# yaml-language-server: $schema=../.schemas/vocab.schema.json
# environment (环境)
- id: ielts-w-001
  track: ielts
  topic: environment
  headword: mitigate
  ipa: /ˈmɪtɪɡeɪt/
  pos: v.
  definitionEn: To make something harmful less severe or serious.
  translationZh: 缓解；减轻
  exampleEn: Governments are investing in flood defenses to mitigate the effects of climate change.
  exampleZh: 各国政府正投资防洪设施，以减轻气候变化的影响。
- id: ielts-w-002
  track: ielts
  topic: environment
  headword: emission
  ipa: /ɪˈmɪʃn/
  pos: n.
  definitionEn: Gas or other substance released into the air.
  translationZh: 排放（物）
  exampleEn: The new regulations aim to cut carbon emissions from factories by half.
  exampleZh: 新法规旨在将工厂的碳排放量削减一半。
- id: ielts-w-003
  track: ielts
  topic: environment
  headword: deforestation
  ipa: /ˌdiːˌfɔːrɪˈsteɪʃn/
  pos: n.
  definitionEn: The cutting down of forests over a large area.
  translationZh: 毁林；滥伐森林
  exampleEn: Deforestation in tropical regions has accelerated the loss of rare species.
  exampleZh: 热带地区的滥伐森林加速了珍稀物种的消失。
- id: ielts-w-004
  track: ielts
  topic: environment
  headword: renewable
  ipa: /rɪˈnuːəbl/
  pos: adj.
  definitionEn: Naturally replaced and never used up, such as wind or solar energy.
  translationZh: 可再生的
  exampleEn: Renewable sources now generate a third of the country's electricity.
  exampleZh: 可再生能源目前提供了该国三分之一的电力。
- id: ielts-w-005
  track: ielts
  topic: environment
  headword: contaminate
  ipa: /kənˈtæmɪneɪt/
  pos: v.
  definitionEn: To make something impure or harmful by adding dangerous substances.
  translationZh: 污染
  exampleEn: Chemical waste from the plant contaminated the river and nearby farmland.
  exampleZh: 工厂排放的化学废料污染了河流和附近的农田。
- id: ielts-w-006
  track: ielts
  topic: environment
  headword: biodiversity
  ipa: /ˌbaɪoʊdaɪˈvɜːrsəti/
  pos: n.
  definitionEn: The variety of plant and animal life in an area.
  translationZh: 生物多样性
  exampleEn: Protecting wetlands is essential for maintaining biodiversity in coastal regions.
  exampleZh: 保护湿地对维持沿海地区的生物多样性至关重要。
- id: ielts-w-007
  track: ielts
  topic: environment
  headword: deplete
  ipa: /dɪˈpliːt/
  pos: v.
  definitionEn: To greatly reduce the amount of something.
  translationZh: 耗尽；使枯竭
  exampleEn: Overfishing has severely depleted fish stocks in many parts of the ocean.
  exampleZh: 过度捕捞已使海洋许多海域的鱼类资源严重枯竭。
- id: ielts-w-008
  track: ielts
  topic: environment
  headword: sustainable
  ipa: /səˈsteɪnəbl/
  pos: adj.
  definitionEn: Able to continue without harming the environment or exhausting resources.
  translationZh: 可持续的
  exampleEn: The city is promoting sustainable transport by expanding its cycling network.
  exampleZh: 该市正通过扩建自行车道网络来推广可持续交通。
- id: ielts-w-009
  track: ielts
  topic: environment
  headword: habitat
  ipa: /ˈhæbɪtæt/
  pos: n.
  definitionEn: The natural home of a plant or animal.
  translationZh: 栖息地
  exampleEn: Urban expansion continues to destroy the natural habitat of many bird species.
  exampleZh: 城市扩张不断破坏许多鸟类的自然栖息地。
- id: ielts-w-010
  track: ielts
  topic: environment
  headword: carbon footprint
  ipa: /ˌkɑːrbən ˈfʊtprɪnt/
  pos: n.
  definitionEn: The amount of carbon dioxide produced by a person's or organization's activities.
  translationZh: 碳足迹
  exampleEn: Companies can reduce their carbon footprint by encouraging employees to work remotely.
  exampleZh: 企业可以通过鼓励员工远程办公来减少碳足迹。
# education (教育)
- id: ielts-w-011
  track: ielts
  topic: education
  headword: curriculum
  ipa: /kəˈrɪkjələm/
  pos: n.
  definitionEn: The subjects taught at a school or university.
  translationZh: 课程体系
  exampleEn: Many universities have added data science to their standard curriculum.
  exampleZh: 许多大学已将数据科学纳入其标准课程体系。
- id: ielts-w-012
  track: ielts
  topic: education
  headword: literacy
  ipa: /ˈlɪtərəsi/
  pos: n.
  definitionEn: The ability to read and write.
  translationZh: 读写能力；识字率
  exampleEn: Improving adult literacy remains a priority in many developing countries.
  exampleZh: 提高成人识字率仍是许多发展中国家的优先任务。
- id: ielts-w-013
  track: ielts
  topic: education
  headword: tuition
  ipa: /tuˈɪʃn/
  pos: n.
  definitionEn: Money paid for being taught, especially at a college or university.
  translationZh: 学费
  exampleEn: Rising tuition fees have discouraged some students from attending university.
  exampleZh: 不断上涨的学费使一些学生放弃了上大学。
- id: ielts-w-014
  track: ielts
  topic: education
  headword: compulsory
  ipa: /kəmˈpʌlsəri/
  pos: adj.
  definitionEn: Required by law or rules; must be done.
  translationZh: 义务的；强制的
  exampleEn: In most countries, education is compulsory until the age of sixteen.
  exampleZh: 在大多数国家，教育在十六岁之前是义务性的。
- id: ielts-w-015
  track: ielts
  topic: education
  headword: vocational
  ipa: /voʊˈkeɪʃənl/
  pos: adj.
  definitionEn: Relating to skills and training needed for a particular job.
  translationZh: 职业的；职业技能的
  exampleEn: Vocational courses give students practical skills that employers value highly.
  exampleZh: 职业课程能让学生掌握雇主非常看重的实用技能。
- id: ielts-w-016
  track: ielts
  topic: education
  headword: enroll
  ipa: /ɪnˈroʊl/
  pos: v.
  definitionEn: To officially register as a member of a course or school.
  translationZh: 注册；入学
  exampleEn: A record number of international students enrolled in the engineering program this year.
  exampleZh: 今年注册工程专业的国际学生人数创下新高。
- id: ielts-w-017
  track: ielts
  topic: education
  headword: assessment
  ipa: /əˈsesmənt/
  pos: n.
  definitionEn: The process of judging the quality of students' work or ability.
  translationZh: 评估；考核
  exampleEn: Continuous assessment gives a fairer picture of ability than a single exam.
  exampleZh: 持续性评估比一次考试更能公平地反映学生能力。
- id: ielts-w-018
  track: ielts
  topic: education
  headword: extracurricular
  ipa: /ˌekstrəkəˈrɪkjələr/
  pos: adj.
  definitionEn: Outside the normal course of study at a school.
  translationZh: 课外的
  exampleEn: Extracurricular activities help students develop teamwork and leadership skills.
  exampleZh: 课外活动有助于学生培养团队合作与领导能力。
- id: ielts-w-019
  track: ielts
  topic: education
  headword: pedagogy
  ipa: /ˈpedəɡɑːdʒi/
  pos: n.
  definitionEn: The method and practice of teaching.
  translationZh: 教学法
  exampleEn: Modern pedagogy encourages discussion rather than passive memorization of facts.
  exampleZh: 现代教学法提倡讨论，而非被动地死记硬背。
- id: ielts-w-020
  track: ielts
  topic: education
  headword: discipline
  ipa: /ˈdɪsəplɪn/
  pos: n.
  definitionEn: Training people to obey rules; also a subject of study.
  translationZh: 纪律；学科
  exampleEn: Strict classroom discipline does not necessarily lead to better academic results.
  exampleZh: 严格的课堂纪律未必能带来更好的学业成绩。
# technology (科技)
- id: ielts-w-021
  track: ielts
  topic: technology
  headword: innovation
  ipa: /ˌɪnəˈveɪʃn/
  pos: n.
  definitionEn: A new idea, method, or invention.
  translationZh: 创新
  exampleEn: Technological innovation has transformed the way companies communicate with customers.
  exampleZh: 技术创新改变了企业与客户沟通的方式。
- id: ielts-w-022
  track: ielts
  topic: technology
  headword: automation
  ipa: /ˌɔːtəˈmeɪʃn/
  pos: n.
  definitionEn: The use of machines to do work previously done by people.
  translationZh: 自动化
  exampleEn: Automation has replaced thousands of routine jobs in the manufacturing sector.
  exampleZh: 自动化已取代了制造业数以千计的常规岗位。
- id: ielts-w-023
  track: ielts
  topic: technology
  headword: obsolete
  ipa: /ˌɑːbsəˈliːt/
  pos: adj.
  definitionEn: No longer used because something newer exists.
  translationZh: 过时的；淘汰的
  exampleEn: Many experts predict that cash will become obsolete within a few decades.
  exampleZh: 许多专家预测，现金将在几十年内被淘汰。
- id: ielts-w-024
  track: ielts
  topic: technology
  headword: cutting-edge
  ipa: /ˌkʌtɪŋ ˈedʒ/
  pos: adj.
  definitionEn: Extremely modern and advanced.
  translationZh: 尖端的；前沿的
  exampleEn: The laboratory uses cutting-edge equipment to analyze genetic data.
  exampleZh: 该实验室使用尖端设备来分析基因数据。
- id: ielts-w-025
  track: ielts
  topic: technology
  headword: breakthrough
  ipa: /ˈbreɪkθruː/
  pos: n.
  definitionEn: An important discovery or development.
  translationZh: 突破
  exampleEn: The breakthrough in battery technology could make electric cars far cheaper.
  exampleZh: 电池技术的突破可能使电动汽车便宜得多。
- id: ielts-w-026
  track: ielts
  topic: technology
  headword: algorithm
  ipa: /ˈælɡərɪðəm/
  pos: n.
  definitionEn: A set of rules a computer follows to solve a problem.
  translationZh: 算法
  exampleEn: Social media algorithms decide which content each user sees first.
  exampleZh: 社交媒体算法决定每个用户最先看到哪些内容。
- id: ielts-w-027
  track: ielts
  topic: technology
  headword: surveillance
  ipa: /sɜːrˈveɪləns/
  pos: n.
  definitionEn: The careful watching of people, especially by governments or technology.
  translationZh: 监控；监视
  exampleEn: The growth of facial recognition has raised concerns about mass surveillance.
  exampleZh: 人脸识别的普及引发了人们对大规模监控的担忧。
- id: ielts-w-028
  track: ielts
  topic: technology
  headword: connectivity
  ipa: /ˌkɑːnekˈtɪvəti/
  pos: n.
  definitionEn: The state of being connected, especially to the internet.
  translationZh: 连通性；网络连接
  exampleEn: Poor internet connectivity still limits online education in rural areas.
  exampleZh: 网络连接不佳仍然制约着农村地区的在线教育。
- id: ielts-w-029
  track: ielts
  topic: technology
  headword: artificial intelligence
  ipa: /ˌɑːrtɪfɪʃl ɪnˈtelɪdʒəns/
  pos: n.
  definitionEn: Computer systems that can perform tasks normally requiring human intelligence.
  translationZh: 人工智能
  exampleEn: Artificial intelligence is increasingly used to diagnose diseases at an early stage.
  exampleZh: 人工智能正越来越多地用于疾病的早期诊断。
- id: ielts-w-030
  track: ielts
  topic: technology
  headword: digitize
  ipa: /ˈdɪdʒɪtaɪz/
  pos: v.
  definitionEn: To convert information into a digital form computers can process.
  translationZh: 数字化
  exampleEn: The national library plans to digitize millions of historical documents.
  exampleZh: 国家图书馆计划将数百万份历史文献数字化。
# society (社会)
- id: ielts-w-031
  track: ielts
  topic: society
  headword: demographic
  ipa: /ˌdeməˈɡræfɪk/
  pos: adj.
  definitionEn: Relating to the structure of a population.
  translationZh: 人口的；人口统计的
  exampleEn: Demographic changes such as aging populations put pressure on healthcare systems.
  exampleZh: 人口老龄化等人口结构变化给医疗体系带来压力。
- id: ielts-w-032
  track: ielts
  topic: society
  headword: urbanization
  ipa: /ˌɜːrbənəˈzeɪʃn/
  pos: n.
  definitionEn: The growth of cities as people move from rural areas.
  translationZh: 城市化
  exampleEn: Rapid urbanization has created severe housing shortages in many developing countries.
  exampleZh: 快速城市化在许多发展中国家造成了严重的住房短缺。
- id: ielts-w-033
  track: ielts
  topic: society
  headword: inequality
  ipa: /ˌɪnɪˈkwɑːləti/
  pos: n.
  definitionEn: An unfair situation where some people have more opportunities or money.
  translationZh: 不平等
  exampleEn: Income inequality has widened despite decades of steady economic growth.
  exampleZh: 尽管经济持续增长了数十年，收入不平等却在扩大。
- id: ielts-w-034
  track: ielts
  topic: society
  headword: welfare
  ipa: /ˈwelfer/
  pos: n.
  definitionEn: Help given by the state to people in need; well-being.
  translationZh: 福利
  exampleEn: The government increased welfare spending to support unemployed workers.
  exampleZh: 政府增加了福利开支以扶助失业人员。
- id: ielts-w-035
  track: ielts
  topic: society
  headword: migration
  ipa: /maɪˈɡreɪʃn/
  pos: n.
  definitionEn: The movement of people from one place to live in another.
  translationZh: 移民；迁移
  exampleEn: Economic pressures have driven large-scale migration from rural villages to cities.
  exampleZh: 经济压力促使人们大规模从农村迁往城市。
- id: ielts-w-036
  track: ielts
  topic: society
  headword: disparity
  ipa: /dɪˈspærəti/
  pos: n.
  definitionEn: A great and unfair difference between people or things.
  translationZh: 差距；悬殊
  exampleEn: There is a clear disparity in educational resources between urban and rural schools.
  exampleZh: 城乡学校之间的教育资源存在明显差距。
- id: ielts-w-037
  track: ielts
  topic: society
  headword: consumerism
  ipa: /kənˈsuːmərɪzəm/
  pos: n.
  definitionEn: The belief that buying more goods is desirable; high consumption.
  translationZh: 消费主义
  exampleEn: Critics argue that consumerism encourages waste and damages the environment.
  exampleZh: 批评者认为消费主义助长浪费并破坏环境。
- id: ielts-w-038
  track: ielts
  topic: society
  headword: infrastructure
  ipa: /ˈɪnfrəstrʌktʃər/
  pos: n.
  definitionEn: Basic systems such as roads, power, and communications that a country needs.
  translationZh: 基础设施
  exampleEn: Investment in public infrastructure creates jobs and supports long-term growth.
  exampleZh: 对公共基础设施的投资能创造就业并支撑长期增长。
- id: ielts-w-039
  track: ielts
  topic: society
  headword: cohesion
  ipa: /koʊˈhiːʒn/
  pos: n.
  definitionEn: The state of a group staying united and working together.
  translationZh: 凝聚力
  exampleEn: Community festivals strengthen social cohesion among residents of different backgrounds.
  exampleZh: 社区节庆活动增强了不同背景居民之间的社会凝聚力。
- id: ielts-w-040
  track: ielts
  topic: society
  headword: unprecedented
  ipa: /ʌnˈpresɪdentɪd/
  pos: adj.
  definitionEn: Never having happened or existed before.
  translationZh: 史无前例的
  exampleEn: The pandemic caused an unprecedented shift toward online learning worldwide.
  exampleZh: 疫情引发了全球范围内向在线学习的空前转变。
# research (学术研究)
- id: ielts-w-041
  track: ielts
  topic: research
  headword: hypothesis
  ipa: /haɪˈpɑːθəsɪs/
  pos: n.
  definitionEn: An idea that is tested through study and experiment.
  translationZh: 假设；假说
  exampleEn: The experiment was designed to test the hypothesis that sleep improves memory.
  exampleZh: 该实验旨在检验睡眠能改善记忆这一假设。
- id: ielts-w-042
  track: ielts
  topic: research
  headword: empirical
  ipa: /ɪmˈpɪrɪkl/
  pos: adj.
  definitionEn: Based on observation or experiment rather than theory.
  translationZh: 实证的；经验的
  exampleEn: There is little empirical evidence to support this widely held belief.
  exampleZh: 几乎没有实证证据支持这一普遍看法。
- id: ielts-w-043
  track: ielts
  topic: research
  headword: methodology
  ipa: /ˌmeθəˈdɑːlədʒi/
  pos: n.
  definitionEn: The set of methods used in a particular study or activity.
  translationZh: 方法论；研究方法
  exampleEn: The paper describes the methodology used to collect and analyze the survey data.
  exampleZh: 该论文阐述了收集和分析调查数据所采用的研究方法。
- id: ielts-w-044
  track: ielts
  topic: research
  headword: variable
  ipa: /ˈveriəbl/
  pos: n.
  definitionEn: A factor in an experiment that can change or be changed.
  translationZh: 变量
  exampleEn: Researchers controlled every variable except the amount of daily exercise.
  exampleZh: 研究人员控制了除每日运动量之外的所有变量。
- id: ielts-w-045
  track: ielts
  topic: research
  headword: correlation
  ipa: /ˌkɔːrəˈleɪʃn/
  pos: n.
  definitionEn: A connection between two things in which one affects the other.
  translationZh: 相关性
  exampleEn: The study found a strong correlation between reading habits and academic performance.
  exampleZh: 研究发现阅读习惯与学业成绩之间存在很强的相关性。
- id: ielts-w-046
  track: ielts
  topic: research
  headword: qualitative
  ipa: /ˈkwɑːlɪteɪtɪv/
  pos: adj.
  definitionEn: Relating to descriptions and qualities rather than numbers.
  translationZh: 定性的
  exampleEn: The team conducted qualitative interviews to understand students' attitudes toward homework.
  exampleZh: 研究团队通过定性访谈了解学生对家庭作业的态度。
- id: ielts-w-047
  track: ielts
  topic: research
  headword: quantitative
  ipa: /ˈkwɑːntɪteɪtɪv/
  pos: adj.
  definitionEn: Relating to numbers and measurable amounts.
  translationZh: 定量的
  exampleEn: Quantitative data from two thousand questionnaires supported the researchers' conclusions.
  exampleZh: 来自两千份问卷的定量数据支持了研究人员的结论。
- id: ielts-w-048
  track: ielts
  topic: research
  headword: phenomenon
  ipa: /fəˈnɑːmɪnən/
  pos: n.
  definitionEn: Something that happens or exists and can be observed.
  translationZh: 现象
  exampleEn: Urban heat islands are a well-documented phenomenon in large modern cities.
  exampleZh: 城市热岛是大型现代城市中记录详实的一种现象。
- id: ielts-w-049
  track: ielts
  topic: research
  headword: bias
  ipa: /ˈbaɪəs/
  pos: n.
  definitionEn: An unfair preference that influences judgment or results.
  translationZh: 偏见；偏差
  exampleEn: A small sample size can introduce serious bias into research findings.
  exampleZh: 样本量过小可能给研究结果带来严重偏差。
- id: ielts-w-050
  track: ielts
  topic: research
  headword: peer review
  ipa: /ˌpɪr rɪˈvjuː/
  pos: n.
  definitionEn: The evaluation of academic work by other experts in the field.
  translationZh: 同行评审
  exampleEn: The findings were published only after a rigorous peer review process.
  exampleZh: 这些研究结果经过严格的同行评审后才得以发表。
# health (健康)
- id: ielts-w-051
  track: ielts
  topic: health
  headword: epidemic
  ipa: /ˌepɪˈdemɪk/
  pos: n.
  definitionEn: A rapid spread of a disease among many people.
  translationZh: 流行病
  exampleEn: The government acted quickly to contain the flu epidemic.
  exampleZh: 政府迅速采取行动以控制流感疫情。
- id: ielts-w-052
  track: ielts
  topic: health
  headword: sedentary
  ipa: /ˈsednteri/
  pos: adj.
  definitionEn: Involving much sitting and little physical activity.
  translationZh: 久坐的
  exampleEn: Sedentary lifestyles are strongly linked to rising obesity rates.
  exampleZh: 久坐的生活方式与肥胖率上升密切相关。
- id: ielts-w-053
  track: ielts
  topic: health
  headword: nutrition
  ipa: /nuˈtrɪʃn/
  pos: n.
  definitionEn: The process of getting the food necessary for health.
  translationZh: 营养
  exampleEn: Good nutrition in childhood lays the foundation for lifelong health.
  exampleZh: 儿童时期的良好营养为终身健康打下基础。
- id: ielts-w-054
  track: ielts
  topic: health
  headword: obesity
  ipa: /oʊˈbiːsəti/
  pos: n.
  definitionEn: The condition of being severely overweight.
  translationZh: 肥胖症
  exampleEn: Obesity among teenagers has doubled over the past two decades.
  exampleZh: 过去二十年，青少年肥胖率翻了一番。
- id: ielts-w-055
  track: ielts
  topic: health
  headword: immunity
  ipa: /ɪˈmjuːnəti/
  pos: n.
  definitionEn: The body's ability to resist infection or disease.
  translationZh: 免疫力
  exampleEn: Vaccination gives the population immunity against measles.
  exampleZh: 接种疫苗使人群获得对麻疹的免疫力。
- id: ielts-w-056
  track: ielts
  topic: health
  headword: longevity
  ipa: /lɔːnˈdʒevəti/
  pos: n.
  definitionEn: Long life; the length of a person's life.
  translationZh: 长寿
  exampleEn: Researchers attribute the islanders' longevity to diet and strong community ties.
  exampleZh: 研究人员将岛民的长寿归因于饮食和紧密的社区关系。
- id: ielts-w-057
  track: ielts
  topic: health
  headword: ailment
  ipa: /ˈeɪlmənt/
  pos: n.
  definitionEn: A minor illness.
  translationZh: 小病；不适
  exampleEn: Pharmacists can treat common ailments without a doctor's prescription.
  exampleZh: 药剂师无需医生处方即可治疗常见小病。
- id: ielts-w-058
  track: ielts
  topic: health
  headword: therapy
  ipa: /ˈθerəpi/
  pos: n.
  definitionEn: Treatment intended to heal a physical or mental condition.
  translationZh: 治疗；疗法
  exampleEn: Music therapy is increasingly used to reduce anxiety in patients.
  exampleZh: 音乐疗法越来越多地被用于缓解病人的焦虑。
- id: ielts-w-059
  track: ielts
  topic: health
  headword: hygiene
  ipa: /ˈhaɪdʒiːn/
  pos: n.
  definitionEn: Practices that keep people and places clean to prevent disease.
  translationZh: 卫生
  exampleEn: Basic hygiene, such as hand washing, prevents many infections.
  exampleZh: 洗手等基本卫生习惯能预防许多感染。
- id: ielts-w-060
  track: ielts
  topic: health
  headword: wellbeing
  ipa: /ˌwelˈbiːɪŋ/
  pos: n.
  definitionEn: The state of being comfortable, healthy, and happy.
  translationZh: 身心健康；幸福感
  exampleEn: Regular exercise improves both physical and mental wellbeing.
  exampleZh: 规律运动能同时改善身体和心理健康。
# urbanization (城市化)
- id: ielts-w-061
  track: ielts
  topic: urbanization
  headword: congestion
  ipa: /kənˈdʒestʃən/
  pos: n.
  definitionEn: Overcrowding, especially of traffic on roads.
  translationZh: 拥堵
  exampleEn: Congestion charges have reduced city-centre traffic by a fifth.
  exampleZh: 拥堵费使市中心车流量减少了五分之一。
- id: ielts-w-062
  track: ielts
  topic: urbanization
  headword: sprawl
  ipa: /sprɔːl/
  pos: n.
  definitionEn: The uncontrolled spread of a city into surrounding areas.
  translationZh: （城市）无序扩张
  exampleEn: Urban sprawl has swallowed farmland on the city's outskirts.
  exampleZh: 城市无序扩张吞噬了市郊的农田。
- id: ielts-w-063
  track: ielts
  topic: urbanization
  headword: amenity
  ipa: /əˈmenəti/
  pos: n.
  definitionEn: A facility that makes life pleasant or convenient.
  translationZh: 便利设施
  exampleEn: The district lacks basic amenities such as parks and libraries.
  exampleZh: 该区缺乏公园、图书馆等基本设施。
- id: ielts-w-064
  track: ielts
  topic: urbanization
  headword: commute
  ipa: /kəˈmjuːt/
  pos: v.
  definitionEn: To travel regularly between home and work.
  translationZh: 通勤
  exampleEn: Millions of residents commute more than an hour each way.
  exampleZh: 数百万居民单程通勤超过一小时。
- id: ielts-w-065
  track: ielts
  topic: urbanization
  headword: high-rise
  ipa: /ˈhaɪ raɪz/
  pos: n.
  definitionEn: A tall building with many floors.
  translationZh: 高层建筑
  exampleEn: High-rises now dominate the skyline of the old harbour district.
  exampleZh: 高楼如今主宰了老港区的天际线。
- id: ielts-w-066
  track: ielts
  topic: urbanization
  headword: pedestrian
  ipa: /pəˈdestriən/
  pos: n.
  definitionEn: A person walking rather than travelling in a vehicle.
  translationZh: 行人
  exampleEn: The city centre was redesigned to give pedestrians priority over cars.
  exampleZh: 市中心经过重新设计，行人享有优先权。
- id: ielts-w-067
  track: ielts
  topic: urbanization
  headword: gentrification
  ipa: /ˌdʒentrɪfɪˈkeɪʃn/
  pos: n.
  definitionEn: Wealthier residents moving in and changing a poorer urban area.
  translationZh: 士绅化
  exampleEn: Gentrification has pushed long-term residents out of the neighbourhood.
  exampleZh: 士绅化把老住户挤出了这个街区。
- id: ielts-w-068
  track: ielts
  topic: urbanization
  headword: metropolitan
  ipa: /ˌmetrəˈpɑːlɪtən/
  pos: adj.
  definitionEn: Relating to a large city and its surrounding areas.
  translationZh: 大都市的
  exampleEn: The metropolitan area produces nearly half of the nation's economic output.
  exampleZh: 该大都市区贡献了全国近一半的经济产出。
- id: ielts-w-069
  track: ielts
  topic: urbanization
  headword: slum
  ipa: /slʌm/
  pos: n.
  definitionEn: A crowded urban area with very poor housing conditions.
  translationZh: 贫民窟
  exampleEn: Rapid migration to cities has expanded slums in many developing countries.
  exampleZh: 人口快速涌入城市使许多发展中国家的贫民窟不断扩大。
- id: ielts-w-070
  track: ielts
  topic: urbanization
  headword: zoning
  ipa: /ˈzoʊnɪŋ/
  pos: n.
  definitionEn: Official rules controlling how land in an area is used.
  translationZh: （土地）分区规划
  exampleEn: Strict zoning laws separate factories from residential districts.
  exampleZh: 严格的分区法规将工厂与居民区分隔开来。
# culture (文化艺术)
- id: ielts-w-071
  track: ielts
  topic: culture
  headword: heritage
  ipa: /ˈherɪtɪdʒ/
  pos: n.
  definitionEn: Traditions, buildings, and culture passed down from the past.
  translationZh: 文化遗产
  exampleEn: The old town was listed as a world heritage site in 1997.
  exampleZh: 这座古城于 1997 年被列为世界遗产。
- id: ielts-w-072
  track: ielts
  topic: culture
  headword: aesthetic
  ipa: /esˈθetɪk/
  pos: adj.
  definitionEn: Concerned with beauty or the appreciation of beauty.
  translationZh: 审美的；美学的
  exampleEn: The bridge was praised for both its engineering and aesthetic value.
  exampleZh: 这座桥的工程价值和美学价值都广受赞誉。
- id: ielts-w-073
  track: ielts
  topic: culture
  headword: exhibition
  ipa: /ˌeksɪˈbɪʃn/
  pos: n.
  definitionEn: A public display of art or other interesting objects.
  translationZh: 展览
  exampleEn: The museum's new exhibition traces the history of printing.
  exampleZh: 博物馆的新展览追溯了印刷术的历史。
- id: ielts-w-074
  track: ielts
  topic: culture
  headword: preservation
  ipa: /ˌprezərˈveɪʃn/
  pos: n.
  definitionEn: Keeping something in its original state and protecting it from damage.
  translationZh: 保护；保存
  exampleEn: Digital scanning aids the preservation of fragile manuscripts.
  exampleZh: 数字扫描有助于脆弱手稿的保存。
- id: ielts-w-075
  track: ielts
  topic: culture
  headword: indigenous
  ipa: /ɪnˈdɪdʒənəs/
  pos: adj.
  definitionEn: Originating naturally in a particular place; native.
  translationZh: 本土的；原住民的
  exampleEn: The gallery devotes an entire wing to indigenous art and craft.
  exampleZh: 美术馆专设一个展区展示原住民艺术与手工艺。
- id: ielts-w-076
  track: ielts
  topic: culture
  headword: folklore
  ipa: /ˈfoʊklɔːr/
  pos: n.
  definitionEn: The traditional stories and customs of a community.
  translationZh: 民间传说；民俗
  exampleEn: Local folklore inspired many of the composer's early works.
  exampleZh: 当地民间传说启发了这位作曲家的许多早期作品。
- id: ielts-w-077
  track: ielts
  topic: culture
  headword: masterpiece
  ipa: /ˈmæstərpiːs/
  pos: n.
  definitionEn: A work of art done with extraordinary skill.
  translationZh: 杰作
  exampleEn: The restored masterpiece drew record crowds to the gallery.
  exampleZh: 修复后的杰作为美术馆带来了创纪录的人流。
- id: ielts-w-078
  track: ielts
  topic: culture
  headword: patronage
  ipa: /ˈpætrənɪdʒ/
  pos: n.
  definitionEn: Financial support given to artists or organizations.
  translationZh: 赞助；资助
  exampleEn: Renaissance painters depended on the patronage of wealthy families.
  exampleZh: 文艺复兴时期的画家依赖富裕家族的赞助。
- id: ielts-w-079
  track: ielts
  topic: culture
  headword: archive
  ipa: /ˈɑːrkaɪv/
  pos: n.
  definitionEn: A collection of historical documents or records.
  translationZh: 档案；档案馆
  exampleEn: The national archive holds letters dating back four centuries.
  exampleZh: 国家档案馆收藏着四百年前的信件。
- id: ielts-w-080
  track: ielts
  topic: culture
  headword: authenticity
  ipa: /ˌɔːθenˈtɪsəti/
  pos: n.
  definitionEn: The quality of being genuine or real.
  translationZh: 真实性
  exampleEn: Experts questioned the authenticity of the newly discovered painting.
  exampleZh: 专家们质疑这幅新发现画作的真伪。
# economy (经济与工作)
- id: ielts-w-081
  track: ielts
  topic: economy
  headword: recession
  ipa: /rɪˈseʃn/
  pos: n.
  definitionEn: A period when an economy shrinks and unemployment rises.
  translationZh: 经济衰退
  exampleEn: Many small businesses closed during the recession.
  exampleZh: 许多小企业在经济衰退期间倒闭。
- id: ielts-w-082
  track: ielts
  topic: economy
  headword: inflation
  ipa: /ɪnˈfleɪʃn/
  pos: n.
  definitionEn: A general rise in prices over time.
  translationZh: 通货膨胀
  exampleEn: High inflation eroded the real value of workers' wages.
  exampleZh: 高通胀侵蚀了工人工资的实际价值。
- id: ielts-w-083
  track: ielts
  topic: economy
  headword: workforce
  ipa: /ˈwɜːrkfɔːrs/
  pos: n.
  definitionEn: All the people who work in a country or company.
  translationZh: 劳动力
  exampleEn: Women now make up nearly half of the national workforce.
  exampleZh: 如今女性约占全国劳动力的一半。
- id: ielts-w-084
  track: ielts
  topic: economy
  headword: redundancy
  ipa: /rɪˈdʌndənsi/
  pos: n.
  definitionEn: Loss of a job because the employer no longer needs it.
  translationZh: （岗位裁撤造成的）裁员
  exampleEn: The plant closure resulted in six hundred redundancies.
  exampleZh: 工厂关闭导致六百人被裁。
- id: ielts-w-085
  track: ielts
  topic: economy
  headword: subsidy
  ipa: /ˈsʌbsədi/
  pos: n.
  definitionEn: Government money paid to keep prices low or support producers.
  translationZh: 补贴
  exampleEn: Farm subsidies remain a controversial part of the trade agreement.
  exampleZh: 农业补贴仍是该贸易协定中有争议的部分。
- id: ielts-w-086
  track: ielts
  topic: economy
  headword: entrepreneur
  ipa: /ˌɑːntrəprəˈnɜːr/
  pos: n.
  definitionEn: A person who starts and runs their own business.
  translationZh: 创业者；企业家
  exampleEn: The city offers tax breaks to attract young entrepreneurs.
  exampleZh: 该市提供税收优惠以吸引年轻创业者。
- id: ielts-w-087
  track: ielts
  topic: economy
  headword: freelance
  ipa: /ˈfriːlæns/
  pos: adj.
  definitionEn: Working independently for different clients rather than one employer.
  translationZh: 自由职业的
  exampleEn: Freelance designers can choose projects that match their interests.
  exampleZh: 自由设计师可以选择符合自身兴趣的项目。
- id: ielts-w-088
  track: ielts
  topic: economy
  headword: productivity
  ipa: /ˌproʊdʌkˈtɪvəti/
  pos: n.
  definitionEn: The rate at which goods or services are produced.
  translationZh: 生产率
  exampleEn: Investment in training raised productivity across the sector.
  exampleZh: 培训投入提升了整个行业的生产率。
- id: ielts-w-089
  track: ielts
  topic: economy
  headword: austerity
  ipa: /ɔːˈsterəti/
  pos: n.
  definitionEn: Strict government policies to reduce spending and debt.
  translationZh: 财政紧缩
  exampleEn: Years of austerity cut funding for public libraries.
  exampleZh: 多年的财政紧缩削减了公共图书馆的经费。
- id: ielts-w-090
  track: ielts
  topic: economy
  headword: gig economy
  ipa: /ˈɡɪɡ ɪˌkɑːnəmi/
  pos: n.
  definitionEn: A labour market based on short-term and freelance work.
  translationZh: 零工经济
  exampleEn: The gig economy offers flexibility but little job security.
  exampleZh: 零工经济提供了灵活性，但缺乏工作保障。
# media (媒体传播)
- id: ielts-w-091
  track: ielts
  topic: media
  headword: censorship
  ipa: /ˈsensərʃɪp/
  pos: n.
  definitionEn: Official control over what may be published or broadcast.
  translationZh: 审查（制度）
  exampleEn: Strict censorship prevented the documentary from being shown.
  exampleZh: 严格的审查使这部纪录片无法上映。
- id: ielts-w-092
  track: ielts
  topic: media
  headword: misinformation
  ipa: /ˌmɪsɪnfərˈmeɪʃn/
  pos: n.
  definitionEn: False information spread without intent to deceive.
  translationZh: 错误信息
  exampleEn: Health misinformation spreads faster than corrections on social media.
  exampleZh: 在社交媒体上，健康类错误信息比更正传播得更快。
- id: ielts-w-093
  track: ielts
  topic: media
  headword: tabloid
  ipa: /ˈtæblɔɪd/
  pos: n.
  definitionEn: A small-format newspaper focused on sensational stories.
  translationZh: 小报
  exampleEn: The actor sued the tabloid over a fabricated story.
  exampleZh: 这位演员就一则捏造的报道起诉了该小报。
- id: ielts-w-094
  track: ielts
  topic: media
  headword: broadcast
  ipa: /ˈbrɔːdkæst/
  pos: v.
  definitionEn: To send out programmes on television or radio.
  translationZh: 播出；广播
  exampleEn: The interview was broadcast live to a national audience.
  exampleZh: 这次采访面向全国观众现场直播。
- id: ielts-w-095
  track: ielts
  topic: media
  headword: credibility
  ipa: /ˌkredəˈbɪləti/
  pos: n.
  definitionEn: The quality of being trusted and believed.
  translationZh: 可信度
  exampleEn: Repeated errors damaged the newspaper's credibility with readers.
  exampleZh: 屡次出错损害了这家报纸在读者中的可信度。
- id: ielts-w-096
  track: ielts
  topic: media
  headword: sensationalism
  ipa: /senˈseɪʃənəlɪzəm/
  pos: n.
  definitionEn: Presenting news in a shocking way to attract attention.
  translationZh: 煽情主义
  exampleEn: Critics accused the channel of sensationalism in its crime coverage.
  exampleZh: 批评者指责该频道在犯罪报道中哗众取宠。
- id: ielts-w-097
  track: ielts
  topic: media
  headword: anonymity
  ipa: /ˌænəˈnɪməti/
  pos: n.
  definitionEn: The state of having one's name or identity unknown.
  translationZh: 匿名（性）
  exampleEn: Online anonymity encourages both honesty and abuse.
  exampleZh: 网络匿名既催生坦诚，也助长恶意。
- id: ielts-w-098
  track: ielts
  topic: media
  headword: mainstream
  ipa: /ˈmeɪnstriːm/
  pos: adj.
  definitionEn: Accepted or used by most people; conventional.
  translationZh: 主流的
  exampleEn: The theory took decades to enter mainstream science journalism.
  exampleZh: 这一理论历经数十年才进入主流科学报道。
- id: ielts-w-099
  track: ielts
  topic: media
  headword: propaganda
  ipa: /ˌprɑːpəˈɡændə/
  pos: n.
  definitionEn: Biased information used to promote a political cause.
  translationZh: （政治）宣传
  exampleEn: Wartime propaganda portrayed the enemy in dehumanising terms.
  exampleZh: 战时宣传以非人化的方式描绘敌人。
- id: ielts-w-100
  track: ielts
  topic: media
  headword: echo chamber
  ipa: /ˈekoʊ ˌtʃeɪmbər/
  pos: n.
  definitionEn: An environment where people only hear opinions like their own.
  translationZh: 回音室（效应）
  exampleEn: Personalised feeds can trap users inside an echo chamber.
  exampleZh: 个性化推送可能把用户困在回音室里。
