# yaml-language-server: $schema=../.schemas/vocab.schema.json
# environment (环境)
- id: ielts-w-001
  track: ielts
  topic: environment
  headword: mitigate
  ipa: /ˈmɪtɪɡeɪt/
  pos: v.
  definitionEn: To make something harmful less severe or serious.
  translationZh: 缓解；减轻
  exampleEn: Governments are investing in flood defenses to mitigate the effects of climate change.
  exampleZh: 各国政府正投资防洪设施，以减轻气候变化的影响。
- id: ielts-w-002
  track: ielts
  topic: environment
  headword: emission
  ipa: /ɪˈmɪʃn/
  pos: n.
  definitionEn: Gas or other substance released into the air.
  translationZh: 排放（物）
  exampleEn: The new regulations aim to cut carbon emissions from factories by half.
  exampleZh: 新法规旨在将工厂的碳排放量削减一半。
- id: ielts-w-003
  track: ielts
  topic: environment
  headword: deforestation
  ipa: /ˌdiːˌfɔːrɪˈsteɪʃn/
  pos: n.
  definitionEn: The cutting down of forests over a large area.
  translationZh: 毁林；滥伐森林
  exampleEn: Deforestation in tropical regions has accelerated the loss of rare species.
  exampleZh: 热带地区的滥伐森林加速了珍稀物种的消失。
- id: ielts-w-004
  track: ielts
  topic: environment
  headword: renewable
  ipa: /rɪˈnuːəbl/
  pos: adj.
  definitionEn: Naturally replaced and never used up, such as wind or solar energy.
  translationZh: 可再生的
  exampleEn: Renewable sources now generate a third of the country's electricity.
  exampleZh: 可再生能源目前提供了该国三分之一的电力。
- id: ielts-w-005
  track: ielts
  topic: environment
  headword: contaminate
  ipa: /kənˈtæmɪneɪt/
  pos: v.
  definitionEn: To make something impure or harmful by adding dangerous substances.
  translationZh: 污染
  exampleEn: Chemical waste from the plant contaminated the river and nearby farmland.
  exampleZh: 工厂排放的化学废料污染了河流和附近的农田。
- id: ielts-w-006
  track: ielts
  topic: environment
  headword: biodiversity
  ipa: /ˌbaɪoʊdaɪˈvɜːrsəti/
  pos: n.
  definitionEn: The variety of plant and animal life in an area.
  translationZh: 生物多样性
  exampleEn: Protecting wetlands is essential for maintaining biodiversity in coastal regions.
  exampleZh: 保护湿地对维持沿海地区的生物多样性至关重要。
- id: ielts-w-007
  track: ielts
  topic: environment
  headword: deplete
  ipa: /dɪˈpliːt/
  pos: v.
  definitionEn: To greatly reduce the amount of something.
  translationZh: 耗尽；使枯竭
  exampleEn: Overfishing has severely depleted fish stocks in many parts of the ocean.
  exampleZh: 过度捕捞已使海洋许多海域的鱼类资源严重枯竭。
- id: ielts-w-008
  track: ielts
  topic: environment
  headword: sustainable
  ipa: /səˈsteɪnəbl/
  pos: adj.
  definitionEn: Able to continue without harming the environment or exhausting resources.
  translationZh: 可持续的
  exampleEn: The city is promoting sustainable transport by expanding its cycling network.
  exampleZh: 该市正通过扩建自行车道网络来推广可持续交通。
- id: ielts-w-009
  track: ielts
  topic: environment
  headword: habitat
  ipa: /ˈhæbɪtæt/
  pos: n.
  definitionEn: The natural home of a plant or animal.
  translationZh: 栖息地
  exampleEn: Urban expansion continues to destroy the natural habitat of many bird species.
  exampleZh: 城市扩张不断破坏许多鸟类的自然栖息地。
- id: ielts-w-010
  track: ielts
  topic: environment
  headword: carbon footprint
  ipa: /ˌkɑːrbən ˈfʊtprɪnt/
  pos: n.
  definitionEn: The amount of carbon dioxide produced by a person's or organization's activities.
  translationZh: 碳足迹
  exampleEn: Companies can reduce their carbon footprint by encouraging employees to work remotely.
  exampleZh: 企业可以通过鼓励员工远程办公来减少碳足迹。
# education (教育)
- id: ielts-w-011
  track: ielts
  topic: education
  headword: curriculum
  ipa: /kəˈrɪkjələm/
  pos: n.
  definitionEn: The subjects taught at a school or university.
  translationZh: 课程体系
  exampleEn: Many universities have added data science to their standard curriculum.
  exampleZh: 许多大学已将数据科学纳入其标准课程体系。
- id: ielts-w-012
  track: ielts
  topic: education
  headword: literacy
  ipa: /ˈlɪtərəsi/
  pos: n.
  definitionEn: The ability to read and write.
  translationZh: 读写能力；识字率
  exampleEn: Improving adult literacy remains a priority in many developing countries.
  exampleZh: 提高成人识字率仍是许多发展中国家的优先任务。
- id: ielts-w-013
  track: ielts
  topic: education
  headword: tuition
  ipa: /tuˈɪʃn/
  pos: n.
  definitionEn: Money paid for being taught, especially at a college or university.
  translationZh: 学费
  exampleEn: Rising tuition fees have discouraged some students from attending university.
  exampleZh: 不断上涨的学费使一些学生放弃了上大学。
- id: ielts-w-014
  track: ielts
  topic: education
  headword: compulsory
  ipa: /kəmˈpʌlsəri/
  pos: adj.
  definitionEn: Required by law or rules; must be done.
  translationZh: 义务的；强制的
  exampleEn: In most countries, education is compulsory until the age of sixteen.
  exampleZh: 在大多数国家，教育在十六岁之前是义务性的。
- id: ielts-w-015
  track: ielts
  topic: education
  headword: vocational
  ipa: /voʊˈkeɪʃənl/
  pos: adj.
  definitionEn: Relating to skills and training needed for a particular job.
  translationZh: 职业的；职业技能的
  exampleEn: Vocational courses give students practical skills that employers value highly.
  exampleZh: 职业课程能让学生掌握雇主非常看重的实用技能。
- id: ielts-w-016
  track: ielts
  topic: education
  headword: enroll
  ipa: /ɪnˈroʊl/
  pos: v.
  definitionEn: To officially register as a member of a course or school.
  translationZh: 注册；入学
  exampleEn: A record number of international students enrolled in the engineering program this year.
  exampleZh: 今年注册工程专业的国际学生人数创下新高。
- id: ielts-w-017
  track: ielts
  topic: education
  headword: assessment
  ipa: /əˈsesmənt/
  pos: n.
  definitionEn: The process of judging the quality of students' work or ability.
  translationZh: 评估；考核
  exampleEn: Continuous assessment gives a fairer picture of ability than a single exam.
  exampleZh: 持续性评估比一次考试更能公平地反映学生能力。
- id: ielts-w-018
  track: ielts
  topic: education
  headword: extracurricular
  ipa: /ˌekstrəkəˈrɪkjələr/
  pos: adj.
  definitionEn: Outside the normal course of study at a school.
  translationZh: 课外的
  exampleEn: Extracurricular activities help students develop teamwork and leadership skills.
  exampleZh: 课外活动有助于学生培养团队合作与领导能力。
- id: ielts-w-019
  track: ielts
  topic: education
  headword: pedagogy
  ipa: /ˈpedəɡɑːdʒi/
  pos: n.
  definitionEn: The method and practice of teaching.
  translationZh: 教学法
  exampleEn: Modern pedagogy encourages discussion rather than passive memorization of facts.
  exampleZh: 现代教学法提倡讨论，而非被动地死记硬背。
- id: ielts-w-020
  track: ielts
  topic: education
  headword: discipline
  ipa: /ˈdɪsəplɪn/
  pos: n.
  definitionEn: Training people to obey rules; also a subject of study.
  translationZh: 纪律；学科
  exampleEn: Strict classroom discipline does not necessarily lead to better academic results.
  exampleZh: 严格的课堂纪律未必能带来更好的学业成绩。
# technology (科技)
- id: ielts-w-021
  track: ielts
  topic: technology
  headword: innovation
  ipa: /ˌɪnəˈveɪʃn/
  pos: n.
  definitionEn: A new idea, method, or invention.
  translationZh: 创新
  exampleEn: Technological innovation has transformed the way companies communicate with customers.
  exampleZh: 技术创新改变了企业与客户沟通的方式。
- id: ielts-w-022
  track: ielts
  topic: technology
  headword: automation
  ipa: /ˌɔːtəˈmeɪʃn/
  pos: n.
  definitionEn: The use of machines to do work previously done by people.
  translationZh: 自动化
  exampleEn: Automation has replaced thousands of routine jobs in the manufacturing sector.
  exampleZh: 自动化已取代了制造业数以千计的常规岗位。
- id: ielts-w-023
  track: ielts
  topic: technology
  headword: obsolete
  ipa: /ˌɑːbsəˈliːt/
  pos: adj.
  definitionEn: No longer used because something newer exists.
  translationZh: 过时的；淘汰的
  exampleEn: Many experts predict that cash will become obsolete within a few decades.
  exampleZh: 许多专家预测，现金将在几十年内被淘汰。
- id: ielts-w-024
  track: ielts
  topic: technology
  headword: cutting-edge
  ipa: /ˌkʌtɪŋ ˈedʒ/
  pos: adj.
  definitionEn: Extremely modern and advanced.
  translationZh: 尖端的；前沿的
  exampleEn: The laboratory uses cutting-edge equipment to analyze genetic data.
  exampleZh: 该实验室使用尖端设备来分析基因数据。
- id: ielts-w-025
  track: ielts
  topic: technology
  headword: breakthrough
  ipa: /ˈbreɪkθruː/
  pos: n.
  definitionEn: An important discovery or development.
  translationZh: 突破
  exampleEn: The breakthrough in battery technology could make electric cars far cheaper.
  exampleZh: 电池技术的突破可能使电动汽车便宜得多。
- id: ielts-w-026
  track: ielts
  topic: technology
  headword: algorithm
  ipa: /ˈælɡərɪðəm/
  pos: n.
  definitionEn: A set of rules a computer follows to solve a problem.
  translationZh: 算法
  exampleEn: Social media algorithms decide which content each user sees first.
  exampleZh: 社交媒体算法决定每个用户最先看到哪些内容。
- id: ielts-w-027
  track: ielts
  topic: technology
  headword: surveillance
  ipa: /sɜːrˈveɪləns/
  pos: n.
  definitionEn: The careful watching of people, especially by governments or technology.
  translationZh: 监控；监视
  exampleEn: The growth of facial recognition has raised concerns about mass surveillance.
  exampleZh: 人脸识别的普及引发了人们对大规模监控的担忧。
- id: ielts-w-028
  track: ielts
  topic: technology
  headword: connectivity
  ipa: /ˌkɑːnekˈtɪvəti/
  pos: n.
  definitionEn: The state of being connected, especially to the internet.
  translationZh: 连通性；网络连接
  exampleEn: Poor internet connectivity still limits online education in rural areas.
  exampleZh: 网络连接不佳仍然制约着农村地区的在线教育。
- id: ielts-w-029
  track: ielts
  topic: technology
  headword: artificial intelligence
  ipa: /ˌɑːrtɪfɪʃl ɪnˈtelɪdʒəns/
  pos: n.
  definitionEn: Computer systems that can perform tasks normally requiring human intelligence.
  translationZh: 人工智能
  exampleEn: Artificial intelligence is increasingly used to diagnose diseases at an early stage.
  exampleZh: 人工智能正越来越多地用于疾病的早期诊断。
- id: ielts-w-030
  track: ielts
  topic: technology
  headword: digitize
  ipa: /ˈdɪdʒɪtaɪz/
  pos: v.
  definitionEn: To convert information into a digital form computers can process.
  translationZh: 数字化
  exampleEn: The national library plans to digitize millions of historical documents.
  exampleZh: 国家图书馆计划将数百万份历史文献数字化。
# society (社会)
- id: ielts-w-031
  track: ielts
  topic: society
  headword: demographic
  ipa: /ˌdeməˈɡræfɪk/
  pos: adj.
  definitionEn: Relating to the structure of a population.
  translationZh: 人口的；人口统计的
  exampleEn: Demographic changes such as aging populations put pressure on healthcare systems.
  exampleZh: 人口老龄化等人口结构变化给医疗体系带来压力。
- id: ielts-w-032
  track: ielts
  topic: society
  headword: urbanization
  ipa: /ˌɜːrbənəˈzeɪʃn/
  pos: n.
  definitionEn: The growth of cities as people move from rural areas.
  translationZh: 城市化
  exampleEn: Rapid urbanization has created severe housing shortages in many developing countries.
  exampleZh: 快速城市化在许多发展中国家造成了严重的住房短缺。
- id: ielts-w-033
  track: ielts
  topic: society
  headword: inequality
  ipa: /ˌɪnɪˈkwɑːləti/
  pos: n.
  definitionEn: An unfair situation where some people have more opportunities or money.
  translationZh: 不平等
  exampleEn: Income inequality has widened despite decades of steady economic growth.
  exampleZh: 尽管经济持续增长了数十年，收入不平等却在扩大。
- id: ielts-w-034
  track: ielts
  topic: society
  headword: welfare
  ipa: /ˈwelfer/
  pos: n.
  definitionEn: Help given by the state to people in need; well-being.
  translationZh: 福利
  exampleEn: The government increased welfare spending to support unemployed workers.
  exampleZh: 政府增加了福利开支以扶助失业人员。
- id: ielts-w-035
  track: ielts
  topic: society
  headword: migration
  ipa: /maɪˈɡreɪʃn/
  pos: n.
  definitionEn: The movement of people from one place to live in another.
  translationZh: 移民；迁移
  exampleEn: Economic pressures have driven large-scale migration from rural villages to cities.
  exampleZh: 经济压力促使人们大规模从农村迁往城市。
- id: ielts-w-036
  track: ielts
  topic: society
  headword: disparity
  ipa: /dɪˈspærəti/
  pos: n.
  definitionEn: A great and unfair difference between people or things.
  translationZh: 差距；悬殊
  exampleEn: There is a clear disparity in educational resources between urban and rural schools.
  exampleZh: 城乡学校之间的教育资源存在明显差距。
- id: ielts-w-037
  track: ielts
  topic: society
  headword: consumerism
  ipa: /kənˈsuːmərɪzəm/
  pos: n.
  definitionEn: The belief that buying more goods is desirable; high consumption.
  translationZh: 消费主义
  exampleEn: Critics argue that consumerism encourages waste and damages the environment.
  exampleZh: 批评者认为消费主义助长浪费并破坏环境。
- id: ielts-w-038
  track: ielts
  topic: society
  headword: infrastructure
  ipa: /ˈɪnfrəstrʌktʃər/
  pos: n.
  definitionEn: Basic systems such as roads, power, and communications that a country needs.
  translationZh: 基础设施
  exampleEn: Investment in public infrastructure creates jobs and supports long-term growth.
  exampleZh: 对公共基础设施的投资能创造就业并支撑长期增长。
- id: ielts-w-039
  track: ielts
  topic: society
  headword: cohesion
  ipa: /koʊˈhiːʒn/
  pos: n.
  definitionEn: The state of a group staying united and working together.
  translationZh: 凝聚力
  exampleEn: Community festivals strengthen social cohesion among residents of different backgrounds.
  exampleZh: 社区节庆活动增强了不同背景居民之间的社会凝聚力。
- id: ielts-w-040
  track: ielts
  topic: society
  headword: unprecedented
  ipa: /ʌnˈpresɪdentɪd/
  pos: adj.
  definitionEn: Never having happened or existed before.
  translationZh: 史无前例的
  exampleEn: The pandemic caused an unprecedented shift toward online learning worldwide.
  exampleZh: 疫情引发了全球范围内向在线学习的空前转变。
# research (学术研究)
- id: ielts-w-041
  track: ielts
  topic: research
  headword: hypothesis
  ipa: /haɪˈpɑːθəsɪs/
  pos: n.
  definitionEn: An idea that is tested through study and experiment.
  translationZh: 假设；假说
  exampleEn: The experiment was designed to test the hypothesis that sleep improves memory.
  exampleZh: 该实验旨在检验睡眠能改善记忆这一假设。
- id: ielts-w-042
  track: ielts
  topic: research
  headword: empirical
  ipa: /ɪmˈpɪrɪkl/
  pos: adj.
  definitionEn: Based on observation or experiment rather than theory.
  translationZh: 实证的；经验的
  exampleEn: There is little empirical evidence to support this widely held belief.
  exampleZh: 几乎没有实证证据支持这一普遍看法。
- id: ielts-w-043
  track: ielts
  topic: research
  headword: methodology
  ipa: /ˌmeθəˈdɑːlədʒi/
  pos: n.
  definitionEn: The set of methods used in a particular study or activity.
  translationZh: 方法论；研究方法
  exampleEn: The paper describes the methodology used to collect and analyze the survey data.
  exampleZh: 该论文阐述了收集和分析调查数据所采用的研究方法。
- id: ielts-w-044
  track: ielts
  topic: research
  headword: variable
  ipa: /ˈveriəbl/
  pos: n.
  definitionEn: A factor in an experiment that can change or be changed.
  translationZh: 变量
  exampleEn: Researchers controlled every variable except the amount of daily exercise.
  exampleZh: 研究人员控制了除每日运动量之外的所有变量。
- id: ielts-w-045
  track: ielts
  topic: research
  headword: correlation
  ipa: /ˌkɔːrəˈleɪʃn/
  pos: n.
  definitionEn: A connection between two things in which one affects the other.
  translationZh: 相关性
  exampleEn: The study found a strong correlation between reading habits and academic performance.
  exampleZh: 研究发现阅读习惯与学业成绩之间存在很强的相关性。
- id: ielts-w-046
  track: ielts
  topic: research
  headword: qualitative
  ipa: /ˈkwɑːlɪteɪtɪv/
  pos: adj.
  definitionEn: Relating to descriptions and qualities rather than numbers.
  translationZh: 定性的
  exampleEn: The team conducted qualitative interviews to understand students' attitudes toward homework.
  exampleZh: 研究团队通过定性访谈了解学生对家庭作业的态度。
- id: ielts-w-047
  track: ielts
  topic: research
  headword: quantitative
  ipa: /ˈkwɑːntɪteɪtɪv/
  pos: adj.
  definitionEn: Relating to numbers and measurable amounts.
  translationZh: 定量的
  exampleEn: Quantitative data from two thousand questionnaires supported the researchers' conclusions.
  exampleZh: 来自两千份问卷的定量数据支持了研究人员的结论。
- id: ielts-w-048
  track: ielts
  topic: research
  headword: phenomenon
  ipa: /fəˈnɑːmɪnən/
  pos: n.
  definitionEn: Something that happens or exists and can be observed.
  translationZh: 现象
  exampleEn: Urban heat islands are a well-documented phenomenon in large modern cities.
  exampleZh: 城市热岛是大型现代城市中记录详实的一种现象。
- id: ielts-w-049
  track: ielts
  topic: research
  headword: bias
  ipa: /ˈbaɪəs/
  pos: n.
  definitionEn: An unfair preference that influences judgment or results.
  translationZh: 偏见；偏差
  exampleEn: A small sample size can introduce serious bias into research findings.
  exampleZh: 样本量过小可能给研究结果带来严重偏差。
- id: ielts-w-050
  track: ielts
  topic: research
  headword: peer review
  ipa: /ˌpɪr rɪˈvjuː/
  pos: n.
  definitionEn: The evaluation of academic work by other experts in the field.
  translationZh: 同行评审
  exampleEn: The findings were published only after a rigorous peer review process.
  exampleZh: 这些研究结果经过严格的同行评审后才得以发表。
# health (健康)
- id: ielts-w-051
  track: ielts
  topic: health
  headword: epidemic
  ipa: /ˌepɪˈdemɪk/
  pos: n.
  definitionEn: A rapid spread of a disease among many people.
  translationZh: 流行病
  exampleEn: The government acted quickly to contain the flu epidemic.
  exampleZh: 政府迅速采取行动以控制流感疫情。
- id: ielts-w-052
  track: ielts
  topic: health
  headword: sedentary
  ipa: /ˈsednteri/
  pos: adj.
  definitionEn: Involving much sitting and little physical activity.
  translationZh: 久坐的
  exampleEn: Sedentary lifestyles are strongly linked to rising obesity rates.
  exampleZh: 久坐的生活方式与肥胖率上升密切相关。
- id: ielts-w-053
  track: ielts
  topic: health
  headword: nutrition
  ipa: /nuˈtrɪʃn/
  pos: n.
  definitionEn: The process of getting the food necessary for health.
  translationZh: 营养
  exampleEn: Good nutrition in childhood lays the foundation for lifelong health.
  exampleZh: 儿童时期的良好营养为终身健康打下基础。
- id: ielts-w-054
  track: ielts
  topic: health
  headword: obesity
  ipa: /oʊˈbiːsəti/
  pos: n.
  definitionEn: The condition of being severely overweight.
  translationZh: 肥胖症
  exampleEn: Obesity among teenagers has doubled over the past two decades.
  exampleZh: 过去二十年，青少年肥胖率翻了一番。
- id: ielts-w-055
  track: ielts
  topic: health
  headword: immunity
  ipa: /ɪˈmjuːnəti/
  pos: n.
  definitionEn: The body's ability to resist infection or disease.
  translationZh: 免疫力
  exampleEn: Vaccination gives the population immunity against measles.
  exampleZh: 接种疫苗使人群获得对麻疹的免疫力。
- id: ielts-w-056
  track: ielts
  topic: health
  headword: longevity
  ipa: /lɔːnˈdʒevəti/
  pos: n.
  definitionEn: Long life; the length of a person's life.
  translationZh: 长寿
  exampleEn: Researchers attribute the islanders' longevity to diet and strong community ties.
  exampleZh: 研究人员将岛民的长寿归因于饮食和紧密的社区关系。
- id: ielts-w-057
  track: ielts
  topic: health
  headword: ailment
  ipa: /ˈeɪlmənt/
  pos: n.
  definitionEn: A minor illness.
  translationZh: 小病；不适
  exampleEn: Pharmacists can treat common ailments without a doctor's prescription.
  exampleZh: 药剂师无需医生处方即可治疗常见小病。
- id: ielts-w-058
  track: ielts
  topic: health
  headword: therapy
  ipa: /ˈθerəpi/
  pos: n.
  definitionEn: Treatment intended to heal a physical or mental condition.
  translationZh: 治疗；疗法
  exampleEn: Music therapy is increasingly used to reduce anxiety in patients.
  exampleZh: 音乐疗法越来越多地被用于缓解病人的焦虑。
- id: ielts-w-059
  track: ielts
  topic: health
  headword: hygiene
  ipa: /ˈhaɪdʒiːn/
  pos: n.
  definitionEn: Practices that keep people and places clean to prevent disease.
  translationZh: 卫生
  exampleEn: Basic hygiene, such as hand washing, prevents many infections.
  exampleZh: 洗手等基本卫生习惯能预防许多感染。
- id: ielts-w-060
  track: ielts
  topic: health
  headword: wellbeing
  ipa: /ˌwelˈbiːɪŋ/
  pos: n.
  definitionEn: The state of being comfortable, healthy, and happy.
  translationZh: 身心健康；幸福感
  exampleEn: Regular exercise improves both physical and mental wellbeing.
  exampleZh: 规律运动能同时改善身体和心理健康。
# urbanization (城市化)
- id: ielts-w-061
  track: ielts
  topic: urbanization
  headword: congestion
  ipa: /kənˈdʒestʃən/
  pos: n.
  definitionEn: Overcrowding, especially of traffic on roads.
  translationZh: 拥堵
  exampleEn: Congestion charges have reduced city-centre traffic by a fifth.
  exampleZh: 拥堵费使市中心车流量减少了五分之一。
- id: ielts-w-062
  track: ielts
  topic: urbanization
  headword: sprawl
  ipa: /sprɔːl/
  pos: n.
  definitionEn: The uncontrolled spread of a city into surrounding areas.
  translationZh: （城市）无序扩张
  exampleEn: Urban sprawl has swallowed farmland on the city's outskirts.
  exampleZh: 城市无序扩张吞噬了市郊的农田。
- id: ielts-w-063
  track: ielts
  topic: urbanization
  headword: amenity
  ipa: /əˈmenəti/
  pos: n.
  definitionEn: A facility that makes life pleasant or convenient.
  translationZh: 便利设施
  exampleEn: The district lacks basic amenities such as parks and libraries.
  exampleZh: 该区缺乏公园、图书馆等基本设施。
- id: ielts-w-064
  track: ielts
  topic: urbanization
  headword: commute
  ipa: /kəˈmjuːt/
  pos: v.
  definitionEn: To travel regularly between home and work.
  translationZh: 通勤
  exampleEn: Millions of residents commute more than an hour each way.
  exampleZh: 数百万居民单程通勤超过一小时。
- id: ielts-w-065
  track: ielts
  topic: urbanization
  headword: high-rise
  ipa: /ˈhaɪ raɪz/
  pos: n.
  definitionEn: A tall building with many floors.
  translationZh: 高层建筑
  exampleEn: High-rises now dominate the skyline of the old harbour district.
  exampleZh: 高楼如今主宰了老港区的天际线。
- id: ielts-w-066
  track: ielts
  topic: urbanization
  headword: pedestrian
  ipa: /pəˈdestriən/
  pos: n.
  definitionEn: A person walking rather than travelling in a vehicle.
  translationZh: 行人
  exampleEn: The city centre was redesigned to give pedestrians priority over cars.
  exampleZh: 市中心经过重新设计，行人享有优先权。
- id: ielts-w-067
  track: ielts
  topic: urbanization
  headword: gentrification
  ipa: /ˌdʒentrɪfɪˈkeɪʃn/
  pos: n.
  definitionEn: Wealthier residents moving in and changing a poorer urban area.
  translationZh: 士绅化
  exampleEn: Gentrification has pushed long-term residents out of the neighbourhood.
  exampleZh: 士绅化把老住户挤出了这个街区。
- id: ielts-w-068
  track: ielts
  topic: urbanization
  headword: metropolitan
  ipa: /ˌmetrəˈpɑːlɪtən/
  pos: adj.
  definitionEn: Relating to a large city and its surrounding areas.
  translationZh: 大都市的
  exampleEn: The metropolitan area produces nearly half of the nation's economic output.
  exampleZh: 该大都市区贡献了全国近一半的经济产出。
- id: ielts-w-069
  track: ielts
  topic: urbanization
  headword: slum
  ipa: /slʌm/
  pos: n.
  definitionEn: A crowded urban area with very poor housing conditions.
  translationZh: 贫民窟
  exampleEn: Rapid migration to cities has expanded slums in many developing countries.
  exampleZh: 人口快速涌入城市使许多发展中国家的贫民窟不断扩大。
- id: ielts-w-070
  track: ielts
  topic: urbanization
  headword: zoning
  ipa: /ˈzoʊnɪŋ/
  pos: n.
  definitionEn: Official rules controlling how land in an area is used.
  translationZh: （土地）分区规划
  exampleEn: Strict zoning laws separate factories from residential districts.
  exampleZh: 严格的分区法规将工厂与居民区分隔开来。
# culture (文化艺术)
- id: ielts-w-071
  track: ielts
  topic: culture
  headword: heritage
  ipa: /ˈherɪtɪdʒ/
  pos: n.
  definitionEn: Traditions, buildings, and culture passed down from the past.
  translationZh: 文化遗产
  exampleEn: The old town was listed as a world heritage site in 1997.
  exampleZh: 这座古城于 1997 年被列为世界遗产。
- id: ielts-w-072
  track: ielts
  topic: culture
  headword: aesthetic
  ipa: /esˈθetɪk/
  pos: adj.
  definitionEn: Concerned with beauty or the appreciation of beauty.
  translationZh: 审美的；美学的
  exampleEn: The bridge was praised for both its engineering and aesthetic value.
  exampleZh: 这座桥的工程价值和美学价值都广受赞誉。
- id: ielts-w-073
  track: ielts
  topic: culture
  headword: exhibition
  ipa: /ˌeksɪˈbɪʃn/
  pos: n.
  definitionEn: A public display of art or other interesting objects.
  translationZh: 展览
  exampleEn: The museum's new exhibition traces the history of printing.
  exampleZh: 博物馆的新展览追溯了印刷术的历史。
- id: ielts-w-074
  track: ielts
  topic: culture
  headword: preservation
  ipa: /ˌprezərˈveɪʃn/
  pos: n.
  definitionEn: Keeping something in its original state and protecting it from damage.
  translationZh: 保护；保存
  exampleEn: Digital scanning aids the preservation of fragile manuscripts.
  exampleZh: 数字扫描有助于脆弱手稿的保存。
- id: ielts-w-075
  track: ielts
  topic: culture
  headword: indigenous
  ipa: /ɪnˈdɪdʒənəs/
  pos: adj.
  definitionEn: Originating naturally in a particular place; native.
  translationZh: 本土的；原住民的
  exampleEn: The gallery devotes an entire wing to indigenous art and craft.
  exampleZh: 美术馆专设一个展区展示原住民艺术与手工艺。
- id: ielts-w-076
  track: ielts
  topic: culture
  headword: folklore
  ipa: /ˈfoʊklɔːr/
  pos: n.
  definitionEn: The traditional stories and customs of a community.
  translationZh: 民间传说；民俗
  exampleEn: Local folklore inspired many of the composer's early works.
  exampleZh: 当地民间传说启发了这位作曲家的许多早期作品。
- id: ielts-w-077
  track: ielts
  topic: culture
  headword: masterpiece
  ipa: /ˈmæstərpiːs/
  pos: n.
  definitionEn: A work of art done with extraordinary skill.
  translationZh: 杰作
  exampleEn: The restored masterpiece drew record crowds to the gallery.
  exampleZh: 修复后的杰作为美术馆带来了创纪录的人流。
- id: ielts-w-078
  track: ielts
  topic: culture
  headword: patronage
  ipa: /ˈpætrənɪdʒ/
  pos: n.
  definitionEn: Financial support given to artists or organizations.
  translationZh: 赞助；资助
  exampleEn: Renaissance painters depended on the patronage of wealthy families.
  exampleZh: 文艺复兴时期的画家依赖富裕家族的赞助。
- id: ielts-w-079
  track: ielts
  topic: culture
  headword: archive
  ipa: /ˈɑːrkaɪv/
  pos: n.
  definitionEn: A collection of historical documents or records.
  translationZh: 档案；档案馆
  exampleEn: The national archive holds letters dating back four centuries.
  exampleZh: 国家档案馆收藏着四百年前的信件。
- id: ielts-w-080
  track: ielts
  topic: culture
  headword: authenticity
  ipa: /ˌɔːθenˈtɪsəti/
  pos: n.
  definitionEn: The quality of being genuine or real.
  translationZh: 真实性
  exampleEn: Experts questioned the authenticity of the newly discovered painting.
  exampleZh: 专家们质疑这幅新发现画作的真伪。
# economy (经济与工作)
- id: ielts-w-081
  track: ielts
  topic: economy
  headword: recession
  ipa: /rɪˈseʃn/
  pos: n.
  definitionEn: A period when an economy shrinks and unemployment rises.
  translationZh: 经济衰退
  exampleEn: Many small businesses closed during the recession.
  exampleZh: 许多小企业在经济衰退期间倒闭。
- id: ielts-w-082
  track: ielts
  topic: economy
  headword: inflation
  ipa: /ɪnˈfleɪʃn/
  pos: n.
  definitionEn: A general rise in prices over time.
  translationZh: 通货膨胀
  exampleEn: High inflation eroded the real value of workers' wages.
  exampleZh: 高通胀侵蚀了工人工资的实际价值。
- id: ielts-w-083
  track: ielts
  topic: economy
  headword: workforce
  ipa: /ˈwɜːrkfɔːrs/
  pos: n.
  definitionEn: All the people who work in a country or company.
  translationZh: 劳动力
  exampleEn: Women now make up nearly half of the national workforce.
  exampleZh: 如今女性约占全国劳动力的一半。
- id: ielts-w-084
  track: ielts
  topic: economy
  headword: redundancy
  ipa: /rɪˈdʌndənsi/
  pos: n.
  definitionEn: Loss of a job because the employer no longer needs it.
  translationZh: （岗位裁撤造成的）裁员
  exampleEn: The plant closure resulted in six hundred redundancies.
  exampleZh: 工厂关闭导致六百人被裁。
- id: ielts-w-085
  track: ielts
  topic: economy
  headword: subsidy
  ipa: /ˈsʌbsədi/
  pos: n.
  definitionEn: Government money paid to keep prices low or support producers.
  translationZh: 补贴
  exampleEn: Farm subsidies remain a controversial part of the trade agreement.
  exampleZh: 农业补贴仍是该贸易协定中有争议的部分。
- id: ielts-w-086
  track: ielts
  topic: economy
  headword: entrepreneur
  ipa: /ˌɑːntrəprəˈnɜːr/
  pos: n.
  definitionEn: A person who starts and runs their own business.
  translationZh: 创业者；企业家
  exampleEn: The city offers tax breaks to attract young entrepreneurs.
  exampleZh: 该市提供税收优惠以吸引年轻创业者。
- id: ielts-w-087
  track: ielts
  topic: economy
  headword: freelance
  ipa: /ˈfriːlæns/
  pos: adj.
  definitionEn: Working independently for different clients rather than one employer.
  translationZh: 自由职业的
  exampleEn: Freelance designers can choose projects that match their interests.
  exampleZh: 自由设计师可以选择符合自身兴趣的项目。
- id: ielts-w-088
  track: ielts
  topic: economy
  headword: productivity
  ipa: /ˌproʊdʌkˈtɪvəti/
  pos: n.
  definitionEn: The rate at which goods or services are produced.
  translationZh: 生产率
  exampleEn: Investment in training raised productivity across the sector.
  exampleZh: 培训投入提升了整个行业的生产率。
- id: ielts-w-089
  track: ielts
  topic: economy
  headword: austerity
  ipa: /ɔːˈsterəti/
  pos: n.
  definitionEn: Strict government policies to reduce spending and debt.
  translationZh: 财政紧缩
  exampleEn: Years of austerity cut funding for public libraries.
  exampleZh: 多年的财政紧缩削减了公共图书馆的经费。
- id: ielts-w-090
  track: ielts
  topic: economy
  headword: gig economy
  ipa: /ˈɡɪɡ ɪˌkɑːnəmi/
  pos: n.
  definitionEn: A labour market based on short-term and freelance work.
  translationZh: 零工经济
  exampleEn: The gig economy offers flexibility but little job security.
  exampleZh: 零工经济提供了灵活性，但缺乏工作保障。
# media (媒体传播)
- id: ielts-w-091
  track: ielts
  topic: media
  headword: censorship
  ipa: /ˈsensərʃɪp/
  pos: n.
  definitionEn: Official control over what may be published or broadcast.
  translationZh: 审查（制度）
  exampleEn: Strict censorship prevented the documentary from being shown.
  exampleZh: 严格的审查使这部纪录片无法上映。
- id: ielts-w-092
  track: ielts
  topic: media
  headword: misinformation
  ipa: /ˌmɪsɪnfərˈmeɪʃn/
  pos: n.
  definitionEn: False information spread without intent to deceive.
  translationZh: 错误信息
  exampleEn: Health misinformation spreads faster than corrections on social media.
  exampleZh: 在社交媒体上，健康类错误信息比更正传播得更快。
- id: ielts-w-093
  track: ielts
  topic: media
  headword: tabloid
  ipa: /ˈtæblɔɪd/
  pos: n.
  definitionEn: A small-format newspaper focused on sensational stories.
  translationZh: 小报
  exampleEn: The actor sued the tabloid over a fabricated story.
  exampleZh: 这位演员就一则捏造的报道起诉了该小报。
- id: ielts-w-094
  track: ielts
  topic: media
  headword: broadcast
  ipa: /ˈbrɔːdkæst/
  pos: v.
  definitionEn: To send out programmes on television or radio.
  translationZh: 播出；广播
  exampleEn: The interview was broadcast live to a national audience.
  exampleZh: 这次采访面向全国观众现场直播。
- id: ielts-w-095
  track: ielts
  topic: media
  headword: credibility
  ipa: /ˌkredəˈbɪləti/
  pos: n.
  definitionEn: The quality of being trusted and believed.
  translationZh: 可信度
  exampleEn: Repeated errors damaged the newspaper's credibility with readers.
  exampleZh: 屡次出错损害了这家报纸在读者中的可信度。
- id: ielts-w-096
  track: ielts
  topic: media
  headword: sensationalism
  ipa: /senˈseɪʃənəlɪzəm/
  pos: n.
  definitionEn: Presenting news in a shocking way to attract attention.
  translationZh: 煽情主义
  exampleEn: Critics accused the channel of sensationalism in its crime coverage.
  exampleZh: 批评者指责该频道在犯罪报道中哗众取宠。
- id: ielts-w-097
  track: ielts
  topic: media
  headword: anonymity
  ipa: /ˌænəˈnɪməti/
  pos: n.
  definitionEn: The state of having one's name or identity unknown.
  translationZh: 匿名（性）
  exampleEn: Online anonymity encourages both honesty and abuse.
  exampleZh: 网络匿名既催生坦诚，也助长恶意。
- id: ielts-w-098
  track: ielts
  topic: media
  headword: mainstream
  ipa: /ˈmeɪnstriːm/
  pos: adj.
  definitionEn: Accepted or used by most people; conventional.
  translationZh: 主流的
  exampleEn: The theory took decades to enter mainstream science journalism.
  exampleZh: 这一理论历经数十年才进入主流科学报道。
- id: ielts-w-099
  track: ielts
  topic: media
  headword: propaganda
  ipa: /ˌprɑːpəˈɡændə/
  pos: n.
  definitionEn: Biased information used to promote a political cause.
  translationZh: （政治）宣传
  exampleEn: Wartime propaganda portrayed the enemy in dehumanising terms.
  exampleZh: 战时宣传以非人化的方式描绘敌人。
- id: ielts-w-100
  track: ielts
  topic: media
  headword: echo chamber
  ipa: /ˈekoʊ ˌtʃeɪmbər/
  pos: n.
  definitionEn: An environment where people only hear opinions like their own.
  translationZh: 回音室（效应）
  exampleEn: Personalised feeds can trap users inside an echo chamber.
  exampleZh: 个性化推送可能把用户困在回音室里。
# energy (能源)
- id: ielts-w-101
  track: ielts
  topic: energy
  headword: depletion
  ipa: /dɪˈpliːʃn/
  pos: n.
  definitionEn: The reduction of something valuable through overuse.
  translationZh: 消耗；枯竭
  exampleEn: The rapid depletion of oil reserves has forced nations to seek alternatives.
  exampleZh: 石油储备的迅速枯竭迫使各国寻找替代能源。
- id: ielts-w-102
  track: ielts
  topic: energy
  headword: consumption
  ipa: /kənˈsʌmpʃn/
  pos: n.
  definitionEn: The amount of energy, goods, or resources used.
  translationZh: 消耗；消费
  exampleEn: Household energy consumption typically peaks during the coldest winter months.
  exampleZh: 家庭能源消耗通常在最寒冷的冬季达到峰值。
- id: ielts-w-103
  track: ielts
  topic: energy
  headword: fossil fuel
  ipa: /ˈfɑːsl fjuːəl/
  pos: n.
  definitionEn: Fuel such as coal or oil formed from ancient organisms.
  translationZh: 化石燃料
  exampleEn: Reducing dependence on fossil fuels is central to most national climate strategies.
  exampleZh: 减少对化石燃料的依赖是多数国家气候战略的核心。
- id: ielts-w-104
  track: ielts
  topic: energy
  headword: turbine
  ipa: /ˈtɜːrbaɪn/
  pos: n.
  definitionEn: A machine with blades turned by wind, water, or steam to generate power.
  translationZh: 涡轮机
  exampleEn: Offshore wind turbines can supply electricity to hundreds of thousands of homes.
  exampleZh: 海上风力涡轮机可为数十万户家庭供电。
- id: ielts-w-105
  track: ielts
  topic: energy
  headword: grid
  ipa: /ɡrɪd/
  pos: n.
  definitionEn: A network of cables supplying electricity across a region.
  translationZh: 电网
  exampleEn: Solar panels allow households to sell surplus power back to the national grid.
  exampleZh: 太阳能电池板让家庭能把多余电力回售给国家电网。
- id: ielts-w-106
  track: ielts
  topic: energy
  headword: efficiency
  ipa: /ɪˈfɪʃnsi/
  pos: n.
  definitionEn: Achieving maximum output with minimum waste of energy or effort.
  translationZh: 效率；能效
  exampleEn: Improving the energy efficiency of old buildings could cut heating bills dramatically.
  exampleZh: 提高老旧建筑的能效可大幅降低取暖费用。
- id: ielts-w-107
  track: ielts
  topic: energy
  headword: harness
  ipa: /ˈhɑːrnɪs/
  pos: v.
  definitionEn: To control and use a natural force to produce power.
  translationZh: 利用；驾驭
  exampleEn: Engineers have long sought better ways to harness the power of the tides.
  exampleZh: 工程师们长期以来一直在寻找更好的方法来利用潮汐能。
- id: ielts-w-108
  track: ielts
  topic: energy
  headword: finite
  ipa: /ˈfaɪnaɪt/
  pos: adj.
  definitionEn: Having a limit; not endless.
  translationZh: 有限的
  exampleEn: Coal and natural gas are finite resources that will eventually run out.
  exampleZh: 煤炭和天然气是终将耗尽的有限资源。
- id: ielts-w-109
  track: ielts
  topic: energy
  headword: photovoltaic
  ipa: /ˌfoʊtoʊvoʊlˈteɪɪk/
  pos: adj.
  definitionEn: Converting sunlight directly into electricity.
  translationZh: 光伏的
  exampleEn: Falling prices have made photovoltaic panels affordable for ordinary homeowners.
  exampleZh: 价格下降使普通家庭也能用得起光伏板。
- id: ielts-w-110
  track: ielts
  topic: energy
  headword: reactor
  ipa: /riˈæktər/
  pos: n.
  definitionEn: A large device that produces nuclear energy.
  translationZh: 反应堆
  exampleEn: The country plans to build four new reactors to secure its electricity supply.
  exampleZh: 该国计划新建四座反应堆以保障电力供应。
# agriculture (农业)
- id: ielts-w-111
  track: ielts
  topic: agriculture
  headword: irrigation
  ipa: /ˌɪrɪˈɡeɪʃn/
  pos: n.
  definitionEn: Supplying water to land so that crops can grow.
  translationZh: 灌溉
  exampleEn: Drip irrigation delivers water directly to the roots and wastes far less.
  exampleZh: 滴灌把水直接送到作物根部，浪费大大减少。
- id: ielts-w-112
  track: ielts
  topic: agriculture
  headword: pesticide
  ipa: /ˈpestɪsaɪd/
  pos: n.
  definitionEn: A chemical used to kill insects that damage crops.
  translationZh: 杀虫剂；农药
  exampleEn: Excessive use of pesticides has been blamed for the decline in bee populations.
  exampleZh: 农药的过度使用被认为是蜜蜂数量减少的原因。
- id: ielts-w-113
  track: ielts
  topic: agriculture
  headword: fertilizer
  ipa: /ˈfɜːrtəlaɪzər/
  pos: n.
  definitionEn: A substance added to soil to help plants grow.
  translationZh: 肥料
  exampleEn: Nitrogen fertilizer washed from fields is polluting rivers and coastal waters.
  exampleZh: 从农田流失的氮肥正在污染河流和近海水域。
- id: ielts-w-114
  track: ielts
  topic: agriculture
  headword: yield
  ipa: /jiːld/
  pos: n.
  definitionEn: The amount of a crop that is produced.
  translationZh: 产量
  exampleEn: New drought-resistant varieties have doubled wheat yields in arid regions.
  exampleZh: 新的抗旱品种使干旱地区的小麦产量翻了一番。
- id: ielts-w-115
  track: ielts
  topic: agriculture
  headword: arable
  ipa: /ˈærəbl/
  pos: adj.
  definitionEn: Suitable for growing crops.
  translationZh: 可耕的；适于耕种的
  exampleEn: Soil erosion is steadily reducing the amount of arable land available.
  exampleZh: 水土流失正不断减少可耕地的面积。
- id: ielts-w-116
  track: ielts
  topic: agriculture
  headword: livestock
  ipa: /ˈlaɪvstɑːk/
  pos: n.
  definitionEn: Farm animals such as cattle, sheep, and pigs.
  translationZh: 牲畜
  exampleEn: Raising livestock accounts for a significant share of global greenhouse gas emissions.
  exampleZh: 饲养牲畜占全球温室气体排放的很大一部分。
- id: ielts-w-117
  track: ielts
  topic: agriculture
  headword: cultivate
  ipa: /ˈkʌltɪveɪt/
  pos: v.
  definitionEn: To prepare land and grow crops on it.
  translationZh: 耕作；种植；培养
  exampleEn: Farmers in the region have cultivated rice terraces for over a thousand years.
  exampleZh: 该地区的农民耕种梯田水稻已有一千多年。
- id: ielts-w-118
  track: ielts
  topic: agriculture
  headword: organic
  ipa: /ɔːrˈɡænɪk/
  pos: adj.
  definitionEn: Produced without artificial chemicals.
  translationZh: 有机的
  exampleEn: Demand for organic vegetables has grown despite their higher prices.
  exampleZh: 尽管价格更高，有机蔬菜的需求仍在增长。
- id: ielts-w-119
  track: ielts
  topic: agriculture
  headword: monoculture
  ipa: /ˈmɑːnoʊkʌltʃər/
  pos: n.
  definitionEn: The practice of growing only one crop on a large area.
  translationZh: 单一栽培
  exampleEn: Monoculture leaves entire harvests vulnerable to a single pest or disease.
  exampleZh: 单一栽培使整季收成容易毁于一种病虫害。
- id: ielts-w-120
  track: ielts
  topic: agriculture
  headword: subsistence
  ipa: /səbˈsɪstəns/
  pos: n.
  definitionEn: The state of having just enough food or money to stay alive.
  translationZh: 勉强维持生计；自给
  exampleEn: Millions of families still depend on subsistence farming for their daily meals.
  exampleZh: 数百万家庭仍靠自给农业维持日常饮食。
# transport (交通运输)
- id: ielts-w-121
  track: ielts
  topic: transport
  headword: freight
  ipa: /freɪt/
  pos: n.
  definitionEn: Goods transported by ship, train, truck, or aircraft.
  translationZh: 货运；货物
  exampleEn: Moving freight by rail produces far less pollution than road transport.
  exampleZh: 铁路货运产生的污染远少于公路运输。
- id: ielts-w-122
  track: ielts
  topic: transport
  headword: transit
  ipa: /ˈtrænzɪt/
  pos: n.
  definitionEn: The system of moving people on public vehicles.
  translationZh: 公共交通；运输
  exampleEn: Investment in public transit reduces both traffic jams and air pollution.
  exampleZh: 对公共交通的投资能同时缓解交通堵塞和空气污染。
- id: ielts-w-123
  track: ielts
  topic: transport
  headword: logistics
  ipa: /ləˈdʒɪstɪks/
  pos: n.
  definitionEn: The detailed organization of moving goods or people.
  translationZh: 物流
  exampleEn: Advanced logistics allow retailers to deliver online orders within hours.
  exampleZh: 先进的物流使零售商能在数小时内送达网上订单。
- id: ielts-w-124
  track: ielts
  topic: transport
  headword: detour
  ipa: /ˈdiːtʊr/
  pos: n.
  definitionEn: A longer route used when the direct one is closed.
  translationZh: 绕行路线
  exampleEn: Drivers faced lengthy detours while the main bridge was under repair.
  exampleZh: 主桥维修期间，司机们不得不长距离绕行。
- id: ielts-w-125
  track: ielts
  topic: transport
  headword: toll
  ipa: /toʊl/
  pos: n.
  definitionEn: Money paid to use a road or bridge.
  translationZh: 通行费
  exampleEn: Electronic tolls have eliminated queues at the motorway entrance.
  exampleZh: 电子收费消除了高速公路入口的排队现象。
- id: ielts-w-126
  track: ielts
  topic: transport
  headword: accessibility
  ipa: /əkˌsesəˈbɪləti/
  pos: n.
  definitionEn: How easy a place or service is to reach or use.
  translationZh: 可达性；无障碍程度
  exampleEn: Low-floor buses have greatly improved accessibility for elderly passengers.
  exampleZh: 低地板公交车大大改善了老年乘客的乘车便利性。
- id: ielts-w-127
  track: ielts
  topic: transport
  headword: autonomous
  ipa: /ɔːˈtɑːnəməs/
  pos: adj.
  definitionEn: Able to operate without human control.
  translationZh: 自动驾驶的；自主的
  exampleEn: Autonomous vehicles could reduce accidents caused by human error.
  exampleZh: 自动驾驶汽车有望减少人为失误造成的事故。
- id: ielts-w-128
  track: ielts
  topic: transport
  headword: mobility
  ipa: /moʊˈbɪləti/
  pos: n.
  definitionEn: The ability to move or travel easily.
  translationZh: 移动性；出行能力
  exampleEn: Shared bicycles offer cheap urban mobility for short journeys.
  exampleZh: 共享单车为短途出行提供了廉价的城市交通方式。
- id: ielts-w-129
  track: ielts
  topic: transport
  headword: fleet
  ipa: /fliːt/
  pos: n.
  definitionEn: A group of vehicles operated by one organization.
  translationZh: 车队；船队
  exampleEn: The city is replacing its ageing bus fleet with electric models.
  exampleZh: 该市正用电动车型替换老化的公交车队。
- id: ielts-w-130
  track: ielts
  topic: transport
  headword: aviation
  ipa: /ˌeɪviˈeɪʃn/
  pos: n.
  definitionEn: The industry of designing and flying aircraft.
  translationZh: 航空（业）
  exampleEn: Aviation accounts for a growing share of global carbon emissions.
  exampleZh: 航空业在全球碳排放中所占比重日益上升。
# tourism (旅游)
- id: ielts-w-131
  track: ielts
  topic: tourism
  headword: itinerary
  ipa: /aɪˈtɪnəreri/
  pos: n.
  definitionEn: A plan of the places visited on a journey.
  translationZh: 行程（表）
  exampleEn: The guided tour follows a fixed itinerary covering five historic cities.
  exampleZh: 这条跟团路线按固定行程游览五座历史名城。
- id: ielts-w-132
  track: ielts
  topic: tourism
  headword: destination
  ipa: /ˌdestɪˈneɪʃn/
  pos: n.
  definitionEn: A place that people travel to.
  translationZh: 目的地
  exampleEn: The island has become a popular destination for honeymooning couples.
  exampleZh: 该岛已成为新婚夫妇热门的蜜月目的地。
- id: ielts-w-133
  track: ielts
  topic: tourism
  headword: hospitality
  ipa: /ˌhɑːspɪˈtæləti/
  pos: n.
  definitionEn: Friendly treatment of guests; the hotel and catering industry.
  translationZh: 热情好客；酒店服务业
  exampleEn: The hospitality industry employs one in ten workers in the region.
  exampleZh: 酒店服务业雇用了该地区十分之一的劳动者。
- id: ielts-w-134
  track: ielts
  topic: tourism
  headword: excursion
  ipa: /ɪkˈskɜːrʒn/
  pos: n.
  definitionEn: A short trip made for pleasure.
  translationZh: 短途旅行；远足
  exampleEn: The cruise offers optional excursions to nearby fishing villages.
  exampleZh: 这条邮轮航线提供前往附近渔村的自选短途游。
- id: ielts-w-135
  track: ielts
  topic: tourism
  headword: souvenir
  ipa: /ˌsuːvəˈnɪr/
  pos: n.
  definitionEn: An object kept as a reminder of a place visited.
  translationZh: 纪念品
  exampleEn: Stalls near the temple sell handmade souvenirs to passing tourists.
  exampleZh: 寺庙附近的摊位向过往游客出售手工纪念品。
- id: ielts-w-136
  track: ielts
  topic: tourism
  headword: ecotourism
  ipa: /ˈiːkoʊtʊrɪzəm/
  pos: n.
  definitionEn: Tourism designed to protect nature and support local people.
  translationZh: 生态旅游
  exampleEn: Ecotourism gives villagers an income that depends on preserving the rainforest.
  exampleZh: 生态旅游让村民的收入与保护雨林息息相关。
- id: ielts-w-137
  track: ielts
  topic: tourism
  headword: off-season
  ipa: /ˈɔːf siːzn/
  pos: adj.
  definitionEn: Happening at a time of year when few tourists visit.
  translationZh: 淡季的
  exampleEn: Off-season travellers enjoy lower prices and far smaller crowds.
  exampleZh: 淡季出行的游客能享受更低的价格和少得多的人流。
- id: ielts-w-138
  track: ielts
  topic: tourism
  headword: commercialize
  ipa: /kəˈmɜːrʃəlaɪz/
  pos: v.
  definitionEn: To run something mainly to make a profit.
  translationZh: 使商业化
  exampleEn: Critics argue the ancient festival has been commercialized beyond recognition.
  exampleZh: 批评者认为这个古老的节日已被商业化得面目全非。
- id: ielts-w-139
  track: ielts
  topic: tourism
  headword: picturesque
  ipa: /ˌpɪktʃəˈresk/
  pos: adj.
  definitionEn: Attractive and charming to look at, like a picture.
  translationZh: 风景如画的
  exampleEn: The picturesque harbour attracts photographers from all over the world.
  exampleZh: 风景如画的港口吸引着世界各地的摄影师。
- id: ielts-w-140
  track: ielts
  topic: tourism
  headword: overcrowding
  ipa: /ˌoʊvərˈkraʊdɪŋ/
  pos: n.
  definitionEn: The presence of too many people in one place.
  translationZh: 过度拥挤
  exampleEn: Overcrowding at the ancient site forced officials to limit daily visitor numbers.
  exampleZh: 古迹的过度拥挤迫使官方限制每日游客数量。
# psychology (心理学)
- id: ielts-w-141
  track: ielts
  topic: psychology
  headword: cognition
  ipa: /kɑːɡˈnɪʃn/
  pos: n.
  definitionEn: The mental process of gaining knowledge and understanding.
  translationZh: 认知
  exampleEn: Regular sleep plays a crucial role in memory and cognition.
  exampleZh: 规律的睡眠对记忆和认知起着关键作用。
- id: ielts-w-142
  track: ielts
  topic: psychology
  headword: perception
  ipa: /pərˈsepʃn/
  pos: n.
  definitionEn: The way something is noticed or understood.
  translationZh: 感知；看法
  exampleEn: Advertising subtly shapes public perception of what a healthy lifestyle looks like.
  exampleZh: 广告潜移默化地塑造公众对健康生活方式的看法。
- id: ielts-w-143
  track: ielts
  topic: psychology
  headword: motivation
  ipa: /ˌmoʊtɪˈveɪʃn/
  pos: n.
  definitionEn: The desire or reason to do something.
  translationZh: 动机；积极性
  exampleEn: Intrinsic motivation predicts academic success better than external rewards.
  exampleZh: 内在动机比外部奖励更能预示学业成功。
- id: ielts-w-144
  track: ielts
  topic: psychology
  headword: resilience
  ipa: /rɪˈzɪliəns/
  pos: n.
  definitionEn: The ability to recover quickly from difficulties.
  translationZh: 心理韧性；恢复力
  exampleEn: Children who learn to cope with small setbacks develop greater resilience.
  exampleZh: 学会应对小挫折的孩子能培养出更强的心理韧性。
- id: ielts-w-145
  track: ielts
  topic: psychology
  headword: introvert
  ipa: /ˈɪntrəvɜːrt/
  pos: n.
  definitionEn: A quiet person who prefers being alone or with few people.
  translationZh: 内向的人
  exampleEn: Open-plan offices can be exhausting environments for introverts.
  exampleZh: 开放式办公室对内向者来说可能非常消耗精力。
- id: ielts-w-146
  track: ielts
  topic: psychology
  headword: subconscious
  ipa: /ˌsʌbˈkɑːnʃəs/
  pos: adj.
  definitionEn: Existing in the mind without one's full awareness.
  translationZh: 潜意识的
  exampleEn: Subconscious biases can influence hiring decisions without recruiters realizing it.
  exampleZh: 潜意识偏见会在招聘者毫无察觉的情况下影响录用决定。
- id: ielts-w-147
  track: ielts
  topic: psychology
  headword: procrastinate
  ipa: /prəˈkræstɪneɪt/
  pos: v.
  definitionEn: To delay doing something that should be done.
  translationZh: 拖延
  exampleEn: Students who procrastinate often produce rushed work of lower quality.
  exampleZh: 爱拖延的学生往往交出仓促完成、质量较低的作业。
- id: ielts-w-148
  track: ielts
  topic: psychology
  headword: empathy
  ipa: /ˈempəθi/
  pos: n.
  definitionEn: The ability to understand and share another person's feelings.
  translationZh: 同理心；共情
  exampleEn: Reading fiction has been shown to strengthen empathy in young readers.
  exampleZh: 研究表明，阅读小说能增强青少年读者的同理心。
- id: ielts-w-149
  track: ielts
  topic: psychology
  headword: peer pressure
  ipa: /ˈpɪr ˌpreʃər/
  pos: n.
  definitionEn: Influence from people of one's own age or group.
  translationZh: 同伴压力
  exampleEn: Teenagers often take up smoking because of peer pressure rather than curiosity.
  exampleZh: 青少年吸烟往往是出于同伴压力而非好奇。
- id: ielts-w-150
  track: ielts
  topic: psychology
  headword: temperament
  ipa: /ˈtemprəmənt/
  pos: n.
  definitionEn: A person's basic nature and usual way of behaving.
  translationZh: 气质；性情
  exampleEn: Studies of twins suggest that temperament is partly inherited.
  exampleZh: 双胞胎研究表明，气质在一定程度上是遗传的。
# history (历史)
- id: ielts-w-151
  track: ielts
  topic: history
  headword: archaeology
  ipa: /ˌɑːrkiˈɑːlədʒi/
  pos: n.
  definitionEn: The study of the past through buried objects and remains.
  translationZh: 考古学
  exampleEn: Advances in archaeology have rewritten the early history of the region.
  exampleZh: 考古学的进展改写了该地区的早期历史。
- id: ielts-w-152
  track: ielts
  topic: history
  headword: artifact
  ipa: /ˈɑːrtɪfækt/
  pos: n.
  definitionEn: An object made by humans, especially one of historical interest.
  translationZh: 人工制品；文物
  exampleEn: The museum returned hundreds of artifacts to their country of origin.
  exampleZh: 博物馆将数百件文物归还给了原属国。
- id: ielts-w-153
  track: ielts
  topic: history
  headword: dynasty
  ipa: /ˈdaɪnəsti/
  pos: n.
  definitionEn: A series of rulers from the same family.
  translationZh: 王朝
  exampleEn: The palace complex was built at the height of the dynasty's power.
  exampleZh: 这处宫殿建筑群建于王朝鼎盛时期。
- id: ielts-w-154
  track: ielts
  topic: history
  headword: excavate
  ipa: /ˈekskəveɪt/
  pos: v.
  definitionEn: To dig carefully to find ancient objects or buildings.
  translationZh: 发掘；挖掘
  exampleEn: The team spent three summers excavating the remains of the Roman villa.
  exampleZh: 考古队花了三个夏天发掘这座罗马别墅的遗迹。
- id: ielts-w-155
  track: ielts
  topic: history
  headword: chronology
  ipa: /krəˈnɑːlədʒi/
  pos: n.
  definitionEn: The order in which a series of events happened.
  translationZh: 年表；时间顺序
  exampleEn: Tree-ring dating helped establish an accurate chronology of the settlement.
  exampleZh: 树木年轮测定法帮助确定了这处聚落的准确年代序列。
- id: ielts-w-156
  track: ielts
  topic: history
  headword: civilization
  ipa: /ˌsɪvələˈzeɪʃn/
  pos: n.
  definitionEn: An organized society with developed culture, laws, and technology.
  translationZh: 文明
  exampleEn: The river valley nurtured one of the world's earliest civilizations.
  exampleZh: 这条河谷孕育了世界上最早的文明之一。
- id: ielts-w-157
  track: ielts
  topic: history
  headword: colonial
  ipa: /kəˈloʊniəl/
  pos: adj.
  definitionEn: Relating to the control of one country by another.
  translationZh: 殖民（时期）的
  exampleEn: Many street names still reflect the city's colonial past.
  exampleZh: 许多街道名称仍映射出这座城市的殖民历史。
- id: ielts-w-158
  track: ielts
  topic: history
  headword: monument
  ipa: /ˈmɑːnjumənt/
  pos: n.
  definitionEn: A structure built to remind people of an event or person.
  translationZh: 纪念碑；历史遗迹
  exampleEn: The stone monument commemorates the soldiers who died in the war.
  exampleZh: 这座石碑纪念在战争中阵亡的士兵。
- id: ielts-w-159
  track: ielts
  topic: history
  headword: medieval
  ipa: /ˌmediˈiːvl/
  pos: adj.
  definitionEn: Relating to the Middle Ages in Europe.
  translationZh: 中世纪的
  exampleEn: The old town's medieval walls remain almost completely intact.
  exampleZh: 老城的中世纪城墙几乎完好无损。
- id: ielts-w-160
  track: ielts
  topic: history
  headword: manuscript
  ipa: /ˈmænjuskrɪpt/
  pos: n.
  definitionEn: A document written by hand, especially an old one.
  translationZh: 手稿；抄本
  exampleEn: Scholars digitized the fragile manuscript so researchers worldwide could study it.
  exampleZh: 学者们将这份脆弱的手稿数字化，供全球研究者研读。
# wildlife (野生动物)
- id: ielts-w-161
  track: ielts
  topic: wildlife
  headword: extinction
  ipa: /ɪkˈstɪŋkʃn/
  pos: n.
  definitionEn: The dying out of an entire species.
  translationZh: 灭绝
  exampleEn: Rhinos face extinction unless illegal hunting is brought under control.
  exampleZh: 若非法捕猎得不到遏制，犀牛将面临灭绝。
- id: ielts-w-162
  track: ielts
  topic: wildlife
  headword: endangered
  ipa: /ɪnˈdeɪndʒərd/
  pos: adj.
  definitionEn: At serious risk of dying out completely.
  translationZh: 濒危的
  exampleEn: The reserve shelters several endangered species, including the snow leopard.
  exampleZh: 该保护区庇护着包括雪豹在内的多种濒危物种。
- id: ielts-w-163
  track: ielts
  topic: wildlife
  headword: predator
  ipa: /ˈpredətər/
  pos: n.
  definitionEn: An animal that hunts and eats other animals.
  translationZh: 捕食者；天敌
  exampleEn: Removing top predators such as wolves upsets the balance of nature.
  exampleZh: 清除狼等顶级捕食者会打破自然界的平衡。
- id: ielts-w-164
  track: ielts
  topic: wildlife
  headword: poaching
  ipa: /ˈpoʊtʃɪŋ/
  pos: n.
  definitionEn: The illegal hunting of wild animals.
  translationZh: 偷猎
  exampleEn: Ivory poaching has halved the elephant population in a single decade.
  exampleZh: 象牙偷猎使大象数量在短短十年间减半。
- id: ielts-w-165
  track: ielts
  topic: wildlife
  headword: conservation
  ipa: /ˌkɑːnsərˈveɪʃn/
  pos: n.
  definitionEn: The protection of nature and wild animals.
  translationZh: （自然）保护
  exampleEn: Local communities play a vital role in successful conservation programmes.
  exampleZh: 当地社区在成功的保护项目中发挥着关键作用。
- id: ielts-w-166
  track: ielts
  topic: wildlife
  headword: ecosystem
  ipa: /ˈiːkoʊsɪstəm/
  pos: n.
  definitionEn: All the living things in an area and their environment.
  translationZh: 生态系统
  exampleEn: Coral reefs are among the most fragile ecosystems on the planet.
  exampleZh: 珊瑚礁是地球上最脆弱的生态系统之一。
- id: ielts-w-167
  track: ielts
  topic: wildlife
  headword: sanctuary
  ipa: /ˈsæŋktʃueri/
  pos: n.
  definitionEn: A protected area where animals can live safely.
  translationZh: 保护区；庇护所
  exampleEn: Rescued orangutans are gradually reintroduced to the wild from the sanctuary.
  exampleZh: 获救的红毛猩猩会从保护区逐步放归野外。
- id: ielts-w-168
  track: ielts
  topic: wildlife
  headword: migratory
  ipa: /ˈmaɪɡrətɔːri/
  pos: adj.
  definitionEn: Moving regularly from one region to another with the seasons.
  translationZh: 迁徙的
  exampleEn: Wind farms are sited carefully to avoid the routes of migratory birds.
  exampleZh: 风电场的选址经过仔细考量，以避开候鸟的迁徙路线。
- id: ielts-w-169
  track: ielts
  topic: wildlife
  headword: captivity
  ipa: /kæpˈtɪvəti/
  pos: n.
  definitionEn: The state of being kept and unable to live freely.
  translationZh: 圈养；囚禁
  exampleEn: Some animals rarely breed in captivity, which makes zoo programmes difficult.
  exampleZh: 有些动物在圈养环境中很少繁殖，这使动物园的繁育项目困难重重。
- id: ielts-w-170
  track: ielts
  topic: wildlife
  headword: species
  ipa: /ˈspiːʃiːz/
  pos: n.
  definitionEn: A group of similar living things that can breed together.
  translationZh: 物种
  exampleEn: Scientists estimate that thousands of insect species remain undiscovered.
  exampleZh: 科学家估计仍有数千种昆虫尚未被发现。
# globalization (全球化)
- id: ielts-w-171
  track: ielts
  topic: globalization
  headword: multinational
  ipa: /ˌmʌltiˈnæʃnəl/
  pos: adj.
  definitionEn: Operating in many different countries.
  translationZh: 跨国的
  exampleEn: Multinational corporations often shift production to countries with lower labour costs.
  exampleZh: 跨国公司常把生产转移到劳动力成本更低的国家。
- id: ielts-w-172
  track: ielts
  topic: globalization
  headword: outsourcing
  ipa: /ˈaʊtsɔːrsɪŋ/
  pos: n.
  definitionEn: Paying an outside company to do work for you.
  translationZh: 外包
  exampleEn: Outsourcing customer service overseas cut costs but frustrated many customers.
  exampleZh: 把客服外包到海外降低了成本，却让许多客户不满。
- id: ielts-w-173
  track: ielts
  topic: globalization
  headword: tariff
  ipa: /ˈtærɪf/
  pos: n.
  definitionEn: A tax on goods entering or leaving a country.
  translationZh: 关税
  exampleEn: Higher tariffs on imported steel raised costs for domestic manufacturers.
  exampleZh: 对进口钢材加征关税抬高了国内制造商的成本。
- id: ielts-w-174
  track: ielts
  topic: globalization
  headword: interdependence
  ipa: /ˌɪntərdɪˈpendəns/
  pos: n.
  definitionEn: A situation in which countries or people rely on each other.
  translationZh: 相互依存
  exampleEn: The pandemic exposed the deep economic interdependence of modern nations.
  exampleZh: 疫情暴露了现代国家之间深度的经济相互依存。
- id: ielts-w-175
  track: ielts
  topic: globalization
  headword: free trade
  ipa: /ˌfriː ˈtreɪd/
  pos: n.
  definitionEn: International trade without taxes or restrictions.
  translationZh: 自由贸易
  exampleEn: Supporters claim free trade lowers prices and widens consumer choice.
  exampleZh: 支持者称自由贸易能降低物价并扩大消费者的选择。
- id: ielts-w-176
  track: ielts
  topic: globalization
  headword: assimilate
  ipa: /əˈsɪməleɪt/
  pos: v.
  definitionEn: To become part of a new culture or group.
  translationZh: 同化；融入
  exampleEn: Second-generation immigrants often assimilate more quickly than their parents.
  exampleZh: 第二代移民往往比父母更快融入当地社会。
- id: ielts-w-177
  track: ielts
  topic: globalization
  headword: supply chain
  ipa: /səˈplaɪ tʃeɪn/
  pos: n.
  definitionEn: The series of steps that move a product from producer to buyer.
  translationZh: 供应链
  exampleEn: A single factory closure can disrupt the entire global supply chain.
  exampleZh: 一家工厂停工就可能扰乱整个全球供应链。
- id: ielts-w-178
  track: ielts
  topic: globalization
  headword: cosmopolitan
  ipa: /ˌkɑːzməˈpɑːlɪtən/
  pos: adj.
  definitionEn: Containing people and influences from many different countries.
  translationZh: 世界性的；国际化的
  exampleEn: The port grew into a cosmopolitan city where dozens of languages were spoken.
  exampleZh: 这座港口发展成一座通行数十种语言的国际化都市。
- id: ielts-w-179
  track: ielts
  topic: globalization
  headword: protectionism
  ipa: /prəˈtekʃənɪzəm/
  pos: n.
  definitionEn: Shielding domestic industries by restricting foreign trade.
  translationZh: 贸易保护主义
  exampleEn: Rising protectionism threatens decades of progress toward open markets.
  exampleZh: 抬头的贸易保护主义威胁着数十年来市场开放的成果。
- id: ielts-w-180
  track: ielts
  topic: globalization
  headword: integration
  ipa: /ˌɪntɪˈɡreɪʃn/
  pos: n.
  definitionEn: The process of combining groups or systems into one whole.
  translationZh: 融合；一体化
  exampleEn: Regional economic integration has boosted trade among neighbouring countries.
  exampleZh: 区域经济一体化促进了邻国之间的贸易。
# employment (就业)
- id: ielts-w-181
  track: ielts
  topic: employment
  headword: recruitment
  ipa: /rɪˈkruːtmənt/
  pos: n.
  definitionEn: The process of finding new people to join an organization.
  translationZh: 招聘
  exampleEn: Online platforms have transformed graduate recruitment in recent years.
  exampleZh: 近年来，线上平台改变了毕业生招聘的方式。
- id: ielts-w-182
  track: ielts
  topic: employment
  headword: remuneration
  ipa: /rɪˌmjuːnəˈreɪʃn/
  pos: n.
  definitionEn: Payment given for work that has been done.
  translationZh: 报酬；薪酬
  exampleEn: Executives' remuneration has risen far faster than average wages.
  exampleZh: 高管薪酬的增长远快于平均工资。
- id: ielts-w-183
  track: ielts
  topic: employment
  headword: internship
  ipa: /ˈɪntɜːrnʃɪp/
  pos: n.
  definitionEn: A period of work experience offered to a student or graduate.
  translationZh: 实习
  exampleEn: A well-chosen internship often leads to a permanent job offer.
  exampleZh: 一段选择得当的实习往往能带来正式工作机会。
- id: ielts-w-184
  track: ielts
  topic: employment
  headword: apprenticeship
  ipa: /əˈprentɪʃɪp/
  pos: n.
  definitionEn: A period of learning a skilled trade while working.
  translationZh: 学徒期；学徒制
  exampleEn: Apprenticeships combine classroom study with paid on-the-job training.
  exampleZh: 学徒制将课堂学习与带薪在岗培训相结合。
- id: ielts-w-185
  track: ielts
  topic: employment
  headword: retention
  ipa: /rɪˈtenʃn/
  pos: n.
  definitionEn: The ability to keep employees or customers over time.
  translationZh: 留任；保留
  exampleEn: Flexible hours have noticeably improved staff retention at the firm.
  exampleZh: 弹性工时明显提高了该公司的员工留任率。
- id: ielts-w-186
  track: ielts
  topic: employment
  headword: turnover
  ipa: /ˈtɜːrnoʊvər/
  pos: n.
  definitionEn: The rate at which employees leave and are replaced.
  translationZh: 人员流动率；营业额
  exampleEn: High staff turnover forces companies to spend heavily on training.
  exampleZh: 高人员流动率迫使企业在培训上投入大量资金。
- id: ielts-w-187
  track: ielts
  topic: employment
  headword: work-life balance
  ipa: /ˌwɜːrk laɪf ˈbæləns/
  pos: n.
  definitionEn: Dividing time sensibly between one's job and personal life.
  translationZh: 工作与生活的平衡
  exampleEn: Remote working has improved work-life balance for many office employees.
  exampleZh: 远程办公改善了许多职员的工作与生活平衡。
- id: ielts-w-188
  track: ielts
  topic: employment
  headword: morale
  ipa: /məˈræl/
  pos: n.
  definitionEn: The level of confidence and enthusiasm in a group.
  translationZh: 士气
  exampleEn: Repeated pay cuts have damaged morale throughout the department.
  exampleZh: 接连降薪挫伤了整个部门的士气。
- id: ielts-w-189
  track: ielts
  topic: employment
  headword: incentive
  ipa: /ɪnˈsentɪv/
  pos: n.
  definitionEn: Something that encourages a person to act or work harder.
  translationZh: 激励；诱因
  exampleEn: Performance bonuses give employees a strong incentive to meet targets.
  exampleZh: 绩效奖金有力地激励员工达成目标。
- id: ielts-w-190
  track: ielts
  topic: employment
  headword: credential
  ipa: /krəˈdenʃl/
  pos: n.
  definitionEn: A qualification or achievement proving someone's ability.
  translationZh: 资历；证书
  exampleEn: Employers increasingly value practical skills over formal credentials.
  exampleZh: 雇主越来越看重实际技能而非正式文凭。
# space (太空探索)
- id: ielts-w-191
  track: ielts
  topic: space
  headword: orbit
  ipa: /ˈɔːrbɪt/
  pos: n.
  definitionEn: The curved path of an object around a planet or star.
  translationZh: 轨道
  exampleEn: Thousands of pieces of debris now circle the Earth in low orbit.
  exampleZh: 如今有成千上万块碎片在近地轨道上环绕地球。
- id: ielts-w-192
  track: ielts
  topic: space
  headword: satellite
  ipa: /ˈsætəlaɪt/
  pos: n.
  definitionEn: An object sent into space to circle the Earth.
  translationZh: 卫星
  exampleEn: Weather satellites give forecasters several days' warning of approaching storms.
  exampleZh: 气象卫星能让预报员提前数天预警来袭的风暴。
- id: ielts-w-193
  track: ielts
  topic: space
  headword: astronaut
  ipa: /ˈæstrənɔːt/
  pos: n.
  definitionEn: A person trained to travel and work in space.
  translationZh: 宇航员
  exampleEn: Astronauts must exercise daily to slow the loss of muscle and bone.
  exampleZh: 宇航员必须每天锻炼，以减缓肌肉和骨骼的流失。
- id: ielts-w-194
  track: ielts
  topic: space
  headword: probe
  ipa: /proʊb/
  pos: n.
  definitionEn: An unmanned spacecraft sent to explore space.
  translationZh: 探测器
  exampleEn: The probe sent back detailed images of the comet's icy surface.
  exampleZh: 探测器传回了彗星冰冻表面的清晰图像。
- id: ielts-w-195
  track: ielts
  topic: space
  headword: gravity
  ipa: /ˈɡrævəti/
  pos: n.
  definitionEn: The force that pulls objects toward the Earth or other bodies.
  translationZh: 重力；引力
  exampleEn: Living without gravity for months changes the human body in unexpected ways.
  exampleZh: 数月的失重生活会以意想不到的方式改变人体。
- id: ielts-w-196
  track: ielts
  topic: space
  headword: telescope
  ipa: /ˈtelɪskoʊp/
  pos: n.
  definitionEn: An instrument that makes distant objects appear closer.
  translationZh: 望远镜
  exampleEn: The space telescope has captured light from galaxies billions of years old.
  exampleZh: 这台太空望远镜捕捉到了数十亿年前星系发出的光。
- id: ielts-w-197
  track: ielts
  topic: space
  headword: launch
  ipa: /lɔːntʃ/
  pos: v.
  definitionEn: To send a rocket or spacecraft into the sky or space.
  translationZh: 发射
  exampleEn: The agency plans to launch its next Mars mission within two years.
  exampleZh: 该机构计划在两年内发射下一次火星任务。
- id: ielts-w-198
  track: ielts
  topic: space
  headword: interstellar
  ipa: /ˌɪntərˈstelər/
  pos: adj.
  definitionEn: Existing or travelling between the stars.
  translationZh: 星际的
  exampleEn: Interstellar travel remains far beyond the reach of current technology.
  exampleZh: 星际旅行仍远超当前技术的能力范围。
- id: ielts-w-199
  track: ielts
  topic: space
  headword: colonize
  ipa: /ˈkɑːlənaɪz/
  pos: v.
  definitionEn: To settle in and take control of a new area or planet.
  translationZh: 移居；在……建立定居点
  exampleEn: Some scientists doubt humans will ever colonize Mars permanently.
  exampleZh: 一些科学家怀疑人类能否在火星永久定居。
- id: ielts-w-200
  track: ielts
  topic: space
  headword: celestial
  ipa: /səˈlestʃl/
  pos: adj.
  definitionEn: Relating to the sky or outer space.
  translationZh: 天体的；天空的
  exampleEn: Ancient navigators steered by the positions of celestial bodies.
  exampleZh: 古代航海者依靠天体的位置导航。
