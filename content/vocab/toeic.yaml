# legal (法律事务)
- id: toeic-w-181
  track: toeic
  topic: legal
  headword: attorney
  ipa: /əˈtɜːrni/
  pos: n.
  definitionEn: A lawyer who represents clients in legal matters.
  translationZh: 律师
  exampleEn: Our attorney reviewed the merger documents before signing.
  exampleZh: 我们的律师在签署前审阅了并购文件。
- id: toeic-w-182
  track: toeic
  topic: legal
  headword: lawsuit
  ipa: /ˈlɔːsuːt/
  pos: n.
  definitionEn: A legal case brought to a court by one party against another.
  translationZh: 诉讼
  exampleEn: The supplier filed a lawsuit over the unpaid deliveries.
  exampleZh: 供应商就拖欠的货款提起了诉讼。
- id: toeic-w-183
  track: toeic
  topic: legal
  headword: plaintiff
  ipa: /ˈpleɪntɪf/
  pos: n.
  definitionEn: The person who starts a legal case against someone.
  translationZh: 原告
  exampleEn: The plaintiff claims the company broke the licensing agreement.
  exampleZh: 原告声称该公司违反了许可协议。
- id: toeic-w-184
  track: toeic
  topic: legal
  headword: settlement
  ipa: /ˈsetlmənt/
  pos: n.
  definitionEn: An official agreement ending a dispute without a trial.
  translationZh: 和解（协议）
  exampleEn: The two firms reached a settlement before the case went to court.
  exampleZh: 两家公司在案件开庭前达成了和解。
- id: toeic-w-185
  track: toeic
  topic: legal
  headword: copyright
  ipa: /ˈkɑːpiraɪt/
  pos: n.
  definitionEn: The legal right to control the use of a creative work.
  translationZh: 版权；著作权
  exampleEn: The publisher holds the copyright to all training materials.
  exampleZh: 出版商拥有全部培训材料的版权。
- id: toeic-w-186
  track: toeic
  topic: legal
  headword: trademark
  ipa: /ˈtreɪdmɑːrk/
  pos: n.
  definitionEn: A registered name or symbol identifying a company's products.
  translationZh: 商标
  exampleEn: The company registered its new logo as a trademark in twelve countries.
  exampleZh: 该公司在十二个国家注册了新标志的商标。
- id: toeic-w-187
  track: toeic
  topic: legal
  headword: confidentiality
  ipa: /ˌkɑːnfɪˌdenʃiˈæləti/
  pos: n.
  definitionEn: The duty to keep information secret.
  translationZh: 保密（性）
  exampleEn: All contractors sign a confidentiality agreement before the project begins.
  exampleZh: 所有承包商在项目开始前都要签署保密协议。
- id: toeic-w-188
  track: toeic
  topic: legal
  headword: regulation
  ipa: /ˌreɡjuˈleɪʃn/
  pos: n.
  definitionEn: An official rule made by a government or authority.
  translationZh: 规章；法规
  exampleEn: New safety regulations require monthly inspections of all equipment.
  exampleZh: 新的安全法规要求每月检查所有设备。
- id: toeic-w-189
  track: toeic
  topic: legal
  headword: sue
  ipa: /suː/
  pos: v.
  definitionEn: To start a legal case against a person or company.
  translationZh: 起诉
  exampleEn: The contractor threatened to sue the developer for unpaid fees.
  exampleZh: 承包商威胁要就拖欠的费用起诉开发商。
- id: toeic-w-190
  track: toeic
  topic: legal
  headword: patent
  ipa: /ˈpætnt/
  pos: n.
  definitionEn: The exclusive legal right to make or sell an invention.
  translationZh: 专利
  exampleEn: The startup filed a patent for its battery technology.
  exampleZh: 这家初创公司为其电池技术申请了专利。
# media (媒体广告)
- id: toeic-w-191
  track: toeic
  topic: media
  headword: advertisement
  ipa: /ˌædvərˈtaɪzmənt/
  pos: n.
  definitionEn: A public notice promoting a product, service, or event.
  translationZh: 广告
  exampleEn: The company placed a full-page advertisement in the business daily.
  exampleZh: 该公司在商业日报上刊登了整版广告。
- id: toeic-w-192
  track: toeic
  topic: media
  headword: broadcast
  ipa: /ˈbrɔːdkæst/
  pos: v.
  definitionEn: To send out a program on television or radio.
  translationZh: 播出；广播
  exampleEn: The interview with the CEO will be broadcast live on Thursday evening.
  exampleZh: 对首席执行官的采访将于周四晚间直播。
- id: toeic-w-193
  track: toeic
  topic: media
  headword: press release
  ipa: /ˈpres rɪˌliːs/
  pos: n.
  definitionEn: An official statement given to the media by an organization.
  translationZh: 新闻稿
  exampleEn: The firm issued a press release announcing the new partnership.
  exampleZh: 公司发布新闻稿，宣布了新的合作关系。
- id: toeic-w-194
  track: toeic
  topic: media
  headword: circulation
  ipa: /ˌsɜːrkjəˈleɪʃn/
  pos: n.
  definitionEn: The number of copies of a newspaper or magazine sold.
  translationZh: 发行量
  exampleEn: The magazine's circulation doubled after its redesign last year.
  exampleZh: 该杂志去年改版后发行量翻了一番。
- id: toeic-w-195
  track: toeic
  topic: media
  headword: editorial
  ipa: /ˌedɪˈtɔːriəl/
  pos: n.
  definitionEn: A newspaper article giving the editor's opinion.
  translationZh: 社论
  exampleEn: Today's editorial criticizes the proposed increase in parking fees.
  exampleZh: 今天的社论批评了上调停车费的提案。
- id: toeic-w-196
  track: toeic
  topic: media
  headword: commercial
  ipa: /kəˈmɜːrʃl/
  pos: n.
  definitionEn: An advertisement broadcast on television or radio.
  translationZh: （电视或广播）广告
  exampleEn: The thirty-second commercial will air during the evening news.
  exampleZh: 这条三十秒的广告将在晚间新闻时段播出。
- id: toeic-w-197
  track: toeic
  topic: media
  headword: journalist
  ipa: /ˈdʒɜːrnəlɪst/
  pos: n.
  definitionEn: A person who writes news reports for the media.
  translationZh: 记者
  exampleEn: Several journalists attended the product launch to interview the designers.
  exampleZh: 多名记者出席产品发布会并采访了设计师。
- id: toeic-w-198
  track: toeic
  topic: media
  headword: sponsor
  ipa: /ˈspɑːnsər/
  pos: v.
  definitionEn: To pay for an event or program in exchange for publicity.
  translationZh: 赞助
  exampleEn: A local bank agreed to sponsor the city marathon this year.
  exampleZh: 一家本地银行同意赞助今年的城市马拉松。
- id: toeic-w-199
  track: toeic
  topic: media
  headword: headline
  ipa: /ˈhedlaɪn/
  pos: n.
  definitionEn: The title printed in large letters above a news story.
  translationZh: （新闻）标题；头条
  exampleEn: The merger made headlines in all the major financial papers.
  exampleZh: 这起并购登上了各大财经报纸的头条。
- id: toeic-w-200
  track: toeic
  topic: media
  headword: feature
