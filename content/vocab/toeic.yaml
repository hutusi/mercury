# yaml-language-server: $schema=../.schemas/vocab.schema.json
# office (办公)
- id: toeic-w-001
  track: toeic
  topic: office
  headword: invoice
  ipa: /ˈɪnvɔɪs/
  pos: n.
  definitionEn: A document listing goods or services provided and the amount due.
  translationZh: 发票；账单
  exampleEn: Please send the invoice to our accounting department by Friday.
  exampleZh: 请在周五前把发票发给我们的财务部门。
- id: toeic-w-002
  track: toeic
  topic: office
  headword: memorandum
  ipa: /ˌmeməˈrændəm/
  pos: n.
  definitionEn: A short official note or report circulated within an organization.
  translationZh: 备忘录
  exampleEn: All staff received a memorandum about the new security procedures yesterday.
  exampleZh: 全体员工昨天收到了一份关于新安全规程的备忘录。
- id: toeic-w-003
  track: toeic
  topic: office
  headword: stationery
  ipa: /ˈsteɪʃəneri/
  pos: n.
  definitionEn: Paper, pens, and other materials used for writing in an office.
  translationZh: 文具
  exampleEn: Please order extra stationery for the new employees starting next Monday.
  exampleZh: 请为下周一入职的新员工订购额外的文具。
- id: toeic-w-004
  track: toeic
  topic: office
  headword: agenda
  ipa: /əˈdʒendə/
  pos: n.
  definitionEn: A list of items to be discussed at a meeting.
  translationZh: 议程
  exampleEn: The budget review is the first item on today's agenda.
  exampleZh: 预算审查是今天议程上的第一项。
- id: toeic-w-005
  track: toeic
  topic: office
  headword: courier
  ipa: /ˈkʊriər/
  pos: n.
  definitionEn: A person or company that delivers documents or packages quickly.
  translationZh: 快递员；快递公司
  exampleEn: The signed documents were sent by courier to the head office this morning.
  exampleZh: 签署好的文件今天上午已由快递送往总部。
- id: toeic-w-006
  track: toeic
  topic: office
  headword: inventory
  ipa: /ˈɪnvəntɔːri/
  pos: n.
  definitionEn: A complete list or stock of goods held by a business.
  translationZh: 库存；存货清单
  exampleEn: Staff will conduct a full inventory of office equipment at the end of the month.
  exampleZh: 员工将在月底对办公设备进行全面盘点。
- id: toeic-w-007
  track: toeic
  topic: office
  headword: malfunction
  ipa: /ˌmælˈfʌŋkʃn/
  pos: n.
  definitionEn: A failure of a machine or system to work correctly.
  translationZh: 故障
  exampleEn: The photocopier malfunction delayed the printing of the conference materials.
  exampleZh: 复印机故障耽误了会议材料的打印。
- id: toeic-w-008
  track: toeic
  topic: office
  headword: expedite
  ipa: /ˈekspədaɪt/
  pos: v.
  definitionEn: To make a process happen more quickly.
  translationZh: 加快；加速办理
  exampleEn: We hired extra staff to expedite the processing of customer orders.
  exampleZh: 我们增聘了人手以加快客户订单的处理。
- id: toeic-w-009
  track: toeic
  topic: office
  headword: premises
  ipa: /ˈpremɪsɪz/
  pos: n.
  definitionEn: The buildings and land occupied by a business.
  translationZh: 经营场所；办公楼
  exampleEn: Visitors must wear identification badges at all times on company premises.
  exampleZh: 访客在公司场所内必须始终佩戴身份识别牌。
- id: toeic-w-010
  track: toeic
  topic: office
  headword: renovation
  ipa: /ˌrenəˈveɪʃn/
  pos: n.
  definitionEn: The act of repairing and improving a building.
  translationZh: 翻新；装修
  exampleEn: The third floor will be closed during the office renovation next month.
  exampleZh: 下个月办公室装修期间，三楼将暂停使用。
# finance (财务)
- id: toeic-w-011
  track: toeic
  topic: finance
  headword: reimburse
  ipa: /ˌriːɪmˈbɜːrs/
  pos: v.
  definitionEn: To pay someone back money they have spent for business purposes.
  translationZh: 报销；偿还
  exampleEn: The company will reimburse employees for travel expenses within two weeks.
  exampleZh: 公司将在两周内为员工报销差旅费用。
- id: toeic-w-012
  track: toeic
  topic: finance
  headword: expenditure
  ipa: /ɪkˈspendɪtʃər/
  pos: n.
  definitionEn: The amount of money spent by an organization.
  translationZh: 支出；开支
  exampleEn: The finance team reviewed last quarter's expenditure to identify possible savings.
  exampleZh: 财务团队审查了上季度的支出，以寻找可节省的空间。
- id: toeic-w-013
  track: toeic
  topic: finance
  headword: audit
  ipa: /ˈɔːdɪt/
  pos: n.
  definitionEn: An official inspection of an organization's financial records.
  translationZh: 审计
  exampleEn: External accountants will conduct the annual audit in early April.
  exampleZh: 外部会计师将于四月初进行年度审计。
- id: toeic-w-014
  track: toeic
  topic: finance
  headword: ledger
  ipa: /ˈledʒər/
  pos: n.
  definitionEn: A book or file recording a company's financial transactions.
  translationZh: 分类账；账簿
  exampleEn: Every payment must be recorded in the general ledger before month-end closing.
  exampleZh: 所有付款都必须在月末结账前记入总账。
- id: toeic-w-015
  track: toeic
  topic: finance
  headword: quarterly
  ipa: /ˈkwɔːrtərli/
  pos: adj.
  definitionEn: Happening or produced four times a year.
  translationZh: 季度的
  exampleEn: The quarterly financial report shows a steady increase in overseas sales.
  exampleZh: 季度财务报告显示海外销售额稳步增长。
- id: toeic-w-016
  track: toeic
  topic: finance
  headword: revenue
  ipa: /ˈrevənuː/
  pos: n.
  definitionEn: The total income a company receives from its business activities.
  translationZh: 收入；营业额
  exampleEn: Online sales now account for nearly half of the company's revenue.
  exampleZh: 线上销售目前占公司收入的近一半。
- id: toeic-w-017
  track: toeic
  topic: finance
  headword: deficit
  ipa: /ˈdefɪsɪt/
  pos: n.
  definitionEn: The amount by which spending exceeds income.
  translationZh: 赤字；亏损
  exampleEn: The department must cut costs to reduce this year's budget deficit.
  exampleZh: 该部门必须削减成本以减少今年的预算赤字。
- id: toeic-w-018
  track: toeic
  topic: finance
  headword: installment
  ipa: /ɪnˈstɔːlmənt/
  pos: n.
  definitionEn: One of several regular payments made over a period of time.
  translationZh: 分期付款
  exampleEn: Clients may pay for the equipment in twelve monthly installments.
  exampleZh: 客户可以分十二个月按月分期支付设备款项。
- id: toeic-w-019
  track: toeic
  topic: finance
  headword: remittance
  ipa: /rɪˈmɪtns/
  pos: n.
  definitionEn: An amount of money sent as payment, especially by mail or bank.
  translationZh: 汇款
  exampleEn: Please include the invoice number with your remittance to avoid processing delays.
  exampleZh: 请在汇款时注明发票号码，以免延误处理。
- id: toeic-w-020
  track: toeic
  topic: finance
  headword: fiscal
  ipa: /ˈfɪskl/
  pos: adj.
  definitionEn: Relating to government or company finances and money management.
  translationZh: 财政的；会计的
  exampleEn: The company's fiscal year ends on March 31 rather than in December.
  exampleZh: 公司的财政年度截止于3月31日，而非12月。
# travel (差旅)
- id: toeic-w-021
  track: toeic
  topic: travel
  headword: itinerary
  ipa: /aɪˈtɪnəreri/
  pos: n.
  definitionEn: A detailed plan of a journey, including routes and schedules.
  translationZh: 行程表
  exampleEn: The assistant emailed a detailed itinerary for the three-day business trip to Tokyo.
  exampleZh: 助理通过电子邮件发送了东京三日商务出差的详细行程表。
- id: toeic-w-022
  track: toeic
  topic: travel
  headword: layover
  ipa: /ˈleɪoʊvər/
  pos: n.
  definitionEn: A short stay between parts of a journey, especially between flights.
  translationZh: 中途停留；转机停留
  exampleEn: The cheapest flight has a four-hour layover in Dubai.
  exampleZh: 最便宜的航班需要在迪拜停留四个小时转机。
- id: toeic-w-023
  track: toeic
  topic: travel
  headword: accommodation
  ipa: /əˌkɑːməˈdeɪʃn/
  pos: n.
  definitionEn: A place to stay, such as a hotel room.
  translationZh: 住宿
  exampleEn: The conference organizers will arrange accommodation for all invited speakers.
  exampleZh: 会议主办方将为所有受邀演讲嘉宾安排住宿。
- id: toeic-w-024
  track: toeic
  topic: travel
  headword: boarding pass
  ipa: /ˈbɔːrdɪŋ pæs/
  pos: n.
  definitionEn: A card that allows a passenger to get on a plane.
  translationZh: 登机牌
  exampleEn: Please have your boarding pass and passport ready at the gate.
  exampleZh: 请在登机口备好登机牌和护照。
- id: toeic-w-025
  track: toeic
  topic: travel
  headword: round-trip
  ipa: /ˌraʊnd ˈtrɪp/
  pos: adj.
  definitionEn: Traveling to a place and back again.
  translationZh: 往返的
  exampleEn: A round-trip ticket to Chicago costs less if you book three weeks ahead.
  exampleZh: 提前三周预订去芝加哥的往返机票会更便宜。
- id: toeic-w-026
  track: toeic
  topic: travel
  headword: customs
  ipa: /ˈkʌstəmz/
  pos: n.
  definitionEn: The government authority that inspects goods and luggage entering a country.
  translationZh: 海关
  exampleEn: After landing, the sales team cleared customs and headed straight to the hotel.
  exampleZh: 落地后，销售团队通过海关，直接前往酒店。
- id: toeic-w-027
  track: toeic
  topic: travel
  headword: carry-on
  ipa: /ˈkæri ɑːn/
  pos: n.
  definitionEn: A small bag that passengers may take onto a plane.
  translationZh: 随身行李
  exampleEn: Laptops must be removed from your carry-on at the security checkpoint.
  exampleZh: 过安检时必须把笔记本电脑从随身行李中取出。
- id: toeic-w-028
  track: toeic
  topic: travel
  headword: fare
  ipa: /fer/
  pos: n.
  definitionEn: The money paid for a journey by bus, train, or plane.
  translationZh: 票价；车费
  exampleEn: Employees may claim the train fare between the airport and the hotel.
  exampleZh: 员工可以报销机场与酒店之间的火车票费用。
- id: toeic-w-029
  track: toeic
  topic: travel
  headword: excursion
  ipa: /ɪkˈskɜːrʒn/
  pos: n.
  definitionEn: A short trip made for pleasure, often by a group.
  translationZh: 短途旅行；远足
  exampleEn: The conference schedule includes a half-day excursion to the old city.
  exampleZh: 会议日程包括一次前往老城区的半日游。
- id: toeic-w-030
  track: toeic
  topic: travel
  headword: reservation
  ipa: /ˌrezərˈveɪʃn/
  pos: n.
  definitionEn: An arrangement to have a room, seat, or table kept for you.
  translationZh: 预订
  exampleEn: I made a reservation for six at the restaurant near the client's office.
  exampleZh: 我在客户办公室附近的餐厅订了六个人的位子。
# contracts (合同)
- id: toeic-w-031
  track: toeic
  topic: contracts
  headword: comply
  ipa: /kəmˈplaɪ/
  pos: v.
  definitionEn: To act according to a rule, agreement, or law.
  translationZh: 遵守；遵从
  exampleEn: All suppliers must comply with the safety standards stated in the contract.
  exampleZh: 所有供应商都必须遵守合同中规定的安全标准。
- id: toeic-w-032
  track: toeic
  topic: contracts
  headword: warranty
  ipa: /ˈwɔːrənti/
  pos: n.
  definitionEn: A written promise to repair or replace a faulty product.
  translationZh: 保修；质保
  exampleEn: The printer comes with a two-year warranty covering parts and labor.
  exampleZh: 这台打印机附带两年保修，涵盖零件和人工费用。
- id: toeic-w-033
  track: toeic
  topic: contracts
  headword: clause
  ipa: /klɔːz/
  pos: n.
  definitionEn: A separate section or condition in a legal document.
  translationZh: 条款
  exampleEn: The lawyer suggested adding a confidentiality clause to the agreement.
  exampleZh: 律师建议在协议中增加一条保密条款。
- id: toeic-w-034
  track: toeic
  topic: contracts
  headword: breach
  ipa: /briːtʃ/
  pos: n.
  definitionEn: An act of breaking a law, promise, or agreement.
  translationZh: 违约；违反
  exampleEn: Late delivery of the goods was considered a breach of contract.
  exampleZh: 货物延迟交付被视为违反合同。
- id: toeic-w-035
  track: toeic
  topic: contracts
  headword: terminate
  ipa: /ˈtɜːrmɪneɪt/
  pos: v.
  definitionEn: To end something officially, such as a contract or employment.
  translationZh: 终止
  exampleEn: Either party may terminate the agreement with thirty days' written notice.
  exampleZh: 任何一方均可提前三十天书面通知终止本协议。
- id: toeic-w-036
  track: toeic
  topic: contracts
  headword: stipulate
  ipa: /ˈstɪpjuleɪt/
  pos: v.
  definitionEn: To state clearly and firmly as a condition of an agreement.
  translationZh: 规定；明确要求
  exampleEn: The contract stipulates that payment must be made within sixty days.
  exampleZh: 合同规定必须在六十天内付款。
- id: toeic-w-037
  track: toeic
  topic: contracts
  headword: provision
  ipa: /prəˈvɪʒn/
  pos: n.
  definitionEn: A condition or arrangement included in a legal document.
  translationZh: 条款；规定
  exampleEn: Under the new provision, the supplier bears all shipping costs.
  exampleZh: 根据新条款，供应商承担全部运费。
- id: toeic-w-038
  track: toeic
  topic: contracts
  headword: liability
  ipa: /ˌlaɪəˈbɪləti/
  pos: n.
  definitionEn: Legal responsibility for damage, loss, or debt.
  translationZh: 法律责任；债务
  exampleEn: The clause limits the manufacturer's liability for damage during transport.
  exampleZh: 该条款限定了制造商对运输途中损坏所承担的责任。
- id: toeic-w-039
  track: toeic
  topic: contracts
  headword: expiration
  ipa: /ˌekspəˈreɪʃn/
  pos: n.
  definitionEn: The end of a period during which something is valid.
  translationZh: 到期；期满
  exampleEn: Please renew the license before its expiration date at the end of June.
  exampleZh: 请在六月底许可证到期日之前完成续期。
- id: toeic-w-040
  track: toeic
  topic: contracts
  headword: amendment
  ipa: /əˈmendmənt/
  pos: n.
  definitionEn: A change or addition made to a contract or law.
  translationZh: 修正案；修改
  exampleEn: Both parties signed an amendment extending the delivery deadline by two weeks.
  exampleZh: 双方签署了一项修正条款，将交货期限延长两周。
# hr (人事)
- id: toeic-w-041
  track: toeic
  topic: hr
  headword: recruit
  ipa: /rɪˈkruːt/
  pos: v.
  definitionEn: To find and hire new people to join a company.
  translationZh: 招聘；招募
  exampleEn: The firm plans to recruit twenty engineers for its new research center.
  exampleZh: 该公司计划为新研发中心招聘二十名工程师。
- id: toeic-w-042
  track: toeic
  topic: hr
  headword: applicant
  ipa: /ˈæplɪkənt/
  pos: n.
  definitionEn: A person who formally applies for a job or position.
  translationZh: 申请人；求职者
  exampleEn: Over three hundred applicants applied for the marketing manager position.
  exampleZh: 超过三百名求职者申请了市场经理这一职位。
- id: toeic-w-043
  track: toeic
  topic: hr
  headword: candidate
  ipa: /ˈkændɪdət/
  pos: n.
  definitionEn: A person being considered for a job or position.
  translationZh: 候选人
  exampleEn: The hiring committee will interview five candidates for the finance director role.
  exampleZh: 招聘委员会将面试五位财务总监职位的候选人。
- id: toeic-w-044
  track: toeic
  topic: hr
  headword: probation
  ipa: /proʊˈbeɪʃn/
  pos: n.
  definitionEn: A trial period during which a new employee's performance is assessed.
  translationZh: 试用期
  exampleEn: New hires complete a three-month probation before their contracts become permanent.
  exampleZh: 新员工需完成三个月试用期，之后合同才转为正式。
- id: toeic-w-045
  track: toeic
  topic: hr
  headword: compensation
  ipa: /ˌkɑːmpenˈseɪʃn/
  pos: n.
  definitionEn: Money and benefits an employee receives for their work.
  translationZh: 薪酬；补偿
  exampleEn: The compensation package includes a base salary, bonuses, and health insurance.
  exampleZh: 薪酬方案包括基本工资、奖金和医疗保险。
- id: toeic-w-046
  track: toeic
  topic: hr
  headword: appraisal
  ipa: /əˈpreɪzl/
  pos: n.
  definitionEn: A formal assessment of an employee's job performance.
  translationZh: 绩效考核；评估
  exampleEn: Managers hold performance appraisals with each team member every June.
  exampleZh: 经理每年六月与每位团队成员进行绩效考核。
- id: toeic-w-047
  track: toeic
  topic: hr
  headword: vacancy
  ipa: /ˈveɪkənsi/
  pos: n.
  definitionEn: A job or position that is available to be filled.
  translationZh: 职位空缺
  exampleEn: The HR department posted a vacancy for a senior accountant on Monday.
  exampleZh: 人力资源部周一发布了一个高级会计师的职位空缺。
- id: toeic-w-048
  track: toeic
  topic: hr
  headword: dismiss
  ipa: /dɪsˈmɪs/
  pos: v.
  definitionEn: To officially remove someone from their job.
  translationZh: 解雇
  exampleEn: The company may dismiss employees who repeatedly violate safety regulations.
  exampleZh: 公司可以解雇屡次违反安全规定的员工。
- id: toeic-w-049
  track: toeic
  topic: hr
  headword: orientation
  ipa: /ˌɔːriənˈteɪʃn/
  pos: n.
  definitionEn: A training session introducing new employees to a company.
  translationZh: 入职培训
  exampleEn: All new staff attend a two-day orientation during their first week.
  exampleZh: 所有新员工在入职第一周参加为期两天的入职培训。
- id: toeic-w-050
  track: toeic
  topic: hr
  headword: résumé
  ipa: /ˈrezəmeɪ/
  pos: n.
  definitionEn: A written summary of your education, skills, and work experience.
  translationZh: 简历
  exampleEn: Please attach your résumé and a cover letter to the online application.
  exampleZh: 请在网上申请中附上简历和求职信。
# marketing (营销)
- id: toeic-w-051
  track: toeic
  topic: marketing
  headword: campaign
  ipa: /kæmˈpeɪn/
  pos: n.
  definitionEn: An organized series of promotional activities to achieve a marketing goal.
  translationZh: 营销活动；宣传攻势
  exampleEn: Our spring campaign increased online sales by thirty percent.
  exampleZh: 我们的春季营销活动使线上销售额增长了百分之三十。
- id: toeic-w-052
  track: toeic
  topic: marketing
  headword: brochure
  ipa: /ˈbroʊʃʊr/
  pos: n.
  definitionEn: A thin booklet describing products or services.
  translationZh: 宣传册
  exampleEn: The travel agency's brochure lists all package tours for the summer season.
  exampleZh: 这家旅行社的宣传册列出了夏季所有的跟团游产品。
- id: toeic-w-053
  track: toeic
  topic: marketing
  headword: endorsement
  ipa: /ɪnˈdɔːrsmənt/
  pos: n.
  definitionEn: Public support for a product, often from a well-known person.
  translationZh: 代言；公开支持
  exampleEn: The athlete's endorsement boosted the brand's credibility among young consumers.
  exampleZh: 这位运动员的代言提升了该品牌在年轻消费者中的可信度。
- id: toeic-w-054
  track: toeic
  topic: marketing
  headword: publicity
  ipa: /pʌˈblɪsəti/
  pos: n.
  definitionEn: Public attention given to a company or product by the media.
  translationZh: 宣传；曝光
  exampleEn: The product recall generated negative publicity for the manufacturer.
  exampleZh: 产品召回给制造商带来了负面舆论。
- id: toeic-w-055
  track: toeic
  topic: marketing
  headword: questionnaire
  ipa: /ˌkwestʃəˈner/
  pos: n.
  definitionEn: A written set of questions used to collect information from people.
  translationZh: 问卷
  exampleEn: Customers who complete the questionnaire will receive a ten-percent coupon.
  exampleZh: 填写问卷的顾客将获得九折优惠券。
- id: toeic-w-056
  track: toeic
  topic: marketing
  headword: launch
  ipa: /lɔːntʃ/
  pos: v.
  definitionEn: To introduce a new product or service to the market.
  translationZh: 推出；上市
  exampleEn: The company plans to launch its new smartphone in October.
  exampleZh: 公司计划十月推出新款智能手机。
- id: toeic-w-057
  track: toeic
  topic: marketing
  headword: testimonial
  ipa: /ˌtestɪˈmoʊniəl/
  pos: n.
  definitionEn: A customer's written statement praising a product or service.
  translationZh: 用户好评；推荐语
  exampleEn: The website features testimonials from satisfied long-term clients.
  exampleZh: 网站上展示了长期老客户的好评。
- id: toeic-w-058
  track: toeic
  topic: marketing
  headword: target audience
  ipa: /ˈtɑːrɡɪt ˈɔːdiəns/
  pos: n.
  definitionEn: The specific group of consumers a product is aimed at.
  translationZh: 目标受众
  exampleEn: Our target audience for this app is commuters in large cities.
  exampleZh: 这款应用的目标受众是大城市的通勤族。
- id: toeic-w-059
  track: toeic
  topic: marketing
  headword: discount
  ipa: /ˈdɪskaʊnt/
  pos: n.
  definitionEn: A reduction from the usual price.
  translationZh: 折扣
  exampleEn: Members receive a fifteen percent discount on all purchases this weekend.
  exampleZh: 会员本周末购物一律享八五折优惠。
- id: toeic-w-060
  track: toeic
  topic: marketing
  headword: subscriber
  ipa: /səbˈskraɪbər/
  pos: n.
  definitionEn: A person who pays regularly to receive a product or service.
  translationZh: 订阅用户
  exampleEn: The newsletter gained two thousand new subscribers after the promotion.
  exampleZh: 促销活动后，该简报新增了两千名订阅用户。
# logistics (物流)
- id: toeic-w-061
  track: toeic
  topic: logistics
  headword: shipment
  ipa: /ˈʃɪpmənt/
  pos: n.
  definitionEn: A quantity of goods sent together to a destination.
  translationZh: 一批货物；装运
  exampleEn: The shipment of office chairs will arrive at the warehouse on Monday.
  exampleZh: 这批办公椅将于周一运抵仓库。
- id: toeic-w-062
  track: toeic
  topic: logistics
  headword: warehouse
  ipa: /ˈwerhaʊs/
  pos: n.
  definitionEn: A large building where goods are stored before distribution.
  translationZh: 仓库
  exampleEn: All returned items are inspected at the central warehouse.
  exampleZh: 所有退货商品都会在中央仓库接受检查。
- id: toeic-w-063
  track: toeic
  topic: logistics
  headword: freight
  ipa: /freɪt/
  pos: n.
  definitionEn: Goods transported in bulk, or the charge for transporting them.
  translationZh: 货运；运费
  exampleEn: Freight costs have risen sharply because of higher fuel prices.
  exampleZh: 由于燃油价格上涨，货运费用大幅上升。
- id: toeic-w-064
  track: toeic
  topic: logistics
  headword: dispatch
  ipa: /dɪˈspætʃ/
  pos: v.
  definitionEn: To send goods or people to a destination.
  translationZh: 发货；派遣
  exampleEn: Orders placed before noon are dispatched the same day.
  exampleZh: 中午前下的订单当天发货。
- id: toeic-w-065
  track: toeic
  topic: logistics
  headword: tracking number
  ipa: /ˈtrækɪŋ ˌnʌmbər/
  pos: n.
  definitionEn: A code used to follow a package during delivery.
  translationZh: 快递单号
  exampleEn: You will receive a tracking number once your parcel leaves our facility.
  exampleZh: 包裹出库后您将收到快递单号。
- id: toeic-w-066
  track: toeic
  topic: logistics
  headword: fragile
  ipa: /ˈfrædʒəl/
  pos: adj.
  definitionEn: Easily broken and needing careful handling.
  translationZh: 易碎的
  exampleEn: Please mark the crate as fragile before loading it onto the truck.
  exampleZh: 装车前请在木箱上标明易碎。
- id: toeic-w-067
  track: toeic
  topic: logistics
  headword: consignment
  ipa: /kənˈsaɪnmənt/
  pos: n.
  definitionEn: A batch of goods sent to someone, often for sale.
  translationZh: 托运货物；寄售货物
  exampleEn: A consignment of laptops was delayed at customs for two days.
  exampleZh: 一批托运的笔记本电脑在海关滞留了两天。
- id: toeic-w-068
  track: toeic
  topic: logistics
  headword: backlog
  ipa: /ˈbæklɔːɡ/
  pos: n.
  definitionEn: An accumulation of work or orders not yet completed.
  translationZh: 积压的工作（或订单）
  exampleEn: The factory is working overtime to clear the backlog of orders.
  exampleZh: 工厂正在加班以消化积压的订单。
- id: toeic-w-069
  track: toeic
  topic: logistics
  headword: distributor
  ipa: /dɪˈstrɪbjətər/
  pos: n.
  definitionEn: A company that buys products and sells them to retailers.
  translationZh: 分销商；经销商
  exampleEn: We are seeking a local distributor for our beverages in Southeast Asia.
  exampleZh: 我们正在东南亚寻找本地饮料分销商。
- id: toeic-w-070
  track: toeic
  topic: logistics
  headword: lead time
  ipa: /ˈliːd taɪm/
  pos: n.
  definitionEn: The time between placing an order and receiving delivery.
  translationZh: 交货周期
  exampleEn: The lead time for customized furniture is approximately six weeks.
  exampleZh: 定制家具的交货周期约为六周。
# support (客服)
- id: toeic-w-071
  track: toeic
  topic: support
  headword: complaint
  ipa: /kəmˈpleɪnt/
  pos: n.
  definitionEn: A statement expressing dissatisfaction with a product or service.
  translationZh: 投诉
  exampleEn: The manager responded to the customer's complaint within twenty-four hours.
  exampleZh: 经理在二十四小时内回应了顾客的投诉。
- id: toeic-w-072
  track: toeic
  topic: support
  headword: refund
  ipa: /ˈriːfʌnd/
  pos: n.
  definitionEn: Money returned to a customer for an unsatisfactory purchase.
  translationZh: 退款
  exampleEn: You may request a full refund within thirty days of purchase.
  exampleZh: 购买后三十天内可申请全额退款。
- id: toeic-w-073
  track: toeic
  topic: support
  headword: inquiry
  ipa: /ɪnˈkwaɪəri/
  pos: n.
  definitionEn: A request for information about products or services.
  translationZh: 咨询；询问
  exampleEn: Our support team handles hundreds of inquiries every day.
  exampleZh: 我们的客服团队每天处理数百条咨询。
- id: toeic-w-074
  track: toeic
  topic: support
  headword: hotline
  ipa: /ˈhɑːtlaɪn/
  pos: n.
  definitionEn: A telephone line providing quick assistance to customers.
  translationZh: 服务热线
  exampleEn: Call our twenty-four-hour hotline if the device stops working.
  exampleZh: 如果设备无法工作，请拨打我们的二十四小时热线。
- id: toeic-w-075
  track: toeic
  topic: support
  headword: apologize
  ipa: /əˈpɑːlədʒaɪz/
  pos: v.
  definitionEn: To say sorry for a mistake or inconvenience.
  translationZh: 道歉
  exampleEn: We sincerely apologize for the delay in processing your order.
  exampleZh: 对于订单处理延误，我们深表歉意。
- id: toeic-w-076
  track: toeic
  topic: support
  headword: defective
  ipa: /dɪˈfektɪv/
  pos: adj.
  definitionEn: Having a fault; not working correctly.
  translationZh: 有缺陷的；有瑕疵的
  exampleEn: Defective items can be exchanged at any of our retail locations.
  exampleZh: 有瑕疵的商品可在我们任一门店换货。
- id: toeic-w-077
  track: toeic
  topic: support
  headword: courteous
  ipa: /ˈkɜːrtiəs/
  pos: adj.
  definitionEn: Polite and respectful in manner.
  translationZh: 彬彬有礼的
  exampleEn: Passengers praised the courteous staff at the check-in counter.
  exampleZh: 乘客们称赞值机柜台的工作人员彬彬有礼。
- id: toeic-w-078
  track: toeic
  topic: support
  headword: resolve
  ipa: /rɪˈzɑːlv/
  pos: v.
  definitionEn: To find a solution to a problem or dispute.
  translationZh: 解决
  exampleEn: The technician resolved the billing issue during the first call.
  exampleZh: 技术人员在第一通电话中就解决了账单问题。
- id: toeic-w-079
  track: toeic
  topic: support
  headword: satisfaction
  ipa: /ˌsætɪsˈfækʃn/
  pos: n.
  definitionEn: The feeling of being pleased with a product or service.
  translationZh: 满意（度）
  exampleEn: The survey shows customer satisfaction has improved this quarter.
  exampleZh: 调查显示本季度客户满意度有所提升。
- id: toeic-w-080
  track: toeic
  topic: support
  headword: goodwill
  ipa: /ˌɡʊdˈwɪl/
  pos: n.
  definitionEn: Friendly feeling shown to customers; a company's good reputation.
  translationZh: 善意；商誉
  exampleEn: As a gesture of goodwill, the airline offered meal vouchers to delayed passengers.
  exampleZh: 作为善意的表示，航空公司向延误的乘客提供了餐券。
# manufacturing (生产制造)
- id: toeic-w-081
  track: toeic
  topic: manufacturing
  headword: assembly line
  ipa: /əˈsembli laɪn/
  pos: n.
  definitionEn: A production arrangement where work passes from station to station.
  translationZh: 装配线；流水线
  exampleEn: The new assembly line doubled the plant's daily output.
  exampleZh: 新装配线使工厂的日产量翻了一番。
- id: toeic-w-082
  track: toeic
  topic: manufacturing
  headword: specification
  ipa: /ˌspesɪfɪˈkeɪʃn/
  pos: n.
  definitionEn: A detailed description of how something should be made or perform.
  translationZh: 规格；技术要求
  exampleEn: All components must meet the specifications listed in the contract.
  exampleZh: 所有部件必须符合合同中列明的规格。
- id: toeic-w-083
  track: toeic
  topic: manufacturing
  headword: prototype
  ipa: /ˈproʊtətaɪp/
  pos: n.
  definitionEn: A first model of a product used for testing.
  translationZh: 原型；样机
  exampleEn: Engineers are testing a prototype of the electric delivery van.
  exampleZh: 工程师们正在测试电动送货车的样机。
- id: toeic-w-084
  track: toeic
  topic: manufacturing
  headword: output
  ipa: /ˈaʊtpʊt/
  pos: n.
  definitionEn: The amount of goods produced by a factory or worker.
  translationZh: 产量
  exampleEn: Monthly output fell after the equipment failure in July.
  exampleZh: 七月设备故障后，月产量有所下降。
- id: toeic-w-085
  track: toeic
  topic: manufacturing
  headword: machinery
  ipa: /məˈʃiːnəri/
  pos: n.
  definitionEn: Machines as a group, especially in a factory.
  translationZh: 机械设备
  exampleEn: The plant invested heavily in modern machinery last year.
  exampleZh: 该工厂去年斥巨资购置现代化机械设备。
- id: toeic-w-086
  track: toeic
  topic: manufacturing
  headword: calibrate
  ipa: /ˈkælɪbreɪt/
  pos: v.
  definitionEn: To adjust an instrument so it measures accurately.
  translationZh: 校准
  exampleEn: Technicians calibrate the scales at the start of every shift.
  exampleZh: 技术人员在每个班次开始时校准秤具。
- id: toeic-w-087
  track: toeic
  topic: manufacturing
  headword: batch
  ipa: /bætʃ/
  pos: n.
  definitionEn: A group of products made together in one production run.
  translationZh: 一批（产品）
  exampleEn: The entire batch was recalled after a labeling error was found.
  exampleZh: 发现标签错误后，整批产品被召回。
- id: toeic-w-088
  track: toeic
  topic: manufacturing
  headword: quality control
  ipa: /ˈkwɑːləti kənˌtroʊl/
  pos: n.
  definitionEn: Checking products to ensure they meet required standards.
  translationZh: 质量控制；质检
  exampleEn: Every device passes through quality control before packaging.
  exampleZh: 每台设备在包装前都要经过质检。
- id: toeic-w-089
  track: toeic
  topic: manufacturing
  headword: raw material
  ipa: /ˌrɔː məˈtɪriəl/
  pos: n.
  definitionEn: A basic substance used to manufacture products.
  translationZh: 原材料
  exampleEn: Rising raw material prices squeezed the company's profit margin.
  exampleZh: 原材料价格上涨压缩了公司的利润空间。
- id: toeic-w-090
  track: toeic
  topic: manufacturing
  headword: hazard
  ipa: /ˈhæzərd/
  pos: n.
  definitionEn: Something that can cause danger or harm.
  translationZh: 危险；隐患
  exampleEn: Workers must report any safety hazard on the factory floor immediately.
  exampleZh: 工人必须立即报告车间内的任何安全隐患。
# technology (信息技术)
- id: toeic-w-091
  track: toeic
  topic: technology
  headword: install
  ipa: /ɪnˈstɔːl/
  pos: v.
  definitionEn: To put software or equipment in place for use.
  translationZh: 安装
  exampleEn: Please install the latest update before tomorrow's system check.
  exampleZh: 请在明天系统检查前安装最新更新。
- id: toeic-w-092
  track: toeic
  topic: technology
  headword: credentials
  ipa: /krəˈdenʃlz/
  pos: n.
  definitionEn: Login details proving identity, or qualifications proving ability.
  translationZh: 登录凭证；资历
  exampleEn: Never share your login credentials with anyone outside the company.
  exampleZh: 切勿将登录凭证透露给公司以外的任何人。
- id: toeic-w-093
  track: toeic
  topic: technology
  headword: troubleshoot
  ipa: /ˈtrʌblʃuːt/
  pos: v.
  definitionEn: To find and fix problems in a system or machine.
  translationZh: 排查故障
  exampleEn: The IT team spent the morning troubleshooting the email server.
  exampleZh: IT 团队花了一上午排查邮件服务器的故障。
- id: toeic-w-094
  track: toeic
  topic: technology
  headword: upgrade
  ipa: /ˈʌpɡreɪd/
  pos: n.
  definitionEn: An improvement to a newer or better version.
  translationZh: 升级
  exampleEn: The software upgrade fixed several security vulnerabilities.
  exampleZh: 这次软件升级修复了多个安全漏洞。
- id: toeic-w-095
  track: toeic
  topic: technology
  headword: server
  ipa: /ˈsɜːrvər/
  pos: n.
  definitionEn: A computer that stores data and provides it over a network.
  translationZh: 服务器
  exampleEn: The website went down when the main server overheated.
  exampleZh: 主服务器过热导致网站瘫痪。
- id: toeic-w-096
  track: toeic
  topic: technology
  headword: database
  ipa: /ˈdeɪtəbeɪs/
  pos: n.
  definitionEn: An organized collection of information stored on a computer.
  translationZh: 数据库
  exampleEn: Customer records are stored in a secure central database.
  exampleZh: 客户记录保存在一个安全的中央数据库中。
- id: toeic-w-097
  track: toeic
  topic: technology
  headword: encryption
  ipa: /ɪnˈkrɪpʃn/
  pos: n.
  definitionEn: Converting data into code to prevent unauthorized access.
  translationZh: 加密
  exampleEn: All payment information is protected by strong encryption.
  exampleZh: 所有支付信息都受到高强度加密保护。
- id: toeic-w-098
  track: toeic
  topic: technology
  headword: compatible
  ipa: /kəmˈpætəbl/
  pos: adj.
  definitionEn: Able to work together with another device or system.
  translationZh: 兼容的
  exampleEn: The new printer is compatible with both Windows and Mac computers.
  exampleZh: 这款新打印机与 Windows 和 Mac 电脑均兼容。
- id: toeic-w-099
  track: toeic
  topic: technology
  headword: glitch
  ipa: /ɡlɪtʃ/
  pos: n.
  definitionEn: A small, sudden problem in equipment or software.
  translationZh: 小故障
  exampleEn: A software glitch caused some invoices to print twice.
  exampleZh: 软件小故障导致部分发票重复打印。
- id: toeic-w-100
  track: toeic
  topic: technology
  headword: backup
  ipa: /ˈbækʌp/
  pos: n.
  definitionEn: A copy of data kept in case the original is lost.
  translationZh: 备份
  exampleEn: The system creates an automatic backup every night at midnight.
  exampleZh: 系统每天午夜自动创建备份。
