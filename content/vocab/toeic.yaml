  pos: v.
  definitionEn: To include someone or something as a special part.
  translationZh: 以……为特色；重点介绍
  exampleEn: The trade magazine will feature our new product line next month.
  exampleZh: 这本行业杂志下个月将重点介绍我们的新产品线。
