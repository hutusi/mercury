# yaml-language-server: $schema=../.schemas/vocab.schema.json
# meetings (会议)
- id: biz-w-001
  track: business
  topic: meetings
  headword: action item
  ipa: /ˈækʃn ˌaɪtəm/
  pos: n.
  definitionEn: A specific task assigned to someone after a meeting.
  translationZh: 行动事项；待办任务
  exampleEn: Let's list the action items and assign an owner to each one.
  exampleZh: 我们把行动事项列出来，并为每一项指定负责人。
- id: biz-w-002
  track: business
  topic: meetings
  headword: adjourn
  ipa: /əˈdʒɜːrn/
  pos: v.
  definitionEn: To end a meeting formally, often until a later time.
  translationZh: 休会；散会
  exampleEn: The chairperson adjourned the meeting until nine o'clock the next morning.
  exampleZh: 主席宣布休会，会议将于次日上午九点继续。
- id: biz-w-003
  track: business
  topic: meetings
  headword: minutes
  ipa: /ˈmɪnɪts/
  pos: n.
  definitionEn: The official written record of what was said at a meeting.
  translationZh: 会议记录
  exampleEn: Sarah will circulate the minutes to all attendees by the end of the day.
  exampleZh: 莎拉会在今天下班前把会议记录发给所有与会者。
- id: biz-w-004
  track: business
  topic: meetings
  headword: consensus
  ipa: /kənˈsensəs/
  pos: n.
  definitionEn: General agreement among the members of a group.
  translationZh: 共识
  exampleEn: After a long discussion, the board reached a consensus on the new pricing strategy.
  exampleZh: 经过长时间讨论，董事会就新定价策略达成了共识。
- id: biz-w-005
  track: business
  topic: meetings
  headword: brainstorm
  ipa: /ˈbreɪnstɔːrm/
  pos: v.
  definitionEn: To suggest many ideas quickly in a group discussion.
  translationZh: 头脑风暴
  exampleEn: The team met on Friday to brainstorm ideas for the product launch.
  exampleZh: 团队周五开会，为产品发布进行头脑风暴。
- id: biz-w-006
  track: business
  topic: meetings
  headword: circle back
  ipa: /ˌsɜːrkl ˈbæk/
  pos: phr.
  definitionEn: To return to a topic or person later.
  translationZh: 回头再谈；稍后再议
  exampleEn: We're short on time, so let's circle back to this issue next week.
  exampleZh: 时间不够了，这个问题我们下周再回头讨论。
- id: biz-w-007
  track: business
  topic: meetings
  headword: touch base
  ipa: /ˌtʌtʃ ˈbeɪs/
  pos: phr.
  definitionEn: To make brief contact with someone to exchange updates.
  translationZh: 简短沟通；碰头
  exampleEn: Let's touch base on Thursday to review the project's progress.
  exampleZh: 我们周四碰个头，一起看看项目进展。
- id: biz-w-008
  track: business
  topic: meetings
  headword: wrap up
  ipa: /ˌræp ˈʌp/
  pos: phr.
  definitionEn: To finish or conclude something, such as a meeting.
  translationZh: 结束；收尾
  exampleEn: Before we wrap up, does anyone have questions about the timeline?
  exampleZh: 在结束之前，大家对时间安排还有什么问题吗？
- id: biz-w-009
  track: business
  topic: meetings
  headword: facilitate
  ipa: /fəˈsɪlɪteɪt/
  pos: v.
  definitionEn: To guide a meeting or process so it runs smoothly.
  translationZh: 主持；推动
  exampleEn: An outside consultant was brought in to facilitate the strategy workshop.
  exampleZh: 公司请来一位外部顾问来主持战略研讨会。
- id: biz-w-010
  track: business
  topic: meetings
  headword: takeaway
  ipa: /ˈteɪkəweɪ/
  pos: n.
  definitionEn: A key point or lesson to remember from a discussion.
  translationZh: 要点；心得
  exampleEn: The main takeaway from today's meeting is that we need faster customer feedback.
  exampleZh: 今天会议的主要结论是我们需要更快获得客户反馈。
# negotiation (谈判)
- id: biz-w-011
  track: business
  topic: negotiation
  headword: leverage
  ipa: /ˈlevərɪdʒ/
  pos: n.
  definitionEn: Power or advantage used to influence a negotiation.
  translationZh: 筹码；影响力
  exampleEn: Being the supplier's largest customer gives us considerable leverage in price talks.
  exampleZh: 作为该供应商最大的客户，我们在价格谈判中拥有相当大的筹码。
- id: biz-w-012
  track: business
  topic: negotiation
  headword: concession
  ipa: /kənˈseʃn/
  pos: n.
  definitionEn: Something you give up in order to reach an agreement.
  translationZh: 让步
  exampleEn: We made a concession on delivery times in exchange for a lower price.
  exampleZh: 我们在交货时间上做了让步，以换取更低的价格。
- id: biz-w-013
  track: business
  topic: negotiation
  headword: counteroffer
  ipa: /ˈkaʊntərɔːfər/
  pos: n.
  definitionEn: An offer made in response to another offer that was unacceptable.
  translationZh: 还盘；还价
  exampleEn: The vendor rejected our bid and returned with a higher counteroffer.
  exampleZh: 供应商拒绝了我们的报价，并提出了更高的还盘。
- id: biz-w-014
  track: business
  topic: negotiation
  headword: trade-off
  ipa: /ˈtreɪd ɔːf/
  pos: n.
  definitionEn: A balance between two things you cannot have both of.
  translationZh: 权衡；取舍
  exampleEn: There is always a trade-off between product quality and production cost.
  exampleZh: 产品质量与生产成本之间总要有所取舍。
- id: biz-w-015
  track: business
  topic: negotiation
  headword: bottom line
  ipa: /ˌbɑːtəm ˈlaɪn/
  pos: n.
  definitionEn: The lowest price or final position someone will accept; net profit.
  translationZh: 底线；净利润
  exampleEn: Our bottom line is fifty dollars per unit; we cannot go any lower.
  exampleZh: 我们的底线是每件五十美元，不能再低了。
- id: biz-w-016
  track: business
  topic: negotiation
  headword: compromise
  ipa: /ˈkɑːmprəmaɪz/
  pos: n.
  definitionEn: An agreement reached when each side gives up part of its demands.
  translationZh: 妥协；折中方案
  exampleEn: After two days of talks, both sides accepted a reasonable compromise.
  exampleZh: 经过两天的谈判，双方接受了一个合理的折中方案。
- id: biz-w-017
  track: business
  topic: negotiation
  headword: deal-breaker
  ipa: /ˈdiːl breɪkər/
  pos: n.
  definitionEn: An issue serious enough to end a negotiation.
  translationZh: 致命问题；无法接受的条件
  exampleEn: The lack of a warranty clause proved to be a deal-breaker for the buyer.
  exampleZh: 缺少保修条款最终让买方放弃了这笔交易。
- id: biz-w-018
  track: business
  topic: negotiation
  headword: middle ground
  ipa: /ˌmɪdl ˈɡraʊnd/
  pos: n.
  definitionEn: A position acceptable to both sides in a disagreement.
  translationZh: 折中立场；中间地带
  exampleEn: The two teams eventually found a middle ground on the licensing fees.
  exampleZh: 双方最终在许可费用问题上找到了折中方案。
- id: biz-w-019
  track: business
  topic: negotiation
  headword: hammer out
  ipa: /ˌhæmər ˈaʊt/
  pos: phr.
  definitionEn: To reach an agreement after long or difficult discussion.
  translationZh: 敲定；反复商定
  exampleEn: Lawyers from both companies hammered out the final terms overnight.
  exampleZh: 两家公司的律师连夜敲定了最终条款。
- id: biz-w-020
  track: business
  topic: negotiation
  headword: win-win
  ipa: /ˌwɪn ˈwɪn/
  pos: adj.
  definitionEn: Describing a result that benefits everyone involved.
  translationZh: 双赢的
  exampleEn: The partnership is a win-win arrangement that expands both companies' markets.
  exampleZh: 这一合作是双赢安排，扩大了两家公司的市场。
# email (邮件)
- id: biz-w-021
  track: business
  topic: email
  headword: follow up
  ipa: /ˌfɑːloʊ ˈʌp/
  pos: phr.
  definitionEn: To take further action or check progress after an earlier contact.
  translationZh: 跟进
  exampleEn: I will follow up with the client if we hear nothing by Friday.
  exampleZh: 如果周五前还没有回音，我会跟进联系客户。
- id: biz-w-022
  track: business
  topic: email
  headword: attachment
  ipa: /əˈtætʃmənt/
  pos: n.
  definitionEn: A file sent together with an email.
  translationZh: 附件
  exampleEn: Please review the attachment and send me your comments by Wednesday.
  exampleZh: 请查看附件，并在周三前把意见发给我。
- id: biz-w-023
  track: business
  topic: email
  headword: loop in
  ipa: /ˌluːp ˈɪn/
  pos: phr.
  definitionEn: To include someone in an email conversation or discussion.
  translationZh: 拉入讨论；抄送知会
  exampleEn: I'm looping in our legal team so they can review the terms.
  exampleZh: 我把法务团队加进来，以便他们审核这些条款。
- id: biz-w-024
  track: business
  topic: email
  headword: acknowledge
  ipa: /əkˈnɑːlɪdʒ/
  pos: v.
  definitionEn: To confirm that you have received or noticed something.
  translationZh: 确认收到
  exampleEn: Please acknowledge receipt of this email so we know the file arrived.
  exampleZh: 请确认收到此邮件，以便我们知道文件已送达。
- id: biz-w-025
  track: business
  topic: email
  headword: recipient
  ipa: /rɪˈsɪpiənt/
  pos: n.
  definitionEn: A person who receives something, such as an email or payment.
  translationZh: 收件人
  exampleEn: Double-check the recipient list before sending the contract to avoid data leaks.
  exampleZh: 发送合同前请再次核对收件人列表，以防信息泄露。
- id: biz-w-026
  track: business
  topic: email
  headword: reach out
  ipa: /ˌriːtʃ ˈaʊt/
  pos: phr.
  definitionEn: To contact someone, especially to offer or request help.
  translationZh: 联系；主动接洽
  exampleEn: Feel free to reach out if you have any questions about the proposal.
  exampleZh: 如对提案有任何疑问，请随时与我联系。
- id: biz-w-027
  track: business
  topic: email
  headword: escalate
  ipa: /ˈeskəleɪt/
  pos: v.
  definitionEn: To pass a problem to a higher level for attention.
  translationZh: 上报；升级处理
  exampleEn: If the server issue continues, we will escalate it to senior management.
  exampleZh: 如果服务器问题持续存在，我们将上报给高层管理者。
- id: biz-w-028
  track: business
  topic: email
  headword: clarify
  ipa: /ˈklærəfaɪ/
  pos: v.
  definitionEn: To make something easier to understand by explaining it.
  translationZh: 澄清；说明
  exampleEn: Could you clarify the payment terms mentioned in your last email?
  exampleZh: 你能澄清一下上封邮件中提到的付款条件吗？
- id: biz-w-029
  track: business
  topic: email
  headword: gentle reminder
  ipa: /ˌdʒentl rɪˈmaɪndər/
  pos: phr.
  definitionEn: A polite message reminding someone to do something.
  translationZh: 温馨提醒；委婉催促
  exampleEn: Just a gentle reminder that the survey closes this Friday afternoon.
  exampleZh: 温馨提醒：问卷调查将于本周五下午截止。
- id: biz-w-030
  track: business
  topic: email
  headword: at your earliest convenience
  ipa: /ət jʊr ˌɜːrliəst kənˈviːniəns/
  pos: phr.
  definitionEn: As soon as it is possible for you.
  translationZh: 尽早；方便时尽快
  exampleEn: Please sign and return the agreement at your earliest convenience.
  exampleZh: 请您方便时尽早签署并寄回协议。
# presentations (演示汇报)
- id: biz-w-031
  track: business
  topic: presentations
  headword: slide deck
  ipa: /ˈslaɪd dek/
  pos: n.
  definitionEn: A set of presentation slides.
  translationZh: 演示文稿；幻灯片
  exampleEn: I'll share the slide deck with everyone right after the presentation.
  exampleZh: 演示结束后我会立刻把幻灯片分享给大家。
- id: biz-w-032
  track: business
  topic: presentations
  headword: walk through
  ipa: /ˌwɔːk ˈθruː/
  pos: phr.
  definitionEn: To explain something step by step.
  translationZh: 逐步讲解
  exampleEn: Let me walk through the quarterly numbers before we discuss next steps.
  exampleZh: 在讨论后续安排之前，我先逐项讲解季度数据。
- id: biz-w-033
  track: business
  topic: presentations
  headword: highlight
  ipa: /ˈhaɪlaɪt/
  pos: v.
  definitionEn: To emphasize the most important parts of something.
  translationZh: 强调；突出
  exampleEn: The report highlights three areas where costs can be reduced immediately.
  exampleZh: 报告重点指出了三个可以立即削减成本的领域。
- id: biz-w-034
  track: business
  topic: presentations
  headword: recap
  ipa: /ˈriːkæp/
  pos: v.
  definitionEn: To repeat the main points of something briefly.
  translationZh: 概括；回顾
  exampleEn: To recap, we agreed on the budget, the timeline, and the team structure.
  exampleZh: 简要回顾一下：我们就预算、时间表和团队结构达成了一致。
- id: biz-w-035
  track: business
  topic: presentations
  headword: drill down
  ipa: /ˌdrɪl ˈdaʊn/
  pos: phr.
  definitionEn: To examine something in greater detail.
  translationZh: 深入分析
  exampleEn: Let's drill down into the regional sales figures to find the problem.
  exampleZh: 我们深入分析各地区的销售数据，找出问题所在。
- id: biz-w-036
  track: business
  topic: presentations
  headword: handout
  ipa: /ˈhændaʊt/
  pos: n.
  definitionEn: A printed document given to people at a presentation.
  translationZh: 讲义；发放材料
  exampleEn: The full financial tables are in the handout on your desks.
  exampleZh: 完整的财务报表在各位桌上的讲义里。
- id: biz-w-037
  track: business
  topic: presentations
  headword: articulate
  ipa: /ɑːrˈtɪkjuleɪt/
  pos: v.
  definitionEn: To express ideas clearly in words.
  translationZh: 清晰表达
  exampleEn: A good presenter can articulate complex ideas in simple language.
  exampleZh: 优秀的演讲者能用简单的语言清晰表达复杂的观点。
- id: biz-w-038
  track: business
  topic: presentations
  headword: illustrate
  ipa: /ˈɪləstreɪt/
  pos: v.
  definitionEn: To explain something by giving examples or using pictures.
  translationZh: 举例说明；图示
  exampleEn: She used a customer case study to illustrate the product's value.
  exampleZh: 她用一个客户案例来说明产品的价值。
- id: biz-w-039
  track: business
  topic: presentations
  headword: pitch
  ipa: /pɪtʃ/
  pos: n.
  definitionEn: A short talk intended to persuade people to buy or invest.
  translationZh: 推介；路演
  exampleEn: The startup delivered a five-minute pitch to a room full of investors.
  exampleZh: 这家初创公司向满屋的投资人做了五分钟的路演。
- id: biz-w-040
  track: business
  topic: presentations
  headword: engage
  ipa: /ɪnˈɡeɪdʒ/
  pos: v.
  definitionEn: To attract and hold someone's interest and attention.
  translationZh: 吸引；调动参与
  exampleEn: Asking questions early is a simple way to engage your audience.
  exampleZh: 尽早提问是吸引听众参与的一个简单方法。
# strategy (战略运营)
- id: biz-w-041
  track: business
  topic: strategy
  headword: stakeholder
  ipa: /ˈsteɪkhoʊldər/
  pos: n.
  definitionEn: A person or group with an interest in a business decision.
  translationZh: 利益相关方
  exampleEn: We must consult all key stakeholders before changing the product roadmap.
  exampleZh: 在调整产品路线图之前，我们必须征询所有关键利益相关方的意见。
- id: biz-w-042
  track: business
  topic: strategy
  headword: streamline
  ipa: /ˈstriːmlaɪn/
  pos: v.
  definitionEn: To make a process simpler and more efficient.
  translationZh: 精简；优化流程
  exampleEn: The new software will streamline the approval process from days to hours.
  exampleZh: 新软件将把审批流程从几天精简到几个小时。
- id: biz-w-043
  track: business
  topic: strategy
  headword: deliverable
  ipa: /dɪˈlɪvərəbl/
  pos: n.
  definitionEn: A product or result that must be completed and handed over.
  translationZh: 交付成果
  exampleEn: The contract lists each deliverable along with its deadline and owner.
  exampleZh: 合同列明了每项交付成果及其截止日期和负责人。
- id: biz-w-044
  track: business
  topic: strategy
  headword: benchmark
  ipa: /ˈbentʃmɑːrk/
  pos: n.
  definitionEn: A standard used to compare and measure performance.
  translationZh: 基准；标杆
  exampleEn: We use industry benchmarks to evaluate our customer service performance.
  exampleZh: 我们以行业基准来评估自身的客户服务表现。
- id: biz-w-045
  track: business
  topic: strategy
  headword: scale up
  ipa: /ˌskeɪl ˈʌp/
  pos: phr.
  definitionEn: To increase the size or capacity of a business or activity.
  translationZh: 扩大规模
  exampleEn: The company plans to scale up production to meet growing overseas demand.
  exampleZh: 公司计划扩大生产规模，以满足不断增长的海外需求。
- id: biz-w-046
  track: business
  topic: strategy
  headword: synergy
  ipa: /ˈsɪnərdʒi/
  pos: n.
  definitionEn: Extra value created when two organizations or teams work together.
  translationZh: 协同效应
  exampleEn: The merger is expected to create significant synergy between the two sales networks.
  exampleZh: 此次合并预计将在两个销售网络之间产生显著的协同效应。
- id: biz-w-047
  track: business
  topic: strategy
  headword: roadmap
  ipa: /ˈroʊdmæp/
  pos: n.
  definitionEn: A plan showing the stages of a project over time.
  translationZh: 路线图；规划
  exampleEn: The product roadmap shows two major releases planned for next year.
  exampleZh: 产品路线图显示明年计划发布两个重要版本。
- id: biz-w-048
  track: business
  topic: strategy
  headword: core competency
  ipa: /ˌkɔːr ˈkɑːmpɪtənsi/
  pos: n.
  definitionEn: A company's main strength that gives it a competitive advantage.
  translationZh: 核心竞争力
  exampleEn: Fast, reliable delivery has become the retailer's core competency.
  exampleZh: 快速可靠的配送已成为这家零售商的核心竞争力。
- id: biz-w-049
  track: business
  topic: strategy
  headword: milestone
  ipa: /ˈmaɪlstoʊn/
  pos: n.
  definitionEn: An important stage or event in the development of something.
  translationZh: 里程碑
  exampleEn: Reaching one million users was a major milestone for the platform.
  exampleZh: 用户数突破一百万是该平台的一个重要里程碑。
- id: biz-w-050
  track: business
  topic: strategy
  headword: outsource
  ipa: /ˈaʊtsɔːrs/
  pos: v.
  definitionEn: To pay another company to do work for your business.
  translationZh: 外包
  exampleEn: The firm decided to outsource its customer support to reduce operating costs.
  exampleZh: 该公司决定将客服外包，以降低运营成本。
# leadership (领导管理)
- id: biz-w-051
  track: business
  topic: leadership
  headword: delegate
  ipa: /ˈdelɪɡeɪt/
  pos: v.
  definitionEn: To give part of your work or authority to someone else.
  translationZh: 授权；分派
  exampleEn: Good managers delegate routine tasks and focus on priorities.
  exampleZh: 优秀的管理者会分派例行事务，专注于优先事项。
- id: biz-w-052
  track: business
  topic: leadership
  headword: mentor
  ipa: /ˈmentɔːr/
  pos: n.
  definitionEn: An experienced person who guides someone less experienced.
  translationZh: 导师
  exampleEn: Each new hire is paired with a mentor for the first six months.
  exampleZh: 每位新员工在入职前六个月都会配备一名导师。
- id: biz-w-053
  track: business
  topic: leadership
  headword: empower
  ipa: /ɪmˈpaʊər/
  pos: v.
  definitionEn: To give someone the confidence and authority to act.
  translationZh: 赋能；授权
  exampleEn: The new policy empowers teams to approve small budgets themselves.
  exampleZh: 新政策授权团队自行审批小额预算。
- id: biz-w-054
  track: business
  topic: leadership
  headword: accountability
  ipa: /əˌkaʊntəˈbɪləti/
  pos: n.
  definitionEn: Being responsible for results and willing to explain them.
  translationZh: 问责；担当
  exampleEn: Clear ownership of each project improves accountability.
  exampleZh: 明确每个项目的负责人有助于加强问责。
- id: biz-w-055
  track: business
  topic: leadership
  headword: micromanage
  ipa: /ˌmaɪkroʊˈmænɪdʒ/
  pos: v.
  definitionEn: To control every small detail of other people's work.
  translationZh: 事无巨细地管控
  exampleEn: Employees quit because the director micromanaged every decision.
  exampleZh: 由于总监事事插手，员工纷纷离职。
- id: biz-w-056
  track: business
  topic: leadership
  headword: buy-in
  ipa: /ˈbaɪ ɪn/
  pos: n.
  definitionEn: Agreement and support for a decision or plan.
  translationZh: 认同；支持
  exampleEn: Get buy-in from the sales team before changing the pricing.
  exampleZh: 调整定价前先争取销售团队的认同。
- id: biz-w-057
  track: business
  topic: leadership
  headword: morale
  ipa: /məˈræl/
  pos: n.
  definitionEn: The level of confidence and enthusiasm in a group.
  translationZh: 士气
  exampleEn: Flexible working hours noticeably improved team morale.
  exampleZh: 弹性工作时间显著提升了团队士气。
- id: biz-w-058
  track: business
  topic: leadership
  headword: lead by example
  ipa: /ˌliːd baɪ ɪɡˈzæmpl/
  pos: phr.
  definitionEn: To show how to behave by doing it yourself.
  translationZh: 以身作则
  exampleEn: She leads by example, always arriving first and fully prepared.
  exampleZh: 她以身作则，总是最早到并做好充分准备。
- id: biz-w-059
  track: business
  topic: leadership
  headword: one-on-one
  ipa: /ˌwʌn ɑːn ˈwʌn/
  pos: n.
  definitionEn: A private meeting between a manager and one team member.
  translationZh: 一对一面谈
  exampleEn: I raised the workload issue in my weekly one-on-one.
  exampleZh: 我在每周的一对一面谈中提出了工作量问题。
- id: biz-w-060
  track: business
  topic: leadership
  headword: big picture
  ipa: /ˌbɪɡ ˈpɪktʃər/
  pos: n.
  definitionEn: The overall situation rather than the small details.
  translationZh: 全局；大方向
  exampleEn: Step back from the details and look at the big picture.
  exampleZh: 从细节中跳出来，着眼于全局。
# sales (市场销售)
- id: biz-w-061
  track: business
  topic: sales
  headword: lead
  ipa: /liːd/
  pos: n.
  definitionEn: A potential customer who has shown interest.
  translationZh: 潜在客户；销售线索
  exampleEn: The webinar generated over three hundred qualified leads.
  exampleZh: 这场线上讲座带来了三百多条有效销售线索。
- id: biz-w-062
  track: business
  topic: sales
  headword: conversion rate
  ipa: /kənˈvɜːrʒn reɪt/
  pos: n.
  definitionEn: The percentage of prospects who become paying customers.
  translationZh: 转化率
  exampleEn: Simplifying the checkout page doubled our conversion rate.
  exampleZh: 简化结算页面使转化率翻了一番。
- id: biz-w-063
  track: business
  topic: sales
  headword: funnel
  ipa: /ˈfʌnl/
  pos: n.
  definitionEn: The stages a prospect passes through before buying.
  translationZh: 销售漏斗
  exampleEn: Most prospects drop out at the top of the funnel.
  exampleZh: 大多数潜在客户在漏斗顶端就流失了。
- id: biz-w-064
  track: business
  topic: sales
  headword: upsell
  ipa: /ˈʌpsel/
  pos: v.
  definitionEn: To persuade a customer to buy something more expensive.
  translationZh: 推销升级产品；向上销售
  exampleEn: Staff are trained to upsell the premium plan politely.
  exampleZh: 员工接受过培训，会礼貌地推荐高级套餐。
- id: biz-w-065
  track: business
  topic: sales
  headword: churn
  ipa: /tʃɜːrn/
  pos: n.
  definitionEn: The rate at which customers stop using a service.
  translationZh: 客户流失（率）
  exampleEn: Monthly churn fell sharply after we improved onboarding.
  exampleZh: 改进新用户引导后，月流失率大幅下降。
- id: biz-w-066
  track: business
  topic: sales
  headword: brand awareness
  ipa: /ˌbrænd əˈwernəs/
  pos: n.
  definitionEn: How familiar consumers are with a brand's name.
  translationZh: 品牌知名度
  exampleEn: The sponsorship deal boosted brand awareness in overseas markets.
  exampleZh: 这项赞助协议提升了品牌在海外市场的知名度。
- id: biz-w-067
  track: business
  topic: sales
  headword: cold call
  ipa: /ˌkoʊld ˈkɔːl/
  pos: n.
  definitionEn: An unexpected sales phone call to a stranger.
  translationZh: 陌生电话推销
  exampleEn: Few deals start from a cold call these days.
  exampleZh: 如今很少有生意是从陌生电话开始的。
- id: biz-w-068
  track: business
  topic: sales
  headword: quota
  ipa: /ˈkwoʊtə/
  pos: n.
  definitionEn: A fixed sales target someone must reach.
  translationZh: 销售指标
  exampleEn: She hit her quarterly quota two weeks early.
  exampleZh: 她提前两周完成了季度销售指标。
- id: biz-w-069
  track: business
  topic: sales
  headword: retention
  ipa: /rɪˈtenʃn/
  pos: n.
  definitionEn: Keeping existing customers over time.
  translationZh: 客户留存
  exampleEn: Loyalty rewards are central to our retention strategy.
  exampleZh: 会员奖励是我们客户留存策略的核心。
- id: biz-w-070
  track: business
  topic: sales
  headword: value proposition
  ipa: /ˈvæljuː ˌprɑːpəˈzɪʃn/
  pos: n.
  definitionEn: A clear statement of the benefit a product offers.
  translationZh: 价值主张
  exampleEn: The pitch failed because the value proposition was vague.
  exampleZh: 由于价值主张含糊不清，这次推介没有成功。
# projects (项目管理)
- id: biz-w-071
  track: business
  topic: projects
  headword: scope creep
  ipa: /ˈskoʊp kriːp/
  pos: n.
  definitionEn: Gradual, uncontrolled growth of a project's requirements.
  translationZh: 需求范围蔓延
  exampleEn: Scope creep pushed the launch back by three months.
  exampleZh: 需求不断扩张使上线推迟了三个月。
- id: biz-w-072
  track: business
  topic: projects
  headword: bottleneck
  ipa: /ˈbɑːtlnek/
  pos: n.
  definitionEn: A point where progress slows because of limited capacity.
  translationZh: 瓶颈
  exampleEn: Design review became the bottleneck of the release cycle.
  exampleZh: 设计评审成了发布周期中的瓶颈。
- id: biz-w-073
  track: business
  topic: projects
  headword: dependency
  ipa: /dɪˈpendənsi/
  pos: n.
  definitionEn: A task that cannot start until another is finished.
  translationZh: 依赖项
  exampleEn: Map the dependencies before you commit to a deadline.
  exampleZh: 承诺截止日期之前，先梳理清楚依赖关系。
- id: biz-w-074
  track: business
  topic: projects
  headword: kickoff
  ipa: /ˈkɪkɔːf/
  pos: n.
  definitionEn: The first meeting that starts a project.
  translationZh: 启动会
  exampleEn: The client will present the requirements at Thursday's kickoff.
  exampleZh: 客户将在周四的启动会上介绍需求。
- id: biz-w-075
  track: business
  topic: projects
  headword: bandwidth
  ipa: /ˈbændwɪdθ/
  pos: n.
  definitionEn: The time and energy someone has for extra work.
  translationZh: 精力；余力
  exampleEn: I don't have the bandwidth to take on another project this month.
  exampleZh: 这个月我没有精力再接一个项目了。
- id: biz-w-076
  track: business
  topic: projects
  headword: sprint
  ipa: /sprɪnt/
  pos: n.
  definitionEn: A short, fixed period for completing a set of work.
  translationZh: 冲刺周期
  exampleEn: The payment feature is planned for the next two-week sprint.
  exampleZh: 支付功能安排在下一个双周冲刺中。
- id: biz-w-077
  track: business
  topic: projects
  headword: postmortem
  ipa: /ˌpoʊstˈmɔːrtəm/
  pos: n.
  definitionEn: A review after a project or incident to learn lessons.
  translationZh: 复盘
  exampleEn: The postmortem revealed that testing had started far too late.
  exampleZh: 复盘发现测试启动得太晚了。
- id: biz-w-078
  track: business
  topic: projects
  headword: contingency
  ipa: /kənˈtɪndʒənsi/
  pos: n.
  definitionEn: A plan or fund prepared for unexpected events.
  translationZh: 应急预案；备用金
  exampleEn: Keep a contingency of ten percent in the project budget.
  exampleZh: 项目预算中要预留百分之十的应急资金。
- id: biz-w-079
  track: business
  topic: projects
  headword: sign-off
  ipa: /ˈsaɪn ɔːf/
  pos: n.
  definitionEn: Formal approval to proceed or release.
  translationZh: 签核；正式批准
  exampleEn: We need legal sign-off before publishing the campaign.
  exampleZh: 发布这次活动前需要法务签核。
- id: biz-w-080
  track: business
  topic: projects
  headword: on track
  ipa: /ˌɑːn ˈtræk/
  pos: phr.
  definitionEn: Progressing as planned toward a goal.
  translationZh: 进展正常
  exampleEn: Despite the early delays, the project is back on track.
  exampleZh: 尽管前期有延误，项目现已回到正轨。
# networking (人脉拓展)
- id: biz-w-081
  track: business
  topic: networking
  headword: referral
  ipa: /rɪˈfɜːrəl/
  pos: n.
  definitionEn: A recommendation that directs someone to a person or business.
  translationZh: 引荐；转介
  exampleEn: Most of our new clients come from referrals.
  exampleZh: 我们的新客户大多来自引荐。
- id: biz-w-082
  track: business
  topic: networking
  headword: rapport
  ipa: /ræˈpɔːr/
  pos: n.
  definitionEn: A friendly relationship with good mutual understanding.
  translationZh: 融洽的关系
  exampleEn: She builds rapport with clients before talking business.
  exampleZh: 她先与客户建立融洽关系，再谈业务。
- id: biz-w-083
  track: business
  topic: networking
  headword: icebreaker
  ipa: /ˈaɪsbreɪkər/
  pos: n.
  definitionEn: A remark or activity that eases initial awkwardness.
  translationZh: 破冰话题（活动）
  exampleEn: The host opened the session with a quick icebreaker.
  exampleZh: 主持人以一个简短的破冰活动开场。
- id: biz-w-084
  track: business
  topic: networking
  headword: elevator pitch
  ipa: /ˈelɪveɪtər pɪtʃ/
  pos: n.
  definitionEn: A very short, persuasive summary of an idea or business.
  translationZh: 电梯演讲
  exampleEn: Practice a thirty-second elevator pitch before the expo.
  exampleZh: 参展前先练好三十秒的电梯演讲。
- id: biz-w-085
  track: business
  topic: networking
  headword: mingle
  ipa: /ˈmɪŋɡl/
  pos: v.
  definitionEn: To move around and talk to many people at an event.
  translationZh: （社交场合）四处交谈
  exampleEn: Don't stand in a corner — mingle and exchange contacts.
  exampleZh: 别站在角落里——多走动，交换联系方式。
- id: biz-w-086
  track: business
  topic: networking
  headword: alumni
  ipa: /əˈlʌmnaɪ/
  pos: n.
  definitionEn: Former students of a school or members of an organization.
  translationZh: 校友
  exampleEn: The alumni network helped him land his first overseas role.
  exampleZh: 校友网络帮他获得了第一份海外工作。
- id: biz-w-087
  track: business
  topic: networking
  headword: mutual connection
  ipa: /ˌmjuːtʃuəl kəˈnekʃn/
  pos: n.
  definitionEn: A person known by both parties.
  translationZh: 共同认识的人
  exampleEn: A mutual connection introduced us at the trade fair.
  exampleZh: 一位共同认识的朋友在展会上介绍我们认识。
- id: biz-w-088
  track: business
  topic: networking
  headword: business card
  ipa: /ˈbɪznəs kɑːrd/
  pos: n.
  definitionEn: A small card with your name and contact details.
  translationZh: 名片
  exampleEn: He ran out of business cards halfway through the conference.
  exampleZh: 会议进行到一半，他的名片就发完了。
- id: biz-w-089
  track: business
  topic: networking
  headword: word of mouth
  ipa: /ˌwɜːrd əv ˈmaʊθ/
  pos: n.
  definitionEn: Informal recommendation spread from person to person.
  translationZh: 口碑
  exampleEn: The restaurant grew purely by word of mouth.
  exampleZh: 这家餐厅完全靠口碑发展起来。
- id: biz-w-090
  track: business
  topic: networking
  headword: keep in touch
  ipa: /ˌkiːp ɪn ˈtʌtʃ/
  pos: phr.
  definitionEn: To continue communicating with someone.
  translationZh: 保持联系
  exampleEn: Let's keep in touch after the project wraps up.
  exampleZh: 项目结束后我们保持联系。
# remote (远程协作)
- id: biz-w-091
  track: business
  topic: remote
  headword: asynchronous
  ipa: /eɪˈsɪŋkrənəs/
  pos: adj.
  definitionEn: Not happening at the same time; not requiring instant replies.
  translationZh: 异步的
  exampleEn: Asynchronous updates let the team collaborate across time zones.
  exampleZh: 异步同步进展让团队可以跨时区协作。
- id: biz-w-092
  track: business
  topic: remote
  headword: time zone
  ipa: /ˈtaɪm zoʊn/
  pos: n.
  definitionEn: A region sharing the same standard time.
  translationZh: 时区
  exampleEn: Schedule the call in a time zone that works for both offices.
  exampleZh: 把电话会安排在两地都方便的时区时间。
- id: biz-w-093
  track: business
  topic: remote
  headword: check-in
  ipa: /ˈtʃek ɪn/
  pos: n.
  definitionEn: A brief regular update on progress or wellbeing.
  translationZh: 例行沟通；进度碰头
  exampleEn: We start each morning with a fifteen-minute check-in.
  exampleZh: 我们每天早上以十五分钟的例行碰头开始。
- id: biz-w-094
  track: business
  topic: remote
  headword: mute
  ipa: /mjuːt/
  pos: v.
  definitionEn: To turn off your microphone during a call.
  translationZh: 静音
  exampleEn: Please stay muted unless you are speaking.
  exampleZh: 不发言时请保持静音。
- id: biz-w-095
  track: business
  topic: remote
  headword: breakout room
  ipa: /ˈbreɪkaʊt ruːm/
  pos: n.
  definitionEn: A smaller online room for group discussion during a meeting.
  translationZh: 分组讨论室
  exampleEn: The trainer split us into breakout rooms of four.
  exampleZh: 培训师把我们分成四人一组的讨论室。
- id: biz-w-096
  track: business
  topic: remote
  headword: screen share
  ipa: /ˈskriːn ʃer/
  pos: n.
  definitionEn: Showing your computer screen to others in a call.
  translationZh: 屏幕共享
  exampleEn: Could you start a screen share so we can see the dashboard?
  exampleZh: 你能共享屏幕让我们看看仪表盘吗？
- id: biz-w-097
  track: business
  topic: remote
  headword: hybrid
  ipa: /ˈhaɪbrɪd/
  pos: adj.
  definitionEn: Combining office work and remote work.
  translationZh: 混合办公的
  exampleEn: The company moved to a hybrid model with two office days.
  exampleZh: 公司改为每周两天到岗的混合办公模式。
- id: biz-w-098
  track: business
  topic: remote
  headword: overlap
  ipa: /ˈoʊvərlæp/
  pos: n.
  definitionEn: A period when different schedules coincide.
  translationZh: （时间）重叠
  exampleEn: Keep four hours of overlap with the Berlin team.
  exampleZh: 与柏林团队保持四小时的工作时间重叠。
- id: biz-w-099
  track: business
  topic: remote
  headword: virtual
  ipa: /ˈvɜːrtʃuəl/
  pos: adj.
  definitionEn: Happening online rather than in person.
  translationZh: 线上的；虚拟的
  exampleEn: The annual summit will be fully virtual again this year.
  exampleZh: 今年的年度峰会将再次全程线上举行。
- id: biz-w-100
  track: business
  topic: remote
  headword: handoff
  ipa: /ˈhændɔːf/
  pos: n.
  definitionEn: Transferring work or responsibility to another person.
  translationZh: 交接
  exampleEn: Write clear notes so the night team gets a smooth handoff.
  exampleZh: 写清备注，让夜班团队顺利交接。
# hiring (招聘)
- id: biz-w-101
  track: business
  topic: hiring
  headword: onboarding
  ipa: /ˈɑːnbɔːrdɪŋ/
  pos: n.
  definitionEn: The process of helping a new employee settle into a company.
  translationZh: 入职培训；新人融入
  exampleEn: A structured onboarding program helps new hires become productive within a month.
  exampleZh: 系统的入职培训能帮助新员工在一个月内进入状态。
- id: biz-w-102
  track: business
  topic: hiring
  headword: candidate
  ipa: /ˈkændɪdət/
  pos: n.
  definitionEn: A person being considered for a job or position.
  translationZh: 候选人；应聘者
  exampleEn: We interviewed six candidates before making an offer to the strongest one.
  exampleZh: 我们面试了六位候选人，最后向最出色的一位发出了录用通知。
- id: biz-w-103
  track: business
  topic: hiring
  headword: headhunt
  ipa: /ˈhedhʌnt/
  pos: v.
  definitionEn: To recruit someone who already works for another company.
  translationZh: 猎头挖角
  exampleEn: She was headhunted by a competitor offering a significantly higher salary.
  exampleZh: 一家竞争对手以高得多的薪水把她挖走了。
- id: biz-w-104
  track: business
  topic: hiring
  headword: shortlist
  ipa: /ˈʃɔːrtlɪst/
  pos: v.
  definitionEn: To select a small group of candidates for final consideration.
  translationZh: 列入候选名单；初选
  exampleEn: HR shortlisted five applicants for the final round of interviews.
  exampleZh: 人力资源部初选出五名应聘者进入终面。
- id: biz-w-105
  track: business
  topic: hiring
  headword: job description
  ipa: /ˈdʒɑːb dɪˌskrɪpʃn/
  pos: n.
  definitionEn: A document listing the duties and requirements of a position.
  translationZh: 职位描述
  exampleEn: Update the job description before posting the opening on hiring platforms.
  exampleZh: 在招聘平台发布职位之前，先更新职位描述。
- id: biz-w-106
  track: business
  topic: hiring
  headword: compensation
  ipa: /ˌkɑːmpenˈseɪʃn/
  pos: n.
  definitionEn: The pay and benefits an employee receives for work.
  translationZh: 薪酬；报酬
  exampleEn: The compensation package includes base salary, bonuses, and stock options.
  exampleZh: 薪酬方案包括基本工资、奖金和股票期权。
- id: biz-w-107
  track: business
  topic: hiring
  headword: probation
  ipa: /proʊˈbeɪʃn/
  pos: n.
  definitionEn: A trial period at the start of a new job.
  translationZh: 试用期
  exampleEn: New employees receive a formal review at the end of their three-month probation.
  exampleZh: 新员工在三个月试用期结束时会接受正式考核。
- id: biz-w-108
  track: business
  topic: hiring
  headword: talent pool
  ipa: /ˈtælənt puːl/
  pos: n.
  definitionEn: A group of qualified people available for hiring.
  translationZh: 人才库
  exampleEn: Internships help the company build a talent pool for future openings.
  exampleZh: 实习项目帮助公司为未来的职位储备人才。
- id: biz-w-109
  track: business
  topic: hiring
  headword: offer letter
  ipa: /ˈɔːfər ˌletər/
  pos: n.
  definitionEn: A formal document offering someone a job.
  translationZh: 录用通知书
  exampleEn: She signed the offer letter the same day it arrived.
  exampleZh: 录用通知书当天送达，她当天就签了。
- id: biz-w-110
  track: business
  topic: hiring
  headword: attrition
  ipa: /əˈtrɪʃn/
  pos: n.
  definitionEn: The gradual loss of employees who are not replaced.
  translationZh: 人员自然流失
  exampleEn: High attrition in the support team is driving up hiring costs.
  exampleZh: 客服团队人员流失严重，推高了招聘成本。
# budgeting (预算管理)
- id: biz-w-111
  track: business
  topic: budgeting
  headword: forecast
  ipa: /ˈfɔːrkæst/
  pos: n.
  definitionEn: An estimate of future figures based on current data.
  translationZh: 预测
  exampleEn: The revenue forecast for next quarter looks more conservative than last year's.
  exampleZh: 下季度的收入预测比去年保守。
- id: biz-w-112
  track: business
  topic: budgeting
  headword: overhead
  ipa: /ˈoʊvərhed/
  pos: n.
  definitionEn: Regular business costs not tied to a specific product.
  translationZh: 间接费用；管理费用
  exampleEn: Moving to a smaller office cut our overhead by thirty percent.
  exampleZh: 搬到更小的办公室后，我们的间接费用降低了三成。
- id: biz-w-113
  track: business
  topic: budgeting
  headword: allocate
  ipa: /ˈæləkeɪt/
  pos: v.
  definitionEn: To officially assign money or resources for a purpose.
  translationZh: 分配；拨给
  exampleEn: The board allocated two million dollars to the digital marketing budget.
  exampleZh: 董事会为数字营销预算拨款两百万美元。
- id: biz-w-114
  track: business
  topic: budgeting
  headword: expenditure
  ipa: /ɪkˈspendɪtʃər/
  pos: n.
  definitionEn: The amount of money an organization spends.
  translationZh: 支出；开支
  exampleEn: Finance flagged the rise in travel expenditure during the quarterly review.
  exampleZh: 财务部在季度审核中指出差旅支出有所上升。
- id: biz-w-115
  track: business
  topic: budgeting
  headword: cost-effective
  ipa: /ˌkɔːst ɪˈfektɪv/
  pos: adj.
  definitionEn: Giving good value compared with the money spent.
  translationZh: 划算的；成本效益高的
  exampleEn: Outsourcing payroll proved more cost-effective than hiring an in-house team.
  exampleZh: 事实证明，工资核算外包比组建内部团队更划算。
- id: biz-w-116
  track: business
  topic: budgeting
  headword: write off
  ipa: /ˌraɪt ˈɔːf/
  pos: phr.
  definitionEn: To accept that money is lost and remove it from accounts.
  translationZh: 核销；注销
  exampleEn: The company wrote off the unpaid invoices as bad debt.
  exampleZh: 公司将这些未付账单作为坏账核销。
- id: biz-w-117
  track: business
  topic: budgeting
  headword: fiscal year
  ipa: /ˌfɪskl ˈjɪr/
  pos: n.
  definitionEn: A twelve-month period used for accounting and budgets.
  translationZh: 财政年度
  exampleEn: Our fiscal year ends in March, so budget planning starts in January.
  exampleZh: 我们的财年三月结束，所以预算规划一月就要启动。
- id: biz-w-118
  track: business
  topic: budgeting
  headword: variance
  ipa: /ˈveriəns/
  pos: n.
  definitionEn: The difference between planned and actual figures.
  translationZh: 差异；偏差
  exampleEn: The report explains the variance between forecast and actual spending.
  exampleZh: 报告解释了预测支出与实际支出之间的差异。
- id: biz-w-119
  track: business
  topic: budgeting
  headword: cash flow
  ipa: /ˈkæʃ floʊ/
  pos: n.
  definitionEn: The movement of money into and out of a business.
  translationZh: 现金流
  exampleEn: Late client payments put serious pressure on our cash flow.
  exampleZh: 客户付款延迟给我们的现金流带来很大压力。
- id: biz-w-120
  track: business
  topic: budgeting
  headword: cut back
  ipa: /ˌkʌt ˈbæk/
  pos: phr.
  definitionEn: To reduce spending or the amount of something.
  translationZh: 削减；缩减
  exampleEn: We had to cut back on conference travel to stay within budget.
  exampleZh: 为了不超预算，我们不得不削减参会差旅。
# branding (品牌)
- id: biz-w-121
  track: business
  topic: branding
  headword: positioning
  ipa: /pəˈzɪʃənɪŋ/
  pos: n.
  definitionEn: The way a product is presented to stand out in customers' minds.
  translationZh: 品牌定位
  exampleEn: Our positioning targets small businesses that find enterprise software too complex.
  exampleZh: 我们的定位面向那些觉得企业级软件过于复杂的小微企业。
- id: biz-w-122
  track: business
  topic: branding
  headword: tagline
  ipa: /ˈtæɡlaɪn/
  pos: n.
  definitionEn: A short memorable phrase used in brand marketing.
  translationZh: 品牌口号；广告语
  exampleEn: The agency proposed a new tagline for the spring campaign.
  exampleZh: 广告公司为春季推广提出了一句新口号。
- id: biz-w-123
  track: business
  topic: branding
  headword: differentiate
  ipa: /ˌdɪfəˈrenʃieɪt/
  pos: v.
  definitionEn: To make a product clearly different from competitors'.
  translationZh: 使差异化；区分
  exampleEn: Excellent after-sales service differentiates us from cheaper rivals.
  exampleZh: 出色的售后服务使我们有别于价格更低的竞争对手。
- id: biz-w-124
  track: business
  topic: branding
  headword: target audience
  ipa: /ˌtɑːrɡɪt ˈɔːdiəns/
  pos: n.
  definitionEn: The specific group of people a product or message is aimed at.
  translationZh: 目标受众
  exampleEn: The ad performs well because it speaks directly to our target audience.
  exampleZh: 这则广告效果很好，因为它直接打动了我们的目标受众。
- id: biz-w-125
  track: business
  topic: branding
  headword: rebrand
  ipa: /ˌriːˈbrænd/
  pos: v.
  definitionEn: To change a company's name, logo, or public image.
  translationZh: 品牌重塑
  exampleEn: The firm rebranded after the merger to signal a fresh start.
  exampleZh: 合并后公司进行了品牌重塑，以示全新开始。
- id: biz-w-126
  track: business
  topic: branding
  headword: brand equity
  ipa: /ˌbrænd ˈekwəti/
  pos: n.
  definitionEn: The commercial value that comes from a brand's reputation.
  translationZh: 品牌资产
  exampleEn: Decades of consistent quality built enormous brand equity for the label.
  exampleZh: 数十年如一日的品质为该品牌积累了巨大的品牌资产。
- id: biz-w-127
  track: business
  topic: branding
  headword: endorsement
  ipa: /ɪnˈdɔːrsmənt/
  pos: n.
  definitionEn: Public support for a product from a well-known person.
  translationZh: 代言；背书
  exampleEn: The athlete's endorsement doubled sales of the running shoes.
  exampleZh: 这位运动员的代言让跑鞋销量翻番。
- id: biz-w-128
  track: business
  topic: branding
  headword: visibility
  ipa: /ˌvɪzəˈbɪləti/
  pos: n.
  definitionEn: The degree to which something is noticed by the public.
  translationZh: 曝光度；关注度
  exampleEn: Sponsoring the tech summit gave the startup valuable visibility.
  exampleZh: 赞助这场科技峰会为这家初创公司带来了宝贵的曝光度。
- id: biz-w-129
  track: business
  topic: branding
  headword: perception
  ipa: /pərˈsepʃn/
  pos: n.
  definitionEn: The way something is understood or seen by people.
  translationZh: 认知；印象
  exampleEn: One viral complaint can damage public perception of a brand overnight.
  exampleZh: 一条疯传的投诉可能一夜之间损害品牌的公众形象。
- id: biz-w-130
  track: business
  topic: branding
  headword: brand loyalty
  ipa: /ˌbrænd ˈlɔɪəlti/
  pos: n.
  definitionEn: Customers' tendency to keep buying the same brand.
  translationZh: 品牌忠诚度
  exampleEn: Strong brand loyalty lets the company charge a premium price.
  exampleZh: 强大的品牌忠诚度让公司能够收取溢价。
# operations (运营)
- id: biz-w-131
  track: business
  topic: operations
  headword: supply chain
  ipa: /səˈplaɪ tʃeɪn/
  pos: n.
  definitionEn: The network that moves a product from suppliers to customers.
  translationZh: 供应链
  exampleEn: The port strike disrupted our supply chain for six weeks.
  exampleZh: 港口罢工使我们的供应链中断了六周。
- id: biz-w-132
  track: business
  topic: operations
  headword: procurement
  ipa: /prəˈkjʊrmənt/
  pos: n.
  definitionEn: The process of buying goods and services for an organization.
  translationZh: 采购
  exampleEn: All contracts above ten thousand dollars must go through procurement.
  exampleZh: 一万美元以上的合同都必须走采购流程。
- id: biz-w-133
  track: business
  topic: operations
  headword: logistics
  ipa: /ləˈdʒɪstɪks/
  pos: n.
  definitionEn: The organization of moving, storing, and delivering goods.
  translationZh: 物流
  exampleEn: We partnered with a logistics provider to speed up overseas delivery.
  exampleZh: 我们与一家物流公司合作，加快海外配送。
- id: biz-w-134
  track: business
  topic: operations
  headword: inventory
  ipa: /ˈɪnvəntɔːri/
  pos: n.
  definitionEn: The goods a business keeps in stock.
  translationZh: 库存
  exampleEn: The warehouse counts inventory at the end of every month.
  exampleZh: 仓库每月月底盘点库存。
- id: biz-w-135
  track: business
  topic: operations
  headword: throughput
  ipa: /ˈθruːpʊt/
  pos: n.
  definitionEn: The amount of work or products processed in a given time.
  translationZh: 处理量；产出量
  exampleEn: The new packing line raised daily throughput by forty percent.
  exampleZh: 新包装线使日处理量提高了四成。
- id: biz-w-136
  track: business
  topic: operations
  headword: downtime
  ipa: /ˈdaʊntaɪm/
  pos: n.
  definitionEn: Time when equipment or systems are not working.
  translationZh: 停机时间
  exampleEn: Scheduled maintenance keeps unplanned downtime to a minimum.
  exampleZh: 定期维护将意外停机时间降到最低。
- id: biz-w-137
  track: business
  topic: operations
  headword: capacity
  ipa: /kəˈpæsəti/
  pos: n.
  definitionEn: The maximum amount that can be produced or handled.
  translationZh: 产能；容量
  exampleEn: The factory is running at full capacity through the holiday season.
  exampleZh: 整个假日季工厂都在满负荷运转。
- id: biz-w-138
  track: business
  topic: operations
  headword: lead time
  ipa: /ˈliːd taɪm/
  pos: n.
  definitionEn: The time between placing an order and receiving it.
  translationZh: 交货周期
  exampleEn: Choosing a local supplier cut the lead time from weeks to days.
  exampleZh: 改用本地供应商后，交货周期从数周缩短到几天。
- id: biz-w-139
  track: business
  topic: operations
  headword: standardize
  ipa: /ˈstændərdaɪz/
  pos: v.
  definitionEn: To make processes or products follow the same fixed rules.
  translationZh: 标准化；统一
  exampleEn: We standardized the reporting templates across all regional offices.
  exampleZh: 我们统一了各区域办公室的报告模板。
- id: biz-w-140
  track: business
  topic: operations
  headword: ramp up
  ipa: /ˌræmp ˈʌp/
  pos: phr.
  definitionEn: To increase activity or output quickly.
  translationZh: 快速提升；加大
  exampleEn: The plant is ramping up production ahead of the product launch.
  exampleZh: 工厂正在产品发布前加紧提高产量。
# product (产品管理)
- id: biz-w-141
  track: business
  topic: product
  headword: iteration
  ipa: /ˌɪtəˈreɪʃn/
  pos: n.
  definitionEn: One version in a repeated cycle of improving a product.
  translationZh: 迭代
  exampleEn: Each iteration of the app fixed issues reported by early users.
  exampleZh: 应用的每次迭代都修复了早期用户反馈的问题。
- id: biz-w-142
  track: business
  topic: product
  headword: backlog
  ipa: /ˈbæklɔːɡ/
  pos: n.
  definitionEn: A prioritized list of work waiting to be done.
  translationZh: 待办清单；积压任务
  exampleEn: The team reviews the backlog every Monday to plan the sprint.
  exampleZh: 团队每周一梳理待办清单来规划冲刺。
- id: biz-w-143
  track: business
  topic: product
  headword: prototype
  ipa: /ˈproʊtətaɪp/
  pos: n.
  definitionEn: An early model built to test an idea or design.
  translationZh: 原型
  exampleEn: We showed users a clickable prototype before writing any code.
  exampleZh: 在写任何代码之前，我们先给用户看了可点击的原型。
- id: biz-w-144
  track: business
  topic: product
  headword: pain point
  ipa: /ˈpeɪn pɔɪnt/
  pos: n.
  definitionEn: A specific problem that frustrates customers or users.
  translationZh: 痛点
  exampleEn: Slow refunds were the biggest pain point in our checkout survey.
  exampleZh: 结算调研显示，退款慢是最大的痛点。
- id: biz-w-145
  track: business
  topic: product
  headword: roll out
  ipa: /ˌroʊl ˈaʊt/
  pos: phr.
  definitionEn: To launch a product or service gradually to users.
  translationZh: 逐步推出；上线
  exampleEn: We will roll out the new dashboard to ten percent of users first.
  exampleZh: 新仪表盘将先向百分之十的用户逐步开放。
- id: biz-w-146
  track: business
  topic: product
  headword: usability
  ipa: /ˌjuːzəˈbɪləti/
  pos: n.
  definitionEn: How easy and pleasant a product is to use.
  translationZh: 易用性
  exampleEn: Usability testing revealed that users couldn't find the export button.
  exampleZh: 易用性测试发现用户找不到导出按钮。
- id: biz-w-147
  track: business
  topic: product
  headword: spec
  ipa: /spek/
  pos: n.
  definitionEn: A detailed description of how a product should work.
  translationZh: 规格说明；需求文档
  exampleEn: Engineering can't estimate the work until the spec is final.
  exampleZh: 规格说明定稿之前，工程团队无法评估工作量。
- id: biz-w-148
  track: business
  topic: product
  headword: edge case
  ipa: /ˈedʒ keɪs/
  pos: n.
  definitionEn: An unusual situation that happens only under extreme conditions.
  translationZh: 边缘情况；极端用例
  exampleEn: The bug only appears in an edge case involving leap years.
  exampleZh: 这个缺陷只在涉及闰年的边缘情况下出现。
- id: biz-w-149
  track: business
  topic: product
  headword: beta
  ipa: /ˈbeɪtə/
  pos: n.
  definitionEn: A nearly finished version released to a limited group for testing.
  translationZh: 测试版
  exampleEn: Two hundred customers joined the beta before the public release.
  exampleZh: 公开发布前，有两百名客户参与了测试版试用。
- id: biz-w-150
  track: business
  topic: product
  headword: use case
  ipa: /ˈjuːs keɪs/
  pos: n.
  definitionEn: A specific situation in which a product could be used.
  translationZh: 使用场景
  exampleEn: Invoice automation is the strongest use case for our new tool.
  exampleZh: 发票自动化是我们新工具最有说服力的使用场景。
# analytics (数据分析)
- id: biz-w-151
  track: business
  topic: analytics
  headword: metric
  ipa: /ˈmetrɪk/
  pos: n.
  definitionEn: A number used to measure and track performance.
  translationZh: 指标
  exampleEn: Pick one north-star metric and review it every week.
  exampleZh: 选定一个北极星指标，每周复盘。
- id: biz-w-152
  track: business
  topic: analytics
  headword: dashboard
  ipa: /ˈdæʃbɔːrd/
  pos: n.
  definitionEn: A screen showing key data in one visual display.
  translationZh: 数据仪表盘
  exampleEn: The sales dashboard updates in real time during the campaign.
  exampleZh: 活动期间销售仪表盘实时更新。
- id: biz-w-153
  track: business
  topic: analytics
  headword: KPI
  ipa: /ˌkeɪ piː ˈaɪ/
  pos: n.
  definitionEn: A key number that shows how well goals are being met.
  translationZh: 关键绩效指标
  exampleEn: Customer retention is the KPI we report to the board monthly.
  exampleZh: 客户留存是我们每月向董事会汇报的关键绩效指标。
- id: biz-w-154
  track: business
  topic: analytics
  headword: data-driven
  ipa: /ˌdeɪtə ˈdrɪvn/
  pos: adj.
  definitionEn: Based on data analysis rather than opinion or guesswork.
  translationZh: 数据驱动的
  exampleEn: We moved to data-driven pricing instead of copying competitors.
  exampleZh: 我们改用数据驱动的定价，而不是照搬竞争对手。
- id: biz-w-155
  track: business
  topic: analytics
  headword: correlation
  ipa: /ˌkɔːrəˈleɪʃn/
  pos: n.
  definitionEn: A relationship in which two things change together.
  translationZh: 相关性
  exampleEn: There is a strong correlation between response speed and customer ratings.
  exampleZh: 响应速度与客户评分之间存在很强的相关性。
- id: biz-w-156
  track: business
  topic: analytics
  headword: segment
  ipa: /ˈseɡmənt/
  pos: n.
  definitionEn: A group of customers who share similar characteristics.
  translationZh: 细分群体
  exampleEn: The premium segment generates most of our profit despite its small size.
  exampleZh: 高端细分群体虽小，却贡献了我们大部分利润。
- id: biz-w-157
  track: business
  topic: analytics
  headword: outlier
  ipa: /ˈaʊtlaɪər/
  pos: n.
  definitionEn: A data point very different from the rest.
  translationZh: 异常值
  exampleEn: Remove the outliers before calculating the average order value.
  exampleZh: 计算平均订单金额之前，先剔除异常值。
- id: biz-w-158
  track: business
  topic: analytics
  headword: baseline
  ipa: /ˈbeɪslaɪn/
  pos: n.
  definitionEn: A starting measurement used for later comparison.
  translationZh: 基线；基准值
  exampleEn: Record a baseline this month so we can measure the campaign's impact.
  exampleZh: 本月先记录基线数据，以便衡量活动效果。
- id: biz-w-159
  track: business
  topic: analytics
  headword: granular
  ipa: /ˈɡrænjələr/
  pos: adj.
  definitionEn: Showing a high level of fine detail.
  translationZh: 细粒度的；精细的
  exampleEn: The new report gives granular data on usage by feature and region.
  exampleZh: 新报告提供了按功能和地区细分的精细数据。
- id: biz-w-160
  track: business
  topic: analytics
  headword: insight
  ipa: /ˈɪnsaɪt/
  pos: n.
  definitionEn: A useful understanding gained from analyzing information.
  translationZh: 洞察
  exampleEn: The survey produced a key insight that users value speed over design.
  exampleZh: 调研得出一个关键洞察：用户看重速度胜过设计。
# customer-success (客户成功)
- id: biz-w-161
  track: business
  topic: customer-success
  headword: touchpoint
  ipa: /ˈtʌtʃpɔɪnt/
  pos: n.
  definitionEn: Any moment when a customer interacts with a company.
  translationZh: 接触点
  exampleEn: Map every touchpoint from the first ad to the renewal email.
  exampleZh: 梳理从第一条广告到续约邮件的每个客户接触点。
- id: biz-w-162
  track: business
  topic: customer-success
  headword: renewal
  ipa: /rɪˈnuːəl/
  pos: n.
  definitionEn: The act of continuing a contract or subscription.
  translationZh: 续约；续订
  exampleEn: The account manager starts renewal conversations ninety days in advance.
  exampleZh: 客户经理提前九十天启动续约沟通。
- id: biz-w-163
  track: business
  topic: customer-success
  headword: adoption
  ipa: /əˈdɑːpʃn/
  pos: n.
  definitionEn: The process of starting to use a new product or feature.
  translationZh: 采用；使用率
  exampleEn: Feature adoption jumped after we added in-app tutorials.
  exampleZh: 增加应用内教程后，功能使用率大幅上升。
- id: biz-w-164
  track: business
  topic: customer-success
  headword: advocate
  ipa: /ˈædvəkət/
  pos: n.
  definitionEn: A loyal customer who actively recommends a product.
  translationZh: 拥护者；推荐者
  exampleEn: Turning happy users into advocates is cheaper than paid advertising.
  exampleZh: 把满意用户变成品牌拥护者比投放广告更省钱。
- id: biz-w-165
  track: business
  topic: customer-success
  headword: satisfaction
  ipa: /ˌsætɪsˈfækʃn/
  pos: n.
  definitionEn: The feeling of being pleased with a product or service.
  translationZh: 满意度
  exampleEn: Customer satisfaction scores rose after we shortened wait times.
  exampleZh: 缩短等待时间后，客户满意度评分上升了。
- id: biz-w-166
  track: business
  topic: customer-success
  headword: testimonial
  ipa: /ˌtestɪˈmoʊniəl/
  pos: n.
  definitionEn: A customer's written or spoken recommendation of a product.
  translationZh: 用户推荐语；好评
  exampleEn: We added three client testimonials to the landing page.
  exampleZh: 我们在落地页上加了三条客户好评。
- id: biz-w-167
  track: business
  topic: customer-success
  headword: proactive
  ipa: /ˌproʊˈæktɪv/
  pos: adj.
  definitionEn: Acting before problems happen rather than reacting afterwards.
  translationZh: 主动的；未雨绸缪的
  exampleEn: Proactive check-ins caught the issue before the client complained.
  exampleZh: 主动回访让我们在客户投诉之前就发现了问题。
- id: biz-w-168
  track: business
  topic: customer-success
  headword: win back
  ipa: /ˌwɪn ˈbæk/
  pos: phr.
  definitionEn: To regain customers who stopped buying from you.
  translationZh: 挽回（流失客户）
  exampleEn: A personalized discount helped us win back lapsed subscribers.
  exampleZh: 个性化折扣帮助我们挽回了流失的订阅用户。
- id: biz-w-169
  track: business
  topic: customer-success
  headword: response time
  ipa: /rɪˈspɑːns taɪm/
  pos: n.
  definitionEn: How long it takes to reply to a customer request.
  translationZh: 响应时间
  exampleEn: Cutting average response time to one hour lifted our support ratings.
  exampleZh: 把平均响应时间缩短到一小时后，客服评分明显提升。
- id: biz-w-170
  track: business
  topic: customer-success
  headword: customer journey
  ipa: /ˌkʌstəmər ˈdʒɜːrni/
  pos: n.
  definitionEn: The complete experience a customer has with a company over time.
  translationZh: 客户旅程
  exampleEn: We redesigned onboarding after mapping the full customer journey.
  exampleZh: 在梳理完整客户旅程之后，我们重新设计了新手引导。
# startups (创业)
- id: biz-w-171
  track: business
  topic: startups
  headword: runway
  ipa: /ˈrʌnweɪ/
  pos: n.
  definitionEn: The time a startup can operate before its money runs out.
  translationZh: 资金可维持时间
  exampleEn: With current spending, the company has eighteen months of runway.
  exampleZh: 按目前的开支水平，公司的资金还能维持十八个月。
- id: biz-w-172
  track: business
  topic: startups
  headword: burn rate
  ipa: /ˈbɜːrn reɪt/
  pos: n.
  definitionEn: The speed at which a company spends its cash.
  translationZh: 资金消耗率
  exampleEn: Investors asked us to cut the burn rate before the next round.
  exampleZh: 投资人要求我们在下一轮融资前降低资金消耗率。
- id: biz-w-173
  track: business
  topic: startups
  headword: bootstrap
  ipa: /ˈbuːtstræp/
  pos: v.
  definitionEn: To build a company using personal funds without outside investment.
  translationZh: 自筹资金创业
  exampleEn: They bootstrapped the business for three years before taking any funding.
  exampleZh: 他们靠自有资金运营了三年才接受融资。
- id: biz-w-174
  track: business
  topic: startups
  headword: venture capital
  ipa: /ˌventʃər ˈkæpɪtl/
  pos: n.
  definitionEn: Money invested in young companies with high growth potential.
  translationZh: 风险投资
  exampleEn: The startup raised venture capital to expand into Southeast Asia.
  exampleZh: 这家初创公司融得风险投资，用于拓展东南亚市场。
- id: biz-w-175
  track: business
  topic: startups
  headword: valuation
  ipa: /ˌvæljuˈeɪʃn/
  pos: n.
  definitionEn: The estimated financial worth of a company.
  translationZh: 估值
  exampleEn: The new round values the company at double its previous valuation.
  exampleZh: 新一轮融资使公司估值较上一轮翻倍。
- id: biz-w-176
  track: business
  topic: startups
  headword: pivot
  ipa: /ˈpɪvət/
  pos: v.
  definitionEn: To change a company's strategy or product direction significantly.
  translationZh: 转型；调整方向
  exampleEn: The team pivoted from consumer sales to enterprise software.
  exampleZh: 团队从面向消费者转型做企业软件。
- id: biz-w-177
  track: business
  topic: startups
  headword: founder
  ipa: /ˈfaʊndər/
  pos: n.
  definitionEn: A person who starts a company.
  translationZh: 创始人
  exampleEn: Both founders still interview every new hire personally.
  exampleZh: 两位创始人至今仍亲自面试每位新员工。
- id: biz-w-178
  track: business
  topic: startups
  headword: incubator
  ipa: /ˈɪŋkjubeɪtər/
  pos: n.
  definitionEn: An organization that supports early startups with resources and advice.
  translationZh: 孵化器
  exampleEn: The incubator provides office space, mentoring, and seed funding.
  exampleZh: 孵化器提供办公场地、导师辅导和种子资金。
- id: biz-w-179
  track: business
  topic: startups
  headword: traction
  ipa: /ˈtrækʃn/
  pos: n.
  definitionEn: Early evidence that customers want a product.
  translationZh: 市场吸引力；增长势头
  exampleEn: Show investors traction, such as steady week-over-week user growth.
  exampleZh: 要向投资人展示增长势头，比如用户数周环比稳定上升。
- id: biz-w-180
  track: business
  topic: startups
  headword: seed round
  ipa: /ˈsiːd raʊnd/
  pos: n.
  definitionEn: A startup's first formal round of investment funding.
  translationZh: 种子轮融资
  exampleEn: The seed round closed at one and a half million dollars.
  exampleZh: 种子轮融资以一百五十万美元完成交割。
# feedback (反馈沟通)
- id: biz-w-181
  track: business
  topic: feedback
  headword: constructive
  ipa: /kənˈstrʌktɪv/
  pos: adj.
  definitionEn: Intended to help someone improve rather than to criticize.
  translationZh: 建设性的
  exampleEn: She gave constructive feedback that focused on specific behaviors, not personality.
  exampleZh: 她给出的反馈很有建设性，针对具体行为而非个性。
- id: biz-w-182
  track: business
  topic: feedback
  headword: candid
  ipa: /ˈkændɪd/
  pos: adj.
  definitionEn: Honest and direct, even when the truth is uncomfortable.
  translationZh: 坦率的
  exampleEn: The manager was candid about the project's chances of being cancelled.
  exampleZh: 经理坦率地谈了项目被取消的可能性。
- id: biz-w-183
  track: business
  topic: feedback
  headword: commend
  ipa: /kəˈmend/
  pos: v.
  definitionEn: To praise someone formally for doing something well.
  translationZh: 表扬；称赞
  exampleEn: The director commended the team for delivering under a tight deadline.
  exampleZh: 总监表扬了团队在紧迫期限内完成交付。
- id: biz-w-184
  track: business
  topic: feedback
  headword: critique
  ipa: /krɪˈtiːk/
  pos: n.
  definitionEn: A careful judgment of strengths and weaknesses.
  translationZh: 评析；点评
  exampleEn: The design team invites open critique at every Friday review.
  exampleZh: 设计团队在每周五的评审会上欢迎大家公开点评。
- id: biz-w-185
  track: business
  topic: feedback
  headword: actionable
  ipa: /ˈækʃənəbl/
  pos: adj.
  definitionEn: Clear and specific enough to act on.
  translationZh: 可执行的；可落实的
  exampleEn: Turn the survey results into three actionable recommendations.
  exampleZh: 把调研结果提炼成三条可执行的建议。
- id: biz-w-186
  track: business
  topic: feedback
  headword: performance review
  ipa: /pərˈfɔːrməns rɪˌvjuː/
  pos: n.
  definitionEn: A formal meeting to evaluate an employee's work.
  translationZh: 绩效考核
  exampleEn: Set measurable goals at the start so the performance review is fair.
  exampleZh: 一开始就设定可衡量的目标，绩效考核才公平。
- id: biz-w-187
  track: business
  topic: feedback
  headword: blind spot
  ipa: /ˈblaɪnd spɑːt/
  pos: n.
  definitionEn: A weakness someone cannot see in themselves.
  translationZh: 盲点
  exampleEn: Peer feedback revealed a blind spot in how he ran meetings.
  exampleZh: 同事的反馈让他发现了自己主持会议方式上的盲点。
- id: biz-w-188
  track: business
  topic: feedback
  headword: follow through
  ipa: /ˌfɑːloʊ ˈθruː/
  pos: phr.
  definitionEn: To complete what was promised or started.
  translationZh: 落实到底；兑现
  exampleEn: Feedback only matters if managers follow through on the changes.
  exampleZh: 只有管理者把改进落实到底，反馈才有意义。
- id: biz-w-189
  track: business
  topic: feedback
  headword: debrief
  ipa: /ˌdiːˈbriːf/
  pos: v.
  definitionEn: To discuss an event afterwards in order to learn from it.
  translationZh: 复盘讨论；事后总结
  exampleEn: Let's debrief right after the client call while details are fresh.
  exampleZh: 客户电话一结束我们就趁热复盘。
- id: biz-w-190
  track: business
  topic: feedback
  headword: receptive
  ipa: /rɪˈseptɪv/
  pos: adj.
  definitionEn: Willing to listen to and consider new ideas or criticism.
  translationZh: 乐于接受的
  exampleEn: The new director is receptive to suggestions from junior staff.
  exampleZh: 新总监乐于听取基层员工的建议。
# careers (职业发展)
- id: biz-w-191
  track: business
  topic: careers
  headword: promotion
  ipa: /prəˈmoʊʃn/
  pos: n.
  definitionEn: A move to a higher position with more responsibility.
  translationZh: 晋升
  exampleEn: She earned a promotion to regional manager after two strong years.
  exampleZh: 凭借两年出色的业绩，她晋升为区域经理。
- id: biz-w-192
  track: business
  topic: careers
  headword: upskill
  ipa: /ˈʌpskɪl/
  pos: v.
  definitionEn: To learn new skills to stay effective at work.
  translationZh: 提升技能
  exampleEn: The company pays for courses so staff can upskill in data analysis.
  exampleZh: 公司报销课程费用，让员工提升数据分析技能。
- id: biz-w-193
  track: business
  topic: careers
  headword: lateral move
  ipa: /ˌlætərəl ˈmuːv/
  pos: n.
  definitionEn: A job change at the same level rather than a promotion.
  translationZh: 平级调动
  exampleEn: A lateral move into marketing broadened her experience before management.
  exampleZh: 平级调到市场部拓宽了她走上管理岗前的历练。
- id: biz-w-194
  track: business
  topic: careers
  headword: career ladder
  ipa: /kəˈrɪr ˌlædər/
  pos: n.
  definitionEn: The series of positions leading to more senior roles.
  translationZh: 职业晋升通道
  exampleEn: The firm publishes a clear career ladder for every department.
  exampleZh: 公司为每个部门公布了清晰的晋升通道。
- id: biz-w-195
  track: business
  topic: careers
  headword: transferable
  ipa: /trænsˈfɜːrəbl/
  pos: adj.
  definitionEn: Useful in many different jobs or situations.
  translationZh: 可迁移的
  exampleEn: Project management is a transferable skill valued in every industry.
  exampleZh: 项目管理是各行各业都看重的可迁移技能。
- id: biz-w-196
  track: business
  topic: careers
  headword: sabbatical
  ipa: /səˈbætɪkl/
  pos: n.
  definitionEn: An extended break from work, often for study or rest.
  translationZh: 长假；进修假
  exampleEn: After seven years, he took a six-month sabbatical to travel and recharge.
  exampleZh: 工作七年后，他休了六个月长假去旅行充电。
- id: biz-w-197
  track: business
  topic: careers
  headword: burnout
  ipa: /ˈbɜːrnaʊt/
  pos: n.
  definitionEn: Exhaustion caused by long-term work stress.
  translationZh: 职业倦怠
  exampleEn: The company added mental health days to reduce burnout.
  exampleZh: 公司增设心理健康假，以缓解职业倦怠。
- id: biz-w-198
  track: business
  topic: careers
  headword: work-life balance
  ipa: /ˌwɜːrk laɪf ˈbæləns/
  pos: n.
  definitionEn: A healthy division of time between job and personal life.
  translationZh: 工作与生活的平衡
  exampleEn: Flexible hours improved work-life balance across the team.
  exampleZh: 弹性工时改善了整个团队的工作生活平衡。
- id: biz-w-199
  track: business
  topic: careers
  headword: notice period
  ipa: /ˈnoʊtɪs ˌpɪriəd/
  pos: n.
  definitionEn: The time you must keep working after resigning.
  translationZh: 离职通知期
  exampleEn: Her contract requires a one-month notice period before leaving.
  exampleZh: 按合同规定，她离职前须提前一个月通知。
- id: biz-w-200
  track: business
  topic: careers
  headword: resign
  ipa: /rɪˈzaɪn/
  pos: v.
  definitionEn: To formally leave a job by choice.
  translationZh: 辞职
  exampleEn: He resigned to join a startup founded by a former colleague.
  exampleZh: 他辞职加入了前同事创办的初创公司。
