# yaml-language-server: $schema=../.schemas/vocab.schema.json
# meetings (会议)
- id: biz-w-001
  track: business
  topic: meetings
  headword: action item
  ipa: /ˈækʃn ˌaɪtəm/
  pos: n.
  definitionEn: A specific task assigned to someone after a meeting.
  translationZh: 行动事项；待办任务
  exampleEn: Let's list the action items and assign an owner to each one.
  exampleZh: 我们把行动事项列出来，并为每一项指定负责人。
- id: biz-w-002
  track: business
  topic: meetings
  headword: adjourn
  ipa: /əˈdʒɜːrn/
  pos: v.
  definitionEn: To end a meeting formally, often until a later time.
  translationZh: 休会；散会
  exampleEn: The chairperson adjourned the meeting until nine o'clock the next morning.
  exampleZh: 主席宣布休会，会议将于次日上午九点继续。
- id: biz-w-003
  track: business
  topic: meetings
  headword: minutes
  ipa: /ˈmɪnɪts/
  pos: n.
  definitionEn: The official written record of what was said at a meeting.
  translationZh: 会议记录
  exampleEn: Sarah will circulate the minutes to all attendees by the end of the day.
  exampleZh: 莎拉会在今天下班前把会议记录发给所有与会者。
- id: biz-w-004
  track: business
  topic: meetings
  headword: consensus
  ipa: /kənˈsensəs/
  pos: n.
  definitionEn: General agreement among the members of a group.
  translationZh: 共识
  exampleEn: After a long discussion, the board reached a consensus on the new pricing strategy.
  exampleZh: 经过长时间讨论，董事会就新定价策略达成了共识。
- id: biz-w-005
  track: business
  topic: meetings
  headword: brainstorm
  ipa: /ˈbreɪnstɔːrm/
  pos: v.
  definitionEn: To suggest many ideas quickly in a group discussion.
  translationZh: 头脑风暴
  exampleEn: The team met on Friday to brainstorm ideas for the product launch.
  exampleZh: 团队周五开会，为产品发布进行头脑风暴。
- id: biz-w-006
  track: business
  topic: meetings
  headword: circle back
  ipa: /ˌsɜːrkl ˈbæk/
  pos: phr.
  definitionEn: To return to a topic or person later.
  translationZh: 回头再谈；稍后再议
  exampleEn: We're short on time, so let's circle back to this issue next week.
  exampleZh: 时间不够了，这个问题我们下周再回头讨论。
- id: biz-w-007
  track: business
  topic: meetings
  headword: touch base
  ipa: /ˌtʌtʃ ˈbeɪs/
  pos: phr.
  definitionEn: To make brief contact with someone to exchange updates.
  translationZh: 简短沟通；碰头
  exampleEn: Let's touch base on Thursday to review the project's progress.
  exampleZh: 我们周四碰个头，一起看看项目进展。
- id: biz-w-008
  track: business
  topic: meetings
  headword: wrap up
  ipa: /ˌræp ˈʌp/
  pos: phr.
  definitionEn: To finish or conclude something, such as a meeting.
  translationZh: 结束；收尾
  exampleEn: Before we wrap up, does anyone have questions about the timeline?
  exampleZh: 在结束之前，大家对时间安排还有什么问题吗？
- id: biz-w-009
  track: business
  topic: meetings
  headword: facilitate
  ipa: /fəˈsɪlɪteɪt/
  pos: v.
  definitionEn: To guide a meeting or process so it runs smoothly.
  translationZh: 主持；推动
  exampleEn: An outside consultant was brought in to facilitate the strategy workshop.
  exampleZh: 公司请来一位外部顾问来主持战略研讨会。
- id: biz-w-010
  track: business
  topic: meetings
  headword: takeaway
  ipa: /ˈteɪkəweɪ/
  pos: n.
  definitionEn: A key point or lesson to remember from a discussion.
  translationZh: 要点；心得
  exampleEn: The main takeaway from today's meeting is that we need faster customer feedback.
  exampleZh: 今天会议的主要结论是我们需要更快获得客户反馈。
# negotiation (谈判)
- id: biz-w-011
  track: business
  topic: negotiation
  headword: leverage
  ipa: /ˈlevərɪdʒ/
  pos: n.
  definitionEn: Power or advantage used to influence a negotiation.
  translationZh: 筹码；影响力
  exampleEn: Being the supplier's largest customer gives us considerable leverage in price talks.
  exampleZh: 作为该供应商最大的客户，我们在价格谈判中拥有相当大的筹码。
- id: biz-w-012
  track: business
  topic: negotiation
  headword: concession
  ipa: /kənˈseʃn/
  pos: n.
  definitionEn: Something you give up in order to reach an agreement.
  translationZh: 让步
  exampleEn: We made a concession on delivery times in exchange for a lower price.
  exampleZh: 我们在交货时间上做了让步，以换取更低的价格。
- id: biz-w-013
  track: business
  topic: negotiation
  headword: counteroffer
  ipa: /ˈkaʊntərɔːfər/
  pos: n.
  definitionEn: An offer made in response to another offer that was unacceptable.
  translationZh: 还盘；还价
  exampleEn: The vendor rejected our bid and returned with a higher counteroffer.
  exampleZh: 供应商拒绝了我们的报价，并提出了更高的还盘。
- id: biz-w-014
  track: business
  topic: negotiation
  headword: trade-off
  ipa: /ˈtreɪd ɔːf/
  pos: n.
  definitionEn: A balance between two things you cannot have both of.
  translationZh: 权衡；取舍
  exampleEn: There is always a trade-off between product quality and production cost.
  exampleZh: 产品质量与生产成本之间总要有所取舍。
- id: biz-w-015
  track: business
  topic: negotiation
  headword: bottom line
  ipa: /ˌbɑːtəm ˈlaɪn/
  pos: n.
  definitionEn: The lowest price or final position someone will accept; net profit.
  translationZh: 底线；净利润
  exampleEn: Our bottom line is fifty dollars per unit; we cannot go any lower.
  exampleZh: 我们的底线是每件五十美元，不能再低了。
- id: biz-w-016
  track: business
  topic: negotiation
  headword: compromise
  ipa: /ˈkɑːmprəmaɪz/
  pos: n.
  definitionEn: An agreement reached when each side gives up part of its demands.
  translationZh: 妥协；折中方案
  exampleEn: After two days of talks, both sides accepted a reasonable compromise.
  exampleZh: 经过两天的谈判，双方接受了一个合理的折中方案。
- id: biz-w-017
  track: business
  topic: negotiation
  headword: deal-breaker
  ipa: /ˈdiːl breɪkər/
  pos: n.
  definitionEn: An issue serious enough to end a negotiation.
  translationZh: 致命问题；无法接受的条件
  exampleEn: The lack of a warranty clause proved to be a deal-breaker for the buyer.
  exampleZh: 缺少保修条款最终让买方放弃了这笔交易。
- id: biz-w-018
  track: business
  topic: negotiation
  headword: middle ground
  ipa: /ˌmɪdl ˈɡraʊnd/
  pos: n.
  definitionEn: A position acceptable to both sides in a disagreement.
  translationZh: 折中立场；中间地带
  exampleEn: The two teams eventually found a middle ground on the licensing fees.
  exampleZh: 双方最终在许可费用问题上找到了折中方案。
- id: biz-w-019
  track: business
  topic: negotiation
  headword: hammer out
  ipa: /ˌhæmər ˈaʊt/
  pos: phr.
  definitionEn: To reach an agreement after long or difficult discussion.
  translationZh: 敲定；反复商定
  exampleEn: Lawyers from both companies hammered out the final terms overnight.
  exampleZh: 两家公司的律师连夜敲定了最终条款。
- id: biz-w-020
  track: business
  topic: negotiation
  headword: win-win
  ipa: /ˌwɪn ˈwɪn/
  pos: adj.
  definitionEn: Describing a result that benefits everyone involved.
  translationZh: 双赢的
  exampleEn: The partnership is a win-win arrangement that expands both companies' markets.
  exampleZh: 这一合作是双赢安排，扩大了两家公司的市场。
# email (邮件)
- id: biz-w-021
  track: business
  topic: email
  headword: follow up
  ipa: /ˌfɑːloʊ ˈʌp/
  pos: phr.
  definitionEn: To take further action or check progress after an earlier contact.
  translationZh: 跟进
  exampleEn: I will follow up with the client if we hear nothing by Friday.
  exampleZh: 如果周五前还没有回音，我会跟进联系客户。
- id: biz-w-022
  track: business
  topic: email
  headword: attachment
  ipa: /əˈtætʃmənt/
  pos: n.
  definitionEn: A file sent together with an email.
  translationZh: 附件
  exampleEn: Please review the attachment and send me your comments by Wednesday.
  exampleZh: 请查看附件，并在周三前把意见发给我。
- id: biz-w-023
  track: business
  topic: email
  headword: loop in
  ipa: /ˌluːp ˈɪn/
  pos: phr.
  definitionEn: To include someone in an email conversation or discussion.
  translationZh: 拉入讨论；抄送知会
  exampleEn: I'm looping in our legal team so they can review the terms.
  exampleZh: 我把法务团队加进来，以便他们审核这些条款。
- id: biz-w-024
  track: business
  topic: email
  headword: acknowledge
  ipa: /əkˈnɑːlɪdʒ/
  pos: v.
  definitionEn: To confirm that you have received or noticed something.
  translationZh: 确认收到
  exampleEn: Please acknowledge receipt of this email so we know the file arrived.
  exampleZh: 请确认收到此邮件，以便我们知道文件已送达。
- id: biz-w-025
  track: business
  topic: email
  headword: recipient
  ipa: /rɪˈsɪpiənt/
  pos: n.
  definitionEn: A person who receives something, such as an email or payment.
  translationZh: 收件人
  exampleEn: Double-check the recipient list before sending the contract to avoid data leaks.
  exampleZh: 发送合同前请再次核对收件人列表，以防信息泄露。
- id: biz-w-026
  track: business
  topic: email
  headword: reach out
  ipa: /ˌriːtʃ ˈaʊt/
  pos: phr.
  definitionEn: To contact someone, especially to offer or request help.
  translationZh: 联系；主动接洽
  exampleEn: Feel free to reach out if you have any questions about the proposal.
  exampleZh: 如对提案有任何疑问，请随时与我联系。
- id: biz-w-027
  track: business
  topic: email
  headword: escalate
  ipa: /ˈeskəleɪt/
  pos: v.
  definitionEn: To pass a problem to a higher level for attention.
  translationZh: 上报；升级处理
  exampleEn: If the server issue continues, we will escalate it to senior management.
  exampleZh: 如果服务器问题持续存在，我们将上报给高层管理者。
- id: biz-w-028
  track: business
  topic: email
  headword: clarify
  ipa: /ˈklærəfaɪ/
  pos: v.
  definitionEn: To make something easier to understand by explaining it.
  translationZh: 澄清；说明
  exampleEn: Could you clarify the payment terms mentioned in your last email?
  exampleZh: 你能澄清一下上封邮件中提到的付款条件吗？
- id: biz-w-029
  track: business
  topic: email
  headword: gentle reminder
  ipa: /ˌdʒentl rɪˈmaɪndər/
  pos: phr.
  definitionEn: A polite message reminding someone to do something.
  translationZh: 温馨提醒；委婉催促
  exampleEn: Just a gentle reminder that the survey closes this Friday afternoon.
  exampleZh: 温馨提醒：问卷调查将于本周五下午截止。
- id: biz-w-030
  track: business
  topic: email
  headword: at your earliest convenience
  ipa: /ət jʊr ˌɜːrliəst kənˈviːniəns/
  pos: phr.
  definitionEn: As soon as it is possible for you.
  translationZh: 尽早；方便时尽快
  exampleEn: Please sign and return the agreement at your earliest convenience.
  exampleZh: 请您方便时尽早签署并寄回协议。
# presentations (演示汇报)
- id: biz-w-031
  track: business
  topic: presentations
  headword: slide deck
  ipa: /ˈslaɪd dek/
  pos: n.
  definitionEn: A set of presentation slides.
  translationZh: 演示文稿；幻灯片
  exampleEn: I'll share the slide deck with everyone right after the presentation.
  exampleZh: 演示结束后我会立刻把幻灯片分享给大家。
- id: biz-w-032
  track: business
  topic: presentations
  headword: walk through
  ipa: /ˌwɔːk ˈθruː/
  pos: phr.
  definitionEn: To explain something step by step.
  translationZh: 逐步讲解
  exampleEn: Let me walk through the quarterly numbers before we discuss next steps.
  exampleZh: 在讨论后续安排之前，我先逐项讲解季度数据。
- id: biz-w-033
  track: business
  topic: presentations
  headword: highlight
  ipa: /ˈhaɪlaɪt/
  pos: v.
  definitionEn: To emphasize the most important parts of something.
  translationZh: 强调；突出
  exampleEn: The report highlights three areas where costs can be reduced immediately.
  exampleZh: 报告重点指出了三个可以立即削减成本的领域。
- id: biz-w-034
  track: business
  topic: presentations
  headword: recap
  ipa: /ˈriːkæp/
  pos: v.
  definitionEn: To repeat the main points of something briefly.
  translationZh: 概括；回顾
  exampleEn: To recap, we agreed on the budget, the timeline, and the team structure.
  exampleZh: 简要回顾一下：我们就预算、时间表和团队结构达成了一致。
- id: biz-w-035
  track: business
  topic: presentations
  headword: drill down
  ipa: /ˌdrɪl ˈdaʊn/
  pos: phr.
  definitionEn: To examine something in greater detail.
  translationZh: 深入分析
  exampleEn: Let's drill down into the regional sales figures to find the problem.
  exampleZh: 我们深入分析各地区的销售数据，找出问题所在。
- id: biz-w-036
  track: business
  topic: presentations
  headword: handout
  ipa: /ˈhændaʊt/
  pos: n.
  definitionEn: A printed document given to people at a presentation.
  translationZh: 讲义；发放材料
  exampleEn: The full financial tables are in the handout on your desks.
  exampleZh: 完整的财务报表在各位桌上的讲义里。
- id: biz-w-037
  track: business
  topic: presentations
  headword: articulate
  ipa: /ɑːrˈtɪkjuleɪt/
  pos: v.
  definitionEn: To express ideas clearly in words.
  translationZh: 清晰表达
  exampleEn: A good presenter can articulate complex ideas in simple language.
  exampleZh: 优秀的演讲者能用简单的语言清晰表达复杂的观点。
- id: biz-w-038
  track: business
  topic: presentations
  headword: illustrate
  ipa: /ˈɪləstreɪt/
  pos: v.
  definitionEn: To explain something by giving examples or using pictures.
  translationZh: 举例说明；图示
  exampleEn: She used a customer case study to illustrate the product's value.
  exampleZh: 她用一个客户案例来说明产品的价值。
- id: biz-w-039
  track: business
  topic: presentations
  headword: pitch
  ipa: /pɪtʃ/
  pos: n.
  definitionEn: A short talk intended to persuade people to buy or invest.
  translationZh: 推介；路演
  exampleEn: The startup delivered a five-minute pitch to a room full of investors.
  exampleZh: 这家初创公司向满屋的投资人做了五分钟的路演。
- id: biz-w-040
  track: business
  topic: presentations
  headword: engage
  ipa: /ɪnˈɡeɪdʒ/
  pos: v.
  definitionEn: To attract and hold someone's interest and attention.
  translationZh: 吸引；调动参与
  exampleEn: Asking questions early is a simple way to engage your audience.
  exampleZh: 尽早提问是吸引听众参与的一个简单方法。
# strategy (战略运营)
- id: biz-w-041
  track: business
  topic: strategy
  headword: stakeholder
  ipa: /ˈsteɪkhoʊldər/
  pos: n.
  definitionEn: A person or group with an interest in a business decision.
  translationZh: 利益相关方
  exampleEn: We must consult all key stakeholders before changing the product roadmap.
  exampleZh: 在调整产品路线图之前，我们必须征询所有关键利益相关方的意见。
- id: biz-w-042
  track: business
  topic: strategy
  headword: streamline
  ipa: /ˈstriːmlaɪn/
  pos: v.
  definitionEn: To make a process simpler and more efficient.
  translationZh: 精简；优化流程
  exampleEn: The new software will streamline the approval process from days to hours.
  exampleZh: 新软件将把审批流程从几天精简到几个小时。
- id: biz-w-043
  track: business
  topic: strategy
  headword: deliverable
  ipa: /dɪˈlɪvərəbl/
  pos: n.
  definitionEn: A product or result that must be completed and handed over.
  translationZh: 交付成果
  exampleEn: The contract lists each deliverable along with its deadline and owner.
  exampleZh: 合同列明了每项交付成果及其截止日期和负责人。
- id: biz-w-044
  track: business
  topic: strategy
  headword: benchmark
  ipa: /ˈbentʃmɑːrk/
  pos: n.
  definitionEn: A standard used to compare and measure performance.
  translationZh: 基准；标杆
  exampleEn: We use industry benchmarks to evaluate our customer service performance.
  exampleZh: 我们以行业基准来评估自身的客户服务表现。
- id: biz-w-045
  track: business
  topic: strategy
  headword: scale up
  ipa: /ˌskeɪl ˈʌp/
  pos: phr.
  definitionEn: To increase the size or capacity of a business or activity.
  translationZh: 扩大规模
  exampleEn: The company plans to scale up production to meet growing overseas demand.
  exampleZh: 公司计划扩大生产规模，以满足不断增长的海外需求。
- id: biz-w-046
  track: business
  topic: strategy
  headword: synergy
  ipa: /ˈsɪnərdʒi/
  pos: n.
  definitionEn: Extra value created when two organizations or teams work together.
  translationZh: 协同效应
  exampleEn: The merger is expected to create significant synergy between the two sales networks.
  exampleZh: 此次合并预计将在两个销售网络之间产生显著的协同效应。
- id: biz-w-047
  track: business
  topic: strategy
  headword: roadmap
  ipa: /ˈroʊdmæp/
  pos: n.
  definitionEn: A plan showing the stages of a project over time.
  translationZh: 路线图；规划
  exampleEn: The product roadmap shows two major releases planned for next year.
  exampleZh: 产品路线图显示明年计划发布两个重要版本。
- id: biz-w-048
  track: business
  topic: strategy
  headword: core competency
  ipa: /ˌkɔːr ˈkɑːmpɪtənsi/
  pos: n.
  definitionEn: A company's main strength that gives it a competitive advantage.
  translationZh: 核心竞争力
  exampleEn: Fast, reliable delivery has become the retailer's core competency.
  exampleZh: 快速可靠的配送已成为这家零售商的核心竞争力。
- id: biz-w-049
  track: business
  topic: strategy
  headword: milestone
  ipa: /ˈmaɪlstoʊn/
  pos: n.
  definitionEn: An important stage or event in the development of something.
  translationZh: 里程碑
  exampleEn: Reaching one million users was a major milestone for the platform.
  exampleZh: 用户数突破一百万是该平台的一个重要里程碑。
- id: biz-w-050
  track: business
  topic: strategy
  headword: outsource
  ipa: /ˈaʊtsɔːrs/
  pos: v.
  definitionEn: To pay another company to do work for your business.
  translationZh: 外包
  exampleEn: The firm decided to outsource its customer support to reduce operating costs.
  exampleZh: 该公司决定将客服外包，以降低运营成本。
# leadership (领导管理)
- id: biz-w-051
  track: business
  topic: leadership
  headword: delegate
  ipa: /ˈdelɪɡeɪt/
  pos: v.
  definitionEn: To give part of your work or authority to someone else.
  translationZh: 授权；分派
  exampleEn: Good managers delegate routine tasks and focus on priorities.
  exampleZh: 优秀的管理者会分派例行事务，专注于优先事项。
- id: biz-w-052
  track: business
  topic: leadership
  headword: mentor
  ipa: /ˈmentɔːr/
  pos: n.
  definitionEn: An experienced person who guides someone less experienced.
  translationZh: 导师
  exampleEn: Each new hire is paired with a mentor for the first six months.
  exampleZh: 每位新员工在入职前六个月都会配备一名导师。
- id: biz-w-053
  track: business
  topic: leadership
  headword: empower
  ipa: /ɪmˈpaʊər/
  pos: v.
  definitionEn: To give someone the confidence and authority to act.
  translationZh: 赋能；授权
  exampleEn: The new policy empowers teams to approve small budgets themselves.
  exampleZh: 新政策授权团队自行审批小额预算。
- id: biz-w-054
  track: business
  topic: leadership
  headword: accountability
  ipa: /əˌkaʊntəˈbɪləti/
  pos: n.
  definitionEn: Being responsible for results and willing to explain them.
  translationZh: 问责；担当
  exampleEn: Clear ownership of each project improves accountability.
  exampleZh: 明确每个项目的负责人有助于加强问责。
- id: biz-w-055
  track: business
  topic: leadership
  headword: micromanage
  ipa: /ˌmaɪkroʊˈmænɪdʒ/
  pos: v.
  definitionEn: To control every small detail of other people's work.
  translationZh: 事无巨细地管控
  exampleEn: Employees quit because the director micromanaged every decision.
  exampleZh: 由于总监事事插手，员工纷纷离职。
- id: biz-w-056
  track: business
  topic: leadership
  headword: buy-in
  ipa: /ˈbaɪ ɪn/
  pos: n.
  definitionEn: Agreement and support for a decision or plan.
  translationZh: 认同；支持
  exampleEn: Get buy-in from the sales team before changing the pricing.
  exampleZh: 调整定价前先争取销售团队的认同。
- id: biz-w-057
  track: business
  topic: leadership
  headword: morale
  ipa: /məˈræl/
  pos: n.
  definitionEn: The level of confidence and enthusiasm in a group.
  translationZh: 士气
  exampleEn: Flexible working hours noticeably improved team morale.
  exampleZh: 弹性工作时间显著提升了团队士气。
- id: biz-w-058
  track: business
  topic: leadership
  headword: lead by example
  ipa: /ˌliːd baɪ ɪɡˈzæmpl/
  pos: phr.
  definitionEn: To show how to behave by doing it yourself.
  translationZh: 以身作则
  exampleEn: She leads by example, always arriving first and fully prepared.
  exampleZh: 她以身作则，总是最早到并做好充分准备。
- id: biz-w-059
  track: business
  topic: leadership
  headword: one-on-one
  ipa: /ˌwʌn ɑːn ˈwʌn/
  pos: n.
  definitionEn: A private meeting between a manager and one team member.
  translationZh: 一对一面谈
  exampleEn: I raised the workload issue in my weekly one-on-one.
  exampleZh: 我在每周的一对一面谈中提出了工作量问题。
- id: biz-w-060
  track: business
  topic: leadership
  headword: big picture
  ipa: /ˌbɪɡ ˈpɪktʃər/
  pos: n.
  definitionEn: The overall situation rather than the small details.
  translationZh: 全局；大方向
  exampleEn: Step back from the details and look at the big picture.
  exampleZh: 从细节中跳出来，着眼于全局。
# sales (市场销售)
- id: biz-w-061
  track: business
  topic: sales
  headword: lead
  ipa: /liːd/
  pos: n.
  definitionEn: A potential customer who has shown interest.
  translationZh: 潜在客户；销售线索
  exampleEn: The webinar generated over three hundred qualified leads.
  exampleZh: 这场线上讲座带来了三百多条有效销售线索。
- id: biz-w-062
  track: business
  topic: sales
  headword: conversion rate
  ipa: /kənˈvɜːrʒn reɪt/
  pos: n.
  definitionEn: The percentage of prospects who become paying customers.
  translationZh: 转化率
  exampleEn: Simplifying the checkout page doubled our conversion rate.
  exampleZh: 简化结算页面使转化率翻了一番。
- id: biz-w-063
  track: business
  topic: sales
  headword: funnel
  ipa: /ˈfʌnl/
  pos: n.
  definitionEn: The stages a prospect passes through before buying.
  translationZh: 销售漏斗
  exampleEn: Most prospects drop out at the top of the funnel.
  exampleZh: 大多数潜在客户在漏斗顶端就流失了。
- id: biz-w-064
  track: business
  topic: sales
  headword: upsell
  ipa: /ˈʌpsel/
  pos: v.
  definitionEn: To persuade a customer to buy something more expensive.
  translationZh: 推销升级产品；向上销售
  exampleEn: Staff are trained to upsell the premium plan politely.
  exampleZh: 员工接受过培训，会礼貌地推荐高级套餐。
- id: biz-w-065
  track: business
  topic: sales
  headword: churn
  ipa: /tʃɜːrn/
  pos: n.
  definitionEn: The rate at which customers stop using a service.
  translationZh: 客户流失（率）
  exampleEn: Monthly churn fell sharply after we improved onboarding.
  exampleZh: 改进新用户引导后，月流失率大幅下降。
- id: biz-w-066
  track: business
  topic: sales
  headword: brand awareness
  ipa: /ˌbrænd əˈwernəs/
  pos: n.
  definitionEn: How familiar consumers are with a brand's name.
  translationZh: 品牌知名度
  exampleEn: The sponsorship deal boosted brand awareness in overseas markets.
  exampleZh: 这项赞助协议提升了品牌在海外市场的知名度。
- id: biz-w-067
  track: business
  topic: sales
  headword: cold call
  ipa: /ˌkoʊld ˈkɔːl/
  pos: n.
  definitionEn: An unexpected sales phone call to a stranger.
  translationZh: 陌生电话推销
  exampleEn: Few deals start from a cold call these days.
  exampleZh: 如今很少有生意是从陌生电话开始的。
- id: biz-w-068
  track: business
  topic: sales
  headword: quota
  ipa: /ˈkwoʊtə/
  pos: n.
  definitionEn: A fixed sales target someone must reach.
  translationZh: 销售指标
  exampleEn: She hit her quarterly quota two weeks early.
  exampleZh: 她提前两周完成了季度销售指标。
- id: biz-w-069
  track: business
  topic: sales
  headword: retention
  ipa: /rɪˈtenʃn/
  pos: n.
  definitionEn: Keeping existing customers over time.
  translationZh: 客户留存
  exampleEn: Loyalty rewards are central to our retention strategy.
  exampleZh: 会员奖励是我们客户留存策略的核心。
- id: biz-w-070
  track: business
  topic: sales
  headword: value proposition
  ipa: /ˈvæljuː ˌprɑːpəˈzɪʃn/
  pos: n.
  definitionEn: A clear statement of the benefit a product offers.
  translationZh: 价值主张
  exampleEn: The pitch failed because the value proposition was vague.
  exampleZh: 由于价值主张含糊不清，这次推介没有成功。
# projects (项目管理)
- id: biz-w-071
  track: business
  topic: projects
  headword: scope creep
  ipa: /ˈskoʊp kriːp/
  pos: n.
  definitionEn: Gradual, uncontrolled growth of a project's requirements.
  translationZh: 需求范围蔓延
  exampleEn: Scope creep pushed the launch back by three months.
  exampleZh: 需求不断扩张使上线推迟了三个月。
- id: biz-w-072
  track: business
  topic: projects
  headword: bottleneck
  ipa: /ˈbɑːtlnek/
  pos: n.
  definitionEn: A point where progress slows because of limited capacity.
  translationZh: 瓶颈
  exampleEn: Design review became the bottleneck of the release cycle.
  exampleZh: 设计评审成了发布周期中的瓶颈。
- id: biz-w-073
  track: business
  topic: projects
  headword: dependency
  ipa: /dɪˈpendənsi/
  pos: n.
  definitionEn: A task that cannot start until another is finished.
  translationZh: 依赖项
  exampleEn: Map the dependencies before you commit to a deadline.
  exampleZh: 承诺截止日期之前，先梳理清楚依赖关系。
- id: biz-w-074
  track: business
  topic: projects
  headword: kickoff
  ipa: /ˈkɪkɔːf/
  pos: n.
  definitionEn: The first meeting that starts a project.
  translationZh: 启动会
  exampleEn: The client will present the requirements at Thursday's kickoff.
  exampleZh: 客户将在周四的启动会上介绍需求。
- id: biz-w-075
  track: business
  topic: projects
  headword: bandwidth
  ipa: /ˈbændwɪdθ/
  pos: n.
  definitionEn: The time and energy someone has for extra work.
  translationZh: 精力；余力
  exampleEn: I don't have the bandwidth to take on another project this month.
  exampleZh: 这个月我没有精力再接一个项目了。
- id: biz-w-076
  track: business
  topic: projects
  headword: sprint
  ipa: /sprɪnt/
  pos: n.
  definitionEn: A short, fixed period for completing a set of work.
  translationZh: 冲刺周期
  exampleEn: The payment feature is planned for the next two-week sprint.
  exampleZh: 支付功能安排在下一个双周冲刺中。
- id: biz-w-077
  track: business
  topic: projects
  headword: postmortem
  ipa: /ˌpoʊstˈmɔːrtəm/
  pos: n.
  definitionEn: A review after a project or incident to learn lessons.
  translationZh: 复盘
  exampleEn: The postmortem revealed that testing had started far too late.
  exampleZh: 复盘发现测试启动得太晚了。
- id: biz-w-078
  track: business
  topic: projects
  headword: contingency
  ipa: /kənˈtɪndʒənsi/
  pos: n.
  definitionEn: A plan or fund prepared for unexpected events.
  translationZh: 应急预案；备用金
  exampleEn: Keep a contingency of ten percent in the project budget.
  exampleZh: 项目预算中要预留百分之十的应急资金。
- id: biz-w-079
  track: business
  topic: projects
  headword: sign-off
  ipa: /ˈsaɪn ɔːf/
  pos: n.
  definitionEn: Formal approval to proceed or release.
  translationZh: 签核；正式批准
  exampleEn: We need legal sign-off before publishing the campaign.
  exampleZh: 发布这次活动前需要法务签核。
- id: biz-w-080
  track: business
  topic: projects
  headword: on track
  ipa: /ˌɑːn ˈtræk/
  pos: phr.
  definitionEn: Progressing as planned toward a goal.
  translationZh: 进展正常
  exampleEn: Despite the early delays, the project is back on track.
  exampleZh: 尽管前期有延误，项目现已回到正轨。
# networking (人脉拓展)
- id: biz-w-081
  track: business
  topic: networking
  headword: referral
  ipa: /rɪˈfɜːrəl/
  pos: n.
  definitionEn: A recommendation that directs someone to a person or business.
  translationZh: 引荐；转介
  exampleEn: Most of our new clients come from referrals.
  exampleZh: 我们的新客户大多来自引荐。
- id: biz-w-082
  track: business
  topic: networking
  headword: rapport
  ipa: /ræˈpɔːr/
  pos: n.
  definitionEn: A friendly relationship with good mutual understanding.
  translationZh: 融洽的关系
  exampleEn: She builds rapport with clients before talking business.
  exampleZh: 她先与客户建立融洽关系，再谈业务。
- id: biz-w-083
  track: business
  topic: networking
  headword: icebreaker
  ipa: /ˈaɪsbreɪkər/
  pos: n.
  definitionEn: A remark or activity that eases initial awkwardness.
  translationZh: 破冰话题（活动）
  exampleEn: The host opened the session with a quick icebreaker.
  exampleZh: 主持人以一个简短的破冰活动开场。
- id: biz-w-084
  track: business
  topic: networking
  headword: elevator pitch
  ipa: /ˈelɪveɪtər pɪtʃ/
  pos: n.
  definitionEn: A very short, persuasive summary of an idea or business.
  translationZh: 电梯演讲
  exampleEn: Practice a thirty-second elevator pitch before the expo.
  exampleZh: 参展前先练好三十秒的电梯演讲。
- id: biz-w-085
  track: business
  topic: networking
  headword: mingle
  ipa: /ˈmɪŋɡl/
  pos: v.
  definitionEn: To move around and talk to many people at an event.
  translationZh: （社交场合）四处交谈
  exampleEn: Don't stand in a corner — mingle and exchange contacts.
  exampleZh: 别站在角落里——多走动，交换联系方式。
- id: biz-w-086
  track: business
  topic: networking
  headword: alumni
  ipa: /əˈlʌmnaɪ/
  pos: n.
  definitionEn: Former students of a school or members of an organization.
  translationZh: 校友
  exampleEn: The alumni network helped him land his first overseas role.
  exampleZh: 校友网络帮他获得了第一份海外工作。
- id: biz-w-087
  track: business
  topic: networking
  headword: mutual connection
  ipa: /ˌmjuːtʃuəl kəˈnekʃn/
  pos: n.
  definitionEn: A person known by both parties.
  translationZh: 共同认识的人
  exampleEn: A mutual connection introduced us at the trade fair.
  exampleZh: 一位共同认识的朋友在展会上介绍我们认识。
- id: biz-w-088
  track: business
  topic: networking
  headword: business card
  ipa: /ˈbɪznəs kɑːrd/
  pos: n.
  definitionEn: A small card with your name and contact details.
  translationZh: 名片
  exampleEn: He ran out of business cards halfway through the conference.
  exampleZh: 会议进行到一半，他的名片就发完了。
- id: biz-w-089
  track: business
  topic: networking
  headword: word of mouth
  ipa: /ˌwɜːrd əv ˈmaʊθ/
  pos: n.
  definitionEn: Informal recommendation spread from person to person.
  translationZh: 口碑
  exampleEn: The restaurant grew purely by word of mouth.
  exampleZh: 这家餐厅完全靠口碑发展起来。
- id: biz-w-090
  track: business
  topic: networking
  headword: keep in touch
  ipa: /ˌkiːp ɪn ˈtʌtʃ/
  pos: phr.
  definitionEn: To continue communicating with someone.
  translationZh: 保持联系
  exampleEn: Let's keep in touch after the project wraps up.
  exampleZh: 项目结束后我们保持联系。
# remote (远程协作)
- id: biz-w-091
  track: business
  topic: remote
  headword: asynchronous
  ipa: /eɪˈsɪŋkrənəs/
  pos: adj.
  definitionEn: Not happening at the same time; not requiring instant replies.
  translationZh: 异步的
  exampleEn: Asynchronous updates let the team collaborate across time zones.
  exampleZh: 异步同步进展让团队可以跨时区协作。
- id: biz-w-092
  track: business
  topic: remote
  headword: time zone
  ipa: /ˈtaɪm zoʊn/
  pos: n.
  definitionEn: A region sharing the same standard time.
  translationZh: 时区
  exampleEn: Schedule the call in a time zone that works for both offices.
  exampleZh: 把电话会安排在两地都方便的时区时间。
- id: biz-w-093
  track: business
  topic: remote
  headword: check-in
  ipa: /ˈtʃek ɪn/
  pos: n.
  definitionEn: A brief regular update on progress or wellbeing.
  translationZh: 例行沟通；进度碰头
  exampleEn: We start each morning with a fifteen-minute check-in.
  exampleZh: 我们每天早上以十五分钟的例行碰头开始。
- id: biz-w-094
  track: business
  topic: remote
  headword: mute
  ipa: /mjuːt/
  pos: v.
  definitionEn: To turn off your microphone during a call.
  translationZh: 静音
  exampleEn: Please stay muted unless you are speaking.
  exampleZh: 不发言时请保持静音。
- id: biz-w-095
  track: business
  topic: remote
  headword: breakout room
  ipa: /ˈbreɪkaʊt ruːm/
  pos: n.
  definitionEn: A smaller online room for group discussion during a meeting.
  translationZh: 分组讨论室
  exampleEn: The trainer split us into breakout rooms of four.
  exampleZh: 培训师把我们分成四人一组的讨论室。
- id: biz-w-096
  track: business
  topic: remote
  headword: screen share
  ipa: /ˈskriːn ʃer/
  pos: n.
  definitionEn: Showing your computer screen to others in a call.
  translationZh: 屏幕共享
  exampleEn: Could you start a screen share so we can see the dashboard?
  exampleZh: 你能共享屏幕让我们看看仪表盘吗？
- id: biz-w-097
  track: business
  topic: remote
  headword: hybrid
  ipa: /ˈhaɪbrɪd/
  pos: adj.
  definitionEn: Combining office work and remote work.
  translationZh: 混合办公的
  exampleEn: The company moved to a hybrid model with two office days.
  exampleZh: 公司改为每周两天到岗的混合办公模式。
- id: biz-w-098
  track: business
  topic: remote
  headword: overlap
  ipa: /ˈoʊvərlæp/
  pos: n.
  definitionEn: A period when different schedules coincide.
  translationZh: （时间）重叠
  exampleEn: Keep four hours of overlap with the Berlin team.
  exampleZh: 与柏林团队保持四小时的工作时间重叠。
- id: biz-w-099
  track: business
  topic: remote
  headword: virtual
  ipa: /ˈvɜːrtʃuəl/
  pos: adj.
  definitionEn: Happening online rather than in person.
  translationZh: 线上的；虚拟的
  exampleEn: The annual summit will be fully virtual again this year.
  exampleZh: 今年的年度峰会将再次全程线上举行。
- id: biz-w-100
  track: business
  topic: remote
  headword: handoff
  ipa: /ˈhændɔːf/
  pos: n.
  definitionEn: Transferring work or responsibility to another person.
  translationZh: 交接
  exampleEn: Write clear notes so the night team gets a smooth handoff.
  exampleZh: 写清备注，让夜班团队顺利交接。
