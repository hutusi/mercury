- id: ielts-l-001
  track: ielts
  title: Enquiring About a Room at Rosewood House
  titleZh: 咨询 Rosewood House 的房间租赁
  style: 对话 · Dialogue
  script:
    - speaker: A
      text: Good morning, Rosewood House student accommodation. How can I help you?
    - speaker: B
      text: Oh, hello. I'm starting a master's course in September, and I saw your advertisement online. Do you still have rooms available?
    - speaker: A
      text: "We do. We have two types left: a standard room with a shared bathroom, and an en-suite room with its own bathroom."
    - speaker: B
      text: What's the difference in price?
    - speaker: A
      text: The standard room is one hundred and forty pounds a week, and the en-suite is one hundred and eighty-five. Both prices include electricity, heating, and internet.
    - speaker: B
      text: That's good to know. Is there a kitchen?
    - speaker: A
      text: Yes, each floor has a shared kitchen with a fridge, an oven, and a microwave. You'd just need to bring your own pots and pans.
    - speaker: B
      text: I see. And how far is the building from the university?
    - speaker: A
      text: It's about a fifteen-minute walk to the main campus, or five minutes by bicycle. There's a secure bike shed behind the building.
    - speaker: B
      text: Great. If I decide to take the en-suite, what do I need to do?
    - speaker: A
      text: You'd pay a deposit of two hundred and fifty pounds to hold the room, and we'd need a copy of your university offer letter. The deposit is refundable when you move out, as long as there's no damage.
    - speaker: B
      text: Understood. Could I come and see the room first? I'll be in the city next week.
    - speaker: A
      text: Of course. We run viewings every Wednesday and Saturday at two p.m. Just bring some photo identification, like a passport.
    - speaker: B
      text: Perfect, I'll come on Wednesday then. Thank you very much for your help.
  questions:
    - id: q1
      stem: Why is the woman calling Rosewood House?
      options:
        - To ask about renting a room for her studies
        - To report a problem with her current room
        - To cancel a booking she made online
        - To ask for directions to the university
      correctIndex: 0
      explanationZh: 女士开头说明来意："I'm starting a master's course in September... Do you still have rooms available?"——她九月开始读硕士，想租学生公寓的房间。后面问到去大学的距离只是了解房源情况的细节问题（排除 D）。
    - id: q2
      stem: How much does the en-suite room cost per week?
      options:
        - One hundred and forty pounds
        - Two hundred and fifty pounds
        - One hundred and eighty-five pounds
        - One hundred and fifteen pounds
      correctIndex: 2
      explanationZh: 接待员报价："the en-suite is one hundred and eighty-five"，即带独立卫浴的房间每周 185 英镑。140 英镑是标准间的价格，250 英镑是押金——IELTS Section 1 常用多个数字互相干扰，要听清每个数字对应的对象。
    - id: q3
      stem: What is included in the weekly rent?
      options:
        - Pots and pans for the kitchen
        - A weekly cleaning service
        - Bicycle rental
        - Electricity, heating, and internet
      correctIndex: 3
      explanationZh: 原文说 "Both prices include electricity, heating, and internet"，两种房型的租金都包含水电暖网。锅具需要自备（"You'd just need to bring your own pots and pans"），选项 A 正好说反。
    - id: q4
      stem: What must the woman provide to reserve the room?
      options:
        - A reference letter from her employer
        - A deposit and a copy of her university offer letter
        - Three months' rent in advance
        - Proof of her home address
      correctIndex: 1
      explanationZh: 接待员说明预订手续："You'd pay a deposit of two hundred and fifty pounds... and we'd need a copy of your university offer letter"，即 250 英镑押金加大学录取通知书复印件。护照是看房时要带的身份证件，与预订手续无关。
    - id: q5
      stem: When will the woman most likely visit Rosewood House?
      options:
        - On Saturday at two p.m.
        - In September, when her course begins
        - On Wednesday at two p.m.
        - Next Monday morning
      correctIndex: 2
      explanationZh: 看房时间为每周三和周六下午两点，女士最后确认："Perfect, I'll come on Wednesday then"，所以她会在周三下午两点去看房。周六也是可选时间但她没有选（排除 A）；九月是开学时间，不是看房时间。
- id: ielts-l-002
  track: ielts
  title: Welcome Tour of the New Campus Sports Centre
  titleZh: 校园新体育中心导览介绍
  style: 独白 · Monologue
  script:
    - speaker: narrator
      text: Good morning, everyone, and welcome to this short introduction to the university's new sports centre. My name is Karen, and I'm the facilities coordinator here.
    - speaker: narrator
      text: The centre opened just last month, and as you can see, it replaces the old gymnasium, which had served the university for over forty years.
    - speaker: narrator
      text: On the ground floor, we have a twenty-five-metre swimming pool and a fitness suite with more than eighty exercise machines. The pool is the only part of the building that closes early, at eight p.m., because of lifeguard requirements.
    - speaker: narrator
      text: The rest of the centre is open from six in the morning until ten at night, seven days a week, including public holidays.
    - speaker: narrator
      text: Upstairs, on the first floor, you'll find four badminton courts, two squash courts, and a large studio used for yoga and dance classes.
    - speaker: narrator
      text: Now, about membership. All full-time students pay a reduced annual fee of ninety pounds, which is less than half the price for members of the public, who pay two hundred pounds.
    - speaker: narrator
      text: Your membership card gives you free access to the pool and the fitness suite at any time. However, the squash and badminton courts must be booked in advance, either online or at the reception desk, and bookings open forty-eight hours ahead.
    - speaker: narrator
      text: "One more thing: the yoga and dance classes are extremely popular, so I'd recommend signing up at the start of each term rather than waiting."
    - speaker: narrator
      text: Right, that's the end of my introduction. If you'd like to follow me, we'll start the tour at the swimming pool, and I'll be happy to answer questions as we walk.
  questions:
    - id: q1
      stem: What is the main purpose of the talk?
      options:
        - To explain the history of the old gymnasium
        - To announce changes to class timetables
        - To recruit lifeguards for the swimming pool
        - To introduce the facilities and rules of a new sports centre
      correctIndex: 3
      explanationZh: 说话人是设施协调员，依次介绍了新体育中心的各层设施、开放时间、会员费和预订规则，属于典型的 Section 2 场馆介绍。旧体育馆只在开头一句带过，不是主要内容（排除 A）。
    - id: q2
      stem: Why does the swimming pool close earlier than the rest of the centre?
      options:
        - It needs to be cleaned every evening
        - Because of lifeguard requirements
        - Fewer people swim in the evening
        - It is still being renovated
      correctIndex: 1
      explanationZh: 原文说泳池八点关闭是 "because of lifeguard requirements"，即出于救生员值守方面的规定。其余选项都是听起来合理的常识性猜测，但讲话中并未提及——IELTS 听力要求以原文为准。
    - id: q3
      stem: How much do full-time students pay for annual membership?
      options:
        - Ninety pounds
        - Two hundred pounds
        - Forty-eight pounds
        - One hundred pounds
      correctIndex: 0
      explanationZh: 讲话人说："All full-time students pay a reduced annual fee of ninety pounds"，学生年费为 90 英镑。200 英镑是校外公众的价格；48 出现在“提前 48 小时开放预订”中，是数字干扰项。
    - id: q4
      stem: What must members do before using the squash courts?
      options:
        - Pay an additional fee at reception
        - Attend a short safety briefing
        - Book the court in advance
        - Bring their own equipment
      correctIndex: 2
      explanationZh: 原文规定 "the squash and badminton courts must be booked in advance, either online or at the reception desk"——壁球场和羽毛球场必须提前预订，线上或前台皆可。会员卡对泳池和健身房是随时免费使用，与球场规则不同。
    - id: q5
      stem: What does the speaker recommend about yoga and dance classes?
      options:
        - Trying a free class before joining
        - Signing up early in the term
        - Booking forty-eight hours in advance
        - Attending on public holidays when it is quieter
      correctIndex: 1
      explanationZh: 讲话人建议："I'd recommend signing up at the start of each term rather than waiting"，因为瑜伽和舞蹈课非常热门。选项 C 的“提前 48 小时”是球场预订规则，不适用于课程报名，属于移花接木的干扰项。
- id: ielts-l-003
  track: ielts
  title: "Lecture: How Migrating Birds Navigate"
  titleZh: 讲座：候鸟如何导航
  style: 讲座 · Lecture
  script:
    - speaker: narrator
      text: Good morning, everyone. Today's lecture looks at one of nature's great puzzles — how migrating birds find their way across thousands of kilometres.
    - speaker: narrator
      text: For a long time, scientists assumed birds simply followed coastlines and other visible landmarks.
    - speaker: narrator
      text: Landmarks certainly matter, but they cannot explain how young birds complete their first migration alone, often at night and over open ocean.
    - speaker: narrator
      text: Experiments in the 1950s provided the first clue. Birds kept in enclosed cages still hopped in the direction of their normal migration route.
    - speaker: narrator
      text: When researchers moved the cages to a planetarium and rotated the artificial night sky, the birds shifted direction to match. They were reading the stars.
    - speaker: narrator
      text: The second clue came from the Earth's magnetic field. Birds fitted with small magnets became disoriented, while those carrying non-magnetic weights flew normally.
    - speaker: narrator
      text: We now believe many species carry an internal magnetic compass, possibly based on light-sensitive proteins in the eye.
    - speaker: narrator
      text: Smell may play a part as well. Seabirds in particular appear to build up a map of ocean scents carried on the wind.
    - speaker: narrator
      text: The key point is that these systems work together. A bird might hold its bearing with the magnetic compass, confirm it by the stars, and use scent or landmarks for the final approach.
    - speaker: narrator
      text: Next week, we'll consider how climate change is disrupting the timing of these extraordinary journeys.
  questions:
    - id: q1
      stem: What long-held assumption does the lecturer question?
      options:
        - That birds migrate mainly in daylight
        - That young birds learn routes from their parents
        - That birds rely only on visible landmarks
        - That seabirds cannot fly over open ocean
      correctIndex: 2
      explanationZh: 讲座开头指出旧观点："scientists assumed birds simply followed coastlines and other visible landmarks"，随后用幼鸟能独自夜间跨洋迁徙这一事实说明仅靠地标解释不通。选项 B 的“向父母学习路线”恰与“独自完成首次迁徙”矛盾。
    - id: q2
      stem: What did the planetarium experiment demonstrate?
      options:
        - Birds use the night sky to set their direction
        - Birds cannot orient themselves under artificial light
        - Caged birds lose the urge to migrate
        - Rotating cages makes birds disoriented
      correctIndex: 0
      explanationZh: 研究者旋转天文馆的人造星空后，"the birds shifted direction to match. They were reading the stars"——鸟随星空转向，证明它们依靠星空定向。被旋转的是星空而不是笼子（排除 D）。
    - id: q3
      stem: What happened to birds fitted with small magnets?
      options:
        - They flew faster than usual
        - They lost their sense of direction
        - They refused to fly at night
        - They followed coastlines instead
      correctIndex: 1
      explanationZh: 原文说 "Birds fitted with small magnets became disoriented"——佩戴磁铁的鸟失去方向感，而携带非磁性重物的对照组飞行正常，由此证明磁场感知的存在。
    - id: q4
      stem: What does the lecturer say about seabirds?
      options:
        - They navigate entirely by magnetism
        - They migrate shorter distances than land birds
        - They cannot see stars over open water
        - They may use a map of ocean scents
      correctIndex: 3
      explanationZh: 讲座提到嗅觉的作用时特别指出："Seabirds in particular appear to build up a map of ocean scents carried on the wind"。选项 A 的 entirely 过于绝对——讲座强调多套系统并用。
    - id: q5
      stem: What is the lecturer's main conclusion about bird navigation?
      options:
        - Magnetic navigation has replaced all other explanations
        - Landmark use is limited to seabirds
        - Birds combine several navigation systems
        - Star navigation is the most reliable method
      correctIndex: 2
      explanationZh: 结论句明确："The key point is that these systems work together"，并举例说明磁场定向、星空校准、气味与地标进近相互配合。其余选项都把某一种手段绝对化，与讲座主旨相悖。
- id: ielts-l-004
  track: ielts
  title: Reporting a Lost Backpack at the Railway Station
  titleZh: 在火车站失物招领处挂失背包
  style: 对话 · Dialogue
  script:
    - speaker: A
      text: Good afternoon, railway lost property office. How can I help?
    - speaker: B
      text: Oh, hello. I think I left my backpack on a train this morning, and I'm hoping someone has handed it in.
    - speaker: A
      text: Let's see what we can do. Which train were you on?
    - speaker: B
      text: The nine fifteen from Cambridge to London King's Cross. I was sitting in the last carriage.
    - speaker: A
      text: And where do you think you left the bag?
    - speaker: B
      text: On the luggage rack above my seat, I'm fairly sure.
    - speaker: A
      text: Can you describe it for me?
    - speaker: B
      text: It's a dark green backpack with brown leather straps. There's a small panda badge sewn onto the front pocket.
    - speaker: A
      text: And what was inside?
    - speaker: B
      text: A grey laptop, a physics textbook, and my gym clothes.
    - speaker: A
      text: Let me check this morning's list. You're in luck — a green backpack with a panda badge was handed in at King's Cross just before eleven.
    - speaker: B
      text: Oh, that's such a relief! How do I get it back?
    - speaker: A
      text: You can collect it from the King's Cross office any day between eight in the morning and six in the evening. Just bring some photo ID, and there's a three-pound handling fee.
    - speaker: B
      text: No problem at all. Do I need a reference number?
    - speaker: A
      text: Yes, write this down — it's L-four-seven-two. Give that number at the desk and they'll bring the bag straight out.
    - speaker: B
      text: L-four-seven-two, got it. Thank you so much for your help!
  questions:
    - id: q1
      stem: Why is the caller contacting the lost property office?
      options:
        - To ask whether his backpack has been handed in
        - To report a delay to his train
        - To complain about a theft in his carriage
        - To ask about opening hours at King's Cross
      correctIndex: 0
      explanationZh: 来电者开门见山："I think I left my backpack on a train this morning, and I'm hoping someone has handed it in"——他把背包落在了火车上，想确认是否有人捡到上交。King's Cross 办公室的开放时间只是后续领取环节的细节（排除 D）；包是遗落而非被偷（排除 C）。
    - id: q2
      stem: Which train was the caller travelling on?
      options:
        - The eleven o'clock from London
        - The nine fifty from Cambridge
        - The eight fifteen to King's Cross
        - The nine fifteen from Cambridge
      correctIndex: 3
      explanationZh: 他明确说自己乘坐的是 "The nine fifteen from Cambridge to London King's Cross"。注意 eleven（十一点前）是背包被送到失物办公室的时间，eight 出现在办公时间里——IELTS Section 1 惯用多个时间数字互相干扰，务必听清每个数字对应的事项。
    - id: q3
      stem: How can the backpack be identified?
      options:
        - It has the caller's name written inside
        - It has a panda badge on the front pocket
        - It has a broken zip on one side
        - It is covered in travel stickers
      correctIndex: 1
      explanationZh: 描述外观时他说 "There's a small panda badge sewn onto the front pocket"——前袋上缝着一枚小熊猫徽章，工作人员正是凭这一特征在清单上找到了包。笔记本电脑和课本是包内物品，属于内容而非外观识别特征。
    - id: q4
      stem: What must the caller do to collect the bag?
      options:
        - Pay ten pounds and sign a form
        - Return to Cambridge station before six
        - Show photo ID, pay a small fee, and give a reference number
        - Wait for the office to post it to his home
      correctIndex: 2
      explanationZh: 工作人员交代领取手续："Just bring some photo ID, and there's a three-pound handling fee"，随后又给出取件编号 L-four-seven-two——即出示证件、付三英镑手续费并报编号。手续费是三英镑而非十英镑（排除 A）；领取地点在 King's Cross 而不是 Cambridge（排除 B）。
- id: ielts-l-005
  track: ielts
  title: Discussing a Questionnaire with a Tutor
  titleZh: 与导师讨论问卷设计
  style: 对话 · Dialogue
  script:
    - speaker: A
      text: Come in, Maya. You wanted to talk about the questionnaire for your psychology project?
    - speaker: B
      text: Yes, thanks for seeing me. I've drafted twenty questions about social media and sleep, and I was hoping you could look them over.
    - speaker: A
      text: I read the draft you emailed me. Overall it's a good start, but I do have one main concern.
    - speaker: B
      text: Oh — is it too long?
    - speaker: A
      text: No, twenty questions is fine. The problem is that several of your questions are leading — they suggest the answer you want.
    - speaker: B
      text: Could you give me an example?
    - speaker: A
      text: Take question five. You wrote, "How much does using your phone at night damage your sleep?" That already assumes it does damage sleep.
    - speaker: B
      text: Ah, I see. So I should ask something more neutral, like how phone use affects their sleep, if at all?
    - speaker: A
      text: Exactly. And before you send it to your whole sample, I'd strongly recommend a pilot study.
    - speaker: B
      text: You mean testing it on a small group first?
    - speaker: A
      text: Yes, five or six people is enough. They'll catch confusing wording that you can't see yourself, because you're too close to it.
    - speaker: B
      text: That makes sense. Will I still have time before the deadline, though?
    - speaker: A
      text: If you run the pilot this week and revise at the weekend, you can still send the final version out on Monday.
    - speaker: B
      text: Perfect. I'll rewrite the leading questions tonight and email you the new draft by Friday.
  questions:
    - id: q1
      stem: What is the tutor's main concern about the questionnaire?
      options:
        - It contains far too many questions
        - It was emailed to students too early
        - Some questions suggest the answer the student wants
        - It does not mention social media
      correctIndex: 2
      explanationZh: 导师明确指出："The problem is that several of your questions are leading — they suggest the answer you want"——若干问题带有引导性，暗示了期望得到的答案。长度不是问题，导师原话是 "No, twenty questions is fine"（排除 A），这是学生自己猜错的方向。
    - id: q2
      stem: What does the tutor recommend before sending out the full survey?
      options:
        - Testing the questionnaire on a small group
        - Doubling the size of the sample
        - Asking the department for more time
        - Changing the topic to sleep medication
      correctIndex: 0
      explanationZh: 导师建议 "I'd strongly recommend a pilot study"，并解释只需五六个人的小规模试测，就能发现作者因“离得太近”而看不出的表述问题，故 A。他并未要求扩大样本或申请延期——按现有时间表周一即可正式发放。
    - id: q3
      stem: What will the student do by Friday?
      options:
        - Send the survey to the whole sample
        - Finish analysing the pilot results
        - Meet the tutor again in person
        - Email a revised draft to the tutor
      correctIndex: 3
      explanationZh: 学生最后承诺："I'll rewrite the leading questions tonight and email you the new draft by Friday"——今晚改写引导性问题，周五前把修改稿发给导师。向全部样本发放问卷是下周一的安排，选项 A 张冠李戴。
- id: ielts-l-006
  track: ielts
  title: "Lecture: Rebuilding Coral Reefs"
  titleZh: 讲座：修复珊瑚礁
  style: 讲座 · Lecture
  script:
    - speaker: narrator
      text: Good afternoon. Today we turn to coral reefs, and to the growing efforts to restore them.
    - speaker: narrator
      text: First, why do reefs matter so much? They cover less than one per cent of the ocean floor, yet they support roughly a quarter of all known marine species.
    - speaker: narrator
      text: They also protect coastlines from storm waves, and they support the livelihoods of hundreds of millions of people.
    - speaker: narrator
      text: The main threat is rising sea temperature. When the water stays too warm for too long, corals expel the tiny algae that feed them and turn completely white — an event known as bleaching.
    - speaker: narrator
      text: A bleached coral is not dead, but if the heat continues, it starves.
    - speaker: narrator
      text: So what can be done? The oldest restoration method is usually called coral gardening.
    - speaker: narrator
      text: Divers collect small fragments of healthy coral, grow them on underwater frames in a nursery, and then transplant them back onto a damaged reef.
    - speaker: narrator
      text: More recent work goes further. Some teams now search for corals that have already survived severe heat, and breed from those individuals — an approach known as assisted evolution.
    - speaker: narrator
      text: I should end with a caution, however. Restoration is slow and expensive, and it cannot keep pace with warming on its own.
    - speaker: narrator
      text: Replanting a reef while the ocean keeps heating is like rebuilding a house during an earthquake. Reducing emissions must come first, with restoration buying time for the survivors.
    - speaker: narrator
      text: Next week, we'll look at mangrove forests, which face similar pressures but recover rather differently.
  questions:
    - id: q1
      stem: What point does the lecturer make about the importance of coral reefs?
      options:
        - They cover a quarter of the ocean floor
        - They are the oldest ecosystems on Earth
        - They keep sea temperatures stable
        - They support a large share of marine species despite their small area
      correctIndex: 3
      explanationZh: 讲座开头指出珊瑚礁 "cover less than one per cent of the ocean floor, yet they support roughly a quarter of all known marine species"——面积不到海底的百分之一，却养育了约四分之一的已知海洋物种。选项 A 把两个数字张冠李戴，是典型的数字干扰。
    - id: q2
      stem: According to the lecturer, what happens during coral bleaching?
      options:
        - Corals are eaten by warm-water predators
        - Corals die immediately when the water warms
        - Corals expel their algae and turn white
        - Corals move to cooler, deeper water
      correctIndex: 2
      explanationZh: 原文描述白化过程："corals expel the tiny algae that feed them and turn completely white"——珊瑚排出供养自己的藻类并完全变白。讲座紧接着强调 "A bleached coral is not dead"（白化并不等于死亡，持续高温才会使其饿死），排除 B。
    - id: q3
      stem: What does coral gardening involve?
      options:
        - Growing coral fragments in nurseries and transplanting them onto damaged reefs
        - Building artificial reefs from concrete blocks
        - Breeding fish that keep the coral clean
        - Cooling the water around a reef with pumps
      correctIndex: 0
      explanationZh: 讲座介绍这一最早的修复方法："Divers collect small fragments of healthy coral, grow them on underwater frames in a nursery, and then transplant them back onto a damaged reef"——采集健康珊瑚碎枝、在水下苗圃培育、再移植回受损礁体。其余三项讲座均未提及。
    - id: q4
      stem: What is the lecturer's final caution about reef restoration?
      options:
        - It is too dangerous for divers
        - It cannot succeed on its own while the ocean keeps warming
        - It damages the corals that are moved
        - It is only possible in shallow water
      correctIndex: 1
      explanationZh: 讲座结尾告诫："it cannot keep pace with warming on its own"，并用“地震中重建房屋”作比喻——海水持续升温时，只靠修复无法奏效，必须首先减排，修复只是为幸存者争取时间。选项 D 的水深限制讲座中并未提及。
