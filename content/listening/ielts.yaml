- id: ielts-l-001
  track: ielts
  title: Enquiring About a Room at Rosewood House
  titleZh: 咨询 Rosewood House 的房间租赁
  style: 对话 · Dialogue
  script:
    - speaker: A
      text: Good morning, Rosewood House student accommodation. How can I help you?
    - speaker: B
      text: Oh, hello. I'm starting a master's course in September, and I saw your advertisement online. Do you still have rooms available?
    - speaker: A
      text: "We do. We have two types left: a standard room with a shared bathroom, and an en-suite room with its own bathroom."
    - speaker: B
      text: What's the difference in price?
    - speaker: A
      text: The standard room is one hundred and forty pounds a week, and the en-suite is one hundred and eighty-five. Both prices include electricity, heating, and internet.
    - speaker: B
      text: That's good to know. Is there a kitchen?
    - speaker: A
      text: Yes, each floor has a shared kitchen with a fridge, an oven, and a microwave. You'd just need to bring your own pots and pans.
    - speaker: B
      text: I see. And how far is the building from the university?
    - speaker: A
      text: It's about a fifteen-minute walk to the main campus, or five minutes by bicycle. There's a secure bike shed behind the building.
    - speaker: B
      text: Great. If I decide to take the en-suite, what do I need to do?
    - speaker: A
      text: You'd pay a deposit of two hundred and fifty pounds to hold the room, and we'd need a copy of your university offer letter. The deposit is refundable when you move out, as long as there's no damage.
    - speaker: B
      text: Understood. Could I come and see the room first? I'll be in the city next week.
    - speaker: A
      text: Of course. We run viewings every Wednesday and Saturday at two p.m. Just bring some photo identification, like a passport.
    - speaker: B
      text: Perfect, I'll come on Wednesday then. Thank you very much for your help.
  questions:
    - id: q1
      stem: Why is the woman calling Rosewood House?
      options:
        - To ask about renting a room for her studies
        - To report a problem with her current room
        - To cancel a booking she made online
        - To ask for directions to the university
      correctIndex: 0
      explanationZh: 女士开头说明来意："I'm starting a master's course in September... Do you still have rooms available?"——她九月开始读硕士，想租学生公寓的房间。后面问到去大学的距离只是了解房源情况的细节问题（排除 D）。
    - id: q2
      stem: How much does the en-suite room cost per week?
      options:
        - One hundred and forty pounds
        - Two hundred and fifty pounds
        - One hundred and eighty-five pounds
        - One hundred and fifteen pounds
      correctIndex: 2
      explanationZh: 接待员报价："the en-suite is one hundred and eighty-five"，即带独立卫浴的房间每周 185 英镑。140 英镑是标准间的价格，250 英镑是押金——IELTS Section 1 常用多个数字互相干扰，要听清每个数字对应的对象。
    - id: q3
      stem: What is included in the weekly rent?
      options:
        - Pots and pans for the kitchen
        - A weekly cleaning service
        - Bicycle rental
        - Electricity, heating, and internet
      correctIndex: 3
      explanationZh: 原文说 "Both prices include electricity, heating, and internet"，两种房型的租金都包含水电暖网。锅具需要自备（"You'd just need to bring your own pots and pans"），选项 A 正好说反。
    - id: q4
      stem: What must the woman provide to reserve the room?
      options:
        - A reference letter from her employer
        - A deposit and a copy of her university offer letter
        - Three months' rent in advance
        - Proof of her home address
      correctIndex: 1
      explanationZh: 接待员说明预订手续："You'd pay a deposit of two hundred and fifty pounds... and we'd need a copy of your university offer letter"，即 250 英镑押金加大学录取通知书复印件。护照是看房时要带的身份证件，与预订手续无关。
    - id: q5
      stem: When will the woman most likely visit Rosewood House?
      options:
        - On Saturday at two p.m.
        - In September, when her course begins
        - On Wednesday at two p.m.
        - Next Monday morning
      correctIndex: 2
      explanationZh: 看房时间为每周三和周六下午两点，女士最后确认："Perfect, I'll come on Wednesday then"，所以她会在周三下午两点去看房。周六也是可选时间但她没有选（排除 A）；九月是开学时间，不是看房时间。
- id: ielts-l-002
  track: ielts
  title: Welcome Tour of the New Campus Sports Centre
  titleZh: 校园新体育中心导览介绍
  style: 独白 · Monologue
  script:
    - speaker: narrator
      text: Good morning, everyone, and welcome to this short introduction to the university's new sports centre. My name is Karen, and I'm the facilities coordinator here.
    - speaker: narrator
      text: The centre opened just last month, and as you can see, it replaces the old gymnasium, which had served the university for over forty years.
    - speaker: narrator
      text: On the ground floor, we have a twenty-five-metre swimming pool and a fitness suite with more than eighty exercise machines. The pool is the only part of the building that closes early, at eight p.m., because of lifeguard requirements.
    - speaker: narrator
      text: The rest of the centre is open from six in the morning until ten at night, seven days a week, including public holidays.
    - speaker: narrator
      text: Upstairs, on the first floor, you'll find four badminton courts, two squash courts, and a large studio used for yoga and dance classes.
    - speaker: narrator
      text: Now, about membership. All full-time students pay a reduced annual fee of ninety pounds, which is less than half the price for members of the public, who pay two hundred pounds.
    - speaker: narrator
      text: Your membership card gives you free access to the pool and the fitness suite at any time. However, the squash and badminton courts must be booked in advance, either online or at the reception desk, and bookings open forty-eight hours ahead.
    - speaker: narrator
      text: "One more thing: the yoga and dance classes are extremely popular, so I'd recommend signing up at the start of each term rather than waiting."
    - speaker: narrator
      text: Right, that's the end of my introduction. If you'd like to follow me, we'll start the tour at the swimming pool, and I'll be happy to answer questions as we walk.
  questions:
    - id: q1
      stem: What is the main purpose of the talk?
      options:
        - To explain the history of the old gymnasium
        - To announce changes to class timetables
        - To recruit lifeguards for the swimming pool
        - To introduce the facilities and rules of a new sports centre
      correctIndex: 3
      explanationZh: 说话人是设施协调员，依次介绍了新体育中心的各层设施、开放时间、会员费和预订规则，属于典型的 Section 2 场馆介绍。旧体育馆只在开头一句带过，不是主要内容（排除 A）。
    - id: q2
      stem: Why does the swimming pool close earlier than the rest of the centre?
      options:
        - It needs to be cleaned every evening
        - Because of lifeguard requirements
        - Fewer people swim in the evening
        - It is still being renovated
      correctIndex: 1
      explanationZh: 原文说泳池八点关闭是 "because of lifeguard requirements"，即出于救生员值守方面的规定。其余选项都是听起来合理的常识性猜测，但讲话中并未提及——IELTS 听力要求以原文为准。
    - id: q3
      stem: How much do full-time students pay for annual membership?
      options:
        - Ninety pounds
        - Two hundred pounds
        - Forty-eight pounds
        - One hundred pounds
      correctIndex: 0
      explanationZh: 讲话人说："All full-time students pay a reduced annual fee of ninety pounds"，学生年费为 90 英镑。200 英镑是校外公众的价格；48 出现在“提前 48 小时开放预订”中，是数字干扰项。
    - id: q4
      stem: What must members do before using the squash courts?
      options:
        - Pay an additional fee at reception
        - Attend a short safety briefing
        - Book the court in advance
        - Bring their own equipment
      correctIndex: 2
      explanationZh: 原文规定 "the squash and badminton courts must be booked in advance, either online or at the reception desk"——壁球场和羽毛球场必须提前预订，线上或前台皆可。会员卡对泳池和健身房是随时免费使用，与球场规则不同。
    - id: q5
      stem: What does the speaker recommend about yoga and dance classes?
      options:
        - Trying a free class before joining
        - Signing up early in the term
        - Booking forty-eight hours in advance
        - Attending on public holidays when it is quieter
      correctIndex: 1
      explanationZh: 讲话人建议："I'd recommend signing up at the start of each term rather than waiting"，因为瑜伽和舞蹈课非常热门。选项 C 的“提前 48 小时”是球场预订规则，不适用于课程报名，属于移花接木的干扰项。
- id: ielts-l-003
  track: ielts
  title: "Lecture: How Migrating Birds Navigate"
  titleZh: 讲座：候鸟如何导航
  style: 讲座 · Lecture
  script:
    - speaker: narrator
      text: Good morning, everyone. Today's lecture looks at one of nature's great puzzles — how migrating birds find their way across thousands of kilometres.
    - speaker: narrator
      text: For a long time, scientists assumed birds simply followed coastlines and other visible landmarks.
    - speaker: narrator
      text: Landmarks certainly matter, but they cannot explain how young birds complete their first migration alone, often at night and over open ocean.
    - speaker: narrator
      text: Experiments in the 1950s provided the first clue. Birds kept in enclosed cages still hopped in the direction of their normal migration route.
    - speaker: narrator
      text: When researchers moved the cages to a planetarium and rotated the artificial night sky, the birds shifted direction to match. They were reading the stars.
    - speaker: narrator
      text: The second clue came from the Earth's magnetic field. Birds fitted with small magnets became disoriented, while those carrying non-magnetic weights flew normally.
    - speaker: narrator
      text: We now believe many species carry an internal magnetic compass, possibly based on light-sensitive proteins in the eye.
    - speaker: narrator
      text: Smell may play a part as well. Seabirds in particular appear to build up a map of ocean scents carried on the wind.
    - speaker: narrator
      text: The key point is that these systems work together. A bird might hold its bearing with the magnetic compass, confirm it by the stars, and use scent or landmarks for the final approach.
    - speaker: narrator
      text: Next week, we'll consider how climate change is disrupting the timing of these extraordinary journeys.
  questions:
    - id: q1
      stem: What long-held assumption does the lecturer question?
      options:
        - That birds migrate mainly in daylight
        - That young birds learn routes from their parents
        - That birds rely only on visible landmarks
        - That seabirds cannot fly over open ocean
      correctIndex: 2
      explanationZh: 讲座开头指出旧观点："scientists assumed birds simply followed coastlines and other visible landmarks"，随后用幼鸟能独自夜间跨洋迁徙这一事实说明仅靠地标解释不通。选项 B 的“向父母学习路线”恰与“独自完成首次迁徙”矛盾。
    - id: q2
      stem: What did the planetarium experiment demonstrate?
      options:
        - Birds use the night sky to set their direction
        - Birds cannot orient themselves under artificial light
        - Caged birds lose the urge to migrate
        - Rotating cages makes birds disoriented
      correctIndex: 0
      explanationZh: 研究者旋转天文馆的人造星空后，"the birds shifted direction to match. They were reading the stars"——鸟随星空转向，证明它们依靠星空定向。被旋转的是星空而不是笼子（排除 D）。
    - id: q3
      stem: What happened to birds fitted with small magnets?
      options:
        - They flew faster than usual
        - They lost their sense of direction
        - They refused to fly at night
        - They followed coastlines instead
      correctIndex: 1
      explanationZh: 原文说 "Birds fitted with small magnets became disoriented"——佩戴磁铁的鸟失去方向感，而携带非磁性重物的对照组飞行正常，由此证明磁场感知的存在。
    - id: q4
      stem: What does the lecturer say about seabirds?
      options:
        - They navigate entirely by magnetism
        - They migrate shorter distances than land birds
        - They cannot see stars over open water
        - They may use a map of ocean scents
      correctIndex: 3
      explanationZh: 讲座提到嗅觉的作用时特别指出："Seabirds in particular appear to build up a map of ocean scents carried on the wind"。选项 A 的 entirely 过于绝对——讲座强调多套系统并用。
    - id: q5
      stem: What is the lecturer's main conclusion about bird navigation?
      options:
        - Magnetic navigation has replaced all other explanations
        - Landmark use is limited to seabirds
        - Birds combine several navigation systems
        - Star navigation is the most reliable method
      correctIndex: 2
      explanationZh: 结论句明确："The key point is that these systems work together"，并举例说明磁场定向、星空校准、气味与地标进近相互配合。其余选项都把某一种手段绝对化，与讲座主旨相悖。
- id: ielts-l-004
  track: ielts
  title: Reporting a Lost Backpack at the Railway Station
  titleZh: 在火车站失物招领处挂失背包
  style: 对话 · Dialogue
  script:
    - speaker: A
      text: Good afternoon, railway lost property office. How can I help?
    - speaker: B
      text: Oh, hello. I think I left my backpack on a train this morning, and I'm hoping someone has handed it in.
    - speaker: A
      text: Let's see what we can do. Which train were you on?
    - speaker: B
      text: The nine fifteen from Cambridge to London King's Cross. I was sitting in the last carriage.
    - speaker: A
      text: And where do you think you left the bag?
    - speaker: B
      text: On the luggage rack above my seat, I'm fairly sure.
    - speaker: A
      text: Can you describe it for me?
    - speaker: B
      text: It's a dark green backpack with brown leather straps. There's a small panda badge sewn onto the front pocket.
    - speaker: A
      text: And what was inside?
    - speaker: B
      text: A grey laptop, a physics textbook, and my gym clothes.
    - speaker: A
      text: Let me check this morning's list. You're in luck — a green backpack with a panda badge was handed in at King's Cross just before eleven.
    - speaker: B
      text: Oh, that's such a relief! How do I get it back?
    - speaker: A
      text: You can collect it from the King's Cross office any day between eight in the morning and six in the evening. Just bring some photo ID, and there's a three-pound handling fee.
    - speaker: B
      text: No problem at all. Do I need a reference number?
    - speaker: A
      text: Yes, write this down — it's L-four-seven-two. Give that number at the desk and they'll bring the bag straight out.
    - speaker: B
      text: L-four-seven-two, got it. Thank you so much for your help!
  questions:
    - id: q1
      stem: Why is the caller contacting the lost property office?
      options:
        - To ask whether his backpack has been handed in
        - To report a delay to his train
        - To complain about a theft in his carriage
        - To ask about opening hours at King's Cross
      correctIndex: 0
      explanationZh: 来电者开门见山："I think I left my backpack on a train this morning, and I'm hoping someone has handed it in"——他把背包落在了火车上，想确认是否有人捡到上交。King's Cross 办公室的开放时间只是后续领取环节的细节（排除 D）；包是遗落而非被偷（排除 C）。
    - id: q2
      stem: Which train was the caller travelling on?
      options:
        - The eleven o'clock from London
        - The nine fifty from Cambridge
        - The eight fifteen to King's Cross
        - The nine fifteen from Cambridge
      correctIndex: 3
      explanationZh: 他明确说自己乘坐的是 "The nine fifteen from Cambridge to London King's Cross"。注意 eleven（十一点前）是背包被送到失物办公室的时间，eight 出现在办公时间里——IELTS Section 1 惯用多个时间数字互相干扰，务必听清每个数字对应的事项。
    - id: q3
      stem: How can the backpack be identified?
      options:
        - It has the caller's name written inside
        - It has a panda badge on the front pocket
        - It has a broken zip on one side
        - It is covered in travel stickers
      correctIndex: 1
      explanationZh: 描述外观时他说 "There's a small panda badge sewn onto the front pocket"——前袋上缝着一枚小熊猫徽章，工作人员正是凭这一特征在清单上找到了包。笔记本电脑和课本是包内物品，属于内容而非外观识别特征。
    - id: q4
      stem: What must the caller do to collect the bag?
      options:
        - Pay ten pounds and sign a form
        - Return to Cambridge station before six
        - Show photo ID, pay a small fee, and give a reference number
        - Wait for the office to post it to his home
      correctIndex: 2
      explanationZh: 工作人员交代领取手续："Just bring some photo ID, and there's a three-pound handling fee"，随后又给出取件编号 L-four-seven-two——即出示证件、付三英镑手续费并报编号。手续费是三英镑而非十英镑（排除 A）；领取地点在 King's Cross 而不是 Cambridge（排除 B）。
- id: ielts-l-005
  track: ielts
  title: Discussing a Questionnaire with a Tutor
  titleZh: 与导师讨论问卷设计
  style: 对话 · Dialogue
  script:
    - speaker: A
      text: Come in, Maya. You wanted to talk about the questionnaire for your psychology project?
    - speaker: B
      text: Yes, thanks for seeing me. I've drafted twenty questions about social media and sleep, and I was hoping you could look them over.
    - speaker: A
      text: I read the draft you emailed me. Overall it's a good start, but I do have one main concern.
    - speaker: B
      text: Oh — is it too long?
    - speaker: A
      text: No, twenty questions is fine. The problem is that several of your questions are leading — they suggest the answer you want.
    - speaker: B
      text: Could you give me an example?
    - speaker: A
      text: Take question five. You wrote, "How much does using your phone at night damage your sleep?" That already assumes it does damage sleep.
    - speaker: B
      text: Ah, I see. So I should ask something more neutral, like how phone use affects their sleep, if at all?
    - speaker: A
      text: Exactly. And before you send it to your whole sample, I'd strongly recommend a pilot study.
    - speaker: B
      text: You mean testing it on a small group first?
    - speaker: A
      text: Yes, five or six people is enough. They'll catch confusing wording that you can't see yourself, because you're too close to it.
    - speaker: B
      text: That makes sense. Will I still have time before the deadline, though?
    - speaker: A
      text: If you run the pilot this week and revise at the weekend, you can still send the final version out on Monday.
    - speaker: B
      text: Perfect. I'll rewrite the leading questions tonight and email you the new draft by Friday.
  questions:
    - id: q1
      stem: What is the tutor's main concern about the questionnaire?
      options:
        - It contains far too many questions
        - It was emailed to students too early
        - Some questions suggest the answer the student wants
        - It does not mention social media
      correctIndex: 2
      explanationZh: 导师明确指出："The problem is that several of your questions are leading — they suggest the answer you want"——若干问题带有引导性，暗示了期望得到的答案。长度不是问题，导师原话是 "No, twenty questions is fine"（排除 A），这是学生自己猜错的方向。
    - id: q2
      stem: What does the tutor recommend before sending out the full survey?
      options:
        - Testing the questionnaire on a small group
        - Doubling the size of the sample
        - Asking the department for more time
        - Changing the topic to sleep medication
      correctIndex: 0
      explanationZh: 导师建议 "I'd strongly recommend a pilot study"，并解释只需五六个人的小规模试测，就能发现作者因“离得太近”而看不出的表述问题，故 A。他并未要求扩大样本或申请延期——按现有时间表周一即可正式发放。
    - id: q3
      stem: What will the student do by Friday?
      options:
        - Send the survey to the whole sample
        - Finish analysing the pilot results
        - Meet the tutor again in person
        - Email a revised draft to the tutor
      correctIndex: 3
      explanationZh: 学生最后承诺："I'll rewrite the leading questions tonight and email you the new draft by Friday"——今晚改写引导性问题，周五前把修改稿发给导师。向全部样本发放问卷是下周一的安排，选项 A 张冠李戴。
- id: ielts-l-006
  track: ielts
  title: "Lecture: Rebuilding Coral Reefs"
  titleZh: 讲座：修复珊瑚礁
  style: 讲座 · Lecture
  script:
    - speaker: narrator
      text: Good afternoon. Today we turn to coral reefs, and to the growing efforts to restore them.
    - speaker: narrator
      text: First, why do reefs matter so much? They cover less than one per cent of the ocean floor, yet they support roughly a quarter of all known marine species.
    - speaker: narrator
      text: They also protect coastlines from storm waves, and they support the livelihoods of hundreds of millions of people.
    - speaker: narrator
      text: The main threat is rising sea temperature. When the water stays too warm for too long, corals expel the tiny algae that feed them and turn completely white — an event known as bleaching.
    - speaker: narrator
      text: A bleached coral is not dead, but if the heat continues, it starves.
    - speaker: narrator
      text: So what can be done? The oldest restoration method is usually called coral gardening.
    - speaker: narrator
      text: Divers collect small fragments of healthy coral, grow them on underwater frames in a nursery, and then transplant them back onto a damaged reef.
    - speaker: narrator
      text: More recent work goes further. Some teams now search for corals that have already survived severe heat, and breed from those individuals — an approach known as assisted evolution.
    - speaker: narrator
      text: I should end with a caution, however. Restoration is slow and expensive, and it cannot keep pace with warming on its own.
    - speaker: narrator
      text: Replanting a reef while the ocean keeps heating is like rebuilding a house during an earthquake. Reducing emissions must come first, with restoration buying time for the survivors.
    - speaker: narrator
      text: Next week, we'll look at mangrove forests, which face similar pressures but recover rather differently.
  questions:
    - id: q1
      stem: What point does the lecturer make about the importance of coral reefs?
      options:
        - They cover a quarter of the ocean floor
        - They are the oldest ecosystems on Earth
        - They keep sea temperatures stable
        - They support a large share of marine species despite their small area
      correctIndex: 3
      explanationZh: 讲座开头指出珊瑚礁 "cover less than one per cent of the ocean floor, yet they support roughly a quarter of all known marine species"——面积不到海底的百分之一，却养育了约四分之一的已知海洋物种。选项 A 把两个数字张冠李戴，是典型的数字干扰。
    - id: q2
      stem: According to the lecturer, what happens during coral bleaching?
      options:
        - Corals are eaten by warm-water predators
        - Corals die immediately when the water warms
        - Corals expel their algae and turn white
        - Corals move to cooler, deeper water
      correctIndex: 2
      explanationZh: 原文描述白化过程："corals expel the tiny algae that feed them and turn completely white"——珊瑚排出供养自己的藻类并完全变白。讲座紧接着强调 "A bleached coral is not dead"（白化并不等于死亡，持续高温才会使其饿死），排除 B。
    - id: q3
      stem: What does coral gardening involve?
      options:
        - Growing coral fragments in nurseries and transplanting them onto damaged reefs
        - Building artificial reefs from concrete blocks
        - Breeding fish that keep the coral clean
        - Cooling the water around a reef with pumps
      correctIndex: 0
      explanationZh: 讲座介绍这一最早的修复方法："Divers collect small fragments of healthy coral, grow them on underwater frames in a nursery, and then transplant them back onto a damaged reef"——采集健康珊瑚碎枝、在水下苗圃培育、再移植回受损礁体。其余三项讲座均未提及。
    - id: q4
      stem: What is the lecturer's final caution about reef restoration?
      options:
        - It is too dangerous for divers
        - It cannot succeed on its own while the ocean keeps warming
        - It damages the corals that are moved
        - It is only possible in shallow water
      correctIndex: 1
      explanationZh: 讲座结尾告诫："it cannot keep pace with warming on its own"，并用“地震中重建房屋”作比喻——海水持续升温时，只靠修复无法奏效，必须首先减排，修复只是为幸存者争取时间。选项 D 的水深限制讲座中并未提及。
- id: ielts-l-007
  track: ielts
  title: Renting an Allotment Garden Plot
  titleZh: 咨询租用社区菜园地块
  style: 对话 · Dialogue
  script:
    - speaker: A
      text: Good morning, Greenfield Council parks department. What can I do for you?
    - speaker: B
      text: Hello. I'm ringing about the allotment gardens — I'd like to rent a plot to grow some vegetables.
    - speaker: A
      text: Certainly. We rent out two sizes, a full plot and a half plot.
    - speaker: B
      text: I've never done this before, so a half plot sounds more realistic. How much would that cost?
    - speaker: A
      text: A half plot is thirty-five pounds a year, and a full plot is sixty. The rent includes water from the shared tanks, but you provide your own tools.
    - speaker: B
      text: That's very reasonable. Is there a site near the town centre?
    - speaker: A
      text: The closest one is Elm Lane, but I'm afraid there's a waiting list of about four months for that site.
    - speaker: B
      text: Four months? Oh dear.
    - speaker: A
      text: However, the Riverside site has three half plots free right now. It's a little further out, but it's next to the number seven bus route.
    - speaker: B
      text: Riverside would suit me fine, actually. What do I need to do?
    - speaker: A
      text: I'll post you an application form today. Before you take the plot on, you'll also need to attend a short induction session — we run one on the first Saturday of every month.
    - speaker: B
      text: That's no problem. Does the session cost anything?
    - speaker: A
      text: No, it's free, and it covers the site rules, the compost bins, and how to book the communal shed.
    - speaker: B
      text: Wonderful. My name is David Sharp, that's S-H-A-R-P, and I'll look out for the form.
  questions:
    - id: q1
      stem: Why is the man calling the parks department?
      options:
        - To report a problem at the Elm Lane site
        - To book the communal shed for an event
        - To ask about renting an allotment plot
        - To complain about the waiting list
      correctIndex: 2
      explanationZh: 男士开头说明来意："I'm ringing about the allotment gardens — I'd like to rent a plot to grow some vegetables"——他想租一块菜园地种菜。公用工具棚和等候名单都是对话后半才出现的细节，并非来电目的（排除 B、D）。
    - id: q2
      stem: How much does a half plot cost per year?
      options:
        - Thirty-five pounds
        - Sixty pounds
        - Forty-five pounds
        - Twenty-five pounds
      correctIndex: 0
      explanationZh: 工作人员报价："A half plot is thirty-five pounds a year, and a full plot is sixty"——半块地年租 35 英镑。60 英镑是整块地的价格，属于典型的数字互扰；45 和 25 在对话中并未出现。
    - id: q3
      stem: What does the woman say about the Riverside site?
      options:
        - It has a four-month waiting list
        - It is the closest site to the town centre
        - It only has full plots left
        - It has half plots available immediately
      correctIndex: 3
      explanationZh: 工作人员说："the Riverside site has three half plots free right now"——Riverside 目前就有三块半地空着，可以立即租用。四个月的等候名单和“离市中心最近”说的都是 Elm Lane（排除 A、B），IELTS 常把两处地点的信息互相调换来设置干扰。
    - id: q4
      stem: What must the man do before taking on the plot?
      options:
        - Buy his own water tank
        - Attend a free induction session
        - Pay a deposit at the town hall
        - Provide a reference from a neighbour
      correctIndex: 1
      explanationZh: 工作人员交代："you'll also need to attend a short induction session — we run one on the first Saturday of every month"，且该课程免费，内容包括场地规则、堆肥箱和公用工具棚的预订方法。需要自备的是工具而不是水箱——用水由共享水箱提供、已含在租金里（排除 A）；押金和推荐信对话中均未提及。
- id: ielts-l-008
  track: ielts
  title: Booking a Place on an Evening Pottery Course
  titleZh: 报名晚间陶艺课程
  style: 对话 · Dialogue
  script:
    - speaker: A
      text: Good afternoon, Hartley Arts Centre. How can I help?
    - speaker: B
      text: Hi. A friend of mine did your pottery course last year, and I'd love to join the next one for beginners.
    - speaker: A
      text: You're just in time — the autumn beginners' course starts on Tuesday the third of October.
    - speaker: B
      text: And is it one evening a week?
    - speaker: A
      text: That's right, every Tuesday from seven to nine, for eight weeks in total.
    - speaker: B
      text: How much does the course cost?
    - speaker: A
      text: It's ninety-six pounds. That covers the clay and the firing of your finished pieces, but not aprons — most people just bring an old shirt.
    - speaker: B
      text: Fair enough. Do I need to bring anything else?
    - speaker: A
      text: Just an old towel for cleaning your hands. All the tools and the wheels are provided in the studio.
    - speaker: B
      text: Great. Are there still places left?
    - speaker: A
      text: Let me check. Yes — the class is limited to twelve people, and there are three places remaining.
    - speaker: B
      text: In that case, how do I book?
    - speaker: A
      text: You pay a twenty-pound deposit through our website to hold your place, and the balance on the first evening. Oh, and if you drive, parking behind the centre is free after six.
    - speaker: B
      text: Perfect, I'll pay the deposit tonight. Thanks so much.
  questions:
    - id: q1
      stem: When does the beginners' course begin?
      options:
        - On Tuesday the thirteenth of October
        - On Tuesday the third of October
        - On Thursday the third of November
        - On Tuesday the eighth of October
      correctIndex: 1
      explanationZh: 接待员说："the autumn beginners' course starts on Tuesday the third of October"——十月三日星期二开课。IELTS Section 1 常用 third 与 thirteenth 这类读音相近的日期互设干扰，要仔细听辨；eight 是课程持续的周数，不是日期。
    - id: q2
      stem: What does the course fee include?
      options:
        - An apron for each student
        - A set of tools to take home
        - Free parking at all times
        - The clay and the firing of finished pieces
      correctIndex: 3
      explanationZh: 原文说："That covers the clay and the firing of your finished pieces, but not aprons"——96 英镑包含陶土和成品烧制，但不含围裙，学员通常自带旧衬衫。工具和拉坯轮由工作室提供、只限课上使用而非带回家（排除 B）；免费停车仅限六点以后（排除 C）。
    - id: q3
      stem: What should the caller bring to the class?
      options:
        - An old towel
        - Her own clay
        - A twenty-pound note
        - A pottery wheel
      correctIndex: 0
      explanationZh: 接待员建议："Just an old towel for cleaning your hands"——只需带一条擦手的旧毛巾，工具和设备都由工作室提供（排除 D）。20 英镑是通过网站支付的订金，不是要带到课堂的现金（排除 C）；陶土已含在课程费里（排除 B）。
    - id: q4
      stem: How can the caller secure a place on the course?
      options:
        - By paying the full fee at reception
        - By arriving early on the first evening
        - By paying a deposit on the website
        - By emailing the course tutor
      correctIndex: 2
      explanationZh: 预订方式为 "You pay a twenty-pound deposit through our website to hold your place, and the balance on the first evening"——先在网站付 20 英镑订金锁定名额，余款第一节课再交。费用并非当场一次付清（排除 A），全靠先到先得更是没有提及（排除 B）。
- id: ielts-l-009
  track: ielts
  title: Planning a Field-Trip Report on River Data
  titleZh: 两名学生讨论野外考察报告
  style: 对话 · Dialogue
  script:
    - speaker: A
      text: Right, Priya, we should sort out the report on the river field trip. The deadline's in two weeks.
    - speaker: B
      text: I know. I typed up all our measurements last night, and there's a problem with the second day.
    - speaker: A
      text: The flow-speed readings?
    - speaker: B
      text: Exactly. The probe wasn't calibrated properly after lunch, so all the afternoon figures are far too high.
    - speaker: A
      text: I wondered about that. Should we just leave those numbers out and not mention it?
    - speaker: B
      text: I don't think we should hide it. My tutor always says examiners give credit when you discuss problems with your method honestly.
    - speaker: A
      text: You're right — we can exclude the faulty readings but explain in the methodology why we did that.
    - speaker: B
      text: Agreed. That actually gives us more to write in the discussion section, too.
    - speaker: A
      text: Good. Now, how shall we split the rest of the work?
    - speaker: B
      text: You're better at the software, so could you do the graphs and the site map? Remember the tutor said every map needs a scale and a north arrow.
    - speaker: A
      text: Fine, I'll do those. Then you could draft the methodology and the introduction, since you took most of the notes.
    - speaker: B
      text: That works. Shall we swap our sections by Friday and then meet to put it all together?
    - speaker: A
      text: Let's say Monday morning in the library instead — Friday's a bit tight with my lab class.
    - speaker: B
      text: Monday it is. I'll book one of the study rooms.
  questions:
    - id: q1
      stem: What problem does Priya mention about their data?
      options:
        - Some measurements were lost on the way home
        - The first day's notes were incomplete
        - They forgot to measure the river's depth
        - Some afternoon readings are inaccurate
      correctIndex: 3
      explanationZh: Priya 指出第二天的数据有问题："The probe wasn't calibrated properly after lunch, so all the afternoon figures are far too high"——探头午后没有正确校准，下午的流速读数全部偏高。数据是不准确而不是丢失（排除 A），出问题的是第二天下午而不是第一天（排除 B）。
    - id: q2
      stem: What do the students agree to do about the faulty readings?
      options:
        - Repeat the measurements at the weekend
        - Exclude them but explain why in the methodology
        - Adjust the figures to more likely values
        - Leave them out without mentioning it
      correctIndex: 1
      explanationZh: 两人商定的做法是 "we can exclude the faulty readings but explain in the methodology why we did that"——剔除有误的读数，并在方法部分如实说明原因。Tom 起初提议“直接删掉、不提这事”，被 Priya 以“诚实讨论方法问题反而能得分”说服（排除 D），这正是 Section 3 常考的“最终共识”题。
    - id: q3
      stem: What will Tom be responsible for?
      options:
        - Drafting the introduction
        - Writing the methodology section
        - Producing the graphs and the site map
        - Booking a study room in the library
      correctIndex: 2
      explanationZh: Priya 提议："You're better at the software, so could you do the graphs and the site map?"，Tom 回答 "Fine, I'll do those"——他负责图表和考察地点地图。方法部分和引言由 Priya 起草，预订自习室也是 Priya 的任务（排除 A、B、D）。
    - id: q4
      stem: When will the students meet to put the report together?
      options:
        - On Monday morning
        - On Friday afternoon
        - In two weeks' time
        - After Tom's lab class on Thursday
      correctIndex: 0
      explanationZh: Priya 先提议周五交换稿件后见面，Tom 因实验课时间太紧改期："Let's say Monday morning in the library instead"，Priya 回应 "Monday it is"。周五只是各自交换初稿的期限（排除 B）；两周后是报告的提交截止日期，不是见面时间（排除 C）。
- id: ielts-l-010
  track: ielts
  title: "Lecture: Beekeeping in the City"
  titleZh: 讲座：城市养蜂
  style: 讲座 · Lecture
  script:
    - speaker: narrator
      text: Good morning. Today's lecture looks at a surprising trend in food production — beekeeping in the middle of large cities.
    - speaker: narrator
      text: Twenty years ago, hives on office rooftops would have seemed absurd. Today, cities such as London, Paris, and Tokyo have thousands of them.
    - speaker: narrator
      text: At first glance, a city seems a terrible home for bees. In fact, urban bees often do better than their rural cousins.
    - speaker: narrator
      text: There are two main reasons. First, city parks and gardens contain an enormous variety of flowering plants, so food is available almost all year round.
    - speaker: narrator
      text: Second, urban green spaces are usually sprayed with far fewer pesticides than farmland, where a single crop may dominate for miles.
    - speaker: narrator
      text: One study of hives in Paris found that city bees produced more honey per hive than bees in the surrounding countryside.
    - speaker: narrator
      text: However, I want to add a note of caution. Honeybees are, essentially, livestock.
    - speaker: narrator
      text: When too many hives are packed into one district, they compete for nectar with wild pollinators such as bumblebees and hoverflies.
    - speaker: narrator
      text: Some researchers now argue that several European capitals already have more hives than their parks can feed.
    - speaker: narrator
      text: So if you want to help pollinators, the best step is not necessarily to keep bees. Planting a variety of flowers, and mowing lawns less often, does far more good.
    - speaker: narrator
      text: Next week, we'll turn from insects to city trees, and ask why some species cope with street life better than others.
  questions:
    - id: q1
      stem: Why do bees often do well in cities, according to the lecturer?
      options:
        - Gardens offer varied flowers and fewer pesticides
        - City air is warmer all year round
        - There are no wild pollinators to compete with
        - Rooftop hives are safe from disease
      correctIndex: 0
      explanationZh: 讲座给出两个原因："city parks and gardens contain an enormous variety of flowering plants" 且 "urban green spaces are usually sprayed with far fewer pesticides than farmland"——花源多样、农药更少。气温和疾病讲座均未提及；选项 C 与后文“与野生传粉者争夺花蜜”的告诫直接矛盾。
    - id: q2
      stem: What did the study of hives in Paris find?
      options:
        - City honey contained traces of pesticides
        - Rural hives held more bees than city ones
        - City hives produced more honey than rural ones
        - Parisian bees flew further than country bees
      correctIndex: 2
      explanationZh: 原文说："One study of hives in Paris found that city bees produced more honey per hive than bees in the surrounding countryside"——巴黎城区蜂箱的单箱产蜜量高于周边乡村。其余选项听起来都像合理的研究结论，但讲座中并无依据——IELTS 听力要求严格以原文为准。
    - id: q3
      stem: What danger does the lecturer mention about having too many hives?
      options:
        - Bees may sting more people in crowded areas
        - They compete with wild pollinators for nectar
        - Honey production becomes too expensive
        - Diseases spread from wild bees to hives
      correctIndex: 1
      explanationZh: 讲座告诫："When too many hives are packed into one district, they compete for nectar with wild pollinators such as bumblebees and hoverflies"——蜂箱过密会与熊蜂、食蚜蝇等野生传粉者争夺花蜜，一些欧洲首都的蜂箱数量可能已超出公园的供养能力。蜇人、成本和疾病都未被提及。
    - id: q4
      stem: What does the lecturer suggest is the best way to help pollinators?
      options:
        - Keeping a hive on every rooftop
        - Moving hives from cities to farmland
        - Banning beekeeping in city centres
        - Planting varied flowers and mowing less often
      correctIndex: 3
      explanationZh: 结尾建议："the best step is not necessarily to keep bees. Planting a variety of flowers, and mowing lawns less often, does far more good"——比起养蜂，种植多样花卉、减少割草对传粉者帮助更大。讲座并未主张禁止城市养蜂（排除 C），只是提醒蜂箱不宜过密。
- id: ielts-l-011
  track: ielts
  title: "Lecture: A Short History of Mapmaking"
  titleZh: 讲座：地图绘制简史
  style: 讲座 · Lecture
  script:
    - speaker: narrator
      text: Good afternoon. In today's lecture I'd like to trace the history of mapmaking, and to ask what maps really show us.
    - speaker: narrator
      text: The oldest surviving world map is a Babylonian clay tablet, made around two and a half thousand years ago. It shows Babylon at the centre, ringed by a circular ocean.
    - speaker: narrator
      text: That choice of centre is revealing. Throughout history, mapmakers have placed their own world in the middle of the picture.
    - speaker: narrator
      text: Medieval European maps, for example, usually put east at the top and Jerusalem at the centre. They were designed to express religious belief, not to guide travellers.
    - speaker: narrator
      text: Practical mapping advanced in the fifteenth century, when Ptolemy's ancient system of latitude and longitude lines was rediscovered and printed.
    - speaker: narrator
      text: Yet one great problem remained. At sea, sailors had no reliable way of measuring longitude — their east-west position.
    - speaker: narrator
      text: The breakthrough came in the eighteenth century, when John Harrison built a clock that kept accurate time on a rolling ship. Comparing local time with the clock finally revealed a ship's longitude, and sea charts improved rapidly.
    - speaker: narrator
      text: Today, satellites map the planet in extraordinary detail, and most of us carry maps on our phones.
    - speaker: narrator
      text: You might think this makes maps neutral at last. It does not.
    - speaker: narrator
      text: Every map must still flatten a round world onto a page, and every projection distorts something — size, shape, or distance.
    - speaker: narrator
      text: So here is the point I want you to remember. A map is always an argument about what matters, made by leaving certain things out.
    - speaker: narrator
      text: Next week, we'll test that idea by comparing three modern maps of the same city.
  questions:
    - id: q1
      stem: What does the lecturer say about medieval European maps?
      options:
        - They were mainly used by sailors
        - They showed latitude and longitude lines
        - They expressed religious belief rather than guiding travel
        - They placed Babylon at the centre of the world
      correctIndex: 2
      explanationZh: 讲座指出中世纪欧洲地图 "were designed to express religious belief, not to guide travellers"——为表达宗教信仰而绘，通常东方朝上、耶路撒冷居中。把巴比伦放在世界中心的是更早的巴比伦泥板地图（排除 D）；经纬网要到十五世纪托勒密体系重新流行才普及（排除 B）。
    - id: q2
      stem: What made it possible to measure longitude at sea?
      options:
        - A clock that kept accurate time on board ship
        - The rediscovery of Ptolemy's writings
        - A new type of circular ocean chart
        - Observations taken from satellites
      correctIndex: 0
      explanationZh: 讲座说突破出现在十八世纪："John Harrison built a clock that kept accurate time on a rolling ship"——把当地时间与这台船钟对比即可求出经度。托勒密体系的重新发现是十五世纪的进展，解决的并不是海上经度难题（排除 B）；卫星测绘是现代才有的技术（排除 D）。
    - id: q3
      stem: What does the lecturer say about map projections?
      options:
        - Modern projections no longer contain errors
        - Sailors invented the first projection
        - Projections only distort very small maps
        - Every projection distorts size, shape, or distance
      correctIndex: 3
      explanationZh: 讲座解释："every map must still flatten a round world onto a page, and every projection distorts something — size, shape, or distance"——任何投影都必然在大小、形状或距离上有所失真，卫星时代也不例外。选项 A 恰与讲座 "It does not"（地图并未因此变得中立）的判断相反。
    - id: q4
      stem: What is the main point of the lecture?
      options:
        - Satellite technology has made older maps worthless
        - Maps always involve choices about what to show
        - The Babylonians were the most skilful mapmakers
        - Longitude was the hardest problem in science
      correctIndex: 1
      explanationZh: 结论句点题："A map is always an argument about what matters, made by leaving certain things out"——地图从来不是中立的画面，而是取舍的结果，从巴比伦泥板到手机地图的整条线索都在支撑这一主旨。其余选项都只是讲座中的局部细节或过度引申。
- id: ielts-l-012
  track: ielts
  title: Campus Radio Talk on the Volunteering Fair
  titleZh: 校园电台：志愿服务集市介绍
  style: 独白 · Monologue
  script:
    - speaker: narrator
      text: Good evening, and welcome back to Campus FM. I'm Leo from the Students' Union, and tonight I want to tell you about next week's Volunteering Fair.
    - speaker: narrator
      text: The fair takes place this coming Thursday in the Great Hall, from eleven in the morning until three in the afternoon.
    - speaker: narrator
      text: More than thirty local organisations will be there, and every one of them is looking for student volunteers.
    - speaker: narrator
      text: To give you a flavour, the city hospital wants presenters for its bedside radio station, and the Wildlife Trust is recruiting for its monthly riverbank clean-ups.
    - speaker: narrator
      text: There's also the homework club at the central library, where volunteers help schoolchildren with reading and maths on Saturday mornings.
    - speaker: narrator
      text: One important note about the homework club. Because it involves working with children, you'll need a background check, and that takes about three weeks to come through.
    - speaker: narrator
      text: So if you're interested in that one, apply at the fair itself rather than waiting until later in the term.
    - speaker: narrator
      text: For most of the other roles, no experience is needed at all — the organisations provide their own training.
    - speaker: narrator
      text: And here's an extra reason to get involved. Volunteering counts towards the university's Skills Award, as long as you log at least twenty-five hours and attend one reflection workshop.
    - speaker: narrator
      text: Finally, if you register your interest on the union website before Thursday, you can skip the queue at the door. See you at the Great Hall!
  questions:
    - id: q1
      stem: What is the main purpose of the talk?
      options:
        - To recruit presenters for Campus FM
        - To encourage students to attend the Volunteering Fair
        - To explain changes to the Skills Award
        - To announce the opening of the Great Hall
      correctIndex: 1
      explanationZh: 说话人来自学生会，整段讲话围绕下周四的志愿服务集市展开——时间地点、参展机构、报名建议，属于典型的 Section 2 活动介绍。医院电台招主持人只是他举的志愿岗位例子，并非为校园电台自身招人（排除 A）；Skills Award 只是顺带提到的参与激励（排除 C）。
    - id: q2
      stem: When will the Volunteering Fair be held?
      options:
        - On Saturday morning
        - On Thursday from three until eleven
        - On Monday at the Students' Union
        - On Thursday from eleven a.m. to three p.m.
      correctIndex: 3
      explanationZh: 原文说："The fair takes place this coming Thursday in the Great Hall, from eleven in the morning until three in the afternoon"——周四上午十一点至下午三点，地点在 Great Hall。选项 B 把起止时间前后颠倒，是数字顺序干扰；周六上午是图书馆作业辅导班的活动时间，不是集市时间（排除 A）。
    - id: q3
      stem: Why should students interested in the homework club apply early?
      options:
        - The required background check takes about three weeks
        - There are only a few places available
        - The club starts before the fair
        - Training sessions fill up quickly
      correctIndex: 0
      explanationZh: 说话人特别提醒：作业辅导班要与儿童打交道，"you'll need a background check, and that takes about three weeks to come through"——背景审查约需三周才能办妥，因此最好在集市当天就提交申请。名额有限和培训报满讲话中都未提及；大多数岗位反而无需经验、由机构自行培训。
    - id: q4
      stem: What must students do to gain the Skills Award through volunteering?
      options:
        - Volunteer for more than thirty organisations
        - Register on the union website before Thursday
        - Log twenty-five hours and attend one workshop
