# yaml-language-server: $schema=../.schemas/listening.schema.json
- id: toeic-l-001
  track: toeic
  title: Finding a Room for the Client Presentation
  titleZh: 为客户演示会另寻会议室
  style: 对话 · Conversation
  script:
    - speaker: A
      text: Hi Rachel, do you have a minute? I'm trying to finalize the room for Thursday's client presentation.
    - speaker: B
      text: Sure, Marcus. I thought we'd already booked Conference Room A for two o'clock.
    - speaker: A
      text: We had, but the facilities team just told me the projector in that room is being repaired. It won't be back until Friday.
    - speaker: B
      text: That's a problem. The sales figures really need to be shown on a big screen.
    - speaker: A
      text: Exactly. Room C is free at the same time, but it only seats eight, and we're expecting ten attendees.
    - speaker: B
      text: What about the training room on the fifth floor? It holds twenty people and has a brand-new display.
    - speaker: A
      text: Good idea. I'll check whether it's available. If it is, could you email the client the updated location?
    - speaker: B
      text: Of course. I'll also print extra copies of the handouts in case anyone prefers paper.
    - speaker: A
      text: Thanks. Oh, one more thing — could you ask Dana to join us? The client may have technical questions about the installation timeline.
    - speaker: B
      text: She's out of the office this morning, but she'll be back after lunch. I'll ask her then.
    - speaker: A
      text: Perfect. Let's meet at one thirty on Thursday to set everything up.
    - speaker: B
      text: Sounds good. I'll send you a calendar invitation right away.
  questions:
    - id: q1
      stem: What problem does the man mention?
      options:
        - A client has cancelled a presentation
        - A conference room has been double-booked
        - A projector is unavailable until Friday
        - The sales figures contain errors
      correctIndex: 2
      explanationZh: 男士说 "the projector in that room is being repaired. It won't be back until Friday"——A 会议室的投影仪送修，周五才能修好，所以周四不能用。选项 B 有迷惑性：房间本身订到了，问题出在设备而不是重复预订。
    - id: q2
      stem: What does the woman suggest?
      options:
        - Using the training room on the fifth floor
        - Moving the presentation to Friday
        - Reducing the number of attendees to eight
        - Presenting the figures without a screen
      correctIndex: 0
      explanationZh: 女士提议 "What about the training room on the fifth floor? It holds twenty people and has a brand-new display"。“八人”是 C 会议室的容量限制，正是放弃该房间的原因，不是解决方案（排除 C）。
    - id: q3
      stem: Why does the man want Dana to attend the presentation?
      options:
        - To print extra copies of the handouts
        - To answer possible technical questions from the client
        - To operate the new display
        - To take notes during the meeting
      correctIndex: 1
      explanationZh: 男士解释请 Dana 参加的原因："The client may have technical questions about the installation timeline"，即客户可能会问安装时间表方面的技术问题。打印讲义是女士主动提出自己来做的事，用作干扰项。
    - id: q4
      stem: What will the woman most likely do next?
      options:
        - Speak to Dana in her office
        - Check the availability of the training room
        - Call the facilities team
        - Send the man a calendar invitation
      correctIndex: 3
      explanationZh: 对话最后女士说 "I'll send you a calendar invitation right away"，right away 表明这是她接下来立刻要做的事。查训练室是否可用的人是男士（"I'll check whether it's available"）；找 Dana 要等到午饭后，都不是“接下来”的动作。
- id: toeic-l-002
  track: toeic
  title: Gate Change Announcement at the Airport
  titleZh: 机场登机口变更广播
  style: 独白 · Talk
  script:
    - speaker: narrator
      text: Good afternoon, passengers. This is an announcement for Skyway Airlines Flight 274 to Vancouver.
    - speaker: narrator
      text: Due to a mechanical inspection of the original aircraft, this flight will now depart from Gate 32 instead of Gate 18.
    - speaker: narrator
      text: Gate 32 is located in Terminal B, about a ten-minute walk from this area. Please follow the signs for Gates 30 through 40.
    - speaker: narrator
      text: The departure time has also been revised. Boarding will now begin at four fifteen, one hour later than originally scheduled.
    - speaker: narrator
      text: We apologize for the inconvenience. As a gesture of goodwill, meal vouchers are available at the Skyway Airlines service desk next to Gate 18.
    - speaker: narrator
      text: The vouchers can be used at any restaurant or cafe inside the terminal.
    - speaker: narrator
      text: Passengers with connecting flights in Vancouver should speak to a member of staff at the service desk. Our agents will rebook any connections affected by the delay.
    - speaker: narrator
      text: Please have your boarding pass and passport ready when boarding begins.
    - speaker: narrator
      text: Once again, Flight 274 to Vancouver will now board at Gate 32 at four fifteen. Thank you for your patience, and we wish you a pleasant journey.
  questions:
    - id: q1
      stem: Where is this announcement most likely being made?
      options:
        - On board an aircraft
        - At an airport
        - At a travel agency
        - At a train station
      correctIndex: 1
      explanationZh: 广播中出现 flight、gate、boarding pass、terminal 等一系列机场专用词汇，且面向的是等待登机的乘客，故场景是机场。注意不是机上广播——广播指引乘客步行前往另一个登机口，说明人还在航站楼内（排除 A）。
    - id: q2
      stem: Why has the departure gate been changed?
      options:
        - Gate 18 is being renovated
        - The flight crew arrived late
        - Bad weather has closed part of the terminal
        - The original aircraft needs a mechanical inspection
      correctIndex: 3
      explanationZh: 广播明确说明原因："Due to a mechanical inspection of the original aircraft, this flight will now depart from Gate 32"，即原飞机需要机械检查。其余选项都是常见的延误原因，但均未在广播中提及。
    - id: q3
      stem: What are passengers offered because of the delay?
      options:
        - Meal vouchers
        - A seat upgrade
        - A discount on their next flight
        - Free access to the airport lounge
      correctIndex: 0
      explanationZh: 广播提到 "meal vouchers are available at the Skyway Airlines service desk"，作为补偿向乘客发放餐券，可在航站楼内任何餐厅或咖啡店使用。其他三项补偿方式都没有出现。
    - id: q4
      stem: What should passengers with connecting flights do?
      options:
        - Proceed directly to Gate 32
        - Call Skyway Airlines customer service
        - Speak to staff at the service desk
        - Wait for a further announcement
      correctIndex: 2
      explanationZh: 广播指示转机乘客 "should speak to a member of staff at the service desk"，工作人员会为受延误影响的衔接航班重新订票。直接去 32 号登机口是对普通乘客的指引，对转机乘客而言少了改签这一步（排除 A）。
- id: toeic-l-003
  track: toeic
  title: Department Store Closing Announcement
  titleZh: 商场闭店广播
  style: 广播 · Announcement
  script:
    - speaker: narrator
      text: Good evening, shoppers, and thank you for visiting Westfield Department Store.
    - speaker: narrator
      text: Please note that the store will close in thirty minutes, at nine o'clock.
    - speaker: narrator
      text: If you would like to make a purchase, we invite you to bring your items to the registers on each floor now.
    - speaker: narrator
      text: As a reminder, our annual home and kitchen sale begins tomorrow morning at ten.
    - speaker: narrator
      text: All cookware and small appliances will be reduced by up to forty percent, for three days only.
    - speaker: narrator
      text: Members of our rewards program can enter one hour early, at nine a.m., through the north entrance.
    - speaker: narrator
      text: Tonight, the underground parking garage will remain open until nine thirty.
    - speaker: narrator
      text: Don't forget to have your parking ticket validated at any register to receive two hours of free parking.
    - speaker: narrator
      text: Thank you for shopping with us, and we look forward to seeing you at tomorrow's sale.
  questions:
    - id: q1
      stem: Where is this announcement most likely being made?
      options:
        - At an airport
        - At a department store
        - At a train station
        - At a sports stadium
      correctIndex: 1
      explanationZh: 开头直接点明地点："thank you for visiting Westfield Department Store"，后文的收银台、厨具促销、积分会员也都指向百货商场。注意不要靠“广播”这一形式就联想到机场（排除 A）。
    - id: q2
      stem: What will happen tomorrow at ten o'clock?
      options:
        - The store will close for renovation
        - A new floor will open to the public
        - A home and kitchen sale will begin
        - Parking will become free all day
      correctIndex: 2
      explanationZh: 广播提醒："our annual home and kitchen sale begins tomorrow morning at ten"——家居厨房用品年度特卖明早十点开始。免费停车（选项 D）是今晚凭小票验证获得的两小时优惠，与明天十点无关。
    - id: q3
      stem: Who can enter the store at nine a.m. tomorrow?
      options:
        - Rewards program members
        - All shoppers with a receipt
        - Kitchen appliance vendors
        - Contractors doing renovations
      correctIndex: 0
      explanationZh: 广播说明 "Members of our rewards program can enter one hour early, at nine a.m., through the north entrance"——只有积分会员可提前一小时从北门入场，普通顾客十点才开始。
    - id: q4
      stem: How can shoppers receive two hours of free parking?
      options:
        - By spending more than forty dollars
        - By joining the rewards program tonight
        - By entering through the north entrance
        - By having their parking ticket validated at a register
      correctIndex: 3
      explanationZh: 广播提示 "have your parking ticket validated at any register to receive two hours of free parking"——在任意收银台验证停车票即可。“forty percent”是商品折扣力度，与停车无关（排除 A）。
- id: toeic-l-004
  track: toeic
  title: Calling the IT Help Desk Before a Business Trip
  titleZh: 出差前致电 IT 服务台
  style: 对话 · Conversation
  script:
    - speaker: A
      text: Hi, this is Hannah Lin from the marketing department. My laptop won't connect to the office network this morning, and I have a flight to Singapore tomorrow afternoon.
    - speaker: B
      text: Good morning, Ms. Lin, this is Victor at the IT help desk. Is the problem with the cable connection or the wireless?
    - speaker: A
      text: The wireless. It keeps asking for a password, but the one I always use doesn't work anymore.
    - speaker: B
      text: Ah, that explains it. We updated the network security over the weekend, so everyone needs to install a new certificate first.
    - speaker: A
      text: I had no idea. Was there an announcement I missed?
    - speaker: B
      text: It went out by e-mail on Friday afternoon, but a lot of people had already left. I can install the certificate for you remotely — it takes about ten minutes.
    - speaker: A
      text: That would be great. And could you check the video conferencing software too, since I'll need it for daily check-ins during the trip?
    - speaker: B
      text: No problem. One more thing — since you're traveling, I'd recommend borrowing one of our portable Wi-Fi routers for overseas trips.
    - speaker: A
      text: I didn't know we had those. Where do I get one?
    - speaker: B
      text: Come down to the second-floor service counter before five today. Just bring your staff ID, and you can sign one out for up to two weeks.
    - speaker: A
      text: Perfect, I'll stop by after lunch. Thanks, Victor.
  questions:
    - id: q1
      stem: Why is the woman calling?
      options:
        - To reschedule a flight to Singapore
        - To report a broken laptop screen
        - To ask about video conferencing software
        - To get help connecting to the network
      correctIndex: 3
      explanationZh: 女士开口就说明了来意："My laptop won't connect to the office network this morning, and I have a flight to Singapore tomorrow afternoon"——她是来求助联网问题的，提到航班只是强调事情紧急。检查视频会议软件是她后来顺带提出的请求（排除 C）。
    - id: q2
      stem: According to the man, what caused the problem?
      options:
        - A security update over the weekend
        - An incorrect e-mail address
        - A damaged wireless router
        - An expired staff ID
      correctIndex: 0
      explanationZh: 男士解释原因："We updated the network security over the weekend, so everyone needs to install a new certificate first"——周末的安全升级让旧密码失效了。周五的通知邮件只是很多人没看到，并不是故障原因（排除 B）。
    - id: q3
      stem: What does the man offer to do?
      options:
        - Send the Friday announcement again
        - Replace the woman's laptop
        - Install a certificate remotely
        - Book a video conference room
      correctIndex: 2
      explanationZh: 男士主动提出 "I can install the certificate for you remotely — it takes about ten minutes"，即远程帮她安装新证书。重发通知邮件、更换电脑、预订会议室都没有出现在对话里。
    - id: q4
      stem: What does the man suggest the woman do before five o'clock?
      options:
        - Update her password
        - Visit the second-floor service counter
        - E-mail the IT department her travel dates
        - Return her portable Wi-Fi router
      correctIndex: 1
      explanationZh: 男士建议她出差前借一台随身 Wi-Fi："Come down to the second-floor service counter before five today"，带上工卡就能借用两周。注意方向：她是去“借出”设备，不是“归还”（排除 D）。
- id: toeic-l-005
  track: toeic
  title: First-Day Orientation Welcome
  titleZh: 新员工入职培训导览
  style: 短独白 · Short Talk
  script:
    - speaker: narrator
      text: Good morning, everyone, and welcome to your first day at Novara Financial. I'm Denise Cho, and I coordinate new-employee orientation.
    - speaker: narrator
      text: Before we begin the building tour, please pick up your ID badge from the table by the door. You'll need it to open the security gates on every floor.
    - speaker: narrator
      text: Our first stop will be the fourth floor, where you'll find your team areas and the meeting rooms, which can be reserved through the calendar app.
    - speaker: narrator
      text: After that, we'll visit the cafeteria on the second floor. It serves breakfast and lunch, and today's meal is free for everyone in this group.
    - speaker: narrator
      text: At eleven o'clock, we'll come back to this room for a short session on payroll and benefits. A specialist from human resources will be here to answer your questions.
    - speaker: narrator
      text: One reminder — the parking garage entrance on Pine Street closes for repairs starting tomorrow. Until Friday, please use the entrance on Harbor Avenue instead.
    - speaker: narrator
      text: If you haven't received your laptop yet, don't worry. The IT team will deliver it to your desk this afternoon.
    - speaker: narrator
      text: All right, if everyone has a badge, let's start the tour. Please stay together — the building can be confusing on your first day.
  questions:
    - id: q1
      stem: Who most likely are the listeners?
      options:
        - Job applicants waiting for interviews
        - Employees starting their first day
        - Clients visiting the fourth floor
        - Technicians repairing a garage
      correctIndex: 1
      explanationZh: 开场白 "welcome to your first day at Novara Financial" 与 "I coordinate new-employee orientation" 说明听众是入职第一天的新员工。他们已经被录用，不再是等待面试的求职者（排除 A）；维修车库的是外部施工，与听众无关（排除 D）。
    - id: q2
      stem: What are the listeners asked to do before the tour?
      options:
        - Reserve a meeting room
        - Turn on their laptops
        - Pick up an ID badge
        - Sign a benefits form
      correctIndex: 2
      explanationZh: 说话人要求 "Before we begin the building tour, please pick up your ID badge from the table by the door"——参观开始前先到门边领取工牌，因为每层的安全闸机都需要它。笔记本电脑要到下午才由 IT 送来（排除 B），福利说明会在十一点才开始（排除 D）。
    - id: q3
      stem: According to the speaker, what will happen at eleven o'clock?
      options:
        - A session about payroll and benefits
        - A free lunch in the cafeteria
        - A software training class
        - A group photograph
      correctIndex: 0
      explanationZh: 时间点信息在 "At eleven o'clock, we'll come back to this room for a short session on payroll and benefits"——十一点回到这个房间听薪酬与福利说明，人力资源专员现场答疑。免费餐是在参观食堂时提到的福利，并没有和十一点绑定（排除 B）。
    - id: q4
      stem: What change does the speaker mention?
      options:
        - The cafeteria will serve dinner
        - Orientation will move to another building
        - Badges will be reissued on Friday
        - A parking entrance will be closed temporarily
      correctIndex: 3
      explanationZh: 说话人提醒 "the parking garage entrance on Pine Street closes for repairs starting tomorrow. Until Friday, please use the entrance on Harbor Avenue instead"——Pine Street 的车库入口明天起临时关闭维修，周五前改走 Harbor Avenue。其余选项都没有在独白中出现。
- id: toeic-l-006
  track: toeic
  title: Voicemail About a Brochure Order
  titleZh: 关于宣传册订单的语音留言
  style: 电话留言 · Voicemail
  script:
    - speaker: narrator
      text: Hello, this message is for Angela Park. This is Devon calling from Riverside Print Solutions about your order of five hundred brochures for the medical equipment fair.
    - speaker: narrator
      text: I'm afraid we've found a problem with the file you sent us. The photographs on pages two and three are too low in resolution, and they would look blurry in print.
    - speaker: narrator
      text: We'd rather not print anything until you've seen the difference yourself. I've e-mailed you a test page this morning so you can compare the two versions.
    - speaker: narrator
      text: If you can send us higher-resolution images by Wednesday noon, we can still deliver the full order by Friday as promised.
    - speaker: narrator
      text: If the original files are the only ones you have, we could print the photos at a smaller size instead. That would hide the problem, though the layout would need some small adjustments.
    - speaker: narrator
      text: Either way, please call me back at 555-0164 before the end of the day, since the printers are scheduled to run Thursday morning.
    - speaker: narrator
      text: Thanks very much, and again, sorry for the extra trouble.
  questions:
    - id: q1
      stem: Where does the speaker most likely work?
      options:
        - At a photography studio
        - At a medical equipment company
        - At a printing company
        - At an exhibition center
      correctIndex: 2
      explanationZh: 说话人开头自报家门："This is Devon calling from Riverside Print Solutions about your order of five hundred brochures"——他在印刷公司工作。medical equipment fair 是客户要参加的展会，不是说话人的单位（排除 B）。
    - id: q2
      stem: What problem does the speaker mention?
      options:
        - An order was delivered to the wrong address
        - A payment has not been received
        - Some pages are missing from a file
        - Some images are low quality
      correctIndex: 3
      explanationZh: 问题出在图片质量："The photographs on pages two and three are too low in resolution, and they would look blurry in print"——分辨率太低，印出来会模糊。文件收到了、页面也没有缺失（排除 C）。
    - id: q3
      stem: What did the speaker send to Ms. Park this morning?
      options:
        - An invoice
        - A test page
        - Higher-resolution images
        - A revised delivery schedule
      correctIndex: 1
      explanationZh: 说话人说 "I've e-mailed you a test page this morning so you can compare the two versions"——发去的是测试样张，方便客户亲眼对比效果。高分辨率图片是他希望客户提供的，方向正好相反（排除 C）。
    - id: q4
      stem: Why should Ms. Park call back today?
      options:
        - The printing is scheduled to start on Thursday morning
        - The fair begins on Wednesday
        - The office closes early on Fridays
        - A discount offer expires tonight
      correctIndex: 0
      explanationZh: 留言结尾说明了紧迫性："please call me back ... before the end of the day, since the printers are scheduled to run Thursday morning"——印刷机周四一早开印，今天之内必须回电。周五只是承诺的交货日期，“周五提前下班”（选项 C）留言中从未提到。
- id: toeic-l-007
  track: toeic
  title: Calling About a Delayed Furniture Delivery
  titleZh: 致电询问办公家具延迟送货
  style: 对话 · Conversation
  script:
    - speaker: A
      text: Hello, this is Susan Reyes from Halverson Consulting. I'm calling about order number 4127 — twelve standing desks and twenty office chairs.
    - speaker: B
      text: Good morning, Ms. Reyes, this is Tomas at Corewood Office Furnishings. Let me pull up your order.
    - speaker: A
      text: They were supposed to arrive yesterday morning, but nothing has been delivered. We're moving into our new office on Monday.
    - speaker: B
      text: I see the issue here. The desks are shipped from our regional warehouse, and a staffing shortage there has delayed all deliveries by about a week.
    - speaker: A
      text: A week is too late, I'm afraid. Our old lease ends this weekend, so the staff will have nowhere to work.
    - speaker: B
      text: I understand. The chairs are stocked locally, so I can have those sent to you tomorrow afternoon.
    - speaker: A
      text: That helps, but what about the desks?
    - speaker: B
      text: We keep a few display models at our downtown showroom. I could lend you six of those at no charge until your order arrives.
    - speaker: A
      text: Six would at least cover the design team. Could your drivers set them up as well?
    - speaker: B
      text: Certainly. I'll schedule the loaner desks and the chairs on the same truck for tomorrow.
    - speaker: A
      text: Great. I'll email you the floor plan this afternoon so the crew knows where everything goes.
    - speaker: B
      text: Perfect. And I'll apply a ten percent discount to the order for the trouble.
  questions:
    - id: q1
      stem: Why is the woman calling?
      options:
        - To change her order to a larger one
        - To ask about a delivery that has not arrived
        - To cancel a furniture order
        - To complain about damaged chairs
      correctIndex: 1
      explanationZh: 女士说明来意："They were supposed to arrive yesterday morning, but nothing has been delivered"——订购的家具昨天就该送到却没有到货，她是来追问送货情况的。她既没有取消订单也没有加购（排除 A、C）；家具还没送到，更谈不上损坏（排除 D）。
    - id: q2
      stem: What caused the delay?
      options:
        - A truck broke down on the highway
        - The order form had the wrong address
        - The chairs are out of stock
        - A staffing shortage at a warehouse
      correctIndex: 3
      explanationZh: 男士解释 "a staffing shortage there has delayed all deliveries by about a week"——区域仓库人手不足，所有发货都推迟了大约一周。椅子本地有现货、明天就能送（排除 C）；卡车故障和地址错误都没有被提及。
    - id: q3
      stem: What does the man offer to do?
      options:
        - Lend the woman some display desks
        - Refund the entire order
        - Deliver the desks over the weekend
        - Upgrade the chairs to a newer model
      correctIndex: 0
      explanationZh: 男士主动提出 "I could lend you six of those at no charge until your order arrives"——把展厅的样品桌免费借给对方过渡。他给的补偿是打九折，不是全额退款（排除 B）；桌子要等约一周，周末送到做不到（排除 C）。
    - id: q4
      stem: What will the woman most likely do this afternoon?
      options:
        - Visit the downtown showroom
        - Sign a new office lease
        - Email a floor plan
        - Interview warehouse staff
      correctIndex: 2
      explanationZh: 女士在结尾说 "I'll email you the floor plan this afternoon so the crew knows where everything goes"——下午把办公室平面图发给对方，方便工人明天按图摆放。去展厅看样品桌是男士那边的事，签租约、面试仓库员工更是无从谈起。
- id: toeic-l-008
  track: toeic
  title: Welcome to the Maritime Museum Tour
  titleZh: 海事博物馆导览欢迎词
  style: 导览 · Guided Tour
  script:
    - speaker: narrator
      text: Good morning, everyone, and welcome to the Harborview Maritime Museum. My name is Elena, and I'll be your guide for the next ninety minutes.
    - speaker: narrator
      text: Before we set off, a few quick reminders. Photography is welcome in most galleries, but please turn off your flash, as it can damage the older paintings.
    - speaker: narrator
      text: Our tour begins in the Age of Sail gallery, where you'll see a full-size replica of a nineteenth-century trading ship.
    - speaker: narrator
      text: After that, we'll move to the lighthouse exhibit, which reopened last month after a two-year restoration.
    - speaker: narrator
      text: The final stop is the shipwreck hall on the second floor. Divers recovered most of those objects from the harbor floor only a few kilometers from here.
    - speaker: narrator
      text: If you'd like more detail at your own pace, audio guides are available at the information desk for five dollars.
    - speaker: narrator
      text: We'll finish at the museum cafe, where tour members receive a free hot drink with any dessert.
    - speaker: narrator
      text: If you get separated from the group, just ask any staff member in a blue uniform to point you back to us. All right, follow me, everyone.
  questions:
    - id: q1
      stem: Who most likely is the speaker?
      options:
        - A ship captain
        - A museum director
        - A tour guide
        - A cafe manager
      correctIndex: 2
      explanationZh: 说话人自我介绍 "My name is Elena, and I'll be your guide for the next ninety minutes"——她是带队讲解九十分钟路线的导览员。博物馆馆长通常不会亲自带团逐个展厅讲解（排除 B），船长和咖啡店经理更与导览词内容不符。
    - id: q2
      stem: What are the listeners asked to do?
      options:
        - Turn off their camera flash
        - Leave their bags at the information desk
        - Stay off the replica ship
        - Buy tickets for the shipwreck hall
      correctIndex: 0
      explanationZh: 提醒事项里说 "please turn off your flash, as it can damage the older paintings"——拍照可以，但要关闭闪光灯以保护老画作。寄存背包、给沉船展厅单独买票等要求都没有出现；复制帆船只是参观内容，没有说不能登船。
    - id: q3
      stem: According to the speaker, what happened last month?
      options:
        - A trading ship arrived at the harbor
        - The museum cafe changed its menu
        - Divers recovered new objects
        - The lighthouse exhibit reopened
      correctIndex: 3
      explanationZh: 说话人介绍 "the lighthouse exhibit, which reopened last month after a two-year restoration"——灯塔展区经过两年修缮，上个月重新开放。沉船文物是从港口海底打捞的馆藏，说话人并没有说是上个月的事（排除 C）。
    - id: q4
      stem: What can tour members receive at the cafe?
      options:
        - A discounted audio guide
        - A free hot drink with any dessert
        - A souvenir photograph
        - A voucher for a future visit
      correctIndex: 1
      explanationZh: 结尾提到 "tour members receive a free hot drink with any dessert"——跟团游客点任意甜品即可免费获赠一杯热饮。语音导览器要在服务台花五美元租借，并没有折扣（排除 A）。
- id: toeic-l-009
  track: toeic
  title: Planning a Retirement Lunch for a Colleague
  titleZh: 为同事筹划退休午餐会
  style: 对话 · Conversation
  script:
    - speaker: A
      text: Carla, have you heard? Margaret in accounting is retiring at the end of the month, after twenty-six years with the company.
    - speaker: B
      text: I did hear that. We should organize a farewell lunch for her — she trained half the people on this floor.
    - speaker: A
      text: My thought exactly. What about Rosetti's, the Italian place across the street with a private room in the back?
    - speaker: B
      text: I love their food, but the private room only takes fifteen people. I'd guess at least twenty-five will want to come.
    - speaker: A
      text: Good point — then how about the Harbor Grill? Their upstairs area seats forty, and they gave us a group discount for the holiday party.
    - speaker: B
      text: That's better. Margaret's last day is Friday the twenty-eighth, so we should book for that Thursday.
    - speaker: A
      text: Could you collect contributions for a gift? People can leave cash with you or pay through the office app.
    - speaker: B
      text: Sure. I saw a beautiful set of gardening tools she'd love — she talks about her garden all the time.
    - speaker: A
      text: She'll be thrilled. I'll call the restaurant this afternoon and reserve the upstairs area for noon.
    - speaker: B
      text: One more thing, Ben — let's keep it a surprise. I'll mark the invitation as a regular team meeting.
    - speaker: A
      text: Perfect. Just make sure Margaret's calendar is free before you send it.
  questions:
    - id: q1
      stem: What are the speakers mainly discussing?
      options:
        - Organizing a farewell lunch
        - Hiring a new accountant
        - Booking a holiday party
        - Redesigning the office garden
      correctIndex: 0
      explanationZh: 对话围绕 "We should organize a farewell lunch for her" 展开——为月底退休的 Margaret 筹办告别午餐。假日聚会只是提到 Harbor Grill 折扣时的往事（排除 C），花园是 Margaret 的个人爱好、只是选礼物的灵感来源（排除 D）。
    - id: q2
      stem: Why do the speakers decide against Rosetti's?
      options:
        - The food is too expensive
        - It is closed on Thursdays
        - The private room is too small
        - It is too far from the office
      correctIndex: 2
      explanationZh: 女士指出 "the private room only takes fifteen people. I'd guess at least twenty-five will want to come"——包间只坐得下十五人，预计到场的人远不止这些。她还夸了那里的食物，价格并不是问题（排除 A）；餐厅就在街对面，距离更不是理由（排除 D）。
    - id: q3
      stem: What does the man ask the woman to do?
      options:
        - Reserve the upstairs area
        - Collect money for a gift
        - Buy gardening tools
        - Invite the accounting department
      correctIndex: 1
      explanationZh: 男士请求 "Could you collect contributions for a gift?"——由女士负责收集大家凑的礼金，现金或办公软件转账都行。订餐厅是男士自己下午要做的事（排除 A）；园艺工具只是女士看中的礼物人选，还没到购买那一步（排除 C）。
    - id: q4
      stem: What will the man do this afternoon?
      options:
        - Send a calendar invitation
        - Visit Margaret's office
        - Choose a gift online
        - Call the Harbor Grill
      correctIndex: 3
      explanationZh: 男士说 "I'll call the restaurant this afternoon and reserve the upstairs area for noon"——下午打电话给 Harbor Grill 预订楼上区域。发送伪装成例会的日历邀请是女士负责的（排除 A），而且要先确认 Margaret 当天有空。
- id: toeic-l-010
  track: toeic
  title: Voicemail from the Pharmacy About a Prescription
  titleZh: 药房关于处方药的语音留言
  style: 电话留言 · Voicemail
  script:
    - speaker: narrator
      text: Hello, this message is for Mr. Alvarez. This is Joyce calling from Greenfield Pharmacy on Maple Street about the prescription you dropped off this morning.
    - speaker: narrator
      text: Your order has two medications, and one of them is ready for pickup now.
    - speaker: narrator
      text: Unfortunately, the second one, the blood pressure tablets, is out of stock at our branch. Our supplier's next delivery won't arrive until Monday.
    - speaker: narrator
      text: However, our Riverside location has it on the shelf right now. If you'd like, I can transfer the prescription there, and it would be ready within an hour.
    - speaker: narrator
      text: Otherwise, we can hold everything here and fill the complete order when the delivery arrives Monday afternoon.
    - speaker: narrator
      text: Please call us back at 555-0129 to let us know which option you prefer. We're open until nine tonight.
    - speaker: narrator
      text: Also, a quick reminder — please bring your insurance card when you come, since your plan was renewed this month. Thank you, and have a good day.
  questions:
    - id: q1
      stem: Where does the speaker most likely work?
      options:
        - At a doctor's office
        - At an insurance company
        - At a delivery service
        - At a pharmacy
      correctIndex: 3
      explanationZh: 说话人自报家门："This is Joyce calling from Greenfield Pharmacy on Maple Street"——她在药房工作，留言内容也全部围绕配药和取药。保险卡只是取药时需要出示的证件，说话人并不在保险公司（排除 B）。
    - id: q2
      stem: What problem does the speaker mention?
      options:
        - A prescription form was filled out incorrectly
        - A medication is out of stock
        - The pharmacy is closing early
        - An insurance claim was rejected
      correctIndex: 1
      explanationZh: 问题在于 "the second one, the blood pressure tablets, is out of stock at our branch"——降压药在本店缺货，供应商周一才补货。处方本身没有问题（排除 A），药房今晚照常营业到九点（排除 C），保险只是提醒带卡、并没有被拒赔（排除 D）。
    - id: q3
      stem: What does the speaker offer to do?
      options:
        - Deliver the medication to Mr. Alvarez's home
        - Ask the doctor to change the prescription
        - Transfer the prescription to another branch
        - Give a discount on the next order
      correctIndex: 2
      explanationZh: 说话人提出 "I can transfer the prescription there, and it would be ready within an hour"——把处方转到 Riverside 分店，一小时内即可取药。送药上门、联系医生改处方、下次打折都不在她给出的两个选项里。
    - id: q4
      stem: What is Mr. Alvarez reminded to bring?
      options:
        - His insurance card
        - A photo ID
        - The original prescription
        - A payment receipt
      correctIndex: 0
      explanationZh: 留言结尾提醒 "please bring your insurance card when you come, since your plan was renewed this month"——保险计划本月刚续期，取药时需要出示新的保险卡。证件照、处方原件、付款收据都没有被提及。
- id: toeic-l-011
  track: toeic
  title: Touring a New Office Space
  titleZh: 实地考察新办公场地
  style: 对话 · Conversation
  script:
    - speaker: B
      text: Ms. Ito, I'm Greg Fowler from Beacon Commercial Realty. Thanks for coming out to see the space today.
    - speaker: A
      text: My pleasure. Our current office is bursting — we've hired eleven people since January and there's simply no room left.
    - speaker: B
      text: Then you'll like this floor. It's nearly twice the size of your current space, and the whole east wall is floor-to-ceiling windows.
    - speaker: A
      text: The natural light is wonderful. Is the open area large enough to fit about forty desks?
    - speaker: B
      text: Easily, and there are two enclosed rooms in the corner you could use for meetings or video calls.
    - speaker: A
      text: I do have one concern. I didn't see a parking garage when I arrived, and many of our staff drive to work.
    - speaker: B
      text: The building itself has no garage, that's true. But there's a public garage one block north, and the landlord has arranged discounted monthly passes for tenants.
    - speaker: A
      text: That could work. What about the rent — is the owner flexible?
    - speaker: B
      text: For a three-year lease, the landlord will offer two months rent-free and cover the cost of repainting.
    - speaker: A
      text: That's quite generous. I'd like my business partner to see the space before we decide anything.
    - speaker: B
      text: Of course. I'm showing it to another company on Friday morning, so earlier in the week would be safer.
    - speaker: A
      text: Then let's say Wednesday at ten. I'll bring our partner and our office designer along.
  questions:
    - id: q1
      stem: Who most likely is the man?
      options:
        - A building security guard
        - A real estate agent
        - An interior designer
        - A parking attendant
      correctIndex: 1
      explanationZh: 男士自我介绍 "I'm Greg Fowler from Beacon Commercial Realty"，并全程带看场地、介绍租约优惠——他是商业地产经纪人。室内设计师是女士周三要带来的人（排除 C）。
    - id: q2
      stem: Why is the woman looking for a new office?
      options:
        - Her company has outgrown its current space
        - Her current rent has doubled
        - Her lease was cancelled by the landlord
        - Her staff want a shorter commute
      correctIndex: 0
      explanationZh: 女士解释 "we've hired eleven people since January and there's simply no room left"——公司扩张太快，现有办公室已经装不下了。租金上涨、租约被取消、通勤距离都不是她给出的原因。
    - id: q3
      stem: What concern does the woman raise?
      options:
        - The windows let in too much sun
        - The meeting rooms are too small
        - The rent must be paid yearly
        - The building has no parking garage
      correctIndex: 3
      explanationZh: 女士提出 "I didn't see a parking garage when I arrived, and many of our staff drive to work"——大楼没有车库，而很多员工开车通勤。男士也证实 "The building itself has no garage"，并用一街之隔的公共车库加租户月卡折扣来化解。落地窗和采光是女士称赞的优点（排除 A）。
    - id: q4
      stem: What will the woman probably do on Wednesday?
      options:
        - Sign a three-year lease
        - Visit the public garage
        - Return with her business partner
        - Meet the other interested company
      correctIndex: 2
      explanationZh: 女士最后敲定 "let's say Wednesday at ten. I'll bring our partner and our office designer along"——周三上午十点带合伙人和设计师再看一次场地。她明确说决定之前要先让合伙人看过，不会当场签约（排除 A）；另一家有意向的公司是周五来看房，与她无关（排除 D）。
- id: toeic-l-012
  track: toeic
  title: Arriving Early at the Hotel
  titleZh: 提前抵达酒店办理入住
  style: 对话 · Conversation
  script:
    - speaker: A
      text: Good morning. I have a reservation under the name Novak, but I know I'm quite early — my flight landed at seven.
    - speaker: B
      text: Welcome to the Grandview Hotel, Ms. Novak, my name is Andre. I'm afraid your room won't be ready until around noon, since check-in normally begins at three.
    - speaker: A
      text: I was worried about that. The problem is I'm speaking at a conference at the convention center at eleven, and I'd hoped to change and drop off my luggage first.
    - speaker: B
      text: We can certainly store your luggage — the bell desk will keep it as long as you need. And you're welcome to use the fitness center changing rooms on the second floor to freshen up.
    - speaker: A
      text: That would be a great help. Is there somewhere I can print my presentation handouts as well?
    - speaker: B
      text: The business center is right behind the elevators, and it's open twenty-four hours. You won't need a room key at this hour — just enter the code printed on this card.
    - speaker: A
      text: Wonderful. And how do I get to the convention center from here?
    - speaker: B
      text: Our shuttle leaves from the main entrance every half hour, and the ride takes about ten minutes. The next one departs at nine fifteen.
    - speaker: A
      text: Perfect, I'll take that one. Could you send me a message when my room is ready?
    - speaker: B
      text: Absolutely. We'll text the number on your reservation, and your key will be waiting here at the front desk.
    - speaker: A
      text: Thank you so much. I'll leave my suitcase with the bell desk now and grab a quick coffee before the shuttle.
    - speaker: B
      text: The cafe is just across the lobby, and conference guests get ten percent off with their event badge.
  questions:
    - id: q1
      stem: Where most likely are the speakers?
      options:
        - At an airport information desk
        - At a convention center
        - At a print shop
        - At a hotel front desk
      correctIndex: 3
      explanationZh: 男士说 "Welcome to the Grandview Hotel"，对话围绕客房未备好、寄存行李、酒店班车和前台取钥匙展开——两人正在酒店前台。会展中心是女士稍后要去演讲的地方，不是对话发生地（排除 B）。
    - id: q2
      stem: What is the woman's problem?
      options:
        - Her flight was delayed
        - Her luggage was lost at the airport
        - Her room is not ready yet
        - Her presentation file was deleted
      correctIndex: 2
      explanationZh: 男士告知 "your room won't be ready until around noon"——她到得太早，客房中午前无法入住，而她十一点就要在会展中心演讲。航班早上七点已正常落地（排除 A）；行李就在身边、正准备寄存（排除 B）。
    - id: q3
      stem: What does the man suggest the woman do to freshen up?
      options:
        - Use the fitness center changing rooms
        - Wait in the cafe across the lobby
        - Book a day-use room
        - Change at the convention center
      correctIndex: 0
      explanationZh: 男士建议 "you're welcome to use the fitness center changing rooms on the second floor to freshen up"——用二楼健身中心的更衣室梳洗更衣。大堂对面的咖啡店是女士自己想去喝咖啡的地方，不是男士给出的更衣建议（排除 B）。
    - id: q4
      stem: What will the woman probably do next?
      options:
        - Print handouts in the business center
        - Leave her suitcase at the bell desk
        - Board the shuttle immediately
        - Check in and go to her room
      correctIndex: 1
      explanationZh: 女士最后说 "I'll leave my suitcase with the bell desk now and grab a quick coffee before the shuttle"——now 表明她接下来先去行李台寄存箱子，再喝杯咖啡，九点十五分才上班车（排除 C）。房间要到中午才能入住（排除 D）。
