# yaml-language-server: $schema=../.schemas/listening.schema.json
- id: biz-l-001
  track: business
  title: "Project Status Meeting: Website Redesign"
  titleZh: 项目状态会议：官网改版
  style: 会议 · Meeting
  script:
    - speaker: A
      text: Thanks for making time, Elena. Let's run through the website redesign before Friday's steering meeting. Where are we overall?
    - speaker: B
      text: Mostly on track. The new homepage and the product pages passed user testing last week, and the feedback was very positive.
    - speaker: A
      text: That's great to hear. What about the checkout flow? That was flagged as a risk last month.
    - speaker: B
      text: That's the one area I'm worried about. The payment provider still hasn't given us access to their new API, so my team can't finish the integration testing.
    - speaker: A
      text: How long have we been waiting on them?
    - speaker: B
      text: About two weeks. I've chased their support team twice, but I keep getting automated replies.
    - speaker: A
      text: Okay, let me escalate that. I know their account director from a previous project, so I'll contact him directly this afternoon.
    - speaker: B
      text: That would help a lot. Even so, we should assume at least one more week of delay for testing.
    - speaker: A
      text: Then let's be realistic with the steering committee. I'd rather move the launch from the fifteenth to the twenty-second than go live with an untested checkout.
    - speaker: B
      text: Agreed. A broken payment page on day one would be far worse than a short delay.
    - speaker: A
      text: Right. Could you update the project plan with the new dates and send it to me by tomorrow morning? I'll present it on Friday.
    - speaker: B
      text: Will do. I'll also prepare a one-page summary of the user testing results, so the committee sees the good news too.
  questions:
    - id: q1
      stem: What is the main purpose of the conversation?
      options:
        - To interview a candidate for the project team
        - To review the status of a project before a steering meeting
        - To choose a new payment provider
        - To analyse the results of a marketing campaign
      correctIndex: 1
      explanationZh: 对话开头点明目的："Let's run through the website redesign before Friday's steering meeting"，即在周五指导委员会会议前梳理项目进展。支付服务商只是项目中的一个阻塞点，两人并没有讨论更换供应商（排除 C）。
    - id: q2
      stem: What is delaying the checkout integration?
      options:
        - Negative feedback from user testing
        - A shortage of developers on Elena's team
        - The budget has not been approved
        - The payment provider has not granted access to its API
      correctIndex: 3
      explanationZh: Elena 说："The payment provider still hasn't given us access to their new API, so my team can't finish the integration testing"——卡点在于支付服务商迟迟不开放 API 权限。用户测试的反馈其实非常正面，选项 A 与原文相反。
    - id: q3
      stem: What does the man offer to do?
      options:
        - Postpone the steering meeting to next month
        - Help Elena's team write the integration tests
        - Contact the payment provider's account director directly
        - Reply to the provider's automated messages
      correctIndex: 2
      explanationZh: 男士提出升级处理："I know their account director from a previous project, so I'll contact him directly this afternoon"，利用旧识关系直接联系对方客户总监。他要调整的是上线日期而不是周五的会议时间（排除 A）。
    - id: q4
      stem: What do the speakers decide about the launch?
      options:
        - To move it from the fifteenth to the twenty-second
        - To launch on time without the checkout page
        - To cancel it until the API is redesigned
        - To let the steering committee choose the date
      correctIndex: 0
      explanationZh: 男士说 "I'd rather move the launch from the fifteenth to the twenty-second than go live with an untested checkout"，Elena 表示同意（"Agreed"），二人决定将上线推迟一周。他们是自己做出决定后再向委员会汇报，而不是把决定权交给委员会（排除 D）。
- id: biz-l-002
  track: business
  title: "Client Call: Following Up on a Delayed Order"
  titleZh: 客户电话：跟进延迟的订单
  style: 电话 · Client call
  script:
    - speaker: A
      text: Good morning, this is Sofia Marsh calling from Atlas Packaging. May I speak with Mr. Reyes?
    - speaker: B
      text: Speaking. Ah, Sofia, good timing. I was actually about to email you about our order.
    - speaker: A
      text: Yes, that's exactly why I'm calling. I want to apologise personally — your shipment of printed boxes has been held up at our factory.
    - speaker: B
      text: I see. How serious is the delay? We have a product launch on the tenth, and those boxes are part of the retail display.
    - speaker: A
      text: I understand the urgency. The good news is that the printing is finished. The delay is in quality inspection, because one batch showed slight colour differences.
    - speaker: B
      text: Hmm. What does that mean for our delivery date?
    - speaker: A
      text: The inspected batches can ship tomorrow, which is about seventy percent of your order. The remaining thirty percent would follow three days later.
    - speaker: B
      text: Seventy percent by this week would actually cover the launch. But I'd need a firm guarantee on the second delivery.
    - speaker: A
      text: You have my word, and I'll confirm it in writing today. We'll also send the second shipment by express freight at our own cost.
    - speaker: B
      text: That sounds fair. Could you copy our warehouse manager on the confirmation email? She'll need to plan the receiving schedule.
    - speaker: A
      text: Of course. Thank you for being so understanding, Mr. Reyes, and again, my apologies for the disruption.
    - speaker: B
      text: These things happen. As long as everything arrives as promised, we'll be happy to keep working with you.
  questions:
    - id: q1
      stem: Why is Sofia calling Mr. Reyes?
      options:
        - To offer him a discount on a future order
        - To ask him to confirm a new order of boxes
        - To apologise for a delay to his shipment
        - To invite him to a product launch
      correctIndex: 2
      explanationZh: Sofia 开门见山："I want to apologise personally — your shipment of printed boxes has been held up at our factory"，来电目的是为发货延迟道歉并说明补救方案。产品发布会（launch）是客户自己的活动，用作干扰项（排除 D）。
    - id: q2
      stem: What caused the delay?
      options:
        - Colour differences found during quality inspection
        - A breakdown of the printing machines
        - A shortage of packaging materials
        - A mistake in the delivery address
      correctIndex: 0
      explanationZh: Sofia 解释："The delay is in quality inspection, because one batch showed slight colour differences"——印刷已完成，问题出在质检环节发现一批产品有轻微色差。选项 B 有迷惑性：印刷本身没有出故障，反而已经全部完成。
    - id: q3
      stem: What does Sofia promise about the second shipment?
      options:
        - It will arrive before the product launch on the tenth
        - It will be replaced by a different box design
        - Mr. Reyes will receive a thirty percent discount on it
        - It will be sent by express freight at Atlas Packaging's expense
      correctIndex: 3
      explanationZh: Sofia 承诺："We'll also send the second shipment by express freight at our own cost"，即剩余 30% 的货物由己方承担快运费用。“30%”指的是第二批货的数量占比而非折扣（排除 C）；能赶上发布会的是第一批 70% 的货，不是第二批（排除 A）。
    - id: q4
      stem: What does Mr. Reyes ask Sofia to do?
      options:
        - Call his warehouse manager directly
        - Include his warehouse manager in the confirmation email
        - Postpone the second delivery by three days
        - Send new samples before shipping
      correctIndex: 1
      explanationZh: Mr. Reyes 提出："Could you copy our warehouse manager on the confirmation email?"——请 Sofia 在书面确认邮件中抄送仓库经理，方便安排收货。copy someone on an email 是商务英语常用表达，意为“抄送某人”，不是打电话给她（排除 A）。
- id: biz-l-003
  track: business
  title: Negotiating a Software Renewal
  titleZh: 软件续约谈判
  style: 谈判 · Negotiation
  script:
    - speaker: A
      text: Thanks for making time, Priya. I wanted to talk about your contract renewal before it expires at the end of the month.
    - speaker: B
      text: Of course, Daniel. I'll be honest — the fifteen percent price increase in your proposal caught us by surprise.
    - speaker: A
      text: I understand. The increase reflects the new analytics module and the doubled storage we added this year.
    - speaker: B
      text: The analytics module is useful, but only two of our teams actually use it. We can't justify paying for the whole company.
    - speaker: A
      text: That's fair. What if we moved you to a tiered plan? You'd pay the higher rate only for the seats that use analytics.
    - speaker: B
      text: That sounds more reasonable. What would it do to the total?
    - speaker: A
      text: Based on your current usage, the renewal would come to about a six percent increase overall, instead of fifteen.
    - speaker: B
      text: Six percent is workable, but I'd need a two-year price lock to get sign-off from our finance director.
    - speaker: A
      text: I can do a two-year lock if you commit to annual payment rather than monthly invoices.
    - speaker: B
      text: Annual payment is fine — we prefer fewer invoices anyway. Can you send the revised terms in writing today?
    - speaker: A
      text: I'll email the updated agreement this afternoon, and I'll copy your procurement team as well.
    - speaker: B
      text: Perfect. If the numbers match what we discussed, you'll have the signature by Friday.
  questions:
    - id: q1
      stem: What surprised the woman about the renewal proposal?
      options:
        - A fifteen percent price increase
        - The removal of the analytics module
        - A change to monthly invoicing
        - An earlier expiry date
      correctIndex: 0
      explanationZh: Priya 开场就说："the fifteen percent price increase in your proposal caught us by surprise"——catch someone by surprise 意为“让人意外”。分析模块并没有被移除，反而是涨价的理由之一（排除 B）。
    - id: q2
      stem: What solution does the man propose?
      options:
        - Cancelling the analytics module for all teams
        - Delaying the renewal by one month
        - Charging the higher rate only for seats that use analytics
        - Reducing the company's storage capacity
      correctIndex: 2
      explanationZh: Daniel 提出分级方案："What if we moved you to a tiered plan? You'd pay the higher rate only for the seats that use analytics"——只有实际使用分析功能的席位才按高价计费，从而把整体涨幅降到约百分之六。
    - id: q3
      stem: What condition does the woman attach to accepting the six percent increase?
      options:
        - Switching to monthly invoices
        - A two-year price lock
        - A discount for early payment
        - A free trial for the other teams
      correctIndex: 1
      explanationZh: Priya 说："I'd need a two-year price lock to get sign-off from our finance director"——需要两年价格锁定才能获得财务总监批准。选项 A 方向相反：最终商定的是年付而非月付。
    - id: q4
      stem: What will the man do this afternoon?
      options:
        - Call the finance director
        - Visit the client's office
        - Prepare an analytics demonstration
        - Send the revised terms in writing
      correctIndex: 3
      explanationZh: 对应 Priya 的请求，Daniel 承诺："I'll email the updated agreement this afternoon, and I'll copy your procurement team as well"——今天下午书面发送修订条款并抄送采购团队。
    - id: q5
      stem: What does the woman say will happen by Friday?
      options:
        - The contract will expire
        - The signed agreement will be returned
        - The finance director will schedule a meeting
        - The analytics module will be rolled out
      correctIndex: 1
      explanationZh: 结尾 Priya 承诺："If the numbers match what we discussed, you'll have the signature by Friday"——只要数字与商谈一致，周五前就会签字返回。合同到期时间是月底，不是周五（排除 A）。
- id: biz-l-004
  track: business
  title: "Daily Stand-up: A Blocked Task"
  titleZh: 每日站会：被阻塞的任务
  style: 站会 · Stand-up
  script:
    - speaker: A
      text: Morning, Ben. Quick stand-up — what did you finish yesterday?
    - speaker: B
      text: I wrapped up the invoice export feature and pushed it to the test environment. All the automated checks passed.
    - speaker: A
      text: Nice. What are you picking up today?
    - speaker: B
      text: The currency display bug, the one the Singapore office reported. But I'm blocked on something first.
    - speaker: A
      text: Go on.
    - speaker: B
      text: I need access to the production logs to see the failed transactions, and my access request has been sitting with IT since Monday.
    - speaker: A
      text: Three days is too long for a standard request. I'll message the IT duty manager right after this and ask him to prioritise it.
    - speaker: B
      text: Thanks. If I get access before lunch, I can still have a fix ready for review by tomorrow.
    - speaker: A
      text: Good. One more thing — the client demo moved from Thursday to Wednesday, so don't merge anything risky after tomorrow morning.
    - speaker: B
      text: Understood. I'll keep tomorrow afternoon free for testing, then.
  questions:
    - id: q1
      stem: What did Ben complete yesterday?
      options:
        - The currency display fix
        - A demo for the Singapore office
        - The invoice export feature
        - A review of the production logs
      correctIndex: 2
      explanationZh: Ben 汇报昨天的成果："I wrapped up the invoice export feature and pushed it to the test environment"。wrap up 意为“完成、收尾”，是站会汇报的高频短语。货币显示 bug 是他今天才要开始的任务（排除 A），生产日志他还没拿到权限、根本没看过（排除 D）。
    - id: q2
      stem: What is blocking Ben's work today?
      options:
        - He is still waiting for access to the production logs
        - The automated checks keep failing
        - The test environment has been shut down
        - The Singapore office has not replied to him
      correctIndex: 0
      explanationZh: Ben 解释："I need access to the production logs... and my access request has been sitting with IT since Monday"——权限申请从周一起一直压在 IT 部门。be blocked on something 是敏捷站会里“被某事卡住”的地道说法。自动化检查其实全部通过了（"All the automated checks passed"，排除 B）。
    - id: q3
      stem: Why should Ben avoid merging risky changes after tomorrow morning?
      options:
        - IT will shut down the test environment
        - The team is switching to a new code repository
        - His access to the production logs will expire
        - The client demo has been moved forward to Wednesday
      correctIndex: 3
      explanationZh: 组长提醒："the client demo moved from Thursday to Wednesday, so don't merge anything risky after tomorrow morning"——客户演示从周四提前到周三，演示前要保持代码稳定。会议或日程 moved from X to Y 是听力常考的时间变更信息，注意分辨提前还是推后。
- id: biz-l-005
  track: business
  title: "All-Company Call: Office Move Announcement"
  titleZh: 全员电话会：办公室搬迁通知
  style: 通知 · Announcement
  script:
    - speaker: narrator
      text: Good afternoon, everyone, and thank you for joining this short all-company call. This is Rachel Kim from Workplace Services, and I have an important update about our office move.
    - speaker: narrator
      text: As announced in March, we are relocating from Harbour Tower to the new Riverside campus. I can now confirm the move will take place over the weekend of the twenty-sixth and twenty-seventh of September.
    - speaker: narrator
      text: Here is what that means for you. Friday the twenty-fifth will be the last working day at Harbour Tower, and the office will close early, at three p.m.
    - speaker: narrator
      text: Please pack your personal belongings into the crates that will be delivered to each floor next Monday. Label every crate with your name and your new desk number, which you can find on the intranet from today.
    - speaker: narrator
      text: IT equipment is handled differently. Do not pack your laptop — take it home with you, because Monday the twenty-eighth will be a work-from-home day for everyone while the network is tested.
    - speaker: narrator
      text: The Riverside campus opens on Tuesday the twenty-ninth. Your building access cards will keep working; only the parking arrangements change.
    - speaker: narrator
      text: If you drive, you will need to register your car through the facilities portal by the twenty-second. Spaces at Riverside are limited, so we encourage the shuttle bus from Central Station, which runs every fifteen minutes at peak times.
    - speaker: narrator
      text: Finally, if you have any special requirements — for example, medical equipment at your desk — please contact my team by the end of this week.
    - speaker: narrator
      text: Thank you all for your patience during the move. A summary of everything I have covered will be emailed to you this afternoon.
  questions:
    - id: q1
      stem: What is the main purpose of the call?
      options:
        - To announce the closure of the company
        - To give employees details about the office relocation
        - To introduce a new head of Workplace Services
        - To explain changes to the shuttle bus timetable
      correctIndex: 1
      explanationZh: 开场即点明主题："I have an important update about our office move"，随后通报搬迁日期、打包要求、居家办公安排和停车登记等细节。班车信息只是停车安排下的一个建议（排除 D）；公司是搬迁，不是关闭（排除 A）。
    - id: q2
      stem: What should employees do with their laptops?
      options:
        - Pack them into the labelled crates
        - Leave them at Harbour Tower for the movers
        - Hand them in to Workplace Services
        - Take them home for a work-from-home day
      correctIndex: 3
      explanationZh: 讲话人特别强调："Do not pack your laptop — take it home with you, because Monday the twenty-eighth will be a work-from-home day"——笔记本不装箱、要带回家，因为周一全员居家办公。这是与“个人物品装箱”相对的例外指令，听到 do not 开头的转折时要格外留心（排除 A）。
    - id: q3
      stem: What must employees who drive do by the twenty-second?
      options:
        - Register their car through the facilities portal
        - Buy a parking permit at Central Station
        - Return their building access cards
        - Reserve a seat on the shuttle bus
      correctIndex: 0
      explanationZh: 通知要求："If you drive, you will need to register your car through the facilities portal by the twenty-second"——开车通勤的员工须在 22 日前通过设施门户登记车辆。班车只是被鼓励乘坐，无需预订座位（排除 D）；门禁卡继续有效，不用交回（"Your building access cards will keep working"，排除 C）。
    - id: q4
      stem: What will happen on Monday the twenty-eighth?
      options:
        - The Riverside campus will open
        - Harbour Tower will close at three p.m.
        - Everyone will work from home while the network is tested
        - Crates will be delivered to each floor
      correctIndex: 2
      explanationZh: 原话是 "Monday the twenty-eighth will be a work-from-home day for everyone while the network is tested"。Riverside 园区周二 29 日才启用（排除 A）；周五 25 日下午三点提前闭楼说的是搬迁前最后一个工作日（排除 B）；板条箱在通知发布后的下周一送达，用于提前打包（排除 D）。本题考查把多个日期与对应事件配对的能力。
- id: biz-l-006
  track: business
  title: Handover Before Annual Leave
  titleZh: 休假前的工作交接
  style: 交接 · Handover
  script:
    - speaker: A
      text: Tom, do you have twenty minutes? I'd like to hand over my main accounts before I leave on Friday.
    - speaker: B
      text: Sure, Maria. Two weeks in Portugal, right? Let me grab my notebook.
    - speaker: A
      text: Right, back on the fourth. The only account that needs real attention is Keystone Logistics.
    - speaker: B
      text: The warehouse client? I thought their contract was already signed.
    - speaker: A
      text: The contract is signed, but their first invoice is on hold. Their finance team says the purchase order number is missing, so I sent a corrected invoice yesterday.
    - speaker: B
      text: Okay. So what do I need to do?
    - speaker: A
      text: If payment hasn't arrived by Wednesday, call their accounts manager, Susan — her number is in the handover document. Don't email; she gets hundreds a day and answers the phone much faster.
    - speaker: B
      text: Call, don't email. Got it — anything else on Keystone?
    - speaker: A
      text: One thing to be careful about. They asked about a discount for next year, and I said we'd discuss it in October — please don't make any commitments before I'm back.
    - speaker: B
      text: Understood, I'll just take notes if they raise it. What about your weekly sales report?
    - speaker: A
      text: Already covered — my manager agreed to skip it while I'm away. You only need to update the pipeline numbers in the shared sheet every Friday.
    - speaker: B
      text: Fine. Enjoy Portugal, and don't check your email — I've got this.
  questions:
    - id: q1
      stem: Why is Maria talking to Tom?
      options:
        - To ask him to sign the Keystone contract
        - To train him for a permanent new role
        - To plan a business trip to Portugal together
        - To hand over her accounts before her holiday
      correctIndex: 3
      explanationZh: Maria 开场说明来意："I'd like to hand over my main accounts before I leave on Friday"，之后又确认 "back on the fourth"——这是一次休假前的工作交接。葡萄牙是她的度假目的地，不是两人要一起出差（排除 C）；交接只覆盖两周假期，不是长期换岗（排除 B）。
    - id: q2
      stem: Why is Keystone's first invoice on hold?
      options:
        - The purchase order number was missing
        - The contract has not been signed yet
        - Susan rejected the corrected invoice
        - The discount has not been agreed
      correctIndex: 0
      explanationZh: Maria 解释："Their finance team says the purchase order number is missing, so I sent a corrected invoice yesterday"——发票被搁置是因为缺少采购订单号，修正版昨天已发出。合同其实已经签署（"The contract is signed"，排除 B）；折扣是明年的事，与本次付款无关（排除 D）。
    - id: q3
      stem: What should Tom do if the payment has not arrived by Wednesday?
      options:
        - Send a reminder email to Susan
        - Put the Keystone account on hold
        - Phone Keystone's accounts manager
        - Offer Keystone a discount
      correctIndex: 2
      explanationZh: Maria 的指示很明确："If payment hasn't arrived by Wednesday, call their accounts manager, Susan"，并特别叮嘱 "Don't email; she gets hundreds a day and answers the phone much faster"——要打电话而不是发邮件，选项 A 恰好说反。这里也顺带学到一个沟通技巧：跟进急事优先用电话。
    - id: q4
      stem: What does Maria say about the discount request?
      options:
        - She has already agreed to a discount for next year
        - Tom should not make any commitments before she returns
        - Her manager has rejected the request
        - It will be reviewed every Friday
      correctIndex: 1
      explanationZh: 关于折扣，Maria 只答应十月再谈，并叮嘱："please don't make any commitments before I'm back"——Tom 只需记录客户的诉求，不能许诺任何条件。选项 A 无中生有；每周五更新的是共享表格里的销售管道数据，与折扣无关（排除 D）。
