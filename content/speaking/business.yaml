# yaml-language-server: $schema=../.schemas/speaking.schema.json
- id: biz-s-001
  track: business
  partType: business_scenario
  title: 60-Second Professional Self-Introduction
  titleZh: 60 秒职业自我介绍
  promptEn: 'You are at an industry networking event and someone asks, "So, tell me about yourself." Give a 60-second professional self-introduction: who you are, what you do and for whom, one concrete achievement or strength, and what you are looking for or interested in right now.'
  promptZh: 你正在参加一场行业交流活动，有人对你说："介绍一下你自己吧。"请做一个 60 秒的职业自我介绍：你是谁、在哪家公司做什么、一项具体的成就或优势，以及你目前在关注或寻找什么。
  prepSeconds: 30
  speakSeconds: 60
  modelAnswer: Hi, I'm Wei Zhang — great to meet you. I'm a supply chain manager at Nordwind Electronics; we make smart-home devices, and my team looks after sourcing and logistics across our Asia-Pacific suppliers. I've been doing this for about six years now. The thing I'm probably proudest of is a dual-sourcing program I led last year — when one of our chip suppliers had a fire at their plant, we switched over in three days instead of the six weeks it would've taken before, so we didn't miss a single shipment. Right now I'm really interested in how AI forecasting can cut inventory costs, and honestly, that's half the reason I came tonight — I'm hoping to meet people who've actually implemented it. What about you — what brings you here?
  checklist:
    - en: "Did you cover all four elements: name and role, company and scope, one achievement, current interest?"
      zh: 是否涵盖四个要素：姓名与职位、公司与职责范围、一项成就、当前关注点？
    - en: Was your achievement concrete, with a number or a result someone can remember?
      zh: 你的成就是否具体，带有让人记得住的数字或结果？
    - en: Did you end by turning the conversation back to the other person?
      zh: 结尾是否把话题转回对方，促成双向交流？
    - en: Did you sound warm and conversational rather than like a recited resume?
      zh: 听起来是否亲切自然，而不是在背简历？
    - en: Did you stay within roughly 60 seconds without rushing the ending?
      zh: 是否控制在约 60 秒内，结尾没有仓促收场？
- id: biz-s-002
  track: business
  partType: business_scenario
  title: Kicking Off a Project Meeting
  titleZh: 主持项目启动会
  promptEn: "You are the project lead for the launch of a new mobile app, and this is the kickoff meeting with six colleagues from engineering, design, and marketing. Open the meeting: welcome everyone, state the purpose and the goal of the project, walk through the agenda briefly, and set one or two ground rules before handing over to the first speaker."
  promptZh: 你是新款手机应用发布项目的负责人，现在要与来自研发、设计和市场部的六位同事召开启动会。请为会议开场：欢迎大家、说明会议目的和项目目标、简要过一遍议程，并在把话筒交给第一位发言人之前定下一两条会议规则。
  prepSeconds: 30
  speakSeconds: 90
  modelAnswer: |-
    Good morning, everyone — thanks for making time, I know calendars are tight this week. For those I haven't worked with before, I'm Chen Jing, and I'll be leading this project.

    So, why are we here? Today is the official kickoff for the Atlas mobile app launch. Our goal is simple to say and hard to do: we ship version one to both app stores by 15 September, in time for the trade show. That gives us fourteen weeks.

    Here's how I'd like to use the next hour. First, I'll spend ten minutes on the background — what customers told us and why now. Then Maya will walk us through the design concept, Tom will cover the technical approach and the main risks, and Priya will outline the marketing plan. We'll keep the last fifteen minutes for open discussion and next steps.

    Two quick ground rules before we start. One — questions are welcome anytime, just jump in; I'd rather be interrupted than misunderstood. Two — we make decisions in this room, so if you disagree, say it here, not in the corridor afterwards.

    Alright, if there are no questions about the agenda — Maya, the floor is yours.
  checklist:
    - en: Did you state the project goal in one clear, memorable sentence with a deadline?
      zh: 是否用一句清晰好记、带截止日期的话说明了项目目标？
    - en: Did you preview the agenda and name who speaks on each item?
      zh: 是否预告了议程，并点明每个环节由谁发言？
    - en: Did you set explicit ground rules for the discussion?
      zh: 是否明确定下了讨论规则？
    - en: Did you hand over smoothly to the first speaker at the end?
      zh: 结尾是否顺畅地把发言权交给了第一位发言人？
    - en: Did you sound confident and inclusive, thanking people and inviting questions?
      zh: 语气是否自信且包容——感谢与会者并欢迎提问？
- id: biz-s-003
  track: business
  partType: business_scenario
  title: "Phone Call: Rescheduling a Client Meeting"
  titleZh: 电话沟通：与客户改约会议
  promptEn: "You must call your client, Ms. Baker, to reschedule tomorrow's 2 p.m. product review because your technical director has been called away to handle an urgent customer issue. Make the call: apologise, explain briefly, propose two alternative times (Thursday 10 a.m. or Friday 3 p.m.), and confirm the next step before ending politely."
  promptZh: 由于你们的技术总监被临时调去处理紧急客户问题，你必须致电客户 Baker 女士，将明天下午两点的产品评审会改期。请完成这通电话：致歉、简要说明原因、提出两个备选时间（周四上午 10 点或周五下午 3 点），确认下一步安排后礼貌结束通话。
  prepSeconds: 20
  speakSeconds: 60
  modelAnswer: Hello Ms. Baker, this is Li Wei from Nordwind — do you have a quick minute? I'm afraid I'm calling with a small change of plan. We're going to have to move tomorrow's two o'clock product review, and I'm very sorry for the short notice. Our technical director, David, has been called away to handle an urgent issue for another customer, and since you specifically wanted him there for the integration questions, I didn't want to run the session without him. Could we do Thursday at ten in the morning instead? Or if that doesn't work, Friday at three. Whichever suits you better — the demo itself is fully ready. Thursday at ten? Perfect. I'll send an updated calendar invitation within the hour, along with the agenda. Thanks so much for being flexible, Ms. Baker — and again, apologies for the change. See you Thursday. Goodbye.
  checklist:
    - en: Did you apologise early and give a brief, honest reason without over-explaining?
      zh: 是否尽早致歉，并简要如实说明原因而不过度解释？
    - en: Did you offer two specific alternative times rather than leaving it open?
      zh: 是否给出了两个具体的备选时间，而不是让对方无从选择？
    - en: Did you confirm the agreed time and state the follow-up action (sending a new invitation)?
      zh: 是否确认了商定的时间，并说明后续动作（发送新的会议邀请）？
    - en: Did you use polite telephone phrases (do you have a quick minute, I'm afraid, thanks for being flexible)?
      zh: 是否使用了礼貌的电话用语（do you have a quick minute、I'm afraid、thanks for being flexible）？
    - en: Did you close the call warmly and clearly instead of ending abruptly?
      zh: 通话结束是否亲切、明确，而不是生硬挂断？
- id: biz-s-004
  track: business
  partType: business_scenario
  title: Pushing Back on an Unrealistic Deadline
  titleZh: 据理力争：回应不合理的截止日期
  promptEn: "In a planning meeting, your manager proposes moving the delivery date of your data-migration project forward by three weeks, to the end of this month, because a major client has asked for it. You know your team cannot make that date safely. Respond to your manager in the meeting: acknowledge the business need first, explain the risk with specifics, offer at least two realistic alternatives, and close by asking for a decision."
  promptZh: 在一次规划会上，你的经理提议将你负责的数据迁移项目的交付日期提前三周至本月底，因为一个大客户提出了要求。你清楚团队无法安全地赶上这个日期。请在会上回应经理：先认可业务需求，再用具体事实说明风险，然后提出至少两个可行的替代方案，最后请经理做决定。
  prepSeconds: 30
  speakSeconds: 90
  modelAnswer: |-
    Thanks — and I completely understand why the client is pushing for this. I want to keep them happy too, so let me be straight about where we stand.

    Honestly, the end of this month worries me. We're still migrating the last two databases, and the step that really can't be rushed is validation — checking that every customer record survived the move intact. If we pull the date forward three weeks, validation shrinks from ten days to about three. And if bad data reaches the client, we don't lose three weeks — we lose the client.

    So rather than a flat no, let me offer two options. Option one: we keep the original date overall, but deliver the client's own data first — fully validated — by the end of this month. That's probably what they actually care about. Option two: we hit the new date for everything, but I'd need two engineers borrowed from the platform team, and we'd still carry some risk on the reporting module.

    My recommendation is option one. It gives the client something real this month without gambling on quality. But it's your call — which direction would you like me to plan for?
  checklist:
    - en: Did you acknowledge the business need before raising your concerns?
      zh: 是否先认可业务需求，再提出你的顾虑？
    - en: Did you explain the risk with specifics — numbers and consequences — rather than just saying it is impossible?
      zh: 是否用数字和后果具体说明风险，而不是只说“做不到”？
    - en: Did you offer at least two workable alternatives and name their trade-offs?
      zh: 是否提出了至少两个可行的替代方案，并说明各自的代价？
    - en: Did you state a clear recommendation while leaving the final decision to your manager?
      zh: 是否给出明确建议，同时把最终决定权留给经理？
    - en: Did you use softening language (my concern is, honestly, I'd rather) instead of a blunt refusal?
      zh: 是否使用了缓和语气的表达（my concern is、honestly、I'd rather），而不是生硬拒绝？
- id: biz-s-005
  track: business
  partType: business_scenario
  title: "Delivering Difficult News: A Price Increase"
  titleZh: 当面向客户传达涨价消息
  promptEn: "You are an account manager meeting your long-term client, Sarah, for an annual review. You must tell her that prices will rise by eight percent from January — the first increase in three years, driven by higher data-centre and licensing costs. Deliver the news face-to-face: raise it directly rather than hiding it, give an honest reason, offer something concrete to soften the impact, and propose a clear next step."
  promptZh: 你是一名客户经理，正与长期客户 Sarah 进行年度回顾会议。你必须告诉她：由于数据中心和授权成本上升，明年 1 月起价格将上调 8%——这是三年来的首次涨价。请当面传达这个消息：直接说明而不是回避、给出诚实的理由、提供具体的缓冲措施以减轻影响，并提出明确的下一步安排。
  prepSeconds: 30
  speakSeconds: 60
  modelAnswer: Sarah, before we get into next year's plan, there's something I need to raise with you directly, because I'd rather you hear it from me than read it in the renewal letter. From January, our prices are going up by eight percent. That's the first increase in three years, and I know it's not the news you were hoping for. The honest reason is that our data-centre and licensing costs have risen sharply, and we've absorbed them for two years — we can't keep doing that without cutting the service quality you rely on. Now, here's what I can do. If you renew for two years, I can hold the increase to five percent and lock the price for the full term. And the premium support tier you've been trialling stays included at no extra cost. I know you'll need to take this to your finance director, so I've prepared a one-page summary with the numbers. Shall we walk through it together now?
  checklist:
    - en: Did you raise the news directly and early, instead of hiding it behind small talk?
      zh: 是否直接、尽早说出坏消息，而不是用寒暄绕圈子回避？
    - en: Did you give an honest, specific reason without over-apologising?
      zh: 是否给出诚实、具体的理由，而没有过度道歉？
    - en: Did you offer something concrete to soften the impact (a cap, a price lock, added value)?
      zh: 是否提供了实际的缓冲措施（涨幅上限、价格锁定、附加价值）？
    - en: Did you acknowledge the client's position and propose a clear next step?
      zh: 是否体谅客户的处境，并提出明确的下一步安排？
    - en: Did you sound calm and confident — the decision is firm, but the delivery is warm?
      zh: 语气是否平静自信——决定是坚定的，但表达是温和的？
- id: biz-s-006
  track: business
  partType: business_scenario
  title: Giving a Status Update in the Daily Stand-up
  titleZh: 在每日站会上汇报进展
  promptEn: "It is your turn to speak at your team's daily stand-up. Give a crisp update on your work on the customer-analytics dashboard: what you finished yesterday (the data-export feature, plus two bug fixes), what you plan to do today (start building the date-filter component), and one blocker (you are still waiting for the platform team to grant you database access, requested two days ago). Keep it tight and structured, and end with a specific ask so the blocker gets resolved."
  promptZh: 团队每日站会轮到你发言。请就客户分析看板的工作做一个简明汇报：昨天完成了什么（数据导出功能，外加修复两个 bug）、今天计划做什么（开始开发日期筛选组件），以及一个阻塞项（两天前向平台团队申请的数据库权限至今没有开通）。汇报要简洁、有条理，并在结尾提出具体的求助请求，推动阻塞项解决。
  prepSeconds: 20
  speakSeconds: 60
  modelAnswer: "Morning, everyone — quick update from me on the analytics dashboard. Yesterday I finished the data-export feature, so users can now download any report as a spreadsheet; that's merged and ready for review. I also fixed the two bugs from Monday's testing — the chart-refresh issue and the broken date display on the summary page. Today I'm starting on the date-filter component, which is the last big piece before our demo next Thursday. One blocker, though, and it's getting urgent: I still don't have access to the production database. I requested it from the platform team on Monday, and without it the filter work stalls by tomorrow. Sam, I think you know their lead — could you ping him after this meeting, or should I raise a priority ticket instead? Either works for me; I just need it today. That's all from me."
  checklist:
    - en: Did you follow the yesterday / today / blocker structure without drifting into detail?
      zh: 是否遵循“昨天、今天、阻塞项”的结构，而没有陷入细节？
    - en: Did you describe finished work as concrete outcomes rather than vague activity?
      zh: 汇报已完成的工作时，是否说的是具体成果而不是含糊的忙碌？
    - en: Did you say how long the blocker has been open and when it will start costing time?
      zh: 是否说明了阻塞项已持续多久、何时会开始耽误进度？
    - en: Did you end with a specific ask directed at a named person?
      zh: 结尾是否向具体的人提出了明确的请求？
    - en: Did you keep the whole update within about sixty seconds?
      zh: 整个汇报是否控制在约六十秒内？
- id: biz-s-007
  track: business
  partType: business_scenario
  title: Giving Constructive Feedback to a Peer
  titleZh: 向同事提出建设性反馈
  promptEn: "Your colleague Ben built the data section of the client presentation you delivered together yesterday. Two of his charts used last quarter's figures, the client spotted it, and you had to apologise on the spot. Ben is skilled, you enjoy working with him, and this is the first time it has happened. Speak to him privately: raise the issue directly but kindly, describe what happened and its impact factually, invite his side of the story, and agree on a concrete way to prevent a repeat."
  promptZh: 同事 Ben 负责制作你们昨天共同向客户交付的演示文稿中的数据部分。其中两张图表用的是上季度的数据，被客户当场发现，你不得不当场致歉。Ben 能力很强，你们合作愉快，而且这是第一次出这种问题。请私下与他谈一谈：直接而友善地提出问题，客观描述事情经过和影响，请他讲讲自己的情况，并商定一个防止再次发生的具体办法。
  prepSeconds: 30
  speakSeconds: 90
  modelAnswer: |-
    Ben, have you got five minutes? I wanted to talk about yesterday's presentation while it's still fresh — just the two of us.

    First, the deck overall was strong — the client said the market-sizing section was the clearest they'd seen. But I do need to raise the two revenue charts. They showed last quarter's figures, their finance director caught it in the room, and I had to apologise on the spot. My worry isn't the mistake itself — it's that for a few minutes we looked unreliable on exactly the numbers we were there to defend.

    Before I suggest anything — what happened from your side? Right, that makes sense. If the data team only sent you the refreshed export late on Friday, I can see exactly how the old file slipped through.

    So here's what I'd propose, and tell me if you'd change it: whichever of us owns the data does a final source check the day before, and the other does a ten-minute review of the numbers only — fresh eyes, nothing else. If we'd had that in place this time, we'd have caught it.

    And Ben, to be clear — one slip in two years of working together doesn't change how much I trust your work. I just want us bulletproof next time. Sound fair?
  checklist:
    - en: Did you raise the issue promptly, privately, and directly — without hinting or sugar-coating it away?
      zh: 是否及时、私下、直接地提出问题，而不是拐弯抹角或含糊带过？
    - en: Did you describe the facts and the business impact, rather than criticising the person?
      zh: 是否客观描述事实和业务影响，而不是批评对方本人？
    - en: Did you invite his explanation before proposing a fix?
      zh: 在提出解决办法之前，是否先请对方说明情况？
    - en: Did you agree on a specific, workable prevention step rather than a vague promise to be more careful?
      zh: 是否商定了具体可行的预防措施，而不是一句空泛的“下次小心”？
    - en: Did you end by reaffirming trust and the working relationship?
      zh: 结尾是否重申了信任与合作关系？
- id: biz-s-008
  track: business
  partType: business_scenario
  title: Pitching a Process Improvement to Your Manager
  titleZh: 向经理提议流程改进
  promptEn: "You have caught your manager between meetings — you have about ninety seconds. You want to propose automating the weekly sales report, which you and a colleague currently compile by hand every Friday from three different systems. It takes the two of you about four hours in total, and small errors keep slipping in. You estimate the automation would take about three days to build using the reporting tool the team already pays for. Make the pitch: open with the problem in numbers, present the solution and its cost, deal with the obvious objection — who covers your work for those three days — and close with a specific request."
  promptZh: 你在会议间隙拦住了经理——大约只有九十秒。你想提议将每周销售报表自动化：目前每周五你和一位同事要从三个不同的系统手工汇总数据，两人合计约花四个小时，而且小错误不断。你估计用团队已付费的报表工具，大约三天就能完成自动化开发。请完成这次提议：用数字点明问题，给出方案和成本，回应显而易见的顾虑——这三天你的日常工作由谁来顶——并以一个具体的请求收尾。
  prepSeconds: 30
  speakSeconds: 90
  modelAnswer: |-
    Claire, have you got ninety seconds? I'd like to run a quick proposal past you.

    Every Friday, Tom and I build the weekly sales report by hand — pulling numbers from the CRM, the billing system, and the web dashboard into one spreadsheet. That costs the two of us about four hours a week, so roughly two hundred hours a year. And because it's manual, errors keep creeping in — you'll remember the mismatched regional totals from two weeks ago.

    Here's my proposal: let me automate it. The reporting tool we already license can pull from all three systems, so there's no new spend — just my time, and I estimate three days to build and test it. From then on the report generates itself every Friday morning, in the same format, and Tom does a five-minute sanity check instead of a half-day of copying.

    I know the concern is coverage while I'm heads-down. I'd do it the week after the quarter closes — our quietest week — and Tom has already agreed to handle my account queries for those three days.

    So the ask is three days of my time, week after next. It pays for itself within a month. Can I go ahead and block it out, or would you rather see a short written plan first?
  checklist:
    - en: Did you quantify the problem — hours lost, error examples — before proposing anything?
      zh: 在提出方案之前，是否先用数字量化了问题——耗费的工时、出错的实例？
    - en: Did you state the solution and its full cost honestly, including your own time?
      zh: 是否如实说明了方案及其全部成本，包括你自己投入的时间？
    - en: Did you anticipate the manager's main objection and answer it before being asked?
      zh: 是否预判了经理的主要顾虑，并在对方开口之前就作了回应？
    - en: Did you close with one specific, easy-to-approve request?
      zh: 结尾是否提出了一个具体、易于批准的请求？
    - en: Did you let the numbers, not adjectives, do the selling — and stay within the time?
      zh: 是否用数字而非形容词来说服对方，并控制在时间之内？
- id: biz-s-009
  track: business
  partType: business_scenario
  title: Handling a Client's Objection on a Sales Call
  titleZh: 通话中回应客户的异议
  promptEn: "You are on a video call with Mr. Ito, the operations director of a mid-sized retailer interested in your inventory-management software. He likes the product but says the switch itself feels too risky — he fears that migrating stock data and retraining forty warehouse staff could disrupt operations for weeks. Respond to the objection: acknowledge the concern genuinely instead of brushing it aside, reframe it with facts (migration runs in parallel with the old system and typically takes ten working days; training is two hours per person, delivered on site), offer proof such as a comparable customer, and propose a low-risk next step."
  promptZh: 你正与一家中型零售企业的运营总监 Ito 先生视频通话，对方对你们的库存管理软件很感兴趣。他认可产品本身，但认为切换过程风险太大——他担心迁移库存数据和重新培训四十名仓库员工会让运营中断数周。请回应这一异议：真诚地承认对方的顾虑而不是敷衍带过，用事实重新说明情况（迁移与旧系统并行进行，通常只需十个工作日；培训为每人两小时、上门开展），提供类似客户的实例作为佐证，并提出一个低风险的下一步。
  prepSeconds: 20
  speakSeconds: 60
  modelAnswer: "Mr. Ito, that's a completely fair concern — and honestly, if switching meant weeks of disruption, I wouldn't recommend it either. So let me explain how the transition actually works. We never switch you over in one jump. The new system runs in parallel with your current one, syncing data in the background, and that phase typically takes ten working days — your warehouses keep operating exactly as they do today. Nothing goes live until your own team has confirmed the stock counts match. As for training, it's two hours per person, on site, in small groups — for forty staff that spreads over about a week, scheduled around your shifts. Redfern Homeware — about your size, three warehouses — went live in March, and their operations director told me the floor never noticed the cutover; I'd be glad to introduce you. And rather than deciding today, how about a pilot in your smallest warehouse first? Two weeks, real stock, and you judge the results yourself."
  checklist:
    - en: Did you acknowledge the concern as legitimate before countering it?
      zh: 是否先承认对方的顾虑合理，再进行回应？
    - en: Did you reframe the risk with concrete facts about parallel running and training time?
      zh: 是否用并行迁移和培训时长等具体事实重新界定了风险？
    - en: Did you offer verifiable proof, such as a reference customer you can introduce?
      zh: 是否提供了可验证的佐证，例如可引荐的现有客户？
    - en: Did you propose a low-risk next step instead of pushing for the full commitment?
      zh: 是否提出了低风险的下一步，而不是急于让对方做出全部承诺？
    - en: Did you stay calm and unhurried, with no defensiveness or sales pressure?
      zh: 语气是否从容不迫，没有辩解或强行推销的意味？
- id: biz-s-010
  track: business
  partType: business_scenario
  title: Briefing a Colleague Before Your Annual Leave
  titleZh: 休假前向同事交接工作
  promptEn: "You start two weeks of annual leave on Monday, and your colleague Dana has agreed to cover your client accounts. Brief her before you go: hand over the two live items (the Redwood contract renewal, which is awaiting the client's signature and may need a gentle chase on Thursday; and a billing-error complaint from Marlowe Ltd, promised a resolution by Wednesday), tell her where the documents live and who can help if she gets stuck, explain when you genuinely want to be contacted and when not, and check she is comfortable with all of it."
  promptZh: 你从周一开始休两周年假，同事 Dana 已同意接手你的客户账户。请在休假前向她交接：交代两件正在进行的事（Redwood 的合同续约正在等客户签字，周四可能需要礼貌地催一下；以及 Marlowe Ltd 投诉的计费错误，已承诺周三前给出解决方案），告诉她文件放在哪里、遇到困难可以找谁，说明什么情况下你确实希望被联系、什么情况下不需要，最后确认她对这些安排没有疑问。
  prepSeconds: 30
  speakSeconds: 90
  modelAnswer: |-
    Dana, thanks again for covering for me — let me walk you through everything now so nothing lands on you cold.

    There are two live items. The big one is the Redwood contract renewal. The terms are agreed and the contract is with their legal team for signature. If it hasn't come back by Thursday, send their procurement lead, Ms. Vane, a friendly nudge — there's a draft chaser in the Redwood folder, so it's two minutes' work. Please don't reopen any terms, though; if they ask for changes, that waits for me.

    The second is Marlowe Ltd. We overcharged them on their April invoice, and I've promised a corrected invoice and a credit note by Wednesday. Finance is preparing both — Rui has the details — so your job is just to check they went out and confirm with Marlowe that they're satisfied.

    Everything lives in the shared drive under Handover-July: one page per account, with contacts and links to the client portals. And if you're ever stuck, Rui knows these accounts almost as well as I do.

    On contacting me — for anything routine, please don't. The notes should cover it, and I trust your judgement completely. But if Redwood wants to change terms, or any client threatens to escalate, call me straight away; I'd rather lose an hour of holiday than a client.

    So — Redwood chase on Thursday, Marlowe check on Wednesday. Anything you'd like me to go over again?
  checklist:
    - en: Did you hand over each live item with its status, the exact action needed, and the day it is due?
      zh: 交接每件事时是否说明了当前状态、需要采取的具体动作和时间节点？
    - en: Did you say clearly what your colleague should not do, as well as what she should?
      zh: 除了该做什么，是否也明确说明了不该做什么？
    - en: Did you point out where documents live and who can help, so she need not rely on memory?
      zh: 是否告知了文件位置和可求助的人，让对方不必单凭记忆行事？
    - en: Did you set explicit contact rules — when to call you and when to decide alone?
      zh: 是否定下了明确的联系规则——什么情况打电话给你，什么情况自行决定？
    - en: Did you close by summarising the key dates and inviting questions?
      zh: 结尾是否总结了关键日期，并主动询问对方是否还有疑问？
