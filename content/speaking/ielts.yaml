- id: ielts-s-007
  track: ielts
  partType: ielts_part2
  title: "Part 2: A Trip You Remember Well"
  titleZh: 第二部分：一次难忘的旅行
  promptEn: |-
    Describe a journey or trip that you remember well.
    You should say:
    - where you went
    - who you travelled with
    - what you did during the trip
    and explain why this trip was so memorable for you.
  promptZh: |-
    描述一次你记忆深刻的旅行。
    你应当谈到：
    - 你去了哪里
    - 你和谁一起去的
    - 旅途中你做了什么
    并说明这次旅行为什么让你如此难忘。
  prepSeconds: 60
  speakSeconds: 120
  modelAnswer: |-
    The trip I remember best is a week of hiking I did in the mountains in the west of the country, about four years ago.

    I went with two friends from university. We'd been talking about doing a proper trekking trip for years and kept putting it off, and then one of them changed jobs and suddenly had two free weeks, so we booked everything in about three days, almost on impulse. Looking back, that spontaneity was part of the magic.

    As for what we did — we walked between mountain villages for five days, staying in small family guesthouses each night. There were no cars involved at all; everything we needed was in our backpacks. The days had a lovely rhythm: walk all morning, a long lunch somewhere with a view, then a shorter walk to the next village before dark. In the evenings we played cards with the guesthouse owners and went to bed ridiculously early. My phone lost signal on the second day, and after the initial panic I honestly stopped missing it.

    Why was it so memorable? Partly the scenery, of course — one morning we climbed above the cloud line before sunrise, and watching the light spread across a sea of clouds is something I'll never forget. But mainly it was the quality of the time. Without screens or schedules, the three of us talked properly for the first time in years — real conversations, not just catching up. We still call it 'the trip' as if there had never been another one, and we've promised ourselves to do it again before we turn forty.
  checklist:
    - en: Did you cover all four points on the cue card, including the final 'explain' point?
      zh: 是否覆盖了提示卡上的全部四个要点，包括最后的“说明”部分？
