- id: ielts-s-009
  track: ielts
  partType: ielts_part2
  title: "Part 2: A Book That Impressed You"
  titleZh: 第二部分：一本给你留下深刻印象的书
  promptEn: |-
    Describe a book that made a strong impression on you.
    You should say:
    - what the book was about
    - when and why you read it
    - what you liked or disliked about it
    and explain why it made such a strong impression on you.
  promptZh: |-
    描述一本给你留下深刻印象的书。
    你应当谈到：
    - 这本书讲了什么
    - 你是什么时候、为什么读它的
    - 你喜欢或不喜欢它的哪些方面
    并说明它为什么给你留下如此深刻的印象。
  prepSeconds: 60
  speakSeconds: 120
  modelAnswer: |-
    The book I'd like to talk about is a memoir written by a young surgeon who discovered, right at the peak of his training, that he had terminal cancer. It's essentially about what makes a life meaningful when you know your time is short — he keeps operating, he and his wife decide to have a child, and he writes the book itself in his final months.

    I read it about three years ago, and the timing was no accident. I'd just come through a rough patch at work — long hours, no clear purpose — and a friend pressed it into my hands and said, read this before you complain to me again. I finished it in two sittings, which almost never happens with me.

    What did I like about it? Mostly the honesty. The author never pretends to be brave or wise; he admits he was terrified and sometimes petty, and that made his moments of courage feel real rather than performed. The writing is beautiful too — he'd studied literature before medicine, and it shows. If I had to name a criticism, the medical detail occasionally slowed me down, though even that added to the sense that you were inside his world.

    As for why it impressed me so deeply — I think it reframed a question I'd been asking badly. I kept asking myself whether I was successful; the book made me ask instead whether the way I spend an ordinary Tuesday reflects what I actually value. I can't say it changed my life overnight, but I did start saying no to work that means nothing to me, and I've reread the final chapter several times since. Very few books survive a second reading like that.
  checklist:
    - en: Did you cover all four points on the cue card, including the final 'explain' point?
      zh: 是否覆盖了提示卡上的全部四个要点，包括最后的“说明”部分？
