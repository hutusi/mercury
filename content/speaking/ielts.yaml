    - en: Did you evaluate the book with nuance, mentioning a weakness as well as strengths?
      zh: 是否对这本书做了有层次的评价，既讲优点也提到不足？
    - en: Did you describe its effect on you concretely (saying no to meaningless work) rather than in vague praise?
      zh: 是否具体描述了它对你的影响（拒绝无意义的工作），而不是空泛地赞美？
- id: ielts-s-010
  track: ielts
  partType: ielts_part3
  title: "Part 3: Travel and Tourism"
  titleZh: 第三部分：旅行与旅游业
  promptEn: "Now let's discuss some more general questions about travel and tourism. Why do you think travelling has become so much more popular in recent decades? Does tourism mainly benefit the places that tourists visit, or does it cause more harm than good? And how do you think the way people travel will change in the future?"
  promptZh: 现在我们来讨论一些关于旅行与旅游业的更宏观的问题。你认为近几十年来旅行为什么变得如此流行？旅游业主要是让旅游目的地受益，还是弊大于利？你认为未来人们的旅行方式会发生怎样的变化？
  prepSeconds: 0
  speakSeconds: 90
  modelAnswer: |-
    Why has travel exploded? Mostly because the barriers collapsed, I'd say. Flights that once cost a month's salary now cost a weekend's, budget airlines and online booking removed the mystery, and social media added a new motive — people don't just want to see places anymore, they want to be seen seeing them. Rising incomes in developing countries have also turned international travel from a luxury for the few into a normal ambition for the many.

    As for whether tourism helps or harms the destination, honestly, it depends on the dose. A steady flow of visitors funds jobs, restores old buildings and can even keep local traditions alive because there's an audience for them. But past a certain point the logic flips — think of those European cities where residents are priced out of their own neighbourhoods and the historic centre becomes a kind of theme park. So the question isn't really tourism yes or no, it's whether the numbers are managed.

    Looking ahead, I suspect travel will become slower and more deliberate. Concern about flights and their emissions is already changing behaviour — trains are fashionable again in Europe — and remote work means people can stay a month in one place instead of racing through five countries in a week. Ironically, the future of travel might look rather like its past: fewer trips, taken more seriously.
