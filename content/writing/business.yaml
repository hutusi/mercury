# yaml-language-server: $schema=../.schemas/writing.schema.json
- id: biz-wr-001
  track: business
  taskType: business_email
  title: "E-mail: Informing a Client about a Project Delay"
  titleZh: 邮件：告知客户项目延期
  promptEn: "You are the project manager for a website redesign for your client Horizon Retail. A key developer has been on sick leave, and the launch must be pushed back from 15 June to 29 June. Write an e-mail to your client contact, Ms. Laura Chen: apologise for the delay, briefly explain the cause, propose the new timeline, and offer something concrete to maintain goodwill. Write at least 100 words."
  promptZh: 你是客户 Horizon Retail 网站改版项目的项目经理。一名核心开发人员因病休假，上线日期必须从 6 月 15 日推迟到 6 月 29 日。请给客户联系人 Laura Chen 女士写一封邮件：为延期道歉、简要说明原因、提出新的时间表，并给出一项具体补偿以维护客户关系。不少于 100 词。
  minWords: 100
  suggestedMinutes: 15
  modelAnswer: |-
    Dear Ms. Chen,

    I am writing to let you know, with apologies, that we need to move the launch of the redesigned Horizon Retail website from 15 June to 29 June.

    The reason is that our lead developer, who built the checkout integration, has been on unexpected sick leave for the past two weeks. Rather than hand his unfinished work to someone unfamiliar with it and risk quality issues at launch, we believe a two-week extension is the responsible choice.

    Here is the revised timeline: internal testing will finish by 19 June, your team will have the staging site for review from 22 June, and we will go live on 29 June. To make up for the inconvenience, we will provide four weeks of post-launch support instead of the usual two, at no additional cost.

    I am happy to walk you through the plan on a call this week — would Thursday morning suit you?

    Kind regards,
    Li Wei
    Project Manager
  checklist:
    - en: Did you deliver the bad news early and clearly, rather than burying it at the end?
      zh: 是否在邮件开头就清楚地传达了坏消息，而不是拖到最后？
    - en: Did you explain the cause briefly and without blaming individuals or making excuses?
      zh: 是否简要说明了原因，且没有推卸责任或过度找借口？
    - en: Did you give a concrete new timeline with specific dates?
      zh: 是否给出了包含具体日期的新时间表？
    - en: Did you offer meaningful compensation or a goodwill gesture?
      zh: 是否提供了有实际意义的补偿或善意举措？
    - en: Did you end with a clear next step, such as proposing a call?
      zh: 结尾是否提出了明确的下一步行动，例如约一次通话？
- id: biz-wr-002
  track: business
  taskType: business_report
  title: "Weekly Status Report: CRM Migration"
  titleZh: 周报：CRM 系统迁移
  promptEn: "Write your weekly status report to your manager for the Aurora CRM migration project. Cover four areas: progress this week (customer data migration is 80% complete; training materials have been drafted), problems (a vendor API outage cost the team two days), plans for next week, and any support you need from management. Use short headings or a clear structure. Write at least 120 words."
  promptZh: 请就 Aurora CRM 迁移项目给你的经理写一份周报。需涵盖四个方面：本周进展（客户数据迁移已完成 80%，培训材料已完成初稿）、遇到的问题（供应商 API 故障耽误了团队两天）、下周计划，以及需要管理层提供的支持。请使用小标题或清晰的结构。不少于 120 词。
  minWords: 120
  suggestedMinutes: 20
  modelAnswer: |-
    Subject: Aurora CRM Migration — Weekly Status, Week 12

    Progress this week
    Customer data migration reached 80% completion, covering all active accounts in the APAC and EMEA regions. The first draft of the end-user training materials is finished and is now with the sales operations team for review.

    Problems
    The vendor's API was unavailable from Tuesday afternoon to Thursday morning, which stopped all migration jobs and cost us roughly two working days. The vendor has confirmed the root cause and credited us for the downtime, but our buffer for this phase is now used up.

    Plans for next week
    We will migrate the remaining 20% of records, run the data-quality audit on a 5% sample, and schedule the first two training sessions for the sales team.

    Support needed
    To protect the go-live date of 30 July, I would like approval for up to 20 hours of contractor time in case the audit uncovers data issues. A decision by Wednesday would keep us on schedule.

    Li Wei
  checklist:
    - en: Did you organize the report under clear headings (progress, problems, plans, support needed)?
      zh: 报告是否按清晰的小标题组织（进展、问题、计划、所需支持）？
    - en: Did you quantify progress with concrete figures instead of vague statements?
      zh: 进展描述是否使用了具体数字，而非含糊表述？
    - en: Did you state the impact of the problem and what has been done about it?
      zh: 是否说明了问题造成的影响以及已采取的应对措施？
    - en: Is your request for support specific and tied to a deadline or decision?
      zh: 所请求的支持是否具体，并关联到明确的期限或决策？
    - en: Is the tone factual and concise, without unnecessary apologies or padding?
      zh: 语气是否客观简洁，没有多余的道歉或废话？
- id: biz-wr-003
  track: business
  taskType: business_email
  title: "E-mail: Responding to a Customer Complaint"
  titleZh: 邮件：回复客户投诉
  promptEn: "A long-standing customer, Mr. Daniel Tan of Innova Labs, has written to complain that order #8823 arrived a week late and that two of the demonstration units inside were damaged, which disrupted a product demonstration for his own client. Write a reply: apologise sincerely, explain briefly what went wrong, state exactly how you will put it right, and offer appropriate compensation. Write at least 100 words."
  promptZh: 老客户、Innova Labs 的 Daniel Tan 先生来信投诉：8823 号订单晚到了一周，且其中两台演示设备损坏，影响了他为自己客户安排的产品演示。请写一封回复邮件：诚恳道歉、简要解释问题原因、明确说明补救措施，并提供适当的补偿。不少于 100 词。
  minWords: 100
  suggestedMinutes: 15
  modelAnswer: |-
    Dear Mr. Tan,

    Thank you for your message about order #8823, and please accept my sincere apologies. A late delivery is bad enough; damaged demonstration units that disrupted a presentation to your own client is a failure we take very seriously.

    We have investigated immediately. The shipment was rerouted through a temporary distribution hub during last week's port congestion, where it was both delayed and mishandled. This does not excuse the outcome, but it explains it, and we have already stopped routing your orders through that hub.

    Here is what we will do. Two replacement units were dispatched this morning by express courier and will reach you by Thursday, at our cost. We will also refund the full shipping charge for order #8823 and apply a 15% credit to your next invoice.

    Your business over the past six years matters greatly to us. If there is anything further we can do to support your client demonstration, please call me directly on my mobile.

    Yours sincerely,
    Chen Jing
    Customer Success Manager
  checklist:
    - en: Did you apologise sincerely and acknowledge the specific impact on the customer's business?
      zh: 是否诚恳道歉，并明确承认了给客户业务造成的具体影响？
    - en: Did you explain the cause honestly without sounding defensive?
      zh: 是否如实解释了原因，而没有显得在辩解？
    - en: Did you list concrete corrective actions with dates (replacement, refund, credit)?
      zh: 是否列出了带时间的具体补救措施（换货、退款、抵扣）？
    - en: Did you mention a preventive step so the problem will not recur?
      zh: 是否提到了防止问题再次发生的措施？
    - en: Did you close by valuing the relationship and offering a direct contact channel?
      zh: 结尾是否表达了对合作关系的重视，并提供了直接联系方式？
- id: biz-wr-004
  track: business
  taskType: business_email
  title: "E-mail: Escalating a Supplier Problem Diplomatically"
  titleZh: 邮件：得体地向供应商升级问题
  promptEn: "Your component supplier, Deltapoint Industrial, has delivered three consecutive orders (#4471, #4489, #4502) between four and nine days late over the past two months, despite polite reminders to its support desk. The delays have twice forced you to reschedule production runs and once to pay overtime. Write an e-mail to the supplier's account director, Mr. Novak: state the facts with order numbers, describe the business impact, request a corrective plan with a deadline, and keep the tone firm but constructive — you want to fix the relationship, not end it. Write at least 100 words."
  promptZh: 你公司的零部件供应商 Deltapoint Industrial 在过去两个月里连续三笔订单（#4471、#4489、#4502）迟到 4 至 9 天，尽管你已多次礼貌提醒其客服部门。延误两次迫使你们调整生产排期，一次产生加班费用。请给该供应商的客户总监 Novak 先生写一封邮件：列出带订单号的事实、说明对业务的影响、要求对方在限期内提交整改方案，语气要坚定而有建设性——你的目标是修复合作关系，而不是终止它。不少于 100 词。
  minWords: 100
  suggestedMinutes: 15
  modelAnswer: |-
    Dear Mr. Novak,

    I am writing to you directly about our recent deliveries, because I believe the issue now needs your attention rather than another routine follow-up with the support desk.

    Over the past two months, three consecutive orders — #4471, #4489, and #4502 — have arrived between four and nine days late. To be fair, your dispatch team has responded politely each time, and the goods have always arrived in good condition. However, the delays have twice forced us to reschedule production runs, and last week we paid overtime to protect a customer deadline that should never have been at risk.

    Deltapoint has been a dependable partner for more than four years, which is exactly why I am raising this with you now rather than looking elsewhere. Could you investigate the root cause and share a short corrective plan by Friday 24 July? I would also welcome a thirty-minute call next week to agree on how we monitor delivery performance over the coming quarter.

    I am confident we can resolve this quickly and return the relationship to the standard we are both used to.

    Kind regards,
    Zhang Min
    Operations Manager, Kestrel Manufacturing
  checklist:
    - en: Did you state the facts precisely, with order numbers and dates, before expressing any frustration?
      zh: 是否先用订单号和具体天数客观陈述事实，而不是一上来就宣泄不满？
    - en: Did you describe the business impact concretely (rescheduled production, overtime costs)?
      zh: 是否具体说明了对业务的影响（生产改期、加班成本），让对方看到问题的分量？
    - en: Is the tone firm but constructive — no threats, no sarcasm, and no apologising for raising the issue?
      zh: 语气是否坚定而有建设性——没有威胁和讽刺，也没有为提出问题而不必要地道歉？
    - en: Did you make a specific request with a deadline (a corrective plan, a follow-up call)?
      zh: 是否提出了带明确期限的具体要求（整改方案、后续通话）？
    - en: Did you acknowledge what the supplier does well and reaffirm the long-term relationship?
      zh: 是否肯定了对方做得好的地方，并重申长期合作的意愿？
- id: biz-wr-005
  track: business
  taskType: business_report
  title: "Lessons-Learned Report: A Launch-Day Outage"
  titleZh: 复盘报告：促销日宕机事故
  promptEn: "Your company's online store went down for three hours during the first morning of its biggest annual promotion. The causes: the marketing email went to the full customer list at 9 a.m. instead of in staggered batches, and the traffic spike overwhelmed the checkout service; the on-call rota also listed an engineer who had left the company, which slowed the response. Write a lessons-learned report for the management team: summarise the incident and its impact, analyse the causes without blaming individuals, note what went well, and propose specific preventive actions with owners and deadlines. Write at least 120 words."
  promptZh: 在公司年度最大促销活动的首日上午，网上商店宕机了三个小时。原因有二：市场部的推广邮件在上午 9 点一次性发给了全部客户，而非分批发送，流量激增压垮了结算服务；同时值班表上还留着一位已离职工程师的名字，延误了响应。请为管理层写一份复盘报告（lessons-learned report）：概述事件及其影响、客观分析原因（对事不对人）、指出做得好的地方，并提出带责任人和期限的具体改进措施。不少于 120 词。
  minWords: 120
  suggestedMinutes: 20
  modelAnswer: |-
    Subject: Lessons-Learned Report — Online Store Outage, 12 October

    Summary
    On 12 October, the first morning of the Autumn Sale, the online store was unavailable from 9:04 to 12:15. We estimate 5,800 lost orders worth approximately $210,000, and customer service handled four times its normal contact volume.

    What happened
    The 9 a.m. promotional email went to all 480,000 customers at once, rather than in staggered batches as in previous years. Traffic reached eleven times the normal load within ten minutes and the checkout service failed. Recovery was slowed by roughly forty minutes because the on-call rota still listed an engineer who left in August.

    Causes
    This was a process failure, not an individual error. The batch-sending step existed only as informal knowledge and was never written into the campaign checklist; no load test was run against the promotion-day traffic forecast; and the on-call rota had no owner responsible for keeping it current.

    What went well
    Once the right engineer was reached, diagnosis and recovery took under an hour. The status page and social media updates were prompt, and complaint volumes stayed below comparable incidents.

    Recommended actions
    1. Add mandatory batch-sending and a pre-launch load test to the campaign checklist — Marketing Operations, by 31 October.
    2. Generate the on-call rota automatically from the HR system so it can never go stale — IT, by 15 November.
    3. Hold a joint marketing-engineering rehearsal one week before every major promotion — both teams, starting with the Year-End Sale.

    Li Wei
  checklist:
    - en: Did you structure the report under clear headings (summary, what happened, causes, what went well, actions)?
      zh: 报告是否按清晰的小标题组织（概述、经过、原因、亮点、改进措施）？
    - en: Did you quantify the impact with concrete numbers (downtime, lost orders, cost)?
      zh: 是否用具体数字量化了影响（宕机时长、损失订单、金额）？
    - en: Did you analyse the causes as process failures instead of blaming individuals?
      zh: 原因分析是否聚焦流程缺陷，而不是指责某个人？
    - en: Did you include a "what went well" section to keep the review balanced and credible?
      zh: 是否包含“做得好的地方”，让复盘保持客观、可信？
    - en: Does every recommended action have an owner and a deadline?
      zh: 每项改进措施是否都有明确的责任人和完成期限？
- id: biz-wr-006
  track: business
  taskType: business_email
  title: "E-mail: Requesting Overdue Input from a Senior Stakeholder"
  titleZh: 邮件：向资深相关方催要逾期材料
  promptEn: "You are preparing a sales proposal for a prospective client, Meridian Logistics, which must be submitted by 5 p.m. this Friday. On Monday you asked the finance team for updated pricing for your enterprise service tier, but two polite chat reminders have gone unanswered, and without the figures you cannot finish the cost section. Write an e-mail to the head of finance, Mr. Alan Reyes: explain exactly what you need and why it is urgent, give a clear deadline, make responding as easy as possible, and keep the tone courteous — he is senior to you and genuinely busy. Write at least 100 words."
  promptZh: 你正在为潜在客户 Meridian Logistics 准备一份销售提案，必须在本周五下午 5 点前提交。周一你已请财务团队提供企业版服务的最新报价，但两次礼貌的即时消息提醒都没有回音；没有这些数字，你就无法完成成本部分。请给财务负责人 Alan Reyes 先生写一封邮件：说清你需要什么、为何紧急，给出明确的期限，尽量让对方容易回复，并保持礼貌得体的语气——他职位比你高，也确实很忙。不少于 100 词。
  minWords: 100
  suggestedMinutes: 15
  modelAnswer: |-
    Dear Mr. Reyes,

    I hope your week is going well. I am writing about the updated enterprise-tier pricing I requested on Monday for the Meridian Logistics proposal — chat messages are easily buried in a busy week, so please forgive the follow-up by e-mail.

    The proposal must reach Meridian by 5 p.m. this Friday, and the cost section is the only part still open. Meridian would be our largest logistics account this year, so I would much rather the numbers came from your team than from my own estimates.

    To keep this quick, I need only three figures: the per-user monthly rate, the volume-discount thresholds, and the one-off onboarding fee. I have attached last year's pricing sheet with those three cells highlighted — updating the attachment directly would be ideal, and of course anyone on your team could do it.

    Could you send the figures by Thursday noon? That leaves me a day for internal review before submission. If a two-minute call would be faster, I am happy to ring whenever suits you.

    Thank you very much for your help.

    Kind regards,
    Lin Yan
    Account Executive
  checklist:
    - en: Did you state exactly what you need, narrowed down to the smallest possible request?
      zh: 是否说清了你到底需要什么，并把请求缩小到最小范围？
    - en: Did you explain the urgency with a concrete deadline and what is at stake for the business?
      zh: 是否用具体期限和业务上的利害关系说明了紧迫性？
    - en: Did you make responding easy — an attachment to fill in, or the offer of a quick call?
      zh: 是否让对方容易回复——例如提供可直接填写的附件，或提出快速通话？
    - en: Is the tone courteous and blame-free, acknowledging that the recipient is busy?
      zh: 语气是否礼貌、不带指责，并体谅对方的繁忙？
    - en: Did you set your internal deadline early enough to leave yourself a buffer?
      zh: 你要求的时间点是否足够提前，为自己留出了缓冲？
- id: biz-wr-007
  track: business
  taskType: business_email
  title: "E-mail: Introducing Your Successor to a Key Client"
  titleZh: 邮件：向重要客户介绍你的接任者
  promptEn: "After four years as the account manager for Bluepine Foods, you are moving to a new internal role at the end of this month. Write an e-mail to your main client contact, Ms. Hana Sato: announce the change in a positive way, introduce your successor, Marco Ruiz, with the credentials that matter to her, explain the handover arrangements so that nothing gets dropped, and thank her for the years of collaboration. Write at least 100 words."
  promptZh: 你担任客户 Bluepine Foods 的客户经理已有四年，本月底将调任公司内部的新岗位。请给你的主要客户联系人 Hana Sato 女士写一封邮件：以积极的方式告知这一变动，介绍接任者 Marco Ruiz 并突出她所关心的资历，说明交接安排以确保工作无缝衔接，并感谢多年来的合作。不少于 100 词。
  minWords: 100
  suggestedMinutes: 15
  modelAnswer: |-
    Dear Ms. Sato,

    I am writing with some personal news: at the end of this month I will be moving into a new role leading our supplier-quality program, and I wanted you to hear it from me first.

    The good news is that Bluepine will be in excellent hands. Marco Ruiz, who takes over as your account manager, has spent five years in our food-and-beverage division and managed the cold-chain accounts you and I have often discussed — he knows the seasonal pressures of your business well.

    To make the transition seamless, Marco and I will run your account together for the next three weeks. He will join our regular Tuesday call from next week, and I have briefed him in detail on the current promotion calendar and the packaging project. Nothing in the current plan changes, and I remain reachable until the handover is complete.

    Working with you these past four years has been a genuine pleasure — the trust you placed in us during the warehouse relocation is something I will not forget. Thank you, and I am confident you and Marco will work very well together.

    Warm regards,
    Zhou Fan
    Account Manager
  checklist:
    - en: Did you announce the change directly and frame it positively, without creating alarm?
      zh: 是否直接、正面地告知变动，而没有引起客户不安？
    - en: Did you introduce the successor with credentials relevant to this client's business?
      zh: 介绍接任者时是否突出了与该客户业务相关的资历？
    - en: Did you describe concrete handover arrangements (overlap period, joining calls, briefings)?
      zh: 是否说明了具体的交接安排（重叠期、参加例会、情况通报）？
    - en: Did you reassure the client that current plans and commitments stay unchanged?
      zh: 是否让客户放心——现有计划与承诺不会改变？
    - en: Did you thank the client with a specific shared memory rather than a generic phrase?
      zh: 是否用具体的共同经历而非客套话向客户表达感谢？
- id: biz-wr-008
  track: business
  taskType: business_email
  title: "E-mail: Chasing an Overdue Invoice"
  titleZh: 邮件：催收逾期账款
  promptEn: "Your client Farrow & Webb has not paid invoice INV-2077 for 12,400 euros, which fell due on 18 June — thirty days ago. A friendly first reminder sent ten days ago received no reply, which is unusual: this client has paid on time for three years. Write a second reminder to their accounts manager, Mr. Oliver Grant: restate the facts precisely, ask for payment or a firm payment date, leave room for an explanation in case something lies behind the silence, and signal the next step if there is still no response — all while keeping the relationship intact. Write at least 100 words."
  promptZh: 客户 Farrow & Webb 尚未支付 6 月 18 日到期、金额 12,400 欧元的发票 INV-2077，至今已逾期三十天。十天前发出的第一封友好提醒没有得到回复——这很反常：该客户三年来一直按时付款。请给对方的财务经理 Oliver Grant 先生写第二封催款邮件：准确重述事实，要求付款或给出确定的付款日期，同时留出余地，询问沉默背后是否另有原因，并说明若仍无回应你们将采取的下一步——所有这些都要以维护双方关系为前提。不少于 100 词。
  minWords: 100
  suggestedMinutes: 15
  modelAnswer: |-
    Dear Mr. Grant,

    I am writing about invoice INV-2077 for 12,400 euros, which fell due on 18 June and remains unpaid. I sent a reminder on 8 July but have not heard back, so I wanted to follow up with you personally.

    I will be honest: the silence is what concerns me most. Farrow & Webb has settled every invoice on time for three years, which is exactly why I would rather ask than assume. If the invoice has gone astray, a copy is attached with our bank details. If anything on it is unclear or in dispute, tell me and we will sort it out quickly. And if cash flow is simply tight this quarter, I would much rather agree on a payment schedule than leave things unresolved.

    Could you either arrange payment or confirm a firm payment date by Friday 25 July? I should mention that if we have not heard from you by then, our standard process requires us to place new orders on hold — an outcome I am keen to avoid.

    Thank you, and I look forward to hearing from you.

    Kind regards,
    Shen Rui
    Finance Coordinator
  checklist:
    - en: Did you restate the facts precisely — invoice number, amount, due date, and the earlier reminder?
      zh: 是否准确重述了事实——发票号、金额、到期日和此前的提醒？
    - en: Did you acknowledge the client's good payment history instead of treating them as a bad payer?
      zh: 是否肯定了客户一贯良好的付款记录，而不是把对方当作恶意拖欠者？
    - en: Did you leave room for an explanation — a lost invoice, a dispute, or a cash-flow problem?
      zh: 是否留出了解释空间——发票遗失、存在争议或资金紧张？
    - en: Did you ask for payment or a firm payment date by a specific deadline?
      zh: 是否要求在明确期限前付款或给出确定的付款日期？
    - en: Did you state the next step calmly as standard process, without personal threats?
      zh: 是否把下一步平静地表述为公司的标准流程，而没有个人威胁的意味？
- id: biz-wr-009
  track: business
  taskType: business_report
  title: "Recommendation Report: Choosing a New Helpdesk Platform"
  titleZh: 建议报告：是否更换客服工单系统
  promptEn: "Your customer-support team has finished an eight-week trial of Zenith Desk, a new helpdesk platform, run alongside your current system. The results: average first-response time fell from 5.1 hours to 3.2 hours, and seven of the nine agents prefer the new tool; however, the subscription costs about 20% more per year, and the integration with your billing system failed twice during the trial. Write a recommendation report for your department head: summarise the background and the trial results, weigh the benefits against the costs and risks, and close with a clear recommendation and proposed next steps. Write at least 120 words."
  promptZh: 你的客服团队刚结束对新工单系统 Zenith Desk 为期八周的试用，试用期间与现有系统并行运行。结果显示：平均首次响应时间从 5.1 小时降至 3.2 小时，九名客服中有七人更喜欢新工具；但订阅费用每年高出约 20%，且与计费系统的集成在试用期间出过两次故障。请给部门负责人写一份建议报告：概述背景与试用结果，权衡收益与成本、风险，并以明确的建议和后续步骤收尾。不少于 120 词。
  minWords: 120
  suggestedMinutes: 20
  modelAnswer: |-
    Subject: Recommendation — Adoption of Zenith Desk for Customer Support

    Background
    Our current helpdesk contract expires on 30 September. From 20 April to 15 June we ran Zenith Desk in parallel with the existing system, with all nine agents handling half of their tickets in each tool.

    Trial results
    Average first-response time fell from 5.1 hours to 3.2 hours, largely thanks to Zenith's automatic routing and reply templates. Seven of the nine agents would prefer to keep the new tool, citing faster search and a cleaner interface. The end-of-week ticket backlog averaged 14% lower than in comparable weeks on the old system.

    Costs and risks
    The subscription is $21,600 per year, roughly 20% above what we pay today. More seriously, the integration with our billing system failed twice during the trial, each time requiring manual reconciliation. Zenith attributes both failures to an API version mismatch and has scheduled a fix for its August release.

    Recommendation
    I recommend we adopt Zenith Desk, on the condition that the August release passes a two-week retest of the billing integration. The response-time gain directly supports our service-level targets and, at current ticket volumes, is worth considerably more than the additional subscription cost.

    Next steps
    1. Retest the billing integration during the first two weeks of August — support operations.
    2. If the retest passes, sign a one-year (not three-year) agreement by 15 September to retain flexibility.
    3. Schedule agent training for the last week of September, before the current contract lapses.

    Xu Qiao
  checklist:
    - en: Did you structure the report with clear headings, ending in a decisive recommendation?
      zh: 报告是否结构清晰、层层递进，并以明确的建议收尾？
    - en: Did you present both the gains and the drawbacks with numbers, not impressions?
      zh: 是否用数字而非主观印象同时呈现了收益与不足？
    - en: Did you weigh the extra cost against a quantified benefit?
      zh: 是否将增加的成本与可量化的收益进行了权衡？
    - en: Did you tie the recommendation to a condition that manages the known risk?
      zh: 建议是否附带了管控已知风险的前提条件？
    - en: Does every next step have an owner and a date?
      zh: 每个后续步骤是否都有责任方和时间点？
- id: biz-wr-010
  track: business
  taskType: business_report
  title: "Quarterly Report: Engineering Hiring Update"
  titleZh: 季度报告：工程团队招聘进展
  promptEn: "Write the quarterly hiring update for your leadership team. The plan called for six new engineering hires this quarter; two have started. The funnel: 340 applications, 41 first interviews, 9 final rounds, 4 offers, 2 acceptances. Both declined offers were for the senior platform engineer role, and both candidates cited compensation below market. Average time-to-hire has grown from 38 to 52 days, mainly because interview feedback keeps arriving late. Cover: progress against target, the funnel figures, an analysis of the two bottlenecks, and what you propose or need from leadership. Write at least 120 words."
  promptZh: 请为管理层撰写本季度的招聘进展报告。原计划本季度为工程团队招聘六人，目前已入职两人。招聘漏斗数据：340 份简历、41 场初面、9 场终面、4 份 offer、2 人接受。被拒的两份 offer 均为高级平台工程师岗位，两位候选人都表示薪酬低于市场水平。平均招聘周期从 38 天延长至 52 天，主要原因是面试反馈总是迟迟不交。报告需涵盖：目标完成情况、漏斗数据、对两个瓶颈的分析，以及你的建议或需要管理层支持的事项。不少于 120 词。
  minWords: 120
  suggestedMinutes: 20
  modelAnswer: |-
    Subject: Engineering Hiring — Quarterly Update

    Progress against target
    The plan called for six engineering hires this quarter; two have started (one backend, one QA), and one further offer, for the data engineer role, is out with a decision expected this week. We are therefore at two of six, with a realistic path to three.

    Pipeline
    This quarter we processed 340 applications, held 41 first interviews and 9 final rounds, and made 4 offers, of which 2 were accepted. Top-of-funnel volume is healthy; conversion breaks down at the offer stage and in scheduling speed.

    Bottlenecks
    First, both declined offers were for the senior platform engineer role, and both candidates named compensation as the reason. The salary band for this role has not been reviewed since early last year, and recruiter benchmarks now place it roughly 12% below the market median.

    Second, average time-to-hire has grown from 38 to 52 days. The delay is internal: interview feedback that should arrive within two days is averaging six, and two strong candidates withdrew during the wait.

    Proposals and support needed
    1. Approve a market review of the senior platform engineer band before we re-open the search — decision needed by 8 August, or we lose the current shortlist.
    2. Back a 48-hour feedback rule: no new interviews are scheduled for anyone with feedback outstanding. I will report compliance monthly.
    3. Keep the target at six. With the two fixes above, we project reaching five by the end of next quarter and closing the gap the quarter after.

    Gao Yuan
  checklist:
    - en: Did you state progress against the original target honestly, right at the top?
      zh: 是否在开头就如实说明了与原定目标的差距？
    - en: Did you show the funnel stage by stage with real numbers?
      zh: 是否用真实数字逐级展示了招聘漏斗？
    - en: Did you diagnose each bottleneck with evidence, rather than assigning blame?
      zh: 对每个瓶颈的分析是否基于证据，而不是追究个人责任？
    - en: Is each request to leadership a specific decision with a deadline?
      zh: 向管理层提出的每项请求是否都是带期限的具体决策？
    - en: Did you close with a realistic forecast of what the proposed fixes will achieve?
      zh: 结尾是否对改进措施的效果给出了务实的预测？
