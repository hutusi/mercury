- id: ielts-wr-001
  track: ielts
  taskType: ielts_task1
  title: "Task 1: Remote Working in Three Countries"
  titleZh: 小作文：三国远程办公数据
  promptEn: The table below shows the percentage of employees who worked remotely at least three days per week in three countries in 2015, 2019 and 2023. In Canada, the figure was 8% in 2015, 12% in 2019 and 34% in 2023. In Japan, it was 3%, 5% and 18% in the same years, while in Germany it rose from 6% to 11% and then to 27%. Summarise the information by selecting and reporting the main features, and make comparisons where relevant. Write at least 150 words.
  promptZh: 下表显示了 2015、2019 和 2023 年三个国家每周至少远程办公三天的员工比例。加拿大三年的数据分别为 8%、12% 和 34%；日本同期为 3%、5% 和 18%；德国则从 6% 升至 11%，再升至 27%。请选择并报告主要特征来概述这些信息，并在相关之处进行比较。不少于 150 词。
  minWords: 150
  suggestedMinutes: 20
  modelAnswer: |-
    The table compares the proportion of employees in Canada, Japan and Germany who worked remotely for at least three days a week in 2015, 2019 and 2023.

    Overall, remote working became markedly more common in all three countries over the period, with by far the steepest growth occurring between 2019 and 2023. Canada recorded the highest figures throughout, while Japan consistently had the lowest.

    In 2015, working from home was relatively rare everywhere: only 8% of Canadian employees worked remotely three or more days a week, compared with 6% in Germany and just 3% in Japan. By 2019, these figures had risen only modestly, reaching 12%, 11% and 5% respectively — an increase of a few percentage points in each country.

    The following four years saw a dramatic acceleration. The Canadian share almost trebled to 34%, while the German figure rose two and a half times to 27%. Japan experienced the fastest relative growth of all, with its rate more than trebling from 5% to 18%, although this was still roughly half the Canadian level in 2023.

    In summary, although the three countries followed the same upward trend, clear differences in the overall level of remote working persisted throughout the period.
  checklist:
    - en: Did you write an overview paragraph stating the main trend without copying exact figures?
      zh: 是否写了概述段，指出总体趋势而不堆砌具体数字？
    - en: Did you compare the three countries with each other, not just describe each one separately?
      zh: 是否在三个国家之间进行了比较，而不是逐一孤立描述？
    - en: Did you select key figures (highest, lowest, biggest change) rather than listing every number?
      zh: 是否选取了关键数据（最高、最低、变化最大），而非罗列所有数字？
    - en: Did you use varied trend language (trebled, rose modestly, accelerated) and comparative structures?
      zh: 是否使用了多样的趋势表达（trebled、rose modestly、accelerated）和比较结构？
    - en: Did you avoid giving opinions or explanations for the data, as Task 1 requires?
      zh: 是否按小作文要求避免了对数据发表观点或解释原因？
- id: ielts-wr-002
  track: ielts
  taskType: ielts_task2
  title: "Task 2: Automation and the Future of Work"
  titleZh: 大作文：自动化与工作的未来
  promptEn: An increasing number of jobs are being performed by machines and artificial intelligence. Some people believe this will free workers to do more creative and rewarding work, while others fear it will lead to widespread unemployment and inequality. Discuss both these views and give your own opinion. Give reasons for your answer and include any relevant examples from your own knowledge or experience. Write at least 250 words.
  promptZh: 越来越多的工作正由机器和人工智能完成。一些人认为这将把劳动者解放出来，去从事更有创造性、更有价值的工作；另一些人则担心这会导致大规模失业和不平等。请讨论这两种观点并给出你自己的看法。请说明理由，并结合你自己的知识或经历举例。不少于 250 词。
  minWords: 250
  suggestedMinutes: 40
  modelAnswer: |-
    As machines and artificial intelligence take over a growing share of work, opinion is divided over whether this shift will liberate employees or impoverish them. In my view, both outcomes are possible, and which one prevails depends largely on how governments and companies manage the transition.

    Optimists argue that automation removes precisely the work people find least rewarding. Assembly-line tasks, data entry and routine document checking are repetitive and mentally exhausting, and handing them to machines allows humans to concentrate on judgement, creativity and personal service — areas where people still hold a clear advantage. History offers some support for this position: the spread of office computing eliminated typing pools, yet total employment rose as entirely new industries emerged. In banking, automated teller machines reduced the cost of running branches, and many staff moved into advisory roles rather than disappearing from the industry.

    Critics respond that this transition is far less comfortable than the statistics suggest. The factory worker whose job is taken by a robot is rarely the same person who is later hired to design software; retraining takes years, and older employees may never recover their previous income. There is also a distributional problem: the profits of automation flow mainly to the owners of the technology, so without intervention the gap between capital and ordinary wages is likely to widen.

    My own position is that both camps are partly right: automation will create wealth and destroy particular livelihoods at the same time. The decisive factor is policy. Where governments fund serious retraining and firms redeploy rather than simply dismiss staff, technology tends to raise the quality of work; where they do not, the pessimists' predictions come true. Machines set the possibilities, but people decide the outcome.
  checklist:
    - en: Did you address both views AND state your own opinion clearly, as the question demands?
      zh: 是否按题目要求讨论了双方观点并明确给出了自己的看法？
    - en: Does each body paragraph develop one main idea with an explanation and a concrete example?
      zh: 每个主体段是否只围绕一个中心论点展开，并配有解释和具体例子？
    - en: Did you use a range of cohesive devices (however, in my view, there is also) without overusing them?
      zh: 是否恰当使用了多样的衔接手段（however、in my view、there is also 等）而不滥用？
    - en: Did you paraphrase the question in your introduction instead of copying it word for word?
      zh: 开头段是否对题目进行了改写，而不是逐字照抄？
    - en: Does your conclusion follow logically from your arguments rather than introducing new ideas?
      zh: 结论是否由前文论证自然得出，而没有引入新的论点？
    - en: Is the essay at least 250 words, written in a consistently formal register?
      zh: 文章是否达到 250 词以上，并保持正式书面语体？
- id: ielts-wr-003
  track: ielts
  taskType: ielts_task2
  title: "Task 2: The Purpose of University Education"
  titleZh: 大作文：大学教育的目的
  promptEn: Some people think the main purpose of university education is to prepare individuals for employment, while others believe it has broader benefits for individuals and society. Discuss both these views and give your own opinion. Give reasons for your answer and include any relevant examples from your own knowledge or experience. Write at least 250 words.
  promptZh: 一些人认为大学教育的主要目的是为个人就业做准备，另一些人则认为它对个人和社会有更广泛的益处。请讨论这两种观点并给出你自己的看法。请说明理由，并结合你自己的知识或经历举例。不少于 250 词。
  minWords: 250
  suggestedMinutes: 40
  modelAnswer: |-
    Whether universities exist chiefly to supply the labour market or to serve wider goals is a long-running debate. While I accept that preparing graduates for work is an essential function, I believe the deeper value of higher education lies in benefits that cannot be measured by a first salary.

    Those who see universities as engines of employment have practical arguments on their side. Degrees are expensive, and most students enrol precisely because they expect better career prospects; it would be irresponsible for institutions to ignore this. Employers, too, depend on universities to produce the engineers, doctors, accountants and programmers a modern economy requires. From this perspective, courses with little connection to the job market can look like a luxury that students, and taxpayers, can no longer afford.

    However, reducing higher education to job training overlooks much of what it actually delivers. Universities teach people to evaluate evidence, tolerate opposing views and construct reasoned arguments — habits of mind that support democracy as much as employment. They also generate public goods that no single employer would pay for: basic scientific research, for instance, rarely produces immediate profit, yet it underpins the vaccines and technologies whole societies rely on. Moreover, in a labour market that changes rapidly, narrow vocational preparation can age badly, whereas the ability to keep learning does not.

    In my opinion, the two purposes are complementary rather than competing. A university that ignored employability would fail its students, but one that taught only marketable skills would fail society. The best institutions do both: they prepare graduates for their first job while equipping them for the fifty years of change that follow it.
  checklist:
    - en: Did you discuss both views fairly before giving your own position?
      zh: 在给出个人观点之前，是否公平地讨论了两种观点？
    - en: Is your opinion visible in the introduction and developed consistently through to the conclusion?
      zh: 你的观点是否在开头已经点明，并贯穿全文直至结论保持一致？
    - en: Did you support abstract claims with concrete examples (e.g. scientific research, changing job markets)?
      zh: 抽象论点是否有具体例子支撑（如基础科研、快速变化的就业市场）？
    - en: Did you use precise academic vocabulary (public goods, vocational, employability) accurately?
      zh: 是否准确使用了较精确的学术词汇（public goods、vocational、employability 等）？
    - en: Did you vary your sentence structures, mixing complex sentences with shorter emphatic ones?
      zh: 句式是否有变化，长难句与简短有力的句子是否交替使用？
