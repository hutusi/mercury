  titleZh: 会员评论：Fulton Works 共享办公空间
  genre: Online review
  passage: |-
    OfficeScout Reviews

    Fulton Works Coworking — Melbourne
    Rating: 3 out of 5 | Reviewed by Owen McCrae on 21 February

    My design studio rented two desks at Fulton Works for three months while our own office was being renovated, so we got to know the space as everyday members rather than casual visitors.

    There is plenty to like. The building is a converted textile mill with high ceilings and generous natural light, the desks are large, and every member gets a lockable storage cabinet. The location could not be better — two blocks from Central Station and surrounded by affordable lunch spots. The community events are genuinely useful, too. A contract-basics workshop in January answered questions we had been struggling with for months.

    Unfortunately, the daily experience does not quite live up to the beautiful photographs on the website. The open area becomes noisy after 10 a.m., and with only two phone booths for more than eighty members, I sometimes waited twenty minutes just to make a client call. Worse, the air conditioning broke down twice during the February heat wave. Management sent an apologetic email both times but provided no fans, and by mid-afternoon the studio was unbearable.

    The staff are friendly, and the front desk tells me three additional phone booths are planned for April. Until they are installed, though, I would recommend Fulton Works to individual freelancers rather than to a whole team.
