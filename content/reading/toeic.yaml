    HALVERTON DAILY TRIBUNE — 2 November

    Orino Kitchenware, the Halverton-based maker of cookware and small kitchen appliances, announced on Monday that Ingrid Halloran will become its chief executive officer on 1 January. She succeeds founder Paolo Orino, who is retiring after leading the company for thirty-two years.

    Ms. Halloran joins Orino from Fenwick Home Products, where she has served as vice president of international sales for the past six years and nearly doubled the company's overseas revenue. Earlier in her career, she spent eight years at an advertising agency, experience that former colleagues say sharpened her sense of how products should be presented to shoppers.

    In a statement released after the announcement, Ms. Halloran said her first priority will be expanding online sales, which currently account for only twelve percent of Orino's revenue. "Customers fell in love with our pans by picking them up in department stores," she said. "Now we have to earn that same trust on a screen."

    Mr. Orino, who started the business in his garage with a single cast-iron skillet, will remain on the board of directors and continue to advise the product design team. Industry analysts welcomed the appointment, and the company's share price rose four percent on Tuesday. Orino Kitchenware operates three factories in the region and employs about 1,100 people.
