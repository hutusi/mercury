- id: toeic-r-001
  track: toeic
  title: Delivery Delay Notice from Brightline Office Supplies
  titleZh: Brightline 办公用品公司的延迟发货通知
  genre: Email
  passage: |-
    From: Marina Kovacs, Account Manager, Brightline Office Supplies
    To: Daniel Cheng, Procurement Lead, Vantagra Solutions
    Subject: Delay to Order #58214
    Date: 12 March

    Dear Mr. Cheng,

    I am writing to inform you that part of your order #58214, placed on 3 March, will arrive later than scheduled. The forty ergonomic chairs are on track for delivery this Friday as originally planned. However, the twelve height-adjustable desks are temporarily out of stock because our manufacturer is dealing with a production backlog. The desks are now expected to reach your office on 26 March, ten days behind schedule.

    To compensate for the inconvenience, we would like to offer you a 15 percent discount on the desks as well as complimentary installation of all items, a service that normally costs $300. Alternatively, if the revised date does not suit your team, we can substitute a similar model from another supplier that could be delivered by 19 March, although that model is available only in white.

    Please let me know by Wednesday which option you prefer so that we can adjust the shipment accordingly. We appreciate your patience and value your continued business.

    Sincerely,
    Marina Kovacs
    Account Manager, Brightline Office Supplies
  suggestedMinutes: 7
  questions:
    - id: q1
      stem: Why did Ms. Kovacs write the email?
      options:
        - To confirm that a complete order will arrive on Friday
        - To explain a shipping delay and propose solutions
        - To promote a new line of office furniture
        - "To request payment for order #58214"
      correctIndex: 1
      explanationZh: 邮件开头明确写道 "I am writing to inform you that part of your order... will arrive later than scheduled"，随后提出折扣、免费安装、替换型号等补救方案，因此正确答案是“解释延迟并提出解决方案”。选项 A 具有迷惑性：周五按时到货的只有椅子，并非全部订单。
    - id: q2
      stem: According to the email, what is expected to happen on 26 March?
      options:
        - The ergonomic chairs will be delivered
        - The discount offer will expire
        - The height-adjustable desks will arrive
        - Mr. Cheng must choose one of the two options
      correctIndex: 2
      explanationZh: 原文说 "The desks are now expected to reach your office on 26 March"，即升降桌将于 3 月 26 日送达。椅子周五到货，回复期限是周三（Wednesday），这两个日期都是干扰项。
    - id: q3
      stem: What is indicated about the substitute desks from another supplier?
      options:
        - They cost 15 percent more than the original model
        - They require an extra $300 installation fee
        - They cannot be delivered before 26 March
        - They come in only one color
      correctIndex: 3
      explanationZh: 邮件提到替换型号 "is available only in white"，即只有白色一种颜色。它反而能提前在 3 月 19 日送达（排除 C）；15% 折扣和 $300 安装费说的是第一种补偿方案，与替换型号无关。
    - id: q4
      stem: The word "complimentary" in paragraph 2 is closest in meaning to
      options:
        - free of charge
        - highly praised
        - optional
        - professional
      correctIndex: 0
      explanationZh: complimentary 在此意为“免费赠送的”，后文 "a service that normally costs $300" 说明这项通常收费 $300 的安装服务此次不收费。注意不要与 complimentary 的另一词源含义“赞美的”（选项 B）混淆，商务语境中修饰服务时几乎总是指“免费”。
- id: toeic-r-002
  track: toeic
  title: "Memo: New Expense Reporting System"
  titleZh: 内部备忘录：启用新报销系统
  genre: Memo
  passage: |-
    MEMO

    To: All Staff
    From: Priya Raman, Director of Operations
    Date: 8 October
    Subject: Transition to the ClearPath Expense System

    Beginning Monday, 1 November, the company will replace paper expense forms with ClearPath, an online expense reporting tool. Employees will photograph their receipts with the ClearPath mobile application and submit claims directly from their phones or computers. Managers will receive automatic notifications and are expected to approve or return claims within three business days.

    The change should benefit everyone: reimbursements will be processed within one week of approval, compared with the current average of three weeks. The finance team will also gain accurate, real-time data on departmental spending, which will simplify quarterly budget reviews.

    To prepare staff for the transition, the finance team will hold two identical training sessions in Room 4B on 20 and 22 October. Each session lasts one hour and includes a live demonstration. Please register for one of the sessions on the company intranet no later than 15 October, as seating is limited to thirty people per session.

    During the transition period, paper forms will still be accepted until 30 November. After that date, only claims submitted through ClearPath will be processed. Questions may be directed to the finance help desk at extension 4501.
  suggestedMinutes: 6
  questions:
    - id: q1
      stem: What is the main purpose of the memo?
      options:
        - To announce changes to the company's travel budget
        - To remind managers to approve expense claims faster
        - To inform staff about a new procedure for expense claims
        - To report the results of a quarterly budget review
      correctIndex: 2
      explanationZh: 备忘录主旨是宣布公司将用 ClearPath 线上系统取代纸质报销单，并说明时间表和培训安排。选项 B 有迷惑性：经理需在三个工作日内审批只是新流程的一个细节，不是备忘录的目的；D 中的季度预算审查只是顺带提到的好处。
    - id: q2
      stem: What are employees asked to do by 15 October?
      options:
        - Sign up for a training session on the intranet
        - Submit their remaining paper expense forms
        - Download the ClearPath mobile application
        - Contact the finance help desk
      correctIndex: 0
      explanationZh: 原文要求 "Please register for one of the sessions on the company intranet no later than 15 October"，即 10 月 15 日前在内网报名培训。纸质表格截止日是 11 月 30 日，属于日期干扰项。
    - id: q3
      stem: According to the memo, how will reimbursement times change?
      options:
        - From one week to three business days
        - From three business days to one week
        - From one month to three weeks
        - From about three weeks to about one week
      correctIndex: 3
      explanationZh: 原文写道 "reimbursements will be processed within one week of approval, compared with the current average of three weeks"：报销到账时间将从平均三周缩短到一周。“三个工作日”是经理审批的时限，用来构造 A、B 两个干扰项。
    - id: q4
      stem: What can be inferred about expense claims submitted in December?
      options:
        - They will require approval from the Director of Operations
        - They must be submitted through ClearPath
        - They will be reimbursed within three weeks
        - They may still be filed using paper forms
      correctIndex: 1
      explanationZh: 备忘录说纸质表格只接受到 11 月 30 日，"After that date, only claims submitted through ClearPath will be processed"。因此 12 月的报销必须走 ClearPath 系统，选项 D 与原文直接矛盾。
- id: toeic-r-003
  track: toeic
  title: "Job Opening: Regional Sales Manager"
  titleZh: 招聘广告：区域销售经理
  genre: Advertisement
  passage: |-
    REGIONAL SALES MANAGER
    Meridian Beverage Group — Kuala Lumpur

    Meridian Beverage Group, one of the fastest-growing drinks distributors in Southeast Asia, is seeking an experienced Regional Sales Manager to lead its expansion in the Kuala Lumpur area.

    Responsibilities
    The successful candidate will manage a team of eight sales representatives, develop annual sales plans for the region, and negotiate supply contracts with supermarket chains, hotels, and restaurants. The position reports directly to the Director of Sales and requires a detailed performance report at the end of each month.

    Requirements
    Applicants must hold a bachelor's degree in business or a related field and have at least five years of sales experience, including a minimum of two years in a supervisory role. Fluency in English is essential, and proficiency in Malay is preferred. Because the role involves visiting clients across the region, candidates should be willing to travel up to three days per week.

    What We Offer
    We provide a competitive salary, performance-based bonuses, a company car, and comprehensive medical coverage. New managers will also complete a two-week orientation program at our Singapore headquarters before starting in Kuala Lumpur.

    To apply, send a resume and cover letter to careers@meridianbev.com by 31 August. Only shortlisted candidates will be contacted. Meridian Beverage Group is an equal opportunity employer.
  suggestedMinutes: 6
  questions:
    - id: q1
      stem: What is indicated about the Regional Sales Manager position?
      options:
        - It involves frequent travel within the region
        - It is based at the company's Singapore headquarters
        - It requires fluency in both English and Malay
        - It reports to the team of sales representatives
      correctIndex: 0
      explanationZh: 广告明确写道 "candidates should be willing to travel up to three days per week"，即每周最多出差三天，可见该职位需要频繁出差。工作地点在吉隆坡，新加坡只是入职培训地点（排除 B）；马来语是 preferred（优先）而非必需（排除 C）。
    - id: q2
      stem: According to the advertisement, what is a stated requirement for applicants?
      options:
        - A master's degree in business administration
        - Experience in the beverage industry
        - Willingness to relocate to Singapore
        - At least two years of supervisory experience
      correctIndex: 3
      explanationZh: 要求部分写明五年销售经验中须包含 "a minimum of two years in a supervisory role"，即至少两年管理经验。学历要求是学士（bachelor's degree）而非硕士；广告并未要求饮料行业背景，公司自身是饮料分销商，这是干扰信息。
    - id: q3
      stem: What will new managers do before starting work in Kuala Lumpur?
      options:
        - Negotiate their first supply contracts
        - Attend a two-week orientation program
        - Submit a monthly performance report
        - Meet the eight sales representatives
      correctIndex: 1
      explanationZh: 福利部分提到 "New managers will also complete a two-week orientation program at our Singapore headquarters before starting in Kuala Lumpur"，即入职前先在新加坡总部参加两周培训。月度报告和合同谈判是上岗后的日常职责，不是入职前的安排。
    - id: q4
      stem: The word "shortlisted" in the last paragraph is closest in meaning to
      options:
        - recently hired
        - briefly interviewed
        - selected for further consideration
        - placed on a waiting list
      correctIndex: 2
      explanationZh: shortlisted 指从全部申请人中“初选入围、进入下一轮”。"Only shortlisted candidates will be contacted" 意为只有进入下一轮筛选的候选人才会收到通知。选项 D “列入等候名单”形似但含义相反——waiting list 是暂未入选者。
- id: toeic-r-004
  track: toeic
  title: "Notice: Elevator Modernization at Harborview Tower"
  titleZh: 港景大厦电梯改造通知
  genre: Notice
  passage: |-
    NOTICE TO ALL TENANTS OF HARBORVIEW TOWER

    Beginning Monday, 4 August, the building's two passenger elevators will undergo scheduled modernization, one at a time. Work on the east elevator will start first and is expected to take approximately three weeks. The west elevator will remain in service during this period, though tenants should allow extra time during the morning and evening rush, when wait times may exceed ten minutes.

    The freight elevator will be reserved for contractors between 9:00 a.m. and 4:00 p.m. on weekdays. Deliveries requiring the freight elevator should therefore be scheduled before 9:00 a.m. or after 4:00 p.m. Tenants expecting large shipments during working hours are asked to notify the building office at least forty-eight hours in advance so that arrangements can be made.

    While the work is underway, the stairwells on both sides of the lobby will stay open, and tenants on lower floors are encouraged to use them. The modernization will bring faster, quieter cabs and a new destination-control system that groups passengers by floor, which is expected to cut average wait times by a third once both elevators return to service in late September.

    We apologize for the inconvenience and appreciate your patience.

    Building Management
  suggestedMinutes: 8
  questions:
    - id: q1
      stem: What is the main purpose of the notice?
      options:
        - To announce a change in building ownership
        - To inform tenants about upcoming elevator work
        - To advertise office space for rent
        - To explain new delivery company policies
      correctIndex: 1
      explanationZh: 首段开门见山："the building's two passenger elevators will undergo scheduled modernization"——通知租户电梯即将改造及相关安排。配送安排（选项 D）只是改造期间的附带说明，不是通知的主要目的。
    - id: q2
      stem: What are tenants asked to do before receiving large deliveries?
      options:
        - Use the west elevator instead
        - Schedule them on weekends only
        - Notify the building office two days ahead
        - Carry the items up the stairwells
      correctIndex: 2
      explanationZh: 原文要求 "notify the building office at least forty-eight hours in advance"，forty-eight hours 即两天，对应选项 C。楼梯（选项 D）是建议低楼层租户日常通行用的，与收货无关。
    - id: q3
      stem: According to the notice, what benefit will the modernization bring?
      options:
        - Lower monthly service fees
        - Additional freight elevators
        - A larger lobby area
        - Shorter average waiting times
      correctIndex: 3
      explanationZh: 末段说明新的目的地控制系统 "is expected to cut average wait times by a third"——平均等待时间将缩短三分之一。通知从头到尾没有提到费用、大堂面积或增加货梯。
    - id: q4
      stem: When are both elevators expected to be back in service?
      options:
        - In late September
        - In early August
        - Within three weeks
        - By the end of the year
      correctIndex: 0
      explanationZh: 原文写明 "once both elevators return to service in late September"。选项 C 有迷惑性：three weeks 只是东侧电梯第一阶段的工期，不是全部工程完工的时间。
- id: toeic-r-005
  track: toeic
  title: "Text-Message Chain: Early Airport Arrival"
  titleZh: 短信对话：客户提前抵达机场
  genre: Text-message chain
  passage: |-
    Priya Nair (2:05 p.m.)
    Jun, are you still at the Riverside branch? Mr. Alvarez's flight from Madrid landed forty minutes early — he's already at baggage claim.

    Jun Park (2:06 p.m.)
    I am. Wasn't the car service booked for 3:15?

    Priya Nair (2:08 p.m.)
    Yes, and they can't send anyone sooner — their nearest driver is stuck on the expressway. I don't want him standing at the curb for an hour.

    Jun Park (2:09 p.m.)
    Riverside is only ten minutes from the airport. I'll drive over and meet him outside Arrivals, Door 4.

    Priya Nair (2:10 p.m.)
    You're a lifesaver. I'll text you his mobile number right now.

    Jun Park (2:11 p.m.)
    Thanks. Should I take him to the hotel first, or straight to the office?

    Priya Nair (2:12 p.m.)
    Straight here, please. The laboratory tour starts at 3:30, and his hotel room won't be ready until four anyway.

    Jun Park (2:13 p.m.)
    Got it. Anything else?

    Priya Nair (2:14 p.m.)
    Just one thing — I'll cancel the 3:15 booking so we aren't billed for a no-show. See you both soon.
  suggestedMinutes: 6
  questions:
    - id: q1
      stem: What problem does Ms. Nair mention?
      options:
        - A hotel reservation was cancelled
        - A laboratory tour has been postponed
        - A visitor arrived earlier than scheduled
        - A driver went to the wrong terminal
      correctIndex: 2
      explanationZh: 2:05 的消息说 "Mr. Alvarez's flight from Madrid landed forty minutes early — he's already at baggage claim"——客户的航班提前四十分钟落地，而接机车 3:15 才到，这就是麻烦所在。实验室参观仍按 3:30 进行（排除 B）；司机是被堵在高速上，并非走错航站楼（排除 D）。
    - id: q2
      stem: At 2:10 p.m., what does Ms. Nair most likely mean when she writes, "You're a lifesaver"?
      options:
        - She is grateful that Mr. Park offered to help
        - She thinks Mr. Park drives very safely
        - She is worried about Mr. Park's schedule
        - She wants Mr. Park to call the car service
      correctIndex: 0
      explanationZh: 短语 "You're a lifesaver" 是口语中表达感激的固定说法，意为“你真是救星/帮了大忙”。上一条消息里 Jun 主动提出 "I'll drive over and meet him outside Arrivals"，Priya 因此如释重负地道谢。这类意图题切忌按字面把 lifesaver 理解成与安全、救援有关（排除 B、D）。
    - id: q3
      stem: What does Ms. Nair say she will do?
      options:
        - Pick up Mr. Alvarez herself
        - Postpone the laboratory tour
        - Reserve a different hotel room
        - Cancel a car booking
      correctIndex: 3
      explanationZh: 她在最后说 "I'll cancel the 3:15 booking so we aren't billed for a no-show"——取消原订的接机车，以免空车照样计费。去机场接人的是 Jun（排除 A），参观时间并未改动（排除 B），酒店只是房间四点才准备好，并没有换房（排除 C）。
    - id: q4
      stem: What is suggested about Mr. Alvarez?
      options:
        - He has visited the company before
        - He will go to the office before his hotel
        - He missed a connecting flight
        - He is traveling with several colleagues
      correctIndex: 1
      explanationZh: Priya 说 "Straight here, please. The laboratory tour starts at 3:30, and his hotel room won't be ready until four anyway"——先直接到公司参加参观，之后再去酒店入住。他的航班是提前到达而非误机（排除 C），对话中没有信息支持他来过公司或有同行者（排除 A、D）。
- id: toeic-r-006
  track: toeic
  title: Coreline Logistics to Open Automated Distribution Center
  titleZh: 文章：Coreline 物流将开设自动化配送中心
  genre: Article
  passage: |-
    GREENFIELD BUSINESS WEEKLY — 14 April

    Coreline Logistics will open its largest distribution center to date on the outskirts of Greenfield this September, the company announced at a press conference on Tuesday. The 40,000-square-meter facility, located next to the Route 9 interchange, will sort and ship goods for online retailers across the region.

    According to chief operations officer Sandra Yee, the site was chosen primarily for its access to major highways. "Eighty percent of our deliveries travel less than 200 kilometers," Ms. Yee explained. "Being fifteen minutes from the interchange means our trucks spend less time in city traffic and more time on the road."

    The center will rely heavily on automation. Robotic carts will move goods between storage shelves and packing stations, work that is done by hand at the company's older warehouses. Even so, Coreline expects to hire approximately 300 employees, including drivers, technicians who maintain the robotic equipment, and customer service staff. Recruitment will begin in June, and the company will hold a job fair at the Greenfield Community Center on 6 and 7 June.

    Local officials welcomed the announcement. Mayor Thomas Grady noted that the project is expected to generate over two million dollars in annual tax revenue, which the city plans to invest in road improvements around the new facility.
  suggestedMinutes: 7
  questions:
    - id: q1
      stem: What is the article mainly about?
      options:
        - A merger between two logistics companies
        - The planned opening of a distribution facility
        - Traffic problems near the Route 9 interchange
        - The results of a regional job fair
      correctIndex: 1
      explanationZh: 文章首句开门见山："Coreline Logistics will open its largest distribution center to date on the outskirts of Greenfield this September"——报道的是配送中心的开设计划。六月的招聘会（选项 D）只是其中一项安排，Route 9 路口只是选址细节，都不是文章主旨。
    - id: q2
      stem: According to the article, why was the Greenfield site chosen?
      options:
        - Land there is less expensive
        - The city offered tax reductions
        - Most of the company's employees live nearby
        - It is close to major highways
      correctIndex: 3
      explanationZh: 首席运营官 Sandra Yee 说明 "the site was chosen primarily for its access to major highways"，并解释卡车可以 "spend less time in city traffic and more time on the road"。市长提到的税收是项目建成后的收益，不是选址原因（排除 B）。
    - id: q3
      stem: What is suggested about Coreline's older warehouses?
      options:
        - Goods there are moved by hand
        - They will close in September
        - They are located outside the region
        - They employ mostly customer service staff
      correctIndex: 0
      explanationZh: 介绍自动化时文章写道，机器人推车承担的搬运工作 "is done by hand at the company's older warehouses"——可见旧仓库目前仍靠人工搬运货物。文章并未说旧仓库将关闭或搬迁（排除 B、C）。
    - id: q4
      stem: The word "generate" in the last paragraph is closest in meaning to
      options:
        - operate
        - distribute
        - produce
        - collect
      correctIndex: 2
      explanationZh: generate 在 "expected to generate over two million dollars in annual tax revenue" 中意为“产生、带来（收入）”，与 produce 最接近。collect（征收）有迷惑性：征税的是政府，而句子的主语是这个项目，说的是它能“创造”税收。
- id: toeic-r-007
  track: toeic
  title: "Guest Review: Grandmont Hotel and Conference Center"
  titleZh: 住客评论：Grandmont 酒店暨会议中心
  genre: Online review
  passage: |-
    TravelPoint Reviews

    Grandmont Hotel and Conference Center — Osaka
    Rating: 4 out of 5 | Reviewed by Claudia Benitez on 3 May

    I spent four nights at the Grandmont last month while attending a logistics conference in the hotel's convention wing, and I would recommend it to anyone traveling for work.

    The rooms are quiet and sensibly designed. Mine had a proper desk with an adjustable chair, plenty of power outlets, and the fastest hotel Internet I have used in years — I uploaded a fifteen-minute training video in seconds. Housekeeping was impeccable, and the front desk arranged a late checkout on my last day without any extra charge.

    Two things kept me from giving five stars. First, breakfast is not worth the price. The buffet costs thirty dollars but offers little variety; the cafe across the street serves a better meal for a third of the price. Second, although the hotel advertises an airport shuttle, it runs only once an hour and fills up quickly during conference season. I missed it twice and had to take a taxi.

    If you are attending an event in the convention wing, though, nothing beats taking an elevator straight down to the exhibition hall. I will most likely stay here again next year.
  suggestedMinutes: 6
  questions:
    - id: q1
      stem: What is suggested about Ms. Benitez?
      options:
        - She paid extra for a late checkout
        - She travels to Osaka every month
        - She works for the Grandmont Hotel
        - She attended an event held at the hotel
      correctIndex: 3
      explanationZh: 评论开头写道 "I spent four nights at the Grandmont last month while attending a logistics conference in the hotel's convention wing"——她参加的会议就设在这家酒店的会展区。延迟退房是前台免费安排的（"without any extra charge"，排除 A）；她计划明年再来，看不出每月都去大阪（排除 B）。
    - id: q2
      stem: What does Ms. Benitez praise about her room?
      options:
        - The view of the exhibition hall
        - The fast Internet connection
        - The complimentary breakfast
        - The size of the bathroom
      correctIndex: 1
      explanationZh: 谈到房间时她最称赞网络："the fastest hotel Internet I have used in years — I uploaded a fifteen-minute training video in seconds"。早餐恰恰是被批评的一项（"breakfast is not worth the price"），属于典型的反向干扰（排除 C）。
    - id: q3
      stem: According to the review, what is a problem with the airport shuttle?
      options:
        - It costs more than a taxi
        - It stops running in the evening
        - It does not run often enough
        - It leaves from the cafe across the street
      correctIndex: 2
      explanationZh: 她抱怨班车 "runs only once an hour and fills up quickly during conference season"——班次太少、还容易坐满，害她两次错过只能打车。打车是错过班车的后果，评论并没有比较两者的价格（排除 A）。
    - id: q4
      stem: The word "impeccable" in paragraph 2 is closest in meaning to
      options:
        - flawless
        - frequent
        - affordable
        - optional
      correctIndex: 0
      explanationZh: impeccable 意为“无可挑剔的”。"Housekeeping was impeccable" 是说客房清洁毫无瑕疵，与 flawless（完美无瑕）同义。这是评价服务的高频褒义词，与价格（affordable，选项 C）无关。
- id: toeic-r-008
  track: toeic
  title: "Web Page: MetroFleet Business Car-Sharing Plans"
  titleZh: 网页：MetroFleet 企业共享用车方案
  genre: Web page
  passage: |-
    https://www.metrofleet.com/business/plans

    METROFLEET FOR BUSINESS
    Vehicles when your team needs them — none when it does not

    MetroFleet gives companies access to a shared fleet of sedans, vans, and electric cars parked at more than ninety locations across the city, without the cost of owning a single vehicle. Employees reserve a car in the mobile app, unlock it with their staff badge, and every trip is billed automatically to one corporate account.

    Choose the plan that fits your team.

    STARTER — up to 10 drivers
    $99 per month plus $12 per hour of driving. Ideal for occasional client visits and deliveries.

    TEAM — up to 50 drivers
    $349 per month plus $9 per hour. Adds priority reservations and free cancellation up to one hour before pickup.

    ENTERPRISE — unlimited drivers
    Custom pricing. Adds dedicated vehicles kept exclusively for your company and a monthly usage report for your finance department.

    Every plan includes fuel, insurance, and parking at all MetroFleet locations, with no long-term contract required. Sign up before 30 September and your company's first month is free on any plan.

    Ready to leave your parking problems behind? Book a free demonstration with our business team at metrofleet.com/demo.
