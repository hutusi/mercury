  title: "Memo: Parking Permit Renewal and Carpool Program"
  titleZh: 内部备忘录：停车证续期与拼车计划
  genre: Memo
  passage: |-
    MEMO

    To: All Employees, Fairview Campus
    From: Renata Silva, Facilities Manager
    Date: 2 February
    Subject: Parking Permit Renewal and New Carpool Program

    All parking permits for the Fairview campus garage expire on 31 March. To renew, log in to the facilities portal, confirm your license plate number, and pay the annual fee of $180 no later than 15 March. Renewals completed after that date will incur a $25 late charge, and from 1 April vehicles without a valid permit will not be admitted to the garage.

    This year we are also introducing a carpool program. Groups of three or more employees who commute in one vehicle may register together, share a single permit fee, and park in the newly marked spaces on Level 1, closest to the lobby entrance. Carpool applications require the names and employee numbers of all members and are submitted through the same portal.

    Please note that the visitor lot beside Building C will be resurfaced during the first week of March. Visitors will be directed to Level 5 of the garage that week, so employees who normally park on Level 5 should expect fewer available spaces there.

    Direct questions about renewal to the facilities help desk at extension 2280. Questions about paying the fee through payroll deduction should go to Human Resources.
