    PACIFIC FOOD EXPO — EXHIBITOR INFORMATION
    Harborside Exhibition Center, 14-16 October

    The Pacific Food Expo brings together more than 300 producers, importers, and packaging suppliers with the buyers who stock the region's supermarkets, hotels, and restaurants. Last year's expo welcomed over 9,000 trade visitors across three days.

    Booth options
    STANDARD BOOTH (9 square meters) — $1,200. Includes a table, two chairs, a printed company sign, and an electrical outlet.
    CORNER BOOTH (9 square meters) — $1,500. Open on two sides for extra foot traffic; otherwise identical to the standard booth.

    Reservations open on 1 May. Exhibitors who reserve before 1 June receive a free listing in the printed show directory; after that date, a listing costs $150.

    Important requirements
    All exhibitors must upload a certificate of product liability insurance to their account page no later than 15 September. Booths without a certificate on file may still exhibit but will not be permitted to offer food samples. Refrigerated display cases can be rented for $95 for all three days; rental orders close on 30 September.

    Booth setup takes place on 13 October between 8:00 a.m. and 8:00 p.m. Delivery vehicles require a loading-dock pass, which can be downloaded from your account page.

    New this year, the Meet the Buyer program offers fifteen-minute appointments with purchasing managers from four supermarket chains. Appointment slots are limited and are assigned in the order in which booths are reserved — one more reason to book early.
