  questions:
    - id: q1
      stem: What is the main purpose of the memo?
      options:
        - To announce the closure of the campus garage
        - To report the results of a commuting survey
        - To explain parking permit renewal procedures
        - To introduce a new facilities manager
      correctIndex: 2
      explanationZh: 备忘录开篇即指出所有停车证 3 月 31 日到期，并说明续期步骤、费用和逾期后果，主体内容是停车证续期的流程安排，拼车计划是附带介绍的新政策。选项 A 与原文矛盾：车库并未关闭，只是无有效停车证的车辆自 4 月 1 日起不得进入。
    - id: q2
      stem: The word "incur" in paragraph 1 is closest in meaning to
      options:
        - become subject to
        - avoid
        - calculate
        - refund
      correctIndex: 0
      explanationZh: incur 意为“招致、承担（费用或后果）”。"Renewals completed after that date will incur a $25 late charge" 是说逾期续费将被加收 25 美元滞纳金，与 become subject to（需承担）最接近。incur 在 TOEIC 中几乎总与 cost、charge、fee、penalty 等搭配，方向是“产生费用”而非“免除费用”，据此可排除 avoid 和 refund。
    - id: q3
      stem: According to the memo, what is a benefit of joining the carpool program?
      options:
        - A free annual permit for each member
        - Access to the visitor lot beside Building C
        - Guaranteed admission after 1 April
        - Parking spaces close to the lobby entrance
      correctIndex: 3
      explanationZh: 原文说明拼车小组可以 "park in the newly marked spaces on Level 1, closest to the lobby entrance"，即使用离大堂入口最近的专属车位。选项 A 有迷惑性：拼车成员是"share a single permit fee"（分摊一份费用），并非人人免费；访客停车场与拼车计划无关。
    - id: q4
      stem: What is suggested about the first week of March?
      options:
        - The facilities portal will be unavailable
        - Parking spaces on Level 5 will be harder to find
        - Visitors will not be allowed on campus
        - Building C will be closed for resurfacing
      correctIndex: 1
      explanationZh: 备忘录提醒访客停车场翻修期间 "Visitors will be directed to Level 5 of the garage that week, so employees who normally park on Level 5 should expect fewer available spaces there"——访客车辆分流到五层，该层车位将更紧张。翻修的是楼旁的访客停车场（visitor lot），不是 Building C 本身，选项 D 偷换了对象。
