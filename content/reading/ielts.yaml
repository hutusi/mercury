      explanationZh: 第一段写道，出发前这种鸟 "nearly doubles its body weight in fat and shrinks its digestive organs, which it will not need in flight, to save weight"——增肥近一倍并缩小飞行中用不上的消化器官以减重。八九天是不进食的连续飞行时间，而非进食（排除 C）；跟随轻型飞机的是人工繁育的美洲鹤（排除 D）。
