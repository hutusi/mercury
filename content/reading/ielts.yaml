        - From studying the skin to studying only the gut
      correctIndex: 0
      explanationZh: 首段说医学过去主要把微生物视为威胁、想用消毒剂和抗生素清除，如今 "giving way to a more nuanced view, in which many of these residents are recognised as essential partners"——转向承认许多微生物是不可或缺的伙伴，故 A 正确。选项 B 把方向搞反了（过去才想清除，如今才认识到其价值）。
    - id: q2
      stem: According to the passage, gut bacteria help the body by
      options:
        - replacing the body's own cells
