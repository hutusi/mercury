  title: Life Without Sunlight
  titleZh: 没有阳光的生命
  genre: Academic
  passage: |-
    The deep ocean — the world below about two hundred metres, where sunlight fails — is the largest living space on Earth, yet it remains less thoroughly mapped than the surface of Mars. For most of scientific history, biologists assumed that the sea floor was a cold, dark desert, sparsely populated because all life ultimately depends on energy from the sun. A single discovery in 1977 overturned that belief.

    Exploring a volcanic ridge near the Galápagos Islands in a small submersible, scientists found cracks in the sea floor gushing water heated by the magma below. Clustered around these hydrothermal vents was an astonishing community of life: metre-long tube worms, ghostly crabs, and dense mats of bacteria, thriving in total darkness. The bacteria, it turned out, were the foundation of the whole system. Rather than using sunlight, they extract energy from the chemicals dissolved in the venting water, particularly hydrogen sulphide — a process known as chemosynthesis. Here was an entire ecosystem powered not by the sun but by the heat of the planet itself.

    The finding transformed several fields at once. It widened the range of conditions under which life is thought possible, encouraging astrobiologists to look more seriously at the ice-covered oceans of moons such as Europa. It also drew commercial attention, because the mineral-rich chimneys that vents build up are laden with copper, zinc, and other metals in growing demand.

    That interest now poses a dilemma. Mining companies have obtained licences to explore parts of the deep sea floor, arguing that its metals are needed for batteries and wind turbines. Marine scientists counter that we understand these ecosystems too poorly to disturb them safely; many vent species are found nowhere else, and the animals of the deep, living in cold and dark, tend to grow and reproduce with extraordinary slowness, so damage could take centuries to heal.
