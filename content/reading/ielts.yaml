      correctIndex: 2
      explanationZh: 第二段解释，这些细菌 "extract energy from the chemicals dissolved in the venting water, particularly hydrogen sulphide"——从喷口水中溶解的化学物质（尤其是硫化氢）获取能量，即化能合成。深海无阳光可用（排除 A）；管虫、螃蟹反而依赖细菌构成的食物基础（排除 B）；热量是水被加热的原因，并非细菌的能量来源（排除 D）。
    - id: q3
      stem: Why did the discovery interest astrobiologists?
      options:
