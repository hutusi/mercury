        - That it was warmer than the surface of the ocean
      correctIndex: 1
      explanationZh: 第一段说，长期以来生物学家假设海底是 "a cold, dark desert, sparsely populated because all life ultimately depends on energy from the sun"——因一切生命最终依赖阳光，海底应是荒芜之地。靠化学能维持的丰富生命恰恰是 1977 年才推翻旧观点的发现（排除 A）；金属与温度并非当时的核心认知（排除 C、D）。
    - id: q2
      stem: How do the bacteria around hydrothermal vents obtain energy?
      options:
