      explanationZh: 第三段说小鼠实验 "suggest that altering the microbiome can change behaviour"，但研究者谨慎地区分动物结果与人体结论，指出关于人的证据 "still preliminary and much harder to interpret"——尚属初步、更难解读。故并未在人身上得到确证（排除 A）；小鼠实验恰恰显示细菌能影响行为（与 D 相反）。
    - id: q4
      stem: The word "foster" in the final paragraph is closest in meaning to
      options:
        - encourage
