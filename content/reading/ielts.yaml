- id: ielts-r-009
  track: ielts
  title: Storing the Sun and Wind
  titleZh: 储存太阳与风
  genre: Academic
  passage: |-
    Wind turbines and solar panels have become dramatically cheaper over the past two decades, and in many countries they now generate electricity more cheaply than coal or gas. Yet a stubborn problem stands between these technologies and a fully renewable grid: the sun sets and the wind drops, often when demand is highest. A power system built on renewables must therefore be able to store energy on a vast scale, releasing it hours — or even days — after it was captured.

    The oldest and still the largest solution is pumped hydroelectric storage. When electricity is plentiful, it drives pumps that lift water into a high reservoir; when demand rises, the water is released back down through turbines. The method is remarkably efficient, returning about eighty per cent of the energy put in, but it requires two large reservoirs at different heights, and suitable mountain sites are limited and often far from cities.

    Lithium-ion batteries, the same chemistry that powers phones and electric cars, have filled part of the gap. Their cost has fallen by roughly ninety per cent since 2010, and enormous battery installations can now smooth out the daily peaks and troughs of a grid. Their weakness is duration: most discharge fully within a few hours, making them ill-suited to the long, still, overcast weeks that can occur in winter.

    For that longer challenge, researchers are pursuing alternatives. Surplus electricity can split water into hydrogen, which stores well but wastes much of the original energy when converted back. Others are testing flow batteries, molten salt, and even towers of stacked concrete blocks raised and lowered by cranes. None is yet cheap enough to dominate. The consensus among engineers is that no single technology will win outright; instead, a future grid will layer several methods, each matched to the timescale it serves best.
  suggestedMinutes: 10
