        - It revealed new metals that could fuel spacecraft
        - It suggested the sun is unnecessary for life on Earth's surface
        - It showed that life can survive in a wider range of conditions than assumed
      correctIndex: 3
      explanationZh: 第三段说这一发现 "widened the range of conditions under which life is thought possible"，促使天体生物学家更认真地考察木卫二等冰封海洋。它只是"鼓励研究"，并未"证明"欧罗巴上存在生命（排除 A）；金属吸引的是采矿业，而非用作航天燃料（排除 B）。
    - id: q4
      stem: The word "laden" in paragraph 3 is closest in meaning to
      options:
        - loaded
