        - Economic theory has been completely abandoned by psychologists
        - Shoppers should never be offered free samples
        - More choice does not always benefit people, contrary to standard economic theory
      correctIndex: 3
      explanationZh: 首段指出传统经济学假设 "more choice is always better"，而心理学证据表明 "this comfortable assumption often fails"，全文围绕"选择过载"展开，故 D 最贴切。选项 A 过于绝对——文中说选择过多只在特定条件下才有害，并非越少越好；心理学是修正而非"彻底抛弃"经济学（排除 B）。
    - id: q2
