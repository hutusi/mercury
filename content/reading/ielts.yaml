- id: ielts-r-001
  track: ielts
  title: The Quiet Work of Urban Green Spaces
  titleZh: 城市绿地的无声贡献
  genre: Academic
  passage: |-
    More than half of the world's population now lives in cities, and the proportion continues to rise. For much of the twentieth century, urban parks, street trees, and community gardens were treated primarily as decoration — pleasant to look at, but peripheral to the serious business of housing, transport, and commerce. A growing body of research suggests that this view badly underestimates what green spaces actually do for cities and their residents.

    The health evidence is perhaps the most striking. Numerous studies have linked proximity to green space with lower stress levels, reduced rates of obesity, and better cardiovascular outcomes. One influential Danish study, which tracked nearly one million residents over several decades, found that children who grew up surrounded by vegetation had a significantly lower risk of developing psychiatric disorders in adulthood, even after the researchers adjusted for family income and history of mental illness. The mechanisms are still debated, but candidate explanations include cleaner air, more opportunities for physical activity, and the restorative effect that natural settings appear to have on attention.

    Green spaces also perform measurable environmental work. Cities are typically several degrees warmer than the surrounding countryside — the so-called urban heat island effect — because concrete and asphalt absorb and store solar radiation. Trees counteract this in two ways: their canopies block sunlight from reaching hard surfaces, and their leaves release water vapour through evapotranspiration, which cools the surrounding air much as perspiration cools the human body. Parks can be two to four degrees cooler than nearby built-up districts, and vegetated ground absorbs stormwater that would otherwise overwhelm drainage systems.

    Yet the benefits of greenery are not evenly shared. Wealthier neighbourhoods tend to have more trees and better-maintained parks, and ambitious new projects can trigger what critics call green gentrification: an attractive park raises nearby property values, and rising rents gradually displace the very residents the project was intended to serve. Partly for this reason, some planners now favour many small, modest pocket parks distributed across a city over a single flagship development.
  suggestedMinutes: 10
  questions:
    - id: q1
      stem: What is the main idea of the passage?
      options:
        - Urban parks are too expensive for most cities to maintain properly
        - Cities should replace flagship parks with community gardens
        - Green spaces provide substantial health and environmental benefits, though their distribution raises concerns
        - The urban heat island effect is the most serious problem facing modern cities
      correctIndex: 2
      explanationZh: 文章先指出绿地长期被视为“装饰”，随后用两段分别论证其健康效益和环境效益，最后一段讨论分配不均与“绿色士绅化”问题，因此 C 最全面地概括了主旨。选项 D 只对应第三段的一个细节，属于以偏概全。
    - id: q2
      stem: What did the Danish study mentioned in paragraph 2 find?
      options:
        - Cleaner air was the main cause of better mental health in cities
        - Children raised near vegetation were less likely to develop psychiatric disorders later in life
        - Family income had no effect on children's health outcomes
        - Adults who moved to green neighbourhoods recovered faster from stress
      correctIndex: 1
      explanationZh: 原文写道，该研究发现 "children who grew up surrounded by vegetation had a significantly lower risk of developing psychiatric disorders in adulthood"。选项 A 有迷惑性：cleaner air 只是文中列举的候选解释之一，且原文明确说机制 "are still debated"（尚有争议），并未确认主因。
    - id: q3
      stem: According to the passage, one way trees cool a city is by
      options:
        - releasing water vapour from their leaves
        - absorbing solar radiation into their trunks
        - reflecting sunlight back into the atmosphere
        - channelling stormwater into drainage systems
      correctIndex: 0
      explanationZh: 第三段指出树木降温的两种方式：树冠遮挡阳光，以及 "their leaves release water vapour through evapotranspiration"（叶片通过蒸腾作用释放水汽）。“吸收太阳辐射”是混凝土和沥青致热的原因，方向正好相反；雨水吸收是绿地的另一功能，与降温无关。
    - id: q4
      stem: The word "displace" in the final paragraph is closest in meaning to
      options:
        - disappoint
        - impoverish
        - replace with newcomers
        - force to move away
      correctIndex: 3
      explanationZh: displace 在此指“迫使（原居民）迁离”：新公园推高房价和租金，原本应受益的居民反而被迫搬走。选项 C 描述的是结果之一（新住户迁入），但 displace 本身强调的是“被迫离开”这一动作。
    - id: q5
      stem: Why do some planners now prefer pocket parks, according to the passage?
      options:
        - They cost less to build than large parks
        - They spread the benefits of greenery while limiting gentrification pressure
        - They are more effective at absorbing stormwater
        - They attract more visitors than flagship developments
      correctIndex: 1
      explanationZh: 最后一段用 "Partly for this reason" 衔接：正因为大型旗舰项目容易引发绿色士绅化，规划者才转向分散在全城的小型口袋公园，让效益更均匀且不至于大幅推高某一片区的房价。文中并未比较建造成本或访客数量，A、D 属于无中生有。
- id: ielts-r-002
  track: ielts
  title: The Open-Plan Office Paradox
  titleZh: 开放式办公室的悖论
  genre: Academic
  passage: |-
    Few features of the modern workplace have been adopted as enthusiastically, or questioned as persistently, as the open-plan office. By removing walls and private rooms, employers hoped to encourage spontaneous conversation, speed up decision-making, and foster a culture of transparency — all while housing more employees in less space. Today, a large majority of office workers in North America and Europe sit in some form of open layout. The assumption underlying this design is intuitive: if people can see each other, they will talk to each other.

    A well-known study by Ethan Bernstein and Stephen Turban, published in 2018, put this assumption to an unusually rigorous test. Rather than asking employees how they communicated, the researchers equipped staff at two multinational companies with wearable sensors that recorded face-to-face interaction before and after their offices were converted to open plans. The results were the opposite of what the designs promised: face-to-face interaction fell by roughly seventy per cent, while email and instant messaging rose sharply. Stripped of privacy, employees appeared to withdraw, protecting their concentration behind headphones and screens rather than engaging with the colleagues now visible all around them.

    Psychologists offer several explanations for this retreat. Constant background noise makes complex work more effortful, and the sense of being observed — what researchers call the audience effect — discourages the informal, half-formed conversations in which new ideas often begin. Signalling unavailability becomes a survival skill: wearing headphones in an open office is now widely understood to mean do not disturb.

    Importantly, the research does not amount to a call for a return to private offices. Bernstein himself argues that the lesson is subtler: organisations should measure how employees actually behave rather than assume that a fashionable layout will produce the intended behaviour. Many firms are now experimenting with activity-based working, in which staff move between quiet zones, collaboration areas, and meeting rooms depending on the task at hand — an acknowledgement that no single environment suits every kind of work.
  suggestedMinutes: 10
  questions:
    - id: q1
      stem: What is the passage mainly about?
      options:
        - The history of office architecture in North America and Europe
        - Why companies should return to private offices
        - Techniques employees use to avoid distraction at work
        - Evidence that open-plan offices can reduce the interaction they were meant to promote
      correctIndex: 3
      explanationZh: 全文围绕一个悖论展开：开放式办公室本为促进交流而设计，但 Bernstein 与 Turban 的研究发现面对面交流反而减少约七成。选项 B 与末段直接矛盾——作者明确说这项研究 "does not amount to a call for a return to private offices"。
    - id: q2
      stem: How did Bernstein and Turban collect their data?
      options:
        - By recording interactions with wearable sensors
        - By interviewing employees about their communication habits
        - By comparing productivity figures at two companies
        - By analysing the content of employees' emails
      correctIndex: 0
      explanationZh: 原文强调研究方法的严谨之处正在于 "Rather than asking employees how they communicated, the researchers equipped staff... with wearable sensors"——不是靠访谈（排除 B），而是用可穿戴传感器客观记录面对面交流。文中提到邮件数量上升，但并未分析邮件内容（排除 D）。
    - id: q3
      stem: According to the study, what happened after the offices became open plan?
      options:
        - Decision-making became noticeably faster
        - Electronic communication increased sharply
        - Employees held more informal conversations
        - Staff spent less time wearing headphones
      correctIndex: 1
      explanationZh: 研究结果是面对面交流下降约 70%，而 "email and instant messaging rose sharply"，即电子沟通大幅增加。选项 A 是开放式布局的设计初衷而非实际结果；C、D 与文中描述的“戴上耳机、回避交谈”正好相反。
    - id: q4
      stem: The word "withdraw" in paragraph 2 is closest in meaning to
      options:
        - resign from their positions
        - remove their belongings
        - retreat from social contact
        - take back their complaints
      correctIndex: 2
      explanationZh: withdraw 在此指员工在失去隐私后“退缩、回避社交接触”，后文 "protecting their concentration behind headphones and screens" 是对这种退缩的具体描写。选项 A 利用了 withdraw 可以表示“退出（职位）”的另一义项，但语境不符。
    - id: q5
      stem: What lesson does Bernstein draw from the research, according to the final paragraph?
      options:
        - Quiet zones are more productive than collaboration areas
        - Fashionable office designs always fail in practice
        - Companies should let employees work from home instead
        - Organisations should observe actual behaviour rather than assume a layout will work as intended
      correctIndex: 3
      explanationZh: 末段直接引述 Bernstein 的观点："organisations should measure how employees actually behave rather than assume that a fashionable layout will produce the intended behaviour"。选项 B 过于绝对——作者并未说时髦设计“总是”失败；文中根本没有讨论居家办公（排除 C）。
- id: ielts-r-003
  track: ielts
  title: The Architecture of Sleep
  titleZh: 睡眠的结构
  genre: Academic
  passage: |-
    Most people picture sleep as a single, uniform state — a switch that turns off at night and back on in the morning. Recordings of the brain's electrical activity, first made systematically in the 1950s, revealed something far more organised. A night of sleep is a series of cycles, each lasting roughly ninety minutes, in which the brain moves through several distinct stages before briefly surfacing and beginning again.

    The early cycles of the night are dominated by deep, slow-wave sleep. During these hours the body carries out most of its physical repair: tissues are rebuilt and growth hormone is released. The brain, meanwhile, is busy filing the day away. Neuroscientists have observed the hippocampus — a region essential for forming new memories — replaying patterns of activity recorded during the day, apparently transferring fragile new memories into more permanent storage.

    Towards morning, the balance shifts to rapid eye movement, or REM, sleep, when most vivid dreaming occurs. REM sleep appears central to emotional regulation: volunteers deprived of it react more strongly to unpleasant images the following day, while retaining the memory of the events themselves. Some researchers describe REM as "overnight therapy" — the brain revisits difficult experiences with the emotional charge turned down.

    The cycle structure has practical consequences. Because REM is concentrated in the final cycles, an alarm that shortens sleep by an hour does not trim each stage equally; it removes a disproportionate share of REM. Waking from deep sleep instead produces "sleep inertia", the heavy grogginess that can take half an hour to clear. This is why sleep researchers often suggest naps of either twenty minutes — ending before deep sleep begins — or a full ninety-minute cycle.

    None of this means everyone needs an identical routine. Cycle length and the preferred timing of sleep vary between individuals, and researchers caution that consumer sleep-tracking apps estimate stages only indirectly, sometimes with considerable error. The architecture of sleep is universal; the schedule built on it is not.
  suggestedMinutes: 10
  questions:
    - id: q1
      stem: What is the main purpose of the passage?
      options:
        - To argue that people should sleep for longer
        - To compare human sleep with that of other animals
        - To describe how sleep is structured and why that structure matters
        - To promote the use of sleep-tracking technology
      correctIndex: 2
      explanationZh: 文章先介绍睡眠以约九十分钟为周期的结构，再分述深睡与 REM 各自的功能，最后讨论其对闹钟、小睡等日常安排的实际影响，对应选项 C。文章结尾对睡眠追踪应用持保留态度，与选项 D 相反。
    - id: q2
      stem: According to the passage, during slow-wave sleep the hippocampus
      options:
        - replays daytime activity patterns to secure new memories
        - releases growth hormone into the body
        - switches off almost completely
        - produces the night's most vivid dreams
      correctIndex: 0
      explanationZh: 第二段写道，海马体 "replaying patterns of activity recorded during the day, apparently transferring fragile new memories into more permanent storage"。生长激素的释放属于身体修复，并非海马体的活动（排除 B）；生动的梦发生在 REM 阶段（排除 D）。
    - id: q3
      stem: The phrase "overnight therapy" in paragraph 3 refers to
      options:
        - the body's physical repair during deep sleep
        - REM sleep weakening the emotional charge of experiences
        - the use of daytime naps to recover from stress
        - professional treatment offered at sleep clinics
      correctIndex: 1
      explanationZh: 引号内的说法紧跟解释："the brain revisits difficult experiences with the emotional charge turned down"——REM 睡眠让大脑以降低的情绪强度重温不快经历，故选 B。身体修复对应的是深睡阶段（排除 A）。
    - id: q4
      stem: The word "trim" in paragraph 4 is closest in meaning to
      options:
        - decorate
        - measure
        - divide
        - reduce
      correctIndex: 3
      explanationZh: 上下文说闹钟提前一小时叫醒 "does not trim each stage equally; it removes a disproportionate share of REM"——各阶段不是被均等地“削减”，其中 removes 一词提示 trim 在此意为“减少”。trim 的“装饰”义（选项 A）与语境不符。
    - id: q5
      stem: What does the writer say about consumer sleep-tracking apps?
      options:
        - Their stage estimates are indirect and can be inaccurate
        - They have proved that sleep cycles are universal
        - They help users obtain more REM sleep
        - They are unsuitable for people with irregular schedules
      correctIndex: 0
      explanationZh: 末段指出这类应用 "estimate stages only indirectly, sometimes with considerable error"，即测算是间接的、可能有相当误差。“睡眠结构具有普遍性”是作者自己的结论，并非应用所证明（排除 B）。
- id: ielts-r-004
  track: ielts
  title: The Bilingual Brain
  titleZh: 双语者的大脑
  genre: Academic
  passage: |-
    For much of the twentieth century, raising a child with two languages was widely regarded as a mistake. Teachers and even doctors warned parents that a second language would overload young minds, confusing children and delaying their progress at school. Families who moved abroad were routinely advised to abandon their mother tongue at home. Research over the past few decades has not merely softened this view; it has overturned it.

    The key insight is that a bilingual brain is never truly "switched off". Brain-imaging studies show that when a bilingual person speaks, both languages remain active, and the one not in use must be continuously suppressed. This constant management appears to act as a form of mental exercise. In laboratory tasks, bilinguals are often faster at switching between rules and better at ignoring irrelevant information — a set of abilities psychologists call executive control, which supports everything from planning a project to resisting distraction.

    The most striking claims concern ageing. In a series of studies in Toronto, the psychologist Ellen Bialystok found that lifelong bilinguals were diagnosed with dementia on average four to five years later than comparable monolinguals, even after education, income, and occupation were taken into account. Bilingualism does not prevent the disease. Brain scans suggest that bilingual patients carry a similar amount of physical damage; rather, their brains appear to cope with that damage for longer, a phenomenon researchers call cognitive reserve.

    The picture is not entirely settled. Several recent large-scale studies have failed to reproduce the laboratory advantage in executive control, and some researchers argue that early positive results were simply more likely to be published than negative ones. Others suggest the benefits depend less on knowing two languages than on how often a speaker actually switches between them. What no one now seriously argues, however, is the old idea that a second language harms the developing mind.
  suggestedMinutes: 10
  questions:
    - id: q1
      stem: What is the main idea of the passage?
      options:
        - Children should be taught a second language as early as possible
        - Bilingualism prevents dementia in old age
        - Research suggests bilingualism brings cognitive benefits, though some findings remain debated
        - Laboratory studies of bilingual people are usually unreliable
      correctIndex: 2
      explanationZh: 第一段结尾指出研究 "has not merely softened this view; it has overturned it"，第二、三段分别介绍执行控制与认知储备两类益处，末段又坦承 "The picture is not entirely settled"，因此 C 概括最准确。选项 B 过于绝对——原文明确说 "Bilingualism does not prevent the disease"（双语并不能预防疾病）。
    - id: q2
      stem: What did the Toronto studies find about lifelong bilinguals?
      options:
        - They were diagnosed with dementia several years later than monolinguals
        - They showed less physical brain damage than monolinguals
        - They had higher levels of education and income
        - They recovered from dementia more quickly
      correctIndex: 0
      explanationZh: 原文写道，双语者 "were diagnosed with dementia on average four to five years later than comparable monolinguals"，即确诊平均晚四到五年。选项 B 有迷惑性——脑部扫描显示双语患者 "carry a similar amount of physical damage"，生理损伤程度相近，只是大脑应对损伤的时间更长。
    - id: q3
      stem: The word "overturned" in paragraph 1 is closest in meaning to
      options:
        - examined
        - confirmed
        - repeated
        - reversed
      correctIndex: 3
      explanationZh: 前半句 "has not merely softened this view" 说明研究的作用不止是“缓和”旧观点，而是将其彻底推翻，故 overturned 意为 reversed（逆转、颠覆）。选项 B（confirmed，证实）方向恰好相反，属于反向干扰。
    - id: q4
      stem: What do some researchers suggest about the benefits of bilingualism?
      options:
        - They appear only in young children
        - They may depend on how often speakers actually switch between languages
        - They have been exaggerated by journalists
        - They disappear after retirement
      correctIndex: 1
      explanationZh: 末段提到，有研究者认为 "the benefits depend less on knowing two languages than on how often a speaker actually switches between them"——关键或许不在于会两门语言，而在于切换的频率。选项 C 偷换了对象——原文说的是阳性结果更容易被发表（发表偏倚），并未指责记者夸大。
- id: ielts-r-005
  track: ielts
  title: The Box That Changed World Trade
  titleZh: 改变世界贸易的集装箱
  genre: Academic
  passage: |-
    Before the mid-1950s, moving goods by sea had changed little since the age of sail. Cargo arrived at the docks in barrels, sacks, and wooden crates, and gangs of workers carried each item into the ship's hold by hand. Loading a single vessel could take a week or more, theft was rampant, and ships often spent longer tied up in port than they did at sea. Shipping was so slow and expensive that most manufacturers simply sold their goods close to home.

    The man who changed this was not a shipping magnate but an American trucking entrepreneur named Malcom McLean. Frustrated by the days his lorries wasted waiting at the docks, he asked a simple question — why unload the cargo at all? In April 1956, a converted tanker called the Ideal X sailed from Newark to Houston carrying fifty-eight sealed metal boxes lifted straight from trucks onto the ship. McLean's real innovation, historians stress, was not the box itself — metal containers had existed for decades — but the system built around it: ships, cranes, lorries, and ports all redesigned to handle one standard unit.

    The economic effects were dramatic. By one estimate, the cost of loading a ship fell from nearly six dollars a ton to just sixteen cents. Ports that embraced the container, such as Felixstowe in England, grew from obscurity into major hubs, while famous old docks like central London's, unsuited to the giant cranes, fell silent within a generation. Cheap, reliable transport also made it practical to assemble a single product from parts made in many different countries — the foundation of today's global supply chains.

    Perhaps the most useful lesson lies in why the container took a further decade to spread worldwide. The technology was trivially simple; the hard part was persuading competing companies and countries to agree on standard sizes and fittings. The container reshaped the world economy not because it was clever, but because everyone finally agreed to use the same one.
  suggestedMinutes: 10
  questions:
    - id: q1
      stem: What is the main purpose of the passage?
      options:
        - To describe the life and career of Malcom McLean
        - To explain how the shipping container transformed world trade
        - To argue that modern supply chains are too fragile
        - To compare ports in England and the United States
      correctIndex: 1
      explanationZh: 文章从集装箱出现前航运的低效讲起，继而介绍 McLean 的创新、装卸成本骤降与港口兴衰，最后落在标准化的启示上，主线是集装箱如何改变世界贸易。McLean 的经历只是第二段的引子，选项 A 以偏概全；文中并未评价供应链是否脆弱（排除 C）。
    - id: q2
      stem: According to the passage, what was McLean's real innovation?
      options:
        - Inventing the first metal shipping container
        - Converting oil tankers into passenger ships
        - Reducing theft at the docks
        - Creating a whole transport system around a standard box
      correctIndex: 3
      explanationZh: 原文特别强调："McLean's real innovation, historians stress, was not the box itself — metal containers had existed for decades — but the system built around it"。选项 A 恰好被这句话直接否定——金属箱早已存在几十年，他的创新是让船、起重机、卡车和港口都围绕同一标准单元重新设计。
    - id: q3
      stem: Why did central London's docks decline, according to the passage?
      options:
        - They could not accommodate the equipment container ships required
        - Theft there had become uncontrollable
        - Manufacturers moved their factories to Felixstowe
        - The government closed them to build housing
      correctIndex: 0
      explanationZh: 第三段写道，伦敦市中心的老码头 "unsuited to the giant cranes, fell silent within a generation"——容纳不下集装箱作业所需的巨型起重机，一代人之内便沉寂了。Felixstowe 是拥抱集装箱而崛起的新港口，与工厂搬迁无关（排除 C）。
    - id: q4
      stem: What does the writer suggest was the hardest part of containerisation?
      options:
        - Designing a box strong enough for ocean voyages
        - Raising money to convert existing ships
        - Getting companies and countries to adopt common standards
        - Training dockworkers to operate the new cranes
      correctIndex: 2
      explanationZh: 末段点明："The technology was trivially simple; the hard part was persuading competing companies and countries to agree on standard sizes and fittings"——技术本身极其简单，难在让相互竞争的公司和国家就统一尺寸与接口达成一致。这也呼应了结尾“因为大家终于同意使用同一种箱子”。
- id: ielts-r-006
  track: ielts
  title: The Sand Beneath Our Cities
  titleZh: 城市脚下的沙子
  genre: Academic
  passage: |-
    After fresh water, sand is the natural resource that humanity consumes in the greatest quantity — by some estimates, around fifty billion tonnes a year. Almost every feature of the modern city begins as sand: concrete is essentially sand and gravel bound with cement, glass is sand melted at high temperature, and even the silicon chips inside computers start life as quartz grains. Demand has tripled in two decades, driven by the fastest wave of urbanisation in human history.

    It might seem absurd to speak of a sand shortage on a planet with the Sahara in it, but deserts offer little help. Grains that have been rolled by wind for thousands of years become round and polished, and they slide past one another instead of locking together, which makes them nearly useless for concrete. Builders need the angular grains produced by flowing water, and so extraction concentrates on riverbeds, floodplains, lakes and coastlines — precisely the environments least able to spare it. Dubai, surrounded by dunes, famously imported sand from Australia to build its tallest towers.

    The consequences of removal are now well documented. Dredging lowers riverbeds, leaving bridge foundations exposed and unstable, while the loss of sediment starves deltas that would otherwise rebuild themselves. In the Mekong Delta, the combination of upstream dams and relentless sand mining has allowed salt water to push further inland each year, damaging the rice fields that feed millions. Elsewhere, at least two dozen small Indonesian islands are reported to have disappeared entirely, carried away barge by barge.

    Governments have begun to respond, banning exports or licensing extraction, though enforcement is patchy and illegal mining remains profitable. In the longer term, researchers argue, the answer is to curb the appetite itself: crushed rock and recycled construction rubble can replace much of the natural sand in concrete, and several laboratories are developing binders that could finally put desert sand to work. Sand is cheap, but treating it as limitless, they warn, is a luxury the coming century cannot afford.
  suggestedMinutes: 9
  questions:
    - id: q1
      stem: What point does the writer make in the first paragraph?
      options:
        - Sand consumption is exceeded only by that of fresh water
        - Computer manufacturing uses more sand than construction
        - Cities have begun to reduce their demand for sand
        - Concrete can now be produced without any sand
      correctIndex: 0
      explanationZh: 首段开头写道 "After fresh water, sand is the natural resource that humanity consumes in the greatest quantity"——除淡水外，沙子是人类消耗量最大的自然资源。芯片只是沙子的用途之一，文中并未比较其与建筑业的用量（排除 B）；需求 "has tripled in two decades"，是增长而非减少（排除 C）。
    - id: q2
      stem: Why is desert sand of little use to the construction industry?
      options:
        - It contains too much salt to mix with cement
        - It is too expensive to transport from remote areas
        - Its rounded grains do not lock together
        - Its colour makes concrete structurally weak
      correctIndex: 2
