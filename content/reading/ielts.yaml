        - A forest is far more interconnected than it appears
        - Fungi are harmful to most trees
      correctIndex: 2
      explanationZh: 末段的定论是 "a forest is far more interconnected than it looks"——森林远比表面看上去更加相互连接，脚下的土壤是一张支撑树木的活网络。把森林说成"单一生物"是作者提醒要谨慎看待的夸张说法（排除 A）；开头"各自竞争"的印象正是全文要复杂化、修正的（排除 B）。
- id: ielts-r-015
  track: ielts
  title: The World Within Us
  titleZh: 我们体内的世界
  genre: Academic
  passage: |-
    The human body is home to a vast population of microorganisms — bacteria, viruses, and fungi — that live on the skin, in the mouth, and above all in the gut. Collectively known as the microbiome, they number in the trillions, rivalling the body's own cells. For a long time medicine viewed such microbes chiefly as a threat, something to be eliminated with disinfectants and antibiotics. That attitude is now giving way to a more nuanced view, in which many of these residents are recognised as essential partners.

    The gut bacteria earn their keep in several ways. They break down fibres that human enzymes cannot digest, releasing compounds the body can absorb; they manufacture certain vitamins; and they help train the immune system, teaching it to distinguish genuine threats from harmless material. A disrupted microbiome — thrown off balance by illness, poor diet, or a heavy course of antibiotics — has been associated with conditions ranging from digestive disorders to allergies.

    More surprising is the growing evidence of a link between the gut and the brain. The two are connected by nerves and by the chemical signals that gut bacteria release, and experiments in mice suggest that altering the microbiome can change behaviour, including levels of anxiety. Researchers are careful, however, to distinguish such findings in animals from firm conclusions about people, where the evidence is still preliminary and much harder to interpret.

    Much of the science remains young, and popular enthusiasm has run ahead of the evidence. Shops now sell probiotic supplements promising to remedy all manner of ailments, most of them poorly supported by trials. What is clear is that diet shapes the microbiome powerfully: a varied diet rich in plants and fibre tends to foster a diverse community of microbes, and diversity, on current evidence, appears to be a reliable marker of a healthy gut.
  suggestedMinutes: 9
  questions:
