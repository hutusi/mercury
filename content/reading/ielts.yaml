      correctIndex: 0
      explanationZh: 第二段的结果是：陈列 24 种果酱的大展台虽吸引更多人驻足，但 "only three per cent went on to buy a jar, compared with nearly a third of those who saw the smaller selection"——大展台购买率仅 3%，远低于小展台的近三分之一。大展台吸引的路人更多（与 C 相反），且多数人反而什么都没买（排除 D）。
    - id: q3
