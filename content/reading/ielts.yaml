        - forbidden
      correctIndex: 1
      explanationZh: 原句 "Hebrew, confined for centuries to religious texts" 指希伯来语数百年来被"局限、限定"于宗教典籍之中，故与 restricted（受限的）最接近。它说的是使用范围狭窄，而非被翻译（A）、被遗忘（C）或被禁止（D）——事实上它一直在宗教场合使用。
    - id: q4
      stem: What does the passage suggest is essential for reviving an endangered language?
      options:
        - The work of scholars above all else
        - A community's decision to pass the language on to its children
        - Government funding for dictionaries
        - Making the language compulsory in schools
      correctIndex: 1
      explanationZh: 末段强调，复兴 "ultimately depends less on scholars than on a community deciding that its language is worth passing on to its children"——关键不在学者，而在社区是否决心把语言传给下一代。学者的工作只是辅助（与 A 相反）；强制入学、政府拨款文中未作为决定性因素提出（排除 C、D）。
- id: ielts-r-014
  track: ielts
  title: The Hidden Network of the Forest
  titleZh: 森林中隐藏的网络
  genre: Academic
  passage: |-
    A walk through a forest gives the impression of individual trees competing for light and water, each standing alone. Beneath the soil, however, lies a hidden system that complicates this picture. The roots of most trees are wrapped in fine threads of fungi, in a partnership so ancient that it may have helped plants colonise land in the first place. The fungi extract water and nutrients such as phosphorus from the soil and pass them to the tree; in return, the tree supplies the fungi with sugars it makes through photosynthesis, which the fungi cannot produce themselves.

    What makes this arrangement remarkable is its scale. A single fungal network can link many trees together, threading through the soil across an entire woodland. Using radioactive tracers, the Canadian ecologist Suzanne Simard showed that carbon could travel through these fungal threads from one tree to another — for instance, from a birch standing in sunlight to a shaded fir seedling struggling to make enough food of its own. Older, well-connected trees, sometimes called hub trees, appeared especially generous, supporting the seedlings growing up around them.

    These findings have captured the public imagination, and the network is now popularly known as the "wood wide web". Some writers have gone further, describing forests as cooperative communities or even as single organisms. Here many scientists urge caution. It is not clear that trees intend to help one another; the fungi, after all, have their own interests, and may simply be moving resources in ways that benefit themselves. Sceptics also note that some of the most dramatic claims rest on a small number of studies.

    What is not in doubt is that a forest is far more interconnected than it looks, and that the soil beneath our feet is not an inert backdrop but a living network on which the trees above depend.
  suggestedMinutes: 10
  questions:
    - id: q1
      stem: In the partnership between trees and fungi, what do the trees provide?
      options:
