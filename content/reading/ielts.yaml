        - That fungi harm the seedlings growing near hub trees
        - That forests are made up of a single species of tree
      correctIndex: 0
      explanationZh: 第二段说 Simard 用放射性示踪剂证明 "carbon could travel through these fungal threads from one tree to another"——碳可经真菌菌丝在树木间传递，例如从阳光下的桦树传给荫蔽处的冷杉幼苗。所谓"枢纽树"是在帮助而非伤害周围幼苗（与 C 相反）。
    - id: q3
      stem: Why do many scientists urge caution about the "wood wide web"?
      options:
