      explanationZh: 第二段描述：人们本用不同形状的黏土代币记数并封入黏土信封，后来发现 "pressing the tokens into the soft surface of the envelope... made the same marks more conveniently"——把代币压进信封表面留下印痕更方便，代币遂被弃用，这些印痕经芦苇笔书写演变为楔形文字。它并非源自动植物摹形（A）或邻族字母（C）。
    - id: q3
