- id: ielts-r-008
  track: ielts
  title: The Vanishing Night
  titleZh: 正在消失的黑夜
  genre: Academic
  passage: |-
    For most of human history, the Milky Way was the most spectacular sight in the night sky. Today, around one third of humanity — including some eighty per cent of people in North America and Europe — can no longer see it at all. The cause is skyglow, artificial light scattered by the atmosphere until the sky over a city glows dull orange all night. Measurements based on citizen scientists counting visible stars suggest the world's night sky has been brightening by almost ten per cent a year, considerably faster than satellite data had indicated.

    The ecological consequences are increasingly well documented. Night-flying insects circle streetlamps until they die of exhaustion, one factor in the worrying decline of insect populations. Birds that migrate at night, navigating partly by the stars, become disoriented by illuminated buildings and collide with them in large numbers. On beaches, newly hatched sea turtles, which instinctively crawl towards the brightest horizon — historically the moonlit sea — instead head inland towards hotels and roads.

    Humans are not exempt. The blue-rich light of modern LED streetlamps and screens suppresses melatonin, the hormone that regulates sleep, and disrupted sleep is linked to a range of health problems. There is also a simpler cost — light shining uselessly into the sky is wasted electricity, paid for by cities every single night.

    The encouraging difference between light pollution and almost every other kind is that it vanishes the instant the source is switched off; nothing lingers in the soil or the water. Solutions are correspondingly straightforward — shielded fittings that direct light downwards, warmer-coloured lamps, dimmers, and motion sensors. When the city of Tucson in Arizona converted its streetlights along these lines, it cut its light output by seven per cent, with residents barely noticing the change. Increasingly, dark-sky reserves are protecting the remaining natural night: places where the Milky Way can still astonish.
  suggestedMinutes: 10
