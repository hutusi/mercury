      correctIndex: 1
      explanationZh: 首段末句指出，已知最早的文字 "arose for a strikingly practical reason"——为记账（accounting）这一极其实际的需要而生；第二段进一步说神庙管理者要清点粮食、牲畜与税收。记录法律与文学是文字后来才有的用途（排除 A）；抄写员的权力是文字带来的结果，而非发明目的（排除 C）。
    - id: q2
