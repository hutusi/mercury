      explanationZh: 文章开头指出可再生能源虽已便宜，但 "the sun sets and the wind drops"，因此必须大规模储能；随后逐一评述各种储能方式的利弊，结尾点明 "no single technology will win outright"。故 B 最全面。选项 D 与末段直接矛盾——锂电池的短板正是持续时间短；A 曲解了"便宜"这一前提，文中从未说便宜到无利可图。
