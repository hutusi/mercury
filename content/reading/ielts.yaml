      correctIndex: 3
      explanationZh: 第二段列举肠道细菌的作用：分解人体酶无法消化的纤维、制造某些维生素，并 "help train the immune system"——帮助训练免疫系统辨别真正的威胁。它们数量堪比人体细胞，但并非"取代"人体细胞（排除 A）；文末恰恰强调多样化饮食的重要（与 C 相反）。
    - id: q3
