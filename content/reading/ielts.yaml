- id: ielts-r-010
  track: ielts
  title: The Longest Journeys
  titleZh: 最漫长的旅程
  genre: Academic
  passage: |-
    Every autumn, the bar-tailed godwit, a wading bird little larger than a pigeon, undertakes one of the most extraordinary journeys in the natural world. Leaving Alaska, it flies south across the open Pacific to New Zealand — a distance of more than eleven thousand kilometres — without once stopping to feed, drink, or rest. Before departing, the bird nearly doubles its body weight in fat and shrinks its digestive organs, which it will not need in flight, to save weight. The voyage takes eight or nine days of continuous flapping.

    How migrating animals find their way has puzzled scientists for centuries. Many species appear to carry several navigational tools at once. Birds can read the position of the setting sun, memorise the pattern of the stars, and, most remarkably, sense the Earth's magnetic field, which tells them both direction and, through its changing angle, rough latitude. Sea turtles and some fish possess a similar magnetic sense, allowing them to return, decades later, to the very beach where they hatched.

    Not all navigation is inherited. While a young godwit seems to fly its first migration on instinct alone, other species learn their routes from older individuals. Whooping cranes raised in captivity, having no adults to follow, famously had to be taught a migration path by conservationists flying ahead in a microlight aircraft.

    Migration is now under growing pressure. Climate change is shifting the timing of the seasons, so that some birds arrive at their breeding grounds to find that the insects their chicks depend on have already peaked. Light pollution disorients night-flyers, and the draining of wetlands removes the refuelling stops on which long journeys depend. Conservationists increasingly argue that protecting a migratory species means protecting an entire chain of sites, sometimes spread across a dozen countries — a challenge as much diplomatic as ecological.
