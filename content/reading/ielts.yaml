      correctIndex: 1
      explanationZh: 第三段指出科学家谨慎的原因："It is not clear that trees intend to help one another"——尚不清楚树木是否真有互助的"意图"，真菌可能只是按对自己有利的方式搬运资源，且某些惊人结论只基于少数研究。网络确实被观测到、树与菌确有交换（排除 A、D）。
    - id: q4
      stem: The word "inert" in the final paragraph is closest in meaning to
      options:
        - fertile
        - shallow
        - hidden
        - lifeless
      correctIndex: 3
      explanationZh: 原句说土壤 "is not an inert backdrop but a living network"——用 "not... but a living network"（不是……而是有生命的网络）与 inert 形成对照，可知 inert 意为"无生命的、不活动的"，故 lifeless 最接近。fertile（肥沃）、hidden（隐蔽）、shallow（浅的）都不符合这一对比。
    - id: q5
      stem: What is the writer's overall conclusion?
      options:
        - Forests are best understood as single organisms
