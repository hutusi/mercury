      correctIndex: 3
      explanationZh: 第二段说语言消亡通常是个"更安静的过程"：少数族群的家长为让孩子获得教育和就业机会，"choose to raise them in a dominant national or global language"——用主流语言抚养孩子，两三代后母语便无人使用。被禁止使用 "though that has happened" 只是例外而非常态（排除 A）。
    - id: q3
      stem: The word "confined" in the final paragraph is closest in meaning to
      options:
        - translated
        - restricted
