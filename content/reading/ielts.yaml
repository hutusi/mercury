- id: ielts-r-013
  track: ielts
  title: When a Language Falls Silent
  titleZh: 当一门语言归于沉寂
  genre: Academic
  passage: |-
    There are roughly seven thousand languages spoken in the world today, but they are vanishing at an alarming rate. Linguists estimate that one language falls silent every few weeks, as its last fluent speaker dies, and that by the end of this century as many as half of all languages may be gone. A striking imbalance underlies these figures: a mere handful of languages, led by Mandarin, English, and Spanish, are spoken by most of humanity, while thousands of others are maintained by only a few hundred or even a few dozen people.

    Languages usually die not because they are forbidden — though that has happened — but through a quieter process. Parents in a minority community, wanting their children to prosper, choose to raise them in a dominant national or global language that promises schooling and employment. Within two or three generations, the ancestral tongue survives only among the elderly, and then not at all.

    To an outsider the loss may seem regrettable but minor. Linguists argue otherwise. Each language encodes a distinct way of organising human experience, and some carry knowledge found nowhere else — detailed classifications of local plants, navigational techniques, or ecological observations accumulated over centuries. When such a language disappears, that knowledge often disappears with it, unrecorded.

    Efforts to reverse the trend are growing, and a few have succeeded spectacularly. Hebrew, confined for centuries to religious texts, was revived as an everyday spoken language and now has millions of native speakers. More modest projects — recording elders, producing dictionaries, running immersion schools where young children hear only the endangered language — have brought others back from the edge. Revival, linguists caution, ultimately depends less on scholars than on a community deciding that its language is worth passing on to its children.
  suggestedMinutes: 9
  questions:
