      correctIndex: 2
      explanationZh: 原句说选择过载 "can be paralysis, dissatisfaction... or a retreat to the familiar"，此处 paralysis 是比喻义，指因难以取舍而"无法作出决定、动弹不得"，故与 an inability to act 最接近。它并非指身体疾病（D），也不同于句中另行列出的 dissatisfaction 与 regret（A）。
    - id: q4
