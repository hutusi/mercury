      explanationZh: 全文先讲语言正快速消失，以及为何这种损失重要（承载独特知识），再谈复兴的努力与个别成功案例，故 B 最全面。现实是少数语言被多数人使用、成千上万种语言仅剩极少数使用者（与 A 相反）；语言多因家长自愿选择而消亡，并非主要因政府（排除 C）。
    - id: q2
      stem: According to the passage, how do languages usually die?
      options:
        - Governments forbid people from speaking them
