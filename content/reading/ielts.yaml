- id: ielts-r-011
  track: ielts
  title: The Tyranny of Too Much Choice
  titleZh: 选择过多的暴政
  genre: Academic
  passage: |-
    Standard economic theory has long assumed that more choice is always better: a rational shopper offered more options can simply ignore the ones they dislike and is never worse off. Over the past twenty-five years, psychologists have gathered evidence that this comfortable assumption often fails to describe how real people behave.

    The best-known demonstration came from a supermarket in California. On one day, shoppers were offered a tasting table displaying twenty-four varieties of jam; on another, just six. The larger display attracted more passers-by, but with a surprising result: of those who stopped at the big table, only three per cent went on to buy a jar, compared with nearly a third of those who saw the smaller selection. Faced with too many options, many shoppers found it easier to walk away and buy nothing at all.

    Researchers call this choice overload. When the alternatives are numerous and hard to compare, the effort of deciding rises, and so does the fear of picking wrongly and later regretting it. The result can be paralysis, dissatisfaction with whatever is eventually chosen, or a retreat to the familiar. The effect is strongest, studies suggest, when the chooser is not an expert and the options differ in complicated ways.

    This does not mean people prefer to have their choices made for them. Feeling in control matters a great deal to human well-being. The practical lesson, rather, is that choices are easier to make when they are well organised — grouped into sensible categories, or presented with a sensible default. Pension schemes illustrate the point: when employees must actively opt in, many never get around to joining, but when enrolment is automatic and they are free to leave, participation rises sharply, even though the underlying freedom is unchanged.
  suggestedMinutes: 9
  questions:
    - id: q1
      stem: What is the writer's main point in the passage?
      options:
