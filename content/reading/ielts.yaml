        - surrounded
      correctIndex: 0
      explanationZh: 原句 "the mineral-rich chimneys... are laden with copper, zinc, and other metals" 中，laden 意为"满载、富含"，故与 loaded 最接近。它强调内部富含大量金属，而非表面被覆盖（B）、被沾污（C）或被环绕（D）。
    - id: q5
      stem: What concern do marine scientists raise about deep-sea mining?
