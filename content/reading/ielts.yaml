- id: ielts-r-016
  track: ielts
  title: The First Writing
  titleZh: 最早的文字
  genre: Academic
  passage: |-
    Writing is such a familiar part of daily life that it is easy to assume it was always destined to be invented. In fact, full writing systems — capable of recording anything that could be spoken — emerged independently only a handful of times in human history, and the earliest known example arose for a strikingly practical reason: accounting.

    In the cities of ancient Mesopotamia, more than five thousand years ago, temple administrators needed to keep track of grain, livestock, and taxes. For centuries they had used small clay tokens of different shapes to represent quantities of goods, sealing them inside clay envelopes as records of a transaction. Eventually someone realised that pressing the tokens into the soft surface of the envelope, before enclosing them, made the same marks more conveniently — and that the tokens themselves were then unnecessary. The marks became signs; the signs, pressed with a reed stylus, became the wedge-shaped script known as cuneiform.

    At first these signs could record only objects and numbers. The decisive step came when scribes began using a sign not just for the thing it depicted but for the sound of its name, so that signs could be combined to spell out words that no picture could easily show — personal names, for example, or abstract ideas. With that innovation, writing broke free of the account book. Within a few centuries it was being used for laws, letters, and the world's first works of literature.

    Because writing was difficult to learn, mastering it conferred power, and scribes formed a respected and privileged class. Yet the technology's ultimate significance lay elsewhere. For the first time, knowledge could be stored outside a human memory and passed intact across generations and distances. Every library and database since rests on that Mesopotamian breakthrough: the discovery that speech could be made to leave a permanent trace.
  suggestedMinutes: 10
  questions:
