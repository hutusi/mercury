      explanationZh: 第一段说，作为回报，树木 "supplies the fungi with sugars it makes through photosynthesis, which the fungi cannot produce themselves"——把光合作用制成的糖分给真菌，因为真菌自己造不出。水和磷等养分是真菌提供给树木的（正好相反，排除 A、B）；放射性示踪剂是研究手段，并非交换物（排除 D）。
    - id: q2
      stem: What did Suzanne Simard's research demonstrate?
      options:
