- id: biz-r-001
  track: business
  title: Making Hybrid Meetings Actually Work
  titleZh: 让混合会议真正有效
  genre: Article
  passage: |-
    When offices reopened after the pandemic, many companies settled into a hybrid rhythm: some employees in the office, others joining from home. The meeting room, however, was slow to catch up. In a typical hybrid meeting, the people around the table dominate the discussion while remote participants hover in a corner of the screen, straining to hear side comments and waiting for a pause long enough to speak. Researchers have a name for the goal that such meetings fail to achieve: meeting equity, the principle that every participant should have the same ability to see, hear, and contribute, regardless of location.

    Companies that run hybrid meetings well tend to follow a few practical rules. First, they appoint a facilitator whose job includes watching the chat window and deliberately inviting remote colleagues to weigh in before decisions are made. Second, they circulate an agenda and any key documents in advance, so that remote attendees are not squinting at a whiteboard they cannot read. Third, many adopt a one-screen-per-person policy: even employees sitting in the office join the video call from their own laptops, which puts every face at the same size and every voice at the same volume.

    None of these habits requires expensive technology. What they require is the recognition that a hybrid meeting is not an in-person meeting with spectators, but a single shared conversation that happens to span two kinds of space. Teams that internalise this distinction report faster decisions and, just as importantly, remote employees who no longer feel like second-class participants.
  suggestedMinutes: 8
  questions:
    - id: q1
      stem: What is the main point of the article?
      options:
        - Hybrid meetings can work well if teams adopt deliberate practices that include remote participants
        - Companies should require all employees to return to the office for important meetings
        - Expensive video conferencing technology is essential for hybrid work
        - Remote employees prefer to communicate through chat rather than video
      correctIndex: 0
      explanationZh: 文章先描述混合会议中远程参与者被边缘化的问题，再给出三条具体做法（指定主持人、提前发议程、一人一屏），结论是这些做法能实现 meeting equity。选项 C 与原文 "None of these habits requires expensive technology" 直接矛盾。
    - id: q2
      stem: According to the article, what problem do remote participants typically face in hybrid meetings?
      options:
        - They are asked too many questions by the facilitator
        - They receive the agenda earlier than office-based colleagues
        - They struggle to hear side comments and find openings to speak
        - They are required to keep their cameras switched off
      correctIndex: 2
      explanationZh: 第一段写远程参与者 "straining to hear side comments and waiting for a pause long enough to speak"，即听不清旁侧讨论、插不上话。选项 A 恰好说反了——主持人主动邀请远程同事发言是文章推荐的解决办法，不是问题。
    - id: q3
      stem: What is the purpose of the one-screen-per-person policy?
      options:
        - To reduce the number of meeting rooms a company needs
        - To give every participant equal visual and audio presence
        - To allow employees to multitask during meetings
        - To record meetings for colleagues in other time zones
      correctIndex: 1
      explanationZh: 原文解释该政策的效果是 "puts every face at the same size and every voice at the same volume"——办公室员工也各自用笔记本入会，让每个人的画面和音量一致，从而实现平等参与。其余选项在文中均未提及。
    - id: q4
      stem: The word "equity" in paragraph 1 is closest in meaning to
      options:
        - ownership of company shares
        - efficiency
        - politeness
        - fairness
      correctIndex: 3
      explanationZh: 文中随即给出定义："the principle that every participant should have the same ability to see, hear, and contribute"，即人人机会均等，故 equity 在此指“公平”。选项 A 利用了 equity 在金融语境中“股权”的常见含义，是典型的一词多义陷阱。
- id: biz-r-002
  track: business
  title: "Nortavia Systems: Third-Quarter Results"
  titleZh: Nortavia Systems 第三季度业绩报告（节选）
  genre: Report
  passage: |-
    Nortavia Systems — Q3 Report to Shareholders (Excerpt)

    Nortavia Systems delivered solid top-line growth in the third quarter. Total revenue rose 12 percent year over year to $48.2 million, driven primarily by our subscription software services, which grew 24 percent and now account for more than half of total revenue. Hardware sales, by contrast, declined 8 percent as customers continued to migrate from on-premise devices to cloud-based solutions.

    Regionally, Asia-Pacific was again our fastest-growing market, with revenue up 21 percent following the launch of localised versions of our platform in Japanese and Korean. Europe grew 9 percent, while North America, our largest and most mature market, expanded 6 percent.

    Profitability did not keep pace with revenue. Operating margin narrowed from 18 percent to 15 percent, mainly because of elevated logistics costs and one-time expenses related to the consolidation of our two European warehouses. Management expects the warehouse consolidation to reduce annual distribution costs by approximately 5 percent beginning next fiscal year.

    Looking ahead, we forecast fourth-quarter revenue of $50 to $52 million. We remain confident in underlying demand; however, this guidance is deliberately cautious, reflecting currency headwinds in several key markets and longer procurement cycles among our enterprise customers. The board has approved continued investment in our Singapore distribution centre, which is scheduled to begin operations in the second quarter of next year.
  suggestedMinutes: 8
  questions:
    - id: q1
      stem: What was the primary driver of Nortavia's revenue growth in the third quarter?
      options:
        - Hardware sales
        - The consolidation of European warehouses
        - Currency movements in key markets
        - Subscription software services
      correctIndex: 3
      explanationZh: 报告第一段明确指出增长 "driven primarily by our subscription software services, which grew 24 percent"。硬件销售实际下降了 8%（排除 A）；仓库整合是导致利润率收窄的一次性成本，与营收增长无关（排除 B）。
    - id: q2
      stem: Which region recorded the highest revenue growth rate?
      options:
        - North America
        - Asia-Pacific
        - Europe
        - All regions grew at the same rate
      correctIndex: 1
      explanationZh: 第二段写道 "Asia-Pacific was again our fastest-growing market, with revenue up 21 percent"，增速高于欧洲的 9% 和北美的 6%。注意北美是规模最大（largest）的市场，但“最大”不等于“增长最快”，这是本题的干扰点。
    - id: q3
      stem: Why did the operating margin narrow during the quarter?
      options:
        - Because of higher logistics costs and one-time warehouse consolidation expenses
        - Because subscription prices were reduced to attract customers
        - Because of the launch of Japanese and Korean versions of the platform
        - Because fourth-quarter guidance was lowered
      correctIndex: 0
      explanationZh: 第三段给出原因："mainly because of elevated logistics costs and one-time expenses related to the consolidation of our two European warehouses"。日韩本地化版本推动的是亚太营收增长（选项 C 张冠李戴）；第四季度指引是展望内容，与本季利润率无因果关系。
    - id: q4
      stem: What can be inferred about the fourth-quarter forecast?
      options:
        - Management expects revenue to decline from Q3 levels
        - It assumes the Singapore distribution centre will already be operating
        - Management set it conservatively because of external risks
        - It depends entirely on hardware sales recovering
      correctIndex: 2
      explanationZh: 报告称指引 "is deliberately cautious, reflecting currency headwinds... and longer procurement cycles"，即因汇率逆风和客户采购周期拉长而刻意保守。预测区间 $50–52M 高于本季 $48.2M，并非下滑（排除 A）；新加坡配送中心要到明年第二季度才投入运营（排除 B）。
- id: biz-r-003
  track: business
  title: "Reading Between the Lines: Communicating Across Cultures"
  titleZh: 言外之意：跨文化商务沟通
  genre: Article
  passage: |-
    A Dutch project manager finishes reviewing a proposal from her Japanese counterpart and sends back a short message: the budget section is unconvincing and needs to be rewritten. To her, this is efficient and respectful — she has saved everyone time. To her counterpart, the message may read as startlingly blunt, even hostile. Neither is being unprofessional. They are simply operating with different assumptions about how messages should be packaged.

    Anthropologist Edward Hall captured this difference in a distinction that is still widely used in business training: low-context and high-context communication. In low-context cultures — the Netherlands, Germany, and the United States are common examples — good communication is explicit. The meaning is in the words, and the speaker is responsible for being clear. In high-context cultures, such as Japan, Korea, and much of the Arab world, meaning is carried as much by the situation as by the words themselves: what is left unsaid, who is present, and how something is phrased can matter more than the literal message. A polite reply of "we will consider it" may, in context, be a clear refusal.

    The practical danger is not the difference itself but the interpretation we attach to it. Direct communicators can be dismissed as rude when they intend to be efficient; indirect communicators can be dismissed as evasive or indecisive when they are being respectful. Experienced international managers therefore make a habit of separating style from substance. They ask clarifying questions, confirm decisions in writing, and resist the temptation to judge a colleague's competence by how directly the colleague delivers a message. The skill is not to abandon your own style, but to stop assuming it is the only professional one.
  suggestedMinutes: 8
  questions:
    - id: q1
      stem: What is the main idea of the article?
      options:
        - Japanese business culture is more polite than Dutch business culture
        - Misunderstandings across cultures often come from different communication styles, not from unprofessional behaviour
        - Managers should always communicate as directly as possible to save time
        - Written confirmation should replace verbal agreements in international business
      correctIndex: 1
      explanationZh: 文章开头的例子就点明 "Neither is being unprofessional"——荷兰经理与日本同事都很专业，只是对信息“包装方式”的预设不同；随后用高/低语境理论解释这种差异。选项 A 把风格差异误读成礼貌程度的高下，正是文章反对的思维方式。
    - id: q2
      stem: According to the article, what characterises high-context communication?
      options:
        - Meaning depends heavily on the situation and on what is left unsaid
        - The speaker takes full responsibility for making the words explicit
        - Messages are usually delivered in writing rather than in person
        - Refusals are always stated clearly and directly
      correctIndex: 0
      explanationZh: '原文说在高语境文化中 "meaning is carried as much by the situation as by the words themselves: what is left unsaid... can matter more than the literal message"。选项 B 描述的是低语境文化的特征（意义在语言本身、说话者负责讲清楚），属于概念对调的干扰项。'
    - id: q3
      stem: In the article, what may the phrase "we will consider it" actually mean in a high-context culture?
      options:
        - A request for more time to decide
        - An enthusiastic acceptance
        - A promise to reply in writing
        - A polite refusal
      correctIndex: 3
      explanationZh: 文中明确写道："A polite reply of 'we will consider it' may, in context, be a clear refusal"——在高语境文化中，这句客气话在特定情境下就是明确的拒绝。选项 A 是按字面意思的理解，恰恰是低语境思维容易掉入的陷阱。
    - id: q4
      stem: What do experienced international managers do, according to the final paragraph?
      options:
        - They adopt the communication style of whichever culture they are visiting
        - They avoid giving critical feedback to colleagues from other cultures
        - They separate a colleague's communication style from the substance of the message
        - They judge competence by how directly a colleague speaks
      correctIndex: 2
      explanationZh: 末段指出有经验的管理者 "make a habit of separating style from substance"，并通过追问和书面确认来核实实质内容。选项 D 与原文 "resist the temptation to judge a colleague's competence by how directly..." 正好相反；文章也没有要求完全照搬对方风格——"The skill is not to abandon your own style"（排除 A）。
