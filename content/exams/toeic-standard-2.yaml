          MEMO

          To: All Redwood Analytics employees
          From: Derek Boone, Director of Facilities and Security
          Date: November 3
          Re: New building-access badges

          On December 1, our current door badges will be deactivated and replaced with new photo identification badges. The new badges respond faster at the readers and, unlike the current ones, also operate the gate of the parking garage. Employees who now carry a separate garage card should return it to the reception desk once their new badge is active.

          To receive a new badge, please visit the security office in Suite 110 between November 10 and November 21 to have your photograph taken. The process takes about five minutes, and no appointment is necessary. Employees who work at client sites should ask their managers to e-mail the security office so that a photo session can be arranged during the all-staff meeting on November 24.

          Please note a related change for guests: beginning December 1, all visitors must be registered in advance through the online visitor portal. Registered visitors will receive a one-day pass at the front desk; unregistered guests can no longer be signed in at the door.

          Questions about the new system may be directed to the security office at extension 88.
        questions:
          - id: ts2-r-q17
            stem: What is the purpose of the memo?
            options:
              - To announce a new security director
              - To explain a move to a new building
              - To report a security incident
              - To introduce a new badge system
            correctIndex: 3
            explanationZh: 备忘录说明 12 月 1 日起旧门禁卡停用、改用带照片的新工卡，并交代办理流程和访客新规，目的是介绍新的门禁系统。公司并没有搬迁，属于干扰项。
          - id: ts2-r-q18
            stem: What should most employees do between November 10 and 21?
            options:
              - Have a photograph taken
              - Return their garage cards
              - Register in the visitor portal
              - Attend a security briefing
            correctIndex: 0
            explanationZh: 原文要求员工在此期间 "visit the security office in Suite 110 ... to have your photograph taken"，约五分钟即可，无需预约。交还车库卡是新卡启用之后的事，属于干扰项。
          - id: ts2-r-q19
            stem: What is stated about the new badges?
            options:
              - They must be renewed each year
              - They cost employees a small fee
              - They also open the parking garage gate
              - They are issued at the reception desk
            correctIndex: 2
            explanationZh: 备忘录说新工卡 "unlike the current ones, also operate the gate of the parking garage"，因此原先单独的车库卡应交回前台。
          - id: ts2-r-q20
            stem: According to the memo, what will change for visitors?
            options:
