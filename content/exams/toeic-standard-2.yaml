          HARBORLIGHT HOTELS — Event Coordinator (Full-Time)

          Harborlight Hotels, a family-owned group of three waterfront properties, is seeking an event coordinator to be based at our Bayside location.

          The coordinator plans and oversees weddings, conferences, and company banquets from the first client meeting to the end of the event. Responsibilities include preparing cost estimates, coordinating with caterers and audiovisual vendors, supervising room setup on event days, and reporting monthly booking figures to the director of sales.

          Applicants must have at least three years of experience in event planning or hotel operations and must be available to work occasional evenings and weekends, as most events take place outside regular office hours. A degree in hospitality management is an advantage but is not essential.

          The position offers a base salary with a quarterly performance bonus, meals during shifts, and discounted stays for employees and their families at all three Harborlight properties.

          Applications must be submitted through the careers page of our website by October 1; applications sent by post or e-mail will not be considered. Shortlisted candidates will be invited to an interview in mid-October, which includes a short event-planning exercise.
        questions:
          - id: ts2-r-q13
            stem: What is indicated about Harborlight Hotels?
            options:
              - It operates three hotels
              - It recently opened a new location
              - It specializes in business travel
              - It is looking for a director of sales
            correctIndex: 0
            explanationZh: 广告开头介绍公司是 "a family-owned group of three waterfront properties"，即拥有三家滨水酒店的家族企业。招聘的是活动统筹专员，而非销售总监，属于干扰项。
          - id: ts2-r-q14
            stem: What is a stated requirement for the position?
            options:
              - A degree in hospitality management
              - Availability outside regular office hours
              - Fluency in a second language
              - Five years of hotel experience
            correctIndex: 1
            explanationZh: 广告要求应聘者 "must be available to work occasional evenings and weekends"，因为多数活动在办公时间之外举行。酒店管理学位只是加分项（"an advantage but is not essential"），属于干扰项。
          - id: ts2-r-q15
            stem: What benefit is mentioned in the advertisement?
            options:
              - A company car
              - A paid gym membership
              - Reduced room rates for family members
              - Extra vacation days
            correctIndex: 2
            explanationZh: 福利包括 "discounted stays for employees and their families at all three Harborlight properties"，即员工及其家属可在三家酒店享受住宿折扣。
          - id: ts2-r-q16
            stem: How should candidates apply for the position?
            options:
              - By e-mailing the director of sales
              - By mailing a printed résumé
              - By visiting the Bayside location
              - By using the company's website
            correctIndex: 3
            explanationZh: 广告要求 "Applications must be submitted through the careers page of our website"，并明确说明邮寄或电邮的申请不予受理，属于反向干扰项。
      - id: ts2-rg5
