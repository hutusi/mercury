              - They must park outside the garage
              - They must be escorted at all times
            correctIndex: 1
            explanationZh: 原文规定 12 月 1 日起 "all visitors must be registered in advance through the online visitor portal"，未提前登记的访客将无法在门口临时签到。
      - id: ts2-rg6
        passage: |-
          Growing Up: Skyfield Greens Takes Farming to the Rooftops

          Five years ago, Skyfield Greens installed its first greenhouse on the roof of a parking garage in central Averton and sold lettuce to two neighborhood restaurants. Today the company operates greenhouses on six buildings around the city and delivers salad greens and fresh herbs year-round to more than forty restaurants and two supermarket chains.

          Founder Tomas Ribeiro says two things made the growth possible. The first was the city's green-roof incentive, introduced three years ago, which reimburses building owners for half the cost of installing a rooftop farm. The second was demand from chefs, who increasingly advertise the origin of their ingredients on their menus.

          "Our greens are cut at sunrise and on the plate by dinner," Ribeiro said. "Nothing we sell ever spends a day in a truck, so it stays fresher than anything shipped from out of state."

          Last month the company signed a lease for its seventh rooftop, on top of Averton General Hospital, whose cafeteria will become a customer when the greenhouse opens next spring. Skyfield is also testing a weekly subscription box that would deliver salad mixes directly to home cooks — about three hundred households have joined the trial.

          The business is not without difficulties. Heating the greenhouses through Averton's long winters is by far the company's largest expense. In February, Skyfield began fitting each greenhouse with insulating thermal curtains, which are drawn at night and have already cut heating costs by nearly a third.
        questions:
          - id: ts2-r-q21
            stem: What is the article mainly about?
            options:
              - A change in a city's food regulations
              - A hospital's new cafeteria menu
              - The growth of an urban farming company
              - A shortage of fresh produce
            correctIndex: 2
            explanationZh: 文章从 Skyfield Greens 五年前的第一座屋顶温室讲到如今遍布六栋建筑的经营规模、扩张计划和成本挑战，主题是一家城市农业公司的成长历程。
          - id: ts2-r-q22
            stem: According to Mr. Ribeiro, what helped the company expand?
            options:
              - Falling energy prices
              - A city incentive program
              - A national advertising campaign
              - A partnership with a university
            correctIndex: 1
            explanationZh: 里贝罗提到两大助力，其一是市政府的绿色屋顶补贴，"reimburses building owners for half the cost of installing a rooftop farm"，其二是主厨对本地食材日益增长的需求。
          - id: ts2-r-q23
            stem: What advantage of the company's produce does Mr. Ribeiro mention?
            options:
              - It is cheaper than imported produce
              - It comes in recyclable packaging
              - It is available in larger quantities
              - It does not travel long distances
            correctIndex: 3
            explanationZh: 里贝罗说 "Nothing we sell ever spends a day in a truck"，蔬菜清晨采摘、当天上桌，因此比外州长途运来的更新鲜。价格优势文中并未提及，属于干扰项。
