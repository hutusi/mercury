      - id: is-rg3
        passage: |-
          Cooling the Urban Furnace

          On a summer evening, the centre of a large city can be five degrees Celsius warmer than the countryside around it, a phenomenon known as the urban heat island. Its causes are well understood. Asphalt and dark rooftops absorb most of the solar energy that strikes them, tall buildings block the winds that would otherwise carry heat away, and vehicles and air conditioners pour waste heat directly into the streets. Above all, cities lack vegetation: where the countryside cools itself by evaporating water through leaves, cities are largely sealed under stone and tar.

          The effect is strongest not at midday but at night, because dense building materials release the heat they have stored during the day for hours after sunset. It is this loss of night-time cooling that makes heat islands dangerous: during heatwaves, bodies that cannot cool overnight come under growing strain, and mortality among the elderly rises accordingly. The heat island also feeds on itself. As temperatures climb, residents turn up their air conditioners, whose exhaust warms the streets further and drives demand still higher — a feedback loop that in some districts can add an extra degree to the evening air.

          The remedies sound almost quaint. Painting roofs white reflects sunlight before it can be absorbed, and Los Angeles has experimented with pale coatings on the roads themselves. The most powerful tool, however, is the tree, which cools twice over: its canopy shades the surface, while the water evaporating from its leaves draws heat from the air, working as a slow, silent air conditioner. Studies in European cities have found that well-treed streets can be several degrees cooler than bare ones nearby.

          Yet trees are distributed with striking inequality. Satellite surveys repeatedly show that wealthy neighbourhoods enjoy far denser canopies than poor ones, meaning that those least able to afford air conditioning often live on the hottest streets. And planting has its own limits: in arid cities, every new tree competes for scarce water, and planners must weigh the cooling of today against the reservoirs of tomorrow. The urban heat island, in short, is not a fact of nature but a consequence of design — and what design has caused, design can temper.
