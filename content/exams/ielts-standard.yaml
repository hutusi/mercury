      - id: is-rg4
        passage: |-
          The Paradox of Automation

          Automation was supposed to remove human error, and in many respects it has. A modern airliner can fly itself from shortly after take-off to touchdown, and flying has never been safer. Yet accident investigators have documented a troubling pattern: when the automation does fail, the humans supervising it are sometimes bewildered, reacting slowly or making errors a novice would recognise. This is the paradox of automation — the more reliable the machine, the less prepared the human becomes to take over when it falters.

          One reason is the slow decay of skill. A typical airline pilot now steers the aircraft by hand for only a few minutes in each flight, usually just after take-off and just before landing. Manual flying, like any skill, fades without practice, and the pilots who most need sharp skills — those flying the most automated aircraft — get the least rehearsal. Investigations into several modern crashes have found experienced crews mishandling emergencies that earlier generations of pilots regarded as routine.

          The second reason concerns attention. Watching a system that almost never fails is one of the tasks human beings perform worst. Laboratory research on vigilance, first conducted with wartime radar operators, shows that the ability to notice rare events falls away sharply within about half an hour of passive monitoring. As early as 1983, the engineer Lisanne Bainbridge described the central irony of automation: designers hand over to the machine the active work that people do well, and leave people the passive watching that they do badly.

          The response, in aviation at least, has been twofold. Some regulators now require pilots to fly manually on a regular schedule, treating hand-flying as a perishable skill to be maintained like any other. Designers, meanwhile, are experimenting with systems that deliberately keep the human engaged — handing back control at unpredictable moments, or requiring active confirmation of decisions. The stakes reach well beyond the cockpit. As cars begin to drive themselves and software reads medical scans, entire professions are becoming supervisors of machines — and the lesson of aviation is that supervision is far harder than it looks.
