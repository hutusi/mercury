          SOLVIA SOFTWARE — Technical Support Specialist (Full-Time)

          Solvia Software, a developer of scheduling tools for medical clinics, is seeking a technical support specialist to join its growing customer care team at our Fairmont office.

          Responsibilities include answering customer inquiries by phone and e-mail, guiding new clinics through software installation, and reporting recurring problems to the development team. The specialist will also update the help articles in our online support center once a month.

          Applicants must have at least two years of customer service experience and a working knowledge of database software. Experience in a medical office is helpful but not required. Because our clients include clinics in Quebec, candidates who speak both English and French will be given preference.

          The position offers a competitive salary, health insurance from the first day of employment, and the option to work from home up to two days per week after a three-month training period.

          To apply, send a résumé and a brief cover letter to the careers address on our website by August 15. Interviews will be held during the first week of September. Please note that applications submitted through third-party job boards will not be reviewed.
        questions:
          - id: ts-r-q13
            stem: What kind of product does Solvia Software make?
            options:
              - Training videos for hospitals
              - Billing software for pharmacies
              - Scheduling tools for medical clinics
              - Security systems for offices
            correctIndex: 2
            explanationZh: 广告第一句介绍公司是 "a developer of scheduling tools for medical clinics"，即为医疗诊所开发排班预约软件。
          - id: ts-r-q14
            stem: What is a stated requirement for the position?
            options:
              - Two years of customer service experience
              - Fluency in French
              - A background in a medical office
              - A university degree in computing
            correctIndex: 0
            explanationZh: 原文要求 "Applicants must have at least two years of customer service experience"。法语只是优先条件（"will be given preference"），医疗办公室经验 "helpful but not required"，都不是硬性要求，属于干扰项。
          - id: ts-r-q15
            stem: What benefit becomes available only after three months?
            options:
              - Health insurance
              - A salary increase
              - Paid tuition
              - Working from home part of the week
            correctIndex: 3
            explanationZh: 原文说每周最多两天居家办公须 "after a three-month training period" 才可享受。医疗保险 "from the first day of employment" 即入职当天生效，属于干扰项。
          - id: ts-r-q16
            stem: How should candidates apply for the position?
            options:
              - By completing an online form
              - By e-mailing a résumé and cover letter
              - By visiting the Fairmont office
              - By using a third-party job board
            correctIndex: 1
            explanationZh: 广告要求 "send a résumé and a brief cover letter to the careers address"，即通过电子邮件投递简历和求职信。原文特别说明第三方招聘网站的申请 "will not be reviewed"，属于反向干扰项。
      - id: ts-rg5
        passage: |-
          MEMO

          To: All Larkspur Insurance employees
          From: Gloria Chen, Vice President of Operations
          Date: September 2
          Re: Flexible scheduling pilot program

          Starting October 1, Larkspur Insurance will test a flexible scheduling program for a period of six months. Under the program, employees may begin their workday at any time between 7:00 and 10:00 A.M., provided that they work eight hours and are present during the core hours of 10:00 A.M. to 3:00 P.M.

          Participation is voluntary. Employees who wish to keep their current nine-to-five schedule do not need to take any action. Those who want a flexible schedule should submit a request form to their department manager by September 19. Managers in departments that answer customer calls may limit the number of participants so that telephone coverage is maintained throughout the day.

          Please note that the program does not change meeting obligations. Employees are expected to attend all meetings scheduled during core hours, regardless of their chosen start time.

          At the end of the pilot, the human resources team will survey participants and their managers. The results will determine whether flexible scheduling becomes a permanent policy next spring.
        questions:
          - id: ts-r-q17
            stem: What is the purpose of the memo?
            options:
              - To announce new customer service hours
              - To explain a change in overtime pay
              - To introduce a new department manager
              - To describe a trial scheduling program
            correctIndex: 3
            explanationZh: 备忘录开头说公司 "will test a flexible scheduling program for a period of six months"，全文说明弹性工作制试点的规则和报名方式，目的是介绍这一试行项目。
          - id: ts-r-q18
            stem: What should interested employees do by September 19?
            options:
              - Attend an information session
              - Choose a new start time online
              - Submit a form to their manager
              - Update their contact information
            correctIndex: 2
            explanationZh: 原文要求想参加的员工 "should submit a request form to their department manager by September 19"，即在 9 月 19 日前向部门经理提交申请表。
          - id: ts-r-q19
            stem: What is required of all program participants?
            options:
              - Being at work from 10 A.M. to 3 P.M.
              - Starting work at 7 A.M.
              - Working four days per week
              - Answering customer telephone calls
            correctIndex: 0
            explanationZh: 备忘录规定参加者须 "present during the core hours of 10:00 A.M. to 3:00 P.M."，即核心时段必须在岗。早上七点只是最早的可选上班时间，并非强制。
          - id: ts-r-q20
            stem: According to the memo, what will happen at the end of the pilot?
            options:
              - The program will be extended by six months
              - Participants and managers will be surveyed
              - Employees will vote on the schedule
              - Core hours will be shortened
            correctIndex: 1
            explanationZh: 原文说试点结束后 "the human resources team will survey participants and their managers"，调查结果将决定弹性工作制是否转为长期政策。是否延续尚无定论，"直接延长六个月" 属于干扰项。
      - id: ts-rg6
        passage: |-
          Gearing Up: Pedal Express Doubles Its Fleet

          When Pedal Express began delivering packages in downtown Marston four years ago, the company owned six cargo bicycles and rented a single garage. Today it operates sixty electric cargo bikes from three depots and handles roughly two thousand deliveries a day for local pharmacies, law firms, and online retailers.

          Founder Imani Brooks credits much of the company's growth to a change in city traffic rules. Two years ago, Marston banned delivery trucks from the historic district between ten in the morning and four in the afternoon; courier bicycles were exempt. Contracts with downtown businesses tripled within six months of the ban.

          "Our couriers can legally go where trucks cannot, and they never circle the block looking for parking," Brooks said. "For any distance under five kilometers, we are almost always faster than a van."

          Last week the company announced that it will double its fleet again by next summer and open a fourth depot near the university. It is also testing insulated containers so that it can begin delivering refrigerated medications to clinics — a service several hospital networks have already asked about.

          Not everything has been easy. Brooks says that finding mechanics familiar with electric cargo bikes remains the company's biggest challenge. In January, Pedal Express opened its own training workshop, where new mechanics earn a certification in eight weeks.
        questions:
          - id: ts-r-q21
            stem: What is the article mainly about?
            options:
              - A new bicycle-sharing service for tourists
              - The rising cost of downtown parking
              - The growth of a delivery company
              - A ban on electric vehicles
            correctIndex: 2
            explanationZh: 文章从 Pedal Express 四年前的六辆货运自行车讲到如今的六十辆车和三个站点，并介绍其扩张计划，主题是一家快递公司的成长历程。
          - id: ts-r-q22
            stem: According to Ms. Brooks, what helped the business grow?
            options:
              - Restrictions on trucks in part of the city
              - A partnership with a national retailer
              - Lower fuel prices
              - An award from the mayor
            correctIndex: 0
            explanationZh: 布鲁克斯把增长归功于交通新规：Marston "banned delivery trucks from the historic district"，而快递自行车不受限制，禁令实施半年内合同增至三倍。
          - id: ts-r-q23
            stem: What advantage of cargo bicycles does Ms. Brooks mention?
            options:
              - They can carry larger loads than vans
              - They require no operating license
              - They are cheaper to insure
              - They do not need to look for parking
            correctIndex: 3
            explanationZh: 布鲁克斯说 "they never circle the block looking for parking"，即快递自行车无需绕圈找车位，而且五公里内几乎总比货车快。载货量和保险费用文中并未提及。
          - id: ts-r-q24
            stem: What is Pedal Express currently testing?
            options:
              - A mobile application for customers
              - Containers for refrigerated deliveries
              - A longer-lasting battery
              - A new courier uniform
            correctIndex: 1
            explanationZh: 原文说公司 "is also testing insulated containers so that it can begin delivering refrigerated medications to clinics"，即测试保温箱以便为诊所配送需冷藏的药品。
          - id: ts-r-q25
            stem: How is the company addressing its biggest challenge?
            options:
              - By raising mechanics' wages
              - By purchasing simpler bicycles
              - By training its own mechanics
              - By closing one of its depots
            correctIndex: 2
            explanationZh: 公司最大的难题是招不到熟悉电动货运自行车的技师，因此 "Pedal Express opened its own training workshop"，让新技师八周内取得认证，即自己培养技师。
