              - Six months of unpaid leave
              - Replacing staff with machines
              - A four-day week with no cut in pay
            correctIndex: 3
            explanationZh: 第二段说 "dozens of firms cut their staff to a four-day week for six months with no reduction in pay"——数十家公司让员工改为四天工作、为期半年且工资不减。
          - id: is2-r-q21
            stem: What happened to revenue during the trial?
            options:
              - It fell sharply
              - It held roughly steady
              - It doubled
              - It could not be measured
            correctIndex: 1
            explanationZh: 第二段说 "Revenue at the participating companies held roughly steady"——参与公司的营收大致持平，同时离职率下降、压力与倦怠减轻。
          - id: is2-r-q22
            stem: According to supporters, where do the gains of a four-day week come from?
            options:
              - Working faster under greater pressure
              - Hiring additional employees
              - Cutting wasteful activities such as long meetings
              - Reducing employees' pay
            correctIndex: 2
            explanationZh: 第三段说收益源于 "cutting waste rather than from working faster"——靠削减浪费而非加快速度，如缩短或取消会议、减少无谓打扰、聚焦真正重要的工作。
          - id: is2-r-q23
            stem: What concern do sceptics raise about the trials?
            options:
              - The firms involved may be unusually well managed
              - The pay cuts imposed were too large
              - Employees ended up working longer hours
              - Revenue always fell in the end
            correctIndex: 0
            explanationZh: 末段说怀疑者指出 "firms that volunteer may well be unusually well managed to begin with"——自愿参加试验的公司本就可能管理格外出色，结果未必能推广。
          - id: is2-r-q24
            stem: What is the writer's overall conclusion about the four-day week?
            options:
              - It should be made compulsory for all firms
