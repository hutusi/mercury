      - id: is2-rg3
        passage: |-
          Saving the Seagrass Meadows

          Beneath the shallow coastal waters of every continent except Antarctica lie meadows of seagrass, the only flowering plants that have returned to live entirely in the sea. Unlike the seaweeds with which they are often confused, seagrasses have true roots, stems and flowers, and they form dense underwater lawns that shelter an extraordinary variety of life. For most of history they were dismissed as worthless slime; only recently have scientists begun to grasp how much they matter.

          Their value is easiest to measure in carbon. Seagrass meadows cover a tiny fraction of the ocean floor, yet acre for acre they lock away carbon far faster than tropical rainforests. The carbon is buried in the seabed beneath the plants, where the lack of oxygen prevents it from rotting, so it can remain trapped for thousands of years. When a meadow is destroyed, however, that ancient store is disturbed, and much of the carbon escapes back into the water and the air.

          Seagrass does much more than store carbon. Its roots bind the seabed and its leaves slow the water, so the meadows act as natural breakwaters, protecting shorelines from the force of storms. They are also nurseries: countless young fish, including many species that people later eat, spend their early lives sheltering among the blades before moving out to the open sea. And by filtering the water and trapping sediment, seagrass keeps coastal waters clear enough for it, and for any nearby coral, to survive.

          Despite all this, seagrass is disappearing faster than almost any other habitat, lost to pollution, dredging and the murky water that follows coastal development. The damage is usually invisible from the shore, which is part of the problem: it is hard to protect what cannot be seen. Yet restoration turns out to be possible and surprisingly cheap. In several bays, volunteers have simply scattered seagrass seeds by hand and watched whole meadows return within a few years, reviving local fisheries and burying carbon once again.
        questions:
          - id: is2-r-q13
            stem: How do seagrasses differ from the seaweeds they are confused with?
            options:
              - They have true roots, stems and flowers
              - They grow only in very deep water
              - They are actually a kind of coral
              - They cannot survive in salt water
            correctIndex: 0
            explanationZh: 首段说 "Unlike the seaweeds with which they are often confused, seagrasses have true roots, stems and flowers"——海草不同于海藻，拥有真正的根、茎和花，是重回海洋的开花植物。
          - id: is2-r-q14
            stem: What does the passage say about seagrass and carbon?
            options:
