              - Harvests no longer affect any work
            correctIndex: 1
            explanationZh: 首段说 "The two-day weekend became standard only in the twentieth century"——两天周末直到二十世纪才成为惯例，说明五天工作制远比看上去要晚近、脆弱。
          - id: is2-r-q20
            stem: What did the large UK trial involve?
            options:
