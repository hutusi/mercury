            explanationZh: 第三段说 "Its roots bind the seabed and its leaves slow the water, so the meadows act as natural breakwaters"——根系固定海床、叶片减缓水流，如同天然防波堤，抵御风暴。
          - id: is2-r-q17
            stem: According to the passage, why is seagrass loss hard to prevent?
