            explanationZh: 末段说修复 "possible and surprisingly cheap"，志愿者仅用手撒种子就能在数年内让整片海草床恢复——既便宜又有效。
      - id: is2-rg4
        passage: |-
          The Four-Day Week

          The idea that a full working week must occupy five days is more recent, and more fragile, than it seems. The two-day weekend became standard only in the twentieth century, and for most of history the rhythm of work was set by harvests and daylight rather than by any calendar. In recent years a growing number of companies have begun to ask a once-heretical question: could employees produce just as much in four days as in five, and go home happier for it?

          The largest test so far took place in the United Kingdom, where dozens of firms cut their staff to a four-day week for six months with no reduction in pay. The results, when they were published, surprised even the organisers. Revenue at the participating companies held roughly steady, the number of employees resigning fell sharply, and reported levels of stress and burnout dropped. At the end of the trial, the great majority of the firms chose to keep the shorter week rather than return to five days.

          Supporters argue that the gains come from cutting waste rather than from working faster. Given less time, teams trimmed the least useful parts of their week: meetings grew shorter or disappeared, needless interruptions were discouraged, and attention was concentrated on work that genuinely mattered. A rested workforce, they add, is a more productive one, and the promise of a three-day weekend gives employees a powerful reason to guard their own concentration.

          Sceptics urge caution. The trials so far have been small and voluntary, and firms that volunteer may well be unusually well managed to begin with. Critics also note that the model suits some jobs far better than others: a software team may be able to compress its output, but a hospital ward or a school classroom cannot simply be closed for a day. The four-day week may yet prove to be less a universal law than a good idea for particular kinds of work — valuable, but not for everyone.
        questions:
