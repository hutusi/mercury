              - It will soon replace all full-time work
              - It suits some kinds of work but not everyone
            correctIndex: 3
            explanationZh: 末段总结 "less a universal law than a good idea for particular kinds of work — valuable, but not for everyone"——它更像适合特定工作的好主意，而非放之四海皆准的定律。
