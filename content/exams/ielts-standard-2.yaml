# yaml-language-server: $schema=../.schemas/exam.schema.json
id: exam-ielts-standard-2
track: ielts
title: IELTS Standard Practice Test 2
titleZh: 雅思标准模考（二）
descriptionZh: 第二套标准模考，共 44 题：听力 20 题（两个部分，涵盖成人课程报名、图书馆导览、城市鸟类项目讨论与电梯史讲座）+ 阅读 24 题（冰川运动、排队心理、海草床保护与四天工作制四篇学术短文），全程约 60 分钟。内容与第一套完全不同，便于重考，题型与出题节奏和正式考试一致。
sections:
  - id: ielts-standard-2-listening-1
    kind: listening
    title: Listening Section 1
    titleZh: 听力第一部分
    durationSeconds: 600
    groups:
      - id: is2-lg1
        script:
          - speaker: A
            text: Good evening, Kingsley Adult Learning Centre. How can I help you?
          - speaker: B
            text: Hello, I'd like to enrol on one of your evening courses. I saw that you run classes in pottery and in watercolour painting.
          - speaker: A
            text: Yes, both start next week. The pottery class runs on Mondays, and the watercolour class is on Wednesdays.
          - speaker: B
            text: I'd prefer the pottery, but I'm away every Monday for work. Is there another pottery group?
          - speaker: A
            text: There's a Thursday pottery group, actually, and it still has a couple of places left. Shall I put you down for that one?
          - speaker: B
            text: Yes please, the Thursday one would be perfect.
          - speaker: A
            text: The course is ninety pounds for the term, or seventy-five if you hold a library membership card.
          - speaker: B
            text: Oh, I do have a library card, so that's the cheaper rate for me.
          - speaker: A
            text: Lovely. Most materials are supplied, but please bring an apron, as the clay does get everywhere.
          - speaker: B
            text: No problem. And which room is the class in?
          - speaker: A
            text: We used to use the art studio upstairs, but the pottery kiln is downstairs, so the class now meets in the basement workshop.
          - speaker: B
            text: Good to know. Could I give you my details?
          - speaker: A
            text: Of course — what's your name?
          - speaker: B
            text: It's Fiona Ashworth — that's A-S-H-W-O-R-T-H.
        questions:
          - id: is2-l-q01
            stem: Which class does the woman finally enrol on?
            options:
              - The Wednesday watercolour class
              - The Monday pottery class
              - The upstairs art class
              - The Thursday pottery class
            correctIndex: 3
            explanationZh: 女士说周一要上班（"I'm away every Monday for work"），职员提到周四的陶艺班还有名额，女士回答 "the Thursday one would be perfect"，因此报名周四陶艺班。周一陶艺班被明确排除。
          - id: is2-l-q02
            stem: How much will the woman pay for the course?
            options:
              - £90
              - £75
              - £70
              - £15
            correctIndex: 1
            explanationZh: 职员报价 "ninety pounds for the term, or seventy-five if you hold a library membership card"，女士随即说 "I do have a library card"，因此按 75 英镑的优惠价付款。90 英镑是无图书馆卡的价格。
          - id: is2-l-q03
            stem: What does the man ask the woman to bring?
            options:
              - An apron
              - Her own clay
              - A set of brushes
              - A notebook
            correctIndex: 0
            explanationZh: 职员说大部分材料由中心提供，但提醒 "please bring an apron, as the clay does get everywhere"——因为黏土容易弄脏衣服，所以要自带围裙。原文说 materials are supplied，故不必自带黏土。
          - id: is2-l-q04
            stem: Where does the pottery class now take place?
            options:
              - In the upstairs art studio
              - In the library
              - In the basement workshop
              - In the main hall
            correctIndex: 2
            explanationZh: 职员说明因为窑炉在楼下，"the class now meets in the basement workshop"——如今在地下室工作间上课。楼上的美术工作室是过去的旧地点，属于 used to 引出的干扰信息。
          - id: is2-l-q05
            stem: What is the caller's surname?
            options:
              - Ashwood
              - Ashworthe
              - Ashford
              - Ashworth
            correctIndex: 3
            explanationZh: 女士报出并拼写姓名："It's Fiona Ashworth — that's A-S-H-W-O-R-T-H"。听清逐字母拼读是雅思 Part 1 的常规考点，注意与发音相近的 Ashwood、Ashford 区分。
      - id: is2-lg2
        script:
          - speaker: narrator
            text: Hello everyone, and welcome to the reopening of Northgate Central Library. I'll take a few minutes to explain what has changed while we were closed for refurbishment.
          - speaker: narrator
            text: Our opening hours are now longer. We're open from eight in the morning until eight at night on weekdays, and from ten until four on Saturdays.
          - speaker: narrator
            text: I'm afraid the top-floor local history archive is not yet open. The new climate-control system is still being installed, and the archive will reopen in September.
          - speaker: narrator
            text: The self-service machines for borrowing and returning books have moved. They used to be by the main entrance, but you'll now find them next to the lift on the ground floor.
          - speaker: narrator
            text: We've added a quiet study zone on the first floor, where talking and phone calls are not allowed. If you need to make a call, please use the seating area beside the café.
          - speaker: narrator
            text: The children's story time has proved so popular that we now run it twice a week, on Tuesday and Friday mornings, rather than only on Fridays.
          - speaker: narrator
            text: Our café now serves hot meals as well as drinks, but please note that food may not be taken into the reading rooms.
          - speaker: narrator
            text: Finally, if you join as a member today, you'll receive a free tote bag, and you can reserve books online and collect them from the front desk.
          - speaker: narrator
            text: That's everything from me — do ask any member of staff at the help desk if you can't find what you're looking for.
        questions:
          - id: is2-l-q06
            stem: When is the library open on Saturdays?
            options:
              - From 8am to 8pm
              - From 10am to 4pm
              - From 9am to 6pm
              - It is closed on Saturdays
            correctIndex: 1
            explanationZh: 讲话人说 "from ten until four on Saturdays"——周六开放时间为上午十点到下午四点。八点到八点是工作日的时间，属于典型的干扰数字。
          - id: is2-l-q07
            stem: Why is the local history archive still closed?
            options:
              - A new climate-control system is being installed
              - It is being repainted
              - The staff are being trained
              - The books are being catalogued
            correctIndex: 0
            explanationZh: 讲话人解释 "The new climate-control system is still being installed, and the archive will reopen in September"——因新的温湿度控制系统仍在安装，档案室要到九月才重开。
          - id: is2-l-q08
            stem: Where are the self-service machines now located?
            options:
              - By the main entrance
              - In the café
              - Next to the lift on the ground floor
              - On the first floor
            correctIndex: 2
            explanationZh: 讲话人强调机器已搬迁："you'll now find them next to the lift on the ground floor"——现在位于一楼电梯旁。正门口是过去的旧位置，注意 used to 引出的干扰信息。
          - id: is2-l-q09
            stem: What is NOT allowed in the quiet study zone?
            options:
              - Reading books
              - Using laptops
              - Drinking water
              - Making phone calls
            correctIndex: 3
            explanationZh: 讲话人说安静自习区 "talking and phone calls are not allowed"——禁止交谈和打电话，需要打电话请到咖啡厅旁的座位区。阅读、用电脑均未被禁止。
          - id: is2-l-q10
            stem: What do new members receive if they join today?
            options:
              - A free tote bag
              - A free hot meal
              - A free book
              - Free café drinks
            correctIndex: 0
            explanationZh: 结尾说 "if you join as a member today, you'll receive a free tote bag"——今天入会赠送一个帆布袋。会员还可在线预约取书，但那是常规权益，不是赠品。
  - id: ielts-standard-2-listening-2
    kind: listening
    title: Listening Section 2
    titleZh: 听力第二部分
    durationSeconds: 600
    groups:
      - id: is2-lg3
        script:
          - speaker: A
            text: Did you get a chance to look at our first set of bird counts from Greenwood Park, Leila?
          - speaker: B
            text: I did, and I'm worried about them. There was a music festival in the park that weekend, and the noise seems to have driven most of the birds away.
          - speaker: A
            text: So the numbers are far too low. Should we just delete that weekend and count again?
          - speaker: B
            text: Dr Halloran said we should keep the data but add extra counts on quiet weekday mornings, so we can actually show the effect of the disturbance.
          - speaker: A
            text: That makes sense. And honestly, do we need all six parks? Getting out to the two on the edge of town eats up a whole morning.
          - speaker: B
            text: I agree, let's drop those two. She said four parks are fine, as long as we keep the one beside the reservoir, because it has the widest range of species.
          - speaker: A
            text: Good. I've also been thinking that just counting the birds we can see misses a lot.
          - speaker: B
            text: Exactly. That's why I want to record the dawn chorus as well, because some species stay hidden in the trees but we can identify them from their song.
          - speaker: A
            text: Clever. So how should we divide up the report?
          - speaker: B
            text: You're stronger with graphs, so you take the data analysis, and I'll write the species descriptions. We can do the introduction together.
          - speaker: A
            text: Sounds fair. One last thing — is the assessment still a written report?
          - speaker: B
            text: No, it's changed this year. We each have to give a fifteen-minute presentation and answer questions afterwards.
        questions:
          - id: is2-l-q11
            stem: Why are the students' first bird counts unreliable?
            options:
              - They visited the wrong park
              - A music festival had frightened the birds away
              - Their equipment failed
              - They counted at the wrong time of day
            correctIndex: 1
            explanationZh: 女生解释 "There was a music festival in the park that weekend, and the noise seems to have driven most of the birds away"——音乐节的噪音把鸟吓走，导致计数偏低，与设备或地点无关。
          - id: is2-l-q12
            stem: What does Dr Halloran advise them to do with the first data?
            options:
              - Delete it and start again
              - Publish it immediately
              - Give it to another group
              - Keep it and add quiet-weekday counts for comparison
            correctIndex: 3
            explanationZh: 导师的建议是保留并补测："keep the data but add extra counts on quiet weekday mornings, so we can actually show the effect of the disturbance"——保留数据并在安静的工作日补计数，用来呈现干扰的影响，而非全部删除重来。
          - id: is2-l-q13
            stem: Why do the students decide to keep the park beside the reservoir?
            options:
              - It is the easiest one to reach
              - It has the widest range of species
              - It is the quietest park
              - It has the most visitors
            correctIndex: 1
            explanationZh: 女生转述导师的话：四个公园足够，"as long as we keep the one beside the reservoir, because it has the widest range of species"——水库旁的公园鸟类种类最丰富，必须保留。
          - id: is2-l-q14
            stem: Why does Leila want to record the dawn chorus?
            options:
              - To identify species that stay hidden in the trees
              - Because it is quicker than counting
              - Because the counts are too expensive
              - Because the tutor requires it
            correctIndex: 0
            explanationZh: 女生解释录音的价值："some species stay hidden in the trees but we can identify them from their song"——有些鸟藏在树里看不见，但能通过鸣声辨认，因此要录制黎明合唱。
          - id: is2-l-q15
            stem: How will the project be assessed this year?
            options:
              - A written report
              - A poster display
              - A presentation with questions
              - A group essay
            correctIndex: 2
            explanationZh: 男生问是否还是书面报告，女生纠正："We each have to give a fifteen-minute presentation and answer questions afterwards"——今年改为十五分钟的口头报告并现场答问。
      - id: is2-lg4
        script:
          - speaker: narrator
            text: Today I want to look at the passenger lift, and to argue that this small moving room did as much to shape the modern city as any bridge or railway.
          - speaker: narrator
            text: Lifts of a kind are ancient. Hoists powered by animals or by hand raised goods and water for centuries, but no sensible person would ride in one, because if the rope broke, the platform fell.
          - speaker: narrator
            text: The breakthrough was not power but safety. In 1853, Elisha Otis demonstrated a device that gripped the rails automatically if the rope snapped, and he proved it by having the cable cut while he stood on the platform.
          - speaker: narrator
            text: Once people trusted the lift, the logic of tall buildings changed completely. Before, the most valuable rooms were on the lower floors, because nobody wanted to climb six flights of stairs.
          - speaker: narrator
            text: After the safe lift arrived, that hierarchy turned upside down. The upper floors, once cramped servants' quarters, became the most sought-after, with the best light and the quietest air.
          - speaker: narrator
            text: The lift also made the skyscraper possible. There was no point building thirty storeys if tenants could not reach them, so the lift and the tall building rose together, each one encouraging the other.
          - speaker: narrator
            text: There were social effects too. In a lift, strangers of every rank stand pressed together in silence, and some historians see it as one of the first truly democratic spaces in the city.
          - speaker: narrator
            text: Lifts even changed how buildings were designed. Architects learned to gather the lifts into a central core, which became the structural backbone around which the rest of each floor could be freely arranged.
          - speaker: narrator
            text: Today the challenge is different again. In the tallest towers a single shaft can no longer serve every floor, so engineers are testing cars that move sideways as well as up, freeing the building from the straight vertical line.
        questions:
          - id: is2-l-q16
            stem: According to the lecturer, what was the key breakthrough for passenger lifts?
            options:
              - A more powerful engine
              - A safety device that stopped the lift falling
              - A cheaper building material
              - A faster cable
            correctIndex: 1
            explanationZh: 讲座指出 "The breakthrough was not power but safety"，具体是奥的斯发明了绳索断裂时自动卡住导轨的装置——关键在安全而非动力。
          - id: is2-l-q17
            stem: Before the safe lift, which floors were the most valuable?
            options:
              - The upper floors
              - The basement
              - The middle floors
              - The lower floors
            correctIndex: 3
            explanationZh: 讲座说在安全电梯出现前 "the most valuable rooms were on the lower floors, because nobody wanted to climb six flights of stairs"——因为没人愿意爬楼，低层最值钱。上层变贵是电梯出现之后的事。
          - id: is2-l-q18
            stem: How did the safe lift change tall buildings?
            options:
              - It made the upper floors the most desirable
              - It made buildings cheaper to heat
              - It reduced the number of storeys
              - It removed the need for stairs
            correctIndex: 0
            explanationZh: 讲座说等级"彻底颠倒"："The upper floors... became the most sought-after, with the best light and the quietest air"——上层因采光好、更安静而变得最抢手。
          - id: is2-l-q19
            stem: Why does the lecturer call the lift a democratic space?
            options:
              - Tickets were free for everyone
              - Strangers of all ranks stand together in it
              - It was funded by the public
              - Anyone could operate it
            correctIndex: 1
            explanationZh: 讲座说 "strangers of every rank stand pressed together in silence"——不同身份的陌生人在电梯里紧挨而立，史学家因此视其为城市里最早的平等空间之一。
          - id: is2-l-q20
            stem: What are engineers testing in the tallest towers today?
            options:
              - Lifts powered by animals
              - Buildings with no lifts at all
              - Lifts that move sideways as well as up
              - Much shorter lift shafts
            correctIndex: 2
            explanationZh: 结尾说最高的塔楼里单一井道已无法服务所有楼层，"engineers are testing cars that move sideways as well as up"——工程师正试验可横向移动的电梯轿厢，摆脱直上直下的限制。
  - id: ielts-standard-2-reading-1
    kind: reading
    title: Reading Section 1
    titleZh: 阅读第一部分
    durationSeconds: 1200
    groups:
      - id: is2-rg1
        passage: |-
          The Slow River of Ice

          A glacier looks like the stillest thing in nature, yet its stillness is an illusion. A glacier is not a frozen pond but a slow river: a mass of ice that flows downhill under its own colossal weight. One forms wherever winter snowfall outlasts summer melting year after year. Each new season buries the last, and the deepening snow is squeezed until its delicate crystals recrystallise into dense glacial ice. When the mass grows heavy enough — typically around fifty metres thick — it begins to move.

          That movement happens in two ways. Deep inside the glacier, where pressure is immense, the ice itself deforms: its crystals slip past one another in what physicists call plastic flow, so the body of the glacier creeps forward without breaking. Where the base rests on a film of meltwater, the whole glacier may also slide across its bed, like a skater gliding on a wet rink. Because the centre of the glacier flows faster than the edges, which drag against the valley walls, the brittle surface ice is stretched and torn into the deep cracks known as crevasses.

          Most glaciers travel at a leisurely pace of a few centimetres to a few metres a day. A small number, however, periodically "surge", accelerating to a hundred times their normal speed for months at a time before falling quiet again. Early researchers tracked such changes by hammering lines of stakes into the ice and returning each summer to measure how far they had drifted downhill; today, satellites can map the speed of ice sheets far too remote for any surveyor to visit.

          The speed of ice is more than a curiosity. Glaciers store more fresh water than all the world's rivers and lakes combined, and hundreds of millions of people depend on their summer meltwater for drinking and farming. A glacier that delivers its ice to the ocean more quickly also raises the sea level. Understanding how, and how fast, ice moves has therefore become one of the more urgent questions in earth science.
        questions:
          - id: is2-r-q01
            stem: According to the first paragraph, what causes a glacier to start moving?
            options:
              - The melting of winter snow
              - The weight of the accumulated ice
              - Cracks opening on its surface
              - The steepness of the valley floor
            correctIndex: 1
            explanationZh: 首段说冰川 "flows downhill under its own colossal weight"，并且 "When the mass grows heavy enough — typically around fifty metres thick — it begins to move"——冰体是在自身重量达到临界后才开始流动。积雪消融和山谷坡度都不是文中给出的启动条件（排除 A、D）。
          - id: is2-r-q02
            stem: In plastic flow, what allows the glacier to creep forward?
            options:
              - Ice crystals slipping past one another
              - Meltwater collecting beneath the glacier
              - The surface breaking into crevasses
              - The glacier sliding across its rocky bed
            correctIndex: 0
            explanationZh: 第二段解释塑性流动："its crystals slip past one another in what physicists call plastic flow, so the body of the glacier creeps forward without breaking"——冰晶相互滑移，使冰体不破裂地缓慢前移。底部融水与整体滑动（B、D）是另一种运动方式，不是塑性流动。
          - id: is2-r-q03
            stem: Why do crevasses form on the surface of a glacier?
            options:
              - The base of the glacier freezes onto the rock
              - Meltwater dissolves the surface ice
              - Winter snow is heavier than glacial ice
              - The centre of the glacier moves faster than its edges
            correctIndex: 3
            explanationZh: 第二段说 "Because the centre of the glacier flows faster than the edges, which drag against the valley walls, the brittle surface ice is stretched and torn into the deep cracks known as crevasses"——中间流得快、两侧受谷壁拖拽流得慢，表层脆冰被拉扯撕裂成裂隙。
          - id: is2-r-q04
            stem: What is unusual about a surging glacier?
            options:
              - It speeds up dramatically for months before slowing again
              - It flows uphill during part of the year
              - It moves only a few centimetres each day
              - It never develops any crevasses
            correctIndex: 0
            explanationZh: 第三段说少数冰川会周期性 "surge"："accelerating to a hundred times their normal speed for months at a time before falling quiet again"——数月内提速至常速的百倍，随后又恢复平静。每天几厘米是普通冰川的常速，不是涌动的特征（排除 C）。
          - id: is2-r-q05
            stem: How did early researchers measure the movement of glaciers?
            options:
              - By mapping the ice from satellites
              - By measuring the volume of summer meltwater
              - By recording how far stakes in the ice had drifted
              - By counting the layers of each winter's snow
            correctIndex: 2
            explanationZh: 第三段说早期研究者 "hammering lines of stakes into the ice and returning each summer to measure how far they had drifted downhill"——在冰面钉入成排木桩，每年夏天测量其漂移距离。卫星测速是今天才有的手段（排除 A）。
          - id: is2-r-q06
            stem: According to the final paragraph, why does the speed of glaciers matter?
            options:
              - Fast-moving glaciers open the deepest crevasses
              - Meltwater supplies and sea level both depend on how glaciers flow
              - The speed of the ice reveals the age of a valley
              - Faster glaciers are easier for surveyors to reach
            correctIndex: 1
            explanationZh: 末段指出冰川储存的淡水超过全球江河湖泊的总和，"hundreds of millions of people depend on their summer meltwater"，同时 "A glacier that delivers its ice to the ocean more quickly also raises the sea level"——流速既关系亿万人的供水，又关系海平面，因此是地球科学的紧迫问题。
      - id: is2-rg2
        passage: |-
          The Psychology of Queuing

          Few experiences are as universally disliked as waiting in a queue, yet the way we experience a wait often has little to do with how long it actually lasts. Researchers who study waiting lines have found that our sense of time is easily distorted: an unoccupied ten minutes can feel far longer than a busy twenty. This is why the psychology of queuing has become a serious concern for airports, hospitals and theme parks, where the perception of delay can matter as much as the delay itself.

          One of the most reliable findings is that occupied time feels shorter than empty time. A famous example comes from an airport that received a stream of complaints about the long wait for luggage at the carousel. Rather than speed up the baggage handlers, the airport moved the arrival gates further from the baggage hall, so that passengers spent most of the wait walking rather than standing still. The total time was unchanged, but the complaints all but vanished, because a wait filled with activity feels less onerous than one spent doing nothing.

          Uncertainty makes waiting worse. A queue that moves steadily, even if slowly, is easier to bear than one that stops and starts unpredictably, because not knowing how long a wait will last adds anxiety to boredom. This is why many services now display an estimated waiting time: the number itself may be only a rough guess, but simply having it restores a sense of control. Fairness matters too, for people will tolerate a long wait far more readily than the sight of a latecomer being served first.

          These insights have quietly reshaped the design of public spaces. The single, snaking line now common in banks and airports is not an accident; it feels fairer than several parallel queues, and it removes the frustration of choosing the "wrong" one. Mirrors were once installed beside slow lifts for a similar reason — not to speed the lift, but to give waiting passengers something to look at. The lesson, repeated across decades of research, is that a well-managed wait is often cheaper and more effective than a genuinely shorter one.
        questions:
          - id: is2-r-q07
            stem: What is the main idea of the first paragraph?
            options:
              - Queues are getting longer everywhere
              - People secretly enjoy waiting
              - Airports have the worst queues of all
              - How long a wait feels often differs from how long it lasts
            correctIndex: 3
            explanationZh: 首段主旨："the way we experience a wait often has little to do with how long it actually lasts"——等待的感受与实际时长常常关系不大，人对时间的感知容易被扭曲。
          - id: is2-r-q08
            stem: How did the airport reduce complaints about baggage waits?
            options:
              - It hired more baggage handlers
              - It reduced the number of flights
              - It made passengers walk further to the baggage hall
              - It offered passengers refunds
            correctIndex: 2
            explanationZh: 第二段说机场没有加快行李处理，而是 "moved the arrival gates further from the baggage hall, so that passengers spent most of the wait walking"——让乘客走更远的路，把站着干等变成走动，投诉几乎消失。
          - id: is2-r-q09
            stem: Why does the passage say uncertainty makes waiting worse?
            options:
              - Uncertain queues actually move faster
              - Not knowing how long a wait will last adds anxiety
              - People forget their place in the line
              - Staff deliberately work more slowly
            correctIndex: 1
