            explanationZh: 末段说 "The damage is usually invisible from the shore... it is hard to protect what cannot be seen"——破坏在岸上看不见，看不见的东西自然难以保护。
          - id: is2-r-q18
            stem: What does the final paragraph say about restoring seagrass?
