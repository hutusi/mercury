              - It cannot store carbon in cold water
            correctIndex: 2
            explanationZh: 第二段说海草床面积虽小，"acre for acre they lock away carbon far faster than tropical rainforests"——单位面积固碳速度远超热带雨林。
          - id: is2-r-q15
            stem: Why can carbon stay trapped beneath seagrass for thousands of years?
