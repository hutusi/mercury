# Local Postgres for development and E2E tests.
# Start:  docker compose up -d
# Then set DATABASE_URL=postgresql://mercury:mercury@localhost:5432/mercury in .env
# (A Homebrew/system Postgres or a Neon dev branch works just as well.)
services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: mercury
      POSTGRES_PASSWORD: mercury
      POSTGRES_DB: mercury
    ports:
      - "5432:5432"
    volumes:
      - mercury-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mercury"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mercury-pgdata:
