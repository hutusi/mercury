name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      # Pin Node explicitly: it runs next build / tsx, and its ABI must match
      # better-sqlite3's prebuilt binary. Bump to 26 once it reaches LTS.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Cache bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile

      - run: bun run lint
      - run: bun run format:check
      - run: bun run test

      - name: Validate schema and seed content against a scratch DB
        run: |
          MERCURY_DB_PATH="$RUNNER_TEMP/ci-mercury.db" bun run db:push
          MERCURY_DB_PATH="$RUNNER_TEMP/ci-mercury.db" bun run db:seed

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('bun.lock') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('bun.lock') }}-

      - name: Generate ephemeral auth secret
        run: echo "BETTER_AUTH_SECRET=$(openssl rand -base64 32)" >> "$GITHUB_ENV"

      - run: bun run build

      # After build: next-env.d.ts and .next/types only exist post-build.
      - run: bun run typecheck

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Cache bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile

      - name: Resolve Playwright version
        run: echo "PLAYWRIGHT_VERSION=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_ENV"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-${{ env.PLAYWRIGHT_VERSION }}

      # On a cache hit the download is skipped; --with-deps still installs OS libs.
      - run: bunx playwright install --with-deps chromium

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('bun.lock') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('bun.lock') }}-

      - name: Generate ephemeral auth secret
        run: echo "BETTER_AUTH_SECRET=$(openssl rand -base64 32)" >> "$GITHUB_ENV"

      - run: bun run build

      - run: bun run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
