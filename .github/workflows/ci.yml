name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mercury
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mercury
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      # Pin Node explicitly: it runs next build / tsx. Bump to 26 once it reaches LTS.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Cache bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile

      - run: bun run lint
      - run: bun run format:check
      - run: bun run test

      - name: Validate migrations and seed content against Postgres
        run: |
          bun run db:migrate
          bun run db:seed

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('bun.lock') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('bun.lock') }}-

      - name: Generate ephemeral auth secret
        run: echo "BETTER_AUTH_SECRET=$(openssl rand -base64 32)" >> "$GITHUB_ENV"

      - run: bun run build

      # After build: next-env.d.ts and .next/types only exist post-build.
      - run: bun run typecheck

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          # The E2E suite targets a dedicated `mercury_e2e` database (it resets
          # the schema on each boot); see playwright.config.ts.
          POSTGRES_DB: mercury_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mercury_e2e
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Cache bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile

      - name: Resolve Playwright version
        run: echo "PLAYWRIGHT_VERSION=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_ENV"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-${{ env.PLAYWRIGHT_VERSION }}

      # On a cache hit the download is skipped; --with-deps still installs OS libs.
      - run: bunx playwright install --with-deps chromium

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('bun.lock') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('bun.lock') }}-

      - name: Generate ephemeral auth secret
        run: echo "BETTER_AUTH_SECRET=$(openssl rand -base64 32)" >> "$GITHUB_ENV"

      - run: bun run build

      - run: bun run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
