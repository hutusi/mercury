openapi: 3.1.0
info:
  title: Mercury API
  version: "1"
  description: |
    HTTP API for native Mercury clients (iOS). Authentication uses better-auth
    bearer tokens: sign-in/sign-up responses carry the session token in the
    `set-auth-token` response header; clients send it back as
    `Authorization: Bearer <token>` and MUST NOT store cookies (a cookie sent
    without an Origin header fails better-auth's CSRF check).

    This document is executable under src/lib/api/openapi-coverage.test.ts:
    every /api/v1 route must appear here and vice versa; local references,
    auth/success metadata, path parameters, and parsed JSON request schemas
    are also checked.
servers:
  - url: /
security:
  - bearerAuth: []

paths:
  # ── better-auth (catch-all route, documented for client authors) ─────────
  /api/auth/sign-up/email:
    post:
      summary: Register with email and password
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        "200":
          description: Registered and signed in.
          headers:
            set-auth-token:
              description: Bearer token for subsequent requests (store in Keychain).
              schema: { type: string }
  /api/auth/sign-in/email:
    post:
      summary: Sign in with email and password
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Signed in.
          headers:
            set-auth-token:
              description: Bearer token for subsequent requests.
              schema: { type: string }
  /api/auth/sign-out:
    post:
      summary: Revoke the current session token
      tags: [auth]
      responses:
        "200": { description: Session revoked. }
  /api/auth/get-session:
    get:
      summary: Current session (null when unauthenticated)
      tags: [auth]
      responses:
        "200": { description: Session or null. }

  # ── account ───────────────────────────────────────────────────────────────
  /api/v1/me:
    get:
      summary: Current user, settings, and AI availability
      tags: [account]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id: { type: string }
                      name: { type: string }
                      email: { type: string }
                  settings:
                    oneOf: [{ $ref: "#/components/schemas/Settings" }, { type: "null" }]
                  aiEnabled: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/me/settings:
    put:
      summary: Atomically create settings and learner profile (onboarding)
      tags: [account]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [track]
              properties:
                track:
                  allOf: [{ $ref: "#/components/schemas/Track" }]
                  description: Becomes the learner profile's goalTrack.
                timeZone:
                  type: string
                  default: Asia/Shanghai
                  description: IANA timezone identifier used for learner-local days.
                goal:
                  type: object
                  properties:
                    targetScore: { type: [integer, "null"], minimum: 10, maximum: 990 }
                    examDate:
                      type: [string, "null"]
                      pattern: '^\d{4}-\d{2}-\d{2}$'
                    dailyMinutes: { type: integer, minimum: 5, maximum: 180 }
                    selfRatedLevel: { $ref: "#/components/schemas/SelfRatedLevel" }
      responses:
        "200":
          description: Updated settings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings: { $ref: "#/components/schemas/Settings" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
    patch:
      summary: Partially update preferences
      tags: [account]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                remindersEnabled:
                  type: boolean
                  description: Opt in/out of study reminders (dashboard nudge; future email/push).
                timeZone:
                  type: string
                  description: IANA timezone identifier used for learner-local days.
      responses:
        "200":
          description: Updated settings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings: { $ref: "#/components/schemas/Settings" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/v1/me/profile:
    get:
      summary: Learner profile (goals, skill estimates, coach memo)
      description: >
        Users without a profile row get the same shape with defaults, so
        clients never branch on null.
      tags: [account]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile: { $ref: "#/components/schemas/LearnerProfile" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      summary: Partially update learning goals
      description: >
        Absent fields stay untouched; null clears — except goalTrack, which
        can change but never clear. Changing goalTrack resets targetScore and
        examDate unless the same patch supplies them (score scales are
        track-specific). skillEstimates and coachMemo are server-owned and
        ignored if sent.
      tags: [account]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                goalTrack: { $ref: "#/components/schemas/Track" }
                targetScore:
                  oneOf: [{ type: integer }, { type: "null" }]
                  description: TOEIC 10–990; IELTS as band×10 (65 = band 6.5).
                examDate:
                  oneOf: [{ type: string }, { type: "null" }]
                  description: Local date YYYY-MM-DD.
                dailyMinutes: { type: integer, minimum: 5, maximum: 180 }
                selfRatedLevel:
                  oneOf: [{ $ref: "#/components/schemas/SelfRatedLevel" }, { type: "null" }]
      responses:
        "200":
          description: Updated profile.
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile: { $ref: "#/components/schemas/LearnerProfile" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  # ── tutor chat ────────────────────────────────────────────────────────────
  /api/v1/tutor/messages:
    get:
      summary: Tutor thread (rolling, single per user) and today's quota
      tags: [tutor]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    description: False when no AI provider is configured (POST would 503).
                  dailyLimit: { type: integer }
                  remainingToday: { type: integer }
                  messages:
                    type: array
                    description: Chronological tail of the thread (up to 50).
                    items: { $ref: "#/components/schemas/ChatMessage" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/OnboardingRequired" }
    post:
      summary: Send a message to the AI tutor and get the reply
      description: >
        Non-streaming by design (one JSON round-trip; see ADR 0013). The user
        message and the reply persist atomically — a failed AI call stores
        nothing and does not consume quota.
      tags: [tutor]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string, minLength: 1, maxLength: 4000 }
      responses:
        "200":
          description: The assistant reply.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { $ref: "#/components/schemas/ChatMessage" }
                  remainingToday: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/OnboardingRequired" }
        "409":
          description: Another tutor provider call is in flight (chat_in_progress), or this turn's claim was superseded by a stale-takeover retry (chat_claim_superseded).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "429":
          description: Daily tutor message cap reached (code chat_limit_reached).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "503":
          description: No AI provider configured (code ai_unavailable).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  # ── dashboard ─────────────────────────────────────────────────────────────
  /api/v1/plan:
    get:
      summary: Today's study plan (今日计划)
      description: >
        Deterministic, server-computed daily plan — due vocab, mistakes,
        weakest-skill practice, writing/speaking cadence, and a mock-exam
        checkpoint ramping toward the exam date, fitted to the learner's
        dailyMinutes. href values are unlocalized web paths; native clients
        map kind/refId to their own screens.
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/PlanItem" }
                  dailyMinutes: { type: integer }
                  generatedFor:
                    type: string
                    description: Local day the plan was computed for (YYYY-MM-DD).
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/OnboardingRequired" }
  /api/v1/dashboard:
    get:
      summary: Streak, due counts, and recent scores
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  goalTrack: { $ref: "#/components/schemas/Track" }
                  streak: { type: integer }
                  dueWords: { type: integer }
                  activeMistakes: { type: integer }
                  isNewUser: { type: boolean }
                  inProgressExamId: { type: ["string", "null"] }
                  lastExamEstimate:
                    oneOf: [{ $ref: "#/components/schemas/ExamEstimate" }, { type: "null" }]
                  recentScores:
                    type: array
                    items: { $ref: "#/components/schemas/RecentScore" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/OnboardingRequired" }

  # ── vocabulary / SRS ──────────────────────────────────────────────────────
  /api/v1/vocab/overview:
    get:
      summary: Word list with per-user SRS flags and aggregates (filterable by track)
      parameters: [{ $ref: "#/components/parameters/trackFilter" }]
      tags: [vocab]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  words:
                    type: array
                    items:
                      allOf:
                        - { $ref: "#/components/schemas/VocabWord" }
                        - type: object
                          properties:
                            started: { type: boolean }
                            due: { type: boolean }
                  dueCount: { type: integer }
                  freshCount: { type: integer }
                  learnedCount: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/OnboardingRequired" }
  /api/v1/vocab/study-queue:
    get:
      summary: Due cards (oldest first) topped up with unseen words
      parameters: [{ $ref: "#/components/parameters/trackFilter" }]
      tags: [vocab]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  cards:
                    type: array
                    items:
                      allOf:
                        - { $ref: "#/components/schemas/VocabWord" }
                        - type: object
                          properties:
                            wordId: { type: string }
                            isNew: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/OnboardingRequired" }
  /api/v1/vocab/grade:
    post:
      summary: SM-2 grade a flashcard (creates the card lazily)
      tags: [vocab]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wordId, grade]
              properties:
                wordId: { type: string }
                grade: { type: integer, enum: [1, 3, 4, 5] }
      responses:
        "200":
          description: New interval.
          content:
            application/json:
              schema:
                type: object
                properties:
                  intervalDays: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/v1/vocab/quiz:
    post:
      summary: Create a 30-minute server-owned quiz session
      parameters: [{ $ref: "#/components/parameters/quizTrack" }]
      tags: [vocab]
      responses:
        "201":
          description: Created; questions contain opaque ids and no answer-key signal.
          content:
            application/json:
              schema:
                type: object
                properties:
                  track: { $ref: "#/components/schemas/Track" }
                  sessionId:
                    oneOf: [{ type: string }, { type: "null" }]
                  expiresAt:
                    oneOf: [{ type: string, format: date-time }, { type: "null" }]
                  questions:
                    type: array
                    items: { $ref: "#/components/schemas/QuizQuestion" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/OnboardingRequired" }
  /api/v1/vocab/quiz/{sessionId}/answers:
    post:
      summary: Grade one opaque quiz option
      tags: [vocab]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [questionId, optionId]
              properties:
                questionId: { type: string }
                optionId: { type: string }
      responses:
        "200":
          description: Per-answer grade; score and total appear on completion.
          content:
            application/json:
              schema:
                type: object
                properties:
                  correct: { type: boolean }
                  correctOptionId: { type: string }
                  completed: { type: boolean }
                  score: { type: integer }
                  total: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Integrity" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "410": { $ref: "#/components/responses/Expired" }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  # ── reading / listening drills ────────────────────────────────────────────
  /api/v1/reading:
    get:
      summary: Reading exercises with the user's best scores (metadata only)
      parameters: [{ $ref: "#/components/parameters/trackFilter" }]
      tags: [exercises]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  exercises:
                    type: array
                    items: { $ref: "#/components/schemas/ExerciseListItem" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/OnboardingRequired" }
  /api/v1/reading/{exerciseId}:
    get:
      summary: One reading exercise, questions sanitized (no answer keys)
      tags: [exercises]
      parameters: [{ $ref: "#/components/parameters/exerciseId" }]
      responses:
        "200":
          description: Sanitized exercise (passage + questions without keys).
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/listening:
    get:
      summary: Listening exercises with the user's best scores (metadata only)
      parameters: [{ $ref: "#/components/parameters/trackFilter" }]
      tags: [exercises]
      responses:
        "200":
          description: OK
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/OnboardingRequired" }
  /api/v1/listening/{exerciseId}:
    get:
      summary: One listening exercise; includes the script for on-device TTS
      tags: [exercises]
      parameters: [{ $ref: "#/components/parameters/exerciseId" }]
      responses:
        "200":
          description: Sanitized exercise (script + questions without keys).
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/exercises/{kind}/{exerciseId}/attempts:
    post:
      summary: Grade an MCQ attempt server-side
      description: The graded result reveals correctIndex/explanationZh — only after answering.
      tags: [exercises]
      parameters:
        - name: kind
          in: path
          required: true
          schema: { type: string, enum: [reading, listening] }
        - { $ref: "#/components/parameters/exerciseId" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requestId, answers, durationSeconds]
              properties:
                requestId:
                  type: string
                  format: uuid
                  description: >-
                    Client-generated idempotency key. Replaying the same id with
                    the same answers returns the original grade without recording
                    a second attempt; reusing it for different answers is a
                    conflict (exercise_request_conflict).
                answers:
                  type: object
                  additionalProperties: { type: integer, minimum: 0, maximum: 3 }
                durationSeconds: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Graded result with per-question key and explanation.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GradedExercise" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  # ── mistakes notebook ─────────────────────────────────────────────────────
  /api/v1/mistakes:
    get:
      summary: Active and cleared mistakes (derived, sanitized)
      parameters: [{ $ref: "#/components/parameters/trackFilter" }]
      tags: [mistakes]
      responses:
        "200":
          description: Active/cleared view models; questions carry no keys.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/OnboardingRequired" }
  /api/v1/mistakes/retest:
    post:
      summary: Re-answer an active MCQ mistake (correct answer clears it)
      description: 403 (integrity) unless the question is a derived active mistake — blocks mid-exam key extraction.
      tags: [mistakes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, refId, questionId, chosenIndex]
              properties:
                kind: { type: string, enum: [reading, listening, exam] }
                refId: { type: string }
                questionId: { type: string }
                chosenIndex: { type: integer, minimum: 0, maximum: 3 }
      responses:
        "200":
          description: Result with the key revealed (post-answer).
          content:
            application/json:
              schema:
                type: object
                properties:
                  correct: { type: boolean }
                  correctIndex: { type: integer }
                  explanationZh: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Integrity" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/mistakes/vocab-retest:
    post:
      summary: Create an opaque one-question session for an active vocab mistake
      tags: [mistakes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wordId]
              properties:
                wordId: { type: string }
      responses:
        "201":
          description: Quiz session; submit through /vocab/quiz/{sessionId}/answers.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Integrity" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── mock exams (server-issued deadlines, server-side grading) ─────────────
  /api/v1/exams:
    get:
      summary: Visible exams (section metadata only) and attempt history
      parameters: [{ $ref: "#/components/parameters/examTrackFilter" }]
      tags: [exams]
      responses:
        "200":
          description: OK
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/OnboardingRequired" }
  /api/v1/exams/{examId}:
    get:
      summary: Exam intro (sections metadata, resumable attempt id)
      tags: [exams]
      parameters: [{ $ref: "#/components/parameters/examId" }]
      responses:
        "200":
          description: Intro; never contains questions.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/exams/{examId}/attempts:
    post:
      summary: Start (or resume) an attempt — idempotent
      description: The server freezes the exam sections and stamps the first section's expiresAt; clients never set timing.
      tags: [exams]
      parameters: [{ $ref: "#/components/parameters/examId" }]
      responses:
        "200":
          description: Attempt id (existing one when already in progress).
          content:
            application/json:
              schema:
                type: object
                properties:
                  attemptId: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/exams/attempts/{attemptId}:
    get:
      summary: Live attempt (sanitized), completed report, or abandoned metadata
      description: |
        in_progress: sanitized sections only, serverTime for clock-skew handling,
        deadlines as epoch-ms. completed: scores, estimate, and the full review
        including correctIndex/explanationZh. abandoned: lifecycle metadata only,
        with neither answers nor review keys.
      tags: [exams]
      parameters: [{ $ref: "#/components/parameters/attemptId" }]
      responses:
        "200":
          description: Status-discriminated attempt resource.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/exams/attempts/{attemptId}/abandon:
    post:
      summary: Abandon an in-progress attempt so a fresh one can start
      description: Owner-scoped and idempotent for already-abandoned attempts; completed attempts cannot be abandoned.
      tags: [exams]
      parameters: [{ $ref: "#/components/parameters/attemptId" }]
      responses:
        "200":
          description: Abandoned attempt metadata.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, enum: [abandoned] }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/exams/attempts/{attemptId}/answers:
    patch:
      summary: Autosave answers for the current unexpired section
      description: Always 204; late or out-of-section answers are silently dropped.
      tags: [exams]
      parameters: [{ $ref: "#/components/parameters/attemptId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers:
                  type: object
                  additionalProperties: { type: integer, minimum: 0, maximum: 3 }
      responses:
        "204": { description: Accepted (whatever passed the deadline/section filter). }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
  /api/v1/exams/attempts/{attemptId}/sections/{sectionId}/submit:
    post:
      summary: Submit a section; final section triggers server-side grading
      description: Late answers (past expiresAt + 30s grace) are discarded — only prior autosaves count.
      tags: [exams]
      parameters:
        - { $ref: "#/components/parameters/attemptId" }
        - name: sectionId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers:
                  type: object
                  additionalProperties: { type: integer, minimum: 0, maximum: 3 }
      responses:
        "200":
          description: Progress state.
          content:
            application/json:
              schema:
                type: object
                properties:
                  done: { type: boolean }
                  nextSectionIndex: { type: integer }
                  deadlines:
                    type: array
                    items: { $ref: "#/components/schemas/SectionDeadline" }
                  serverTime: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  # ── writing (AI-graded, degrades to self-assessment) ──────────────────────
  /api/v1/writing:
    get:
      summary: Writing prompts with the user's submission counts
      parameters: [{ $ref: "#/components/parameters/trackFilter" }]
      tags: [writing]
      responses:
        "200":
          description: OK
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/OnboardingRequired" }
  /api/v1/writing/{promptId}:
    get:
      summary: One prompt (never includes the model answer) + recent submissions
      tags: [writing]
      parameters: [{ $ref: "#/components/parameters/promptId" }]
      responses:
        "200":
          description: Prompt and history.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/writing/{promptId}/submissions:
    post:
      summary: Submit an essay for AI grading (degrades to self_assessed)
      tags: [writing]
      parameters: [{ $ref: "#/components/parameters/promptId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requestId, text]
              properties:
                requestId:
                  type: string
                  format: uuid
                  description: Per-user idempotency key; same input returns the original submission.
                text: { type: string, minLength: 20, maxLength: 30000 }
      responses:
        "200":
          description: Result (feedback null when degraded).
          content:
            application/json:
              schema:
                type: object
                properties:
                  submissionId: { type: string }
                  status: { $ref: "#/components/schemas/SubmissionStatus" }
                  feedback: {}
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "429":
          description: Shared daily writing/speaking provider-call cap reached (code ai_grading_limit_reached).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /api/v1/writing/submissions/{submissionId}:
    get:
      summary: Submission detail; selfAssess material only when not AI-scored
      tags: [writing]
      parameters: [{ $ref: "#/components/parameters/submissionId" }]
      responses:
        "200":
          description: Detail with feedback or selfAssess payload.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/writing/submissions/{submissionId}/retry-feedback:
    post:
      summary: Retry AI grading for a self-assessed submission
      tags: [writing]
      parameters: [{ $ref: "#/components/parameters/submissionId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requestId]
              properties:
                requestId: { type: string, format: uuid }
      responses:
        "200":
          description: Refreshed result with the graded feedback (same contract as speaking).
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "429":
          description: Shared daily writing/speaking provider-call cap reached (code ai_grading_limit_reached).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "503": { $ref: "#/components/responses/AiUnavailable" }

  # ── speaking (on-device STT, AI-graded, degrades) ─────────────────────────
  /api/v1/speaking:
    get:
      summary: Speaking prompts with the user's submission counts
      parameters: [{ $ref: "#/components/parameters/trackFilter" }]
      tags: [speaking]
      responses:
        "200":
          description: OK
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/OnboardingRequired" }
  /api/v1/speaking/{promptId}:
    get:
      summary: One prompt incl. model answer/checklist (practice material) + history
      tags: [speaking]
      parameters: [{ $ref: "#/components/parameters/promptId" }]
      responses:
        "200":
          description: Prompt and history.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/speaking/{promptId}/submissions:
    post:
      summary: Submit an on-device transcript for AI grading (degrades)
      tags: [speaking]
      parameters: [{ $ref: "#/components/parameters/promptId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requestId, transcript, durationSeconds]
              properties:
                requestId:
                  type: string
                  format: uuid
                  description: Per-user idempotency key; same input returns the original submission.
                transcript: { type: string, minLength: 10, maxLength: 20000 }
                durationSeconds: { type: integer, minimum: 0, maximum: 600 }
      responses:
        "200":
          description: Result (feedback null when degraded).
          content:
            application/json:
              schema:
                type: object
                properties:
                  submissionId: { type: string }
                  status: { $ref: "#/components/schemas/SubmissionStatus" }
                  feedback: {}
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "429":
          description: Shared daily writing/speaking provider-call cap reached (code ai_grading_limit_reached).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /api/v1/speaking/submissions/{submissionId}:
    get:
      summary: Submission detail; selfAssess material only when not AI-scored
      tags: [speaking]
      parameters: [{ $ref: "#/components/parameters/submissionId" }]
      responses:
        "200":
          description: Detail with feedback or selfAssess payload.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/speaking/submissions/{submissionId}/retry-feedback:
    post:
      summary: Retry AI grading for a self-assessed submission
      tags: [speaking]
      parameters: [{ $ref: "#/components/parameters/submissionId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requestId]
              properties:
                requestId: { type: string, format: uuid }
      responses:
        "200":
          description: Refreshed result.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "429":
          description: Shared daily writing/speaking provider-call cap reached (code ai_grading_limit_reached).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "503": { $ref: "#/components/responses/AiUnavailable" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: better-auth session token from the set-auth-token response header.

  parameters:
    exerciseId:
      name: exerciseId
      in: path
      required: true
      schema: { type: string }
    examId:
      name: examId
      in: path
      required: true
      schema: { type: string }
    attemptId:
      name: attemptId
      in: path
      required: true
      schema: { type: string }
    promptId:
      name: promptId
      in: path
      required: true
      schema: { type: string }
    submissionId:
      name: submissionId
      in: path
      required: true
      schema: { type: string }
    trackFilter:
      name: track
      in: query
      required: false
      schema: { type: string, enum: [toeic, ielts, business, all] }
      description: >-
        Track filter. Absent defaults to the learner's goal track; `all`
        lifts the filter; an invalid value is a 422.
    examTrackFilter:
      name: track
      in: query
      required: false
      schema: { type: string, enum: [toeic, ielts, all] }
      description: >-
        Exam-track filter. Absent defaults to the goal track, or `all`
        for a business goal.
    quizTrack:
      name: track
      in: query
      required: false
      schema: { $ref: "#/components/schemas/Track" }
      description: >-
        Word-pool track for the session; absent defaults to the goal track.
        Quiz sessions are single-track by design, so `all` is not accepted.

  responses:
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    OnboardingRequired:
      description: The user has not completed onboarding — no settings.onboardedAt plus profile goal track (code onboarding_required).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Integrity:
      description: The mutation is not allowed in the current state (code integrity).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    NotFound:
      description: Resource missing or not visible to this user (code not_found).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Conflict:
      description: >-
        Request conflicts with persisted state — the specific code is in the
        envelope (quiz_answer_conflict, attempt_not_abandonable,
        exercise_request_conflict, grading_request_conflict, grading_in_progress,
        or grading_claim_superseded).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Expired:
      description: Ephemeral resource expired or stale (for example quiz_session_expired or mistake_session_stale).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    ValidationFailed:
      description: Request failed Zod validation (code validation_failed, issues in details).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    AiUnavailable:
      description: AI grading is unavailable (code ai_unavailable); keep the self-assessed state.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Machine-readable contract (unauthorized, onboarding_required, integrity, not_found, conflict, quiz_answer_conflict, attempt_not_abandonable, exercise_request_conflict, grading_request_conflict, grading_in_progress, grading_claim_superseded, chat_in_progress, chat_claim_superseded, expired, quiz_session_expired, mistake_session_stale, validation_failed, invalid_json, ai_unavailable, ai_grading_limit_reached, chat_limit_reached, internal).
            message:
              type: string
              description: English debug text — not for end users.
            details: {}
    Track:
      type: string
      enum: [toeic, ielts, business]
    Settings:
      type: object
      required: [timeZone, dailyGoal, remindersEnabled, onboardedAt]
      properties:
        timeZone:
          type: string
          description: IANA timezone for streaks, plans, reminders, and daily quotas.
        dailyGoal:
          type: integer
          deprecated: true
          description: Legacy card-count goal; superseded by LearnerProfile.dailyMinutes.
        remindersEnabled: { type: boolean }
        onboardedAt:
          oneOf: [{ type: string, format: date-time }, { type: "null" }]
    SelfRatedLevel:
      type: string
      enum: [novice, elementary, intermediate, upper, advanced]
    ChatMessage:
      type: object
      properties:
        id: { type: string }
        role: { type: string, enum: [user, assistant] }
        content: { type: string }
        createdAt: { type: string, format: date-time }
    PlanItem:
      type: object
      properties:
        kind:
          type: string
          enum:
            [vocab_review, vocab_new, mistakes, reading, listening, writing, speaking, mock_exam]
        refId:
          type: string
          description: Content id for exercise/prompt/exam kinds; absent for vocab/mistakes.
        href: { type: string, description: Unlocalized web path for this item. }
        estMinutes: { type: integer }
        reasonKey:
          type: string
          enum:
            [
              dueVocab,
              newWords,
              clearMistakes,
              weakSkill,
              writingCadence,
              speakingCadence,
              examCheckpoint,
            ]
    SkillEstimate:
      type: object
      description: Server-computed ability estimate; evolves from practice/exam/AI signals.
      properties:
        estimate: { type: integer, minimum: 0, maximum: 100 }
        confidence: { type: string, enum: [low, medium, high] }
        updatedAt: { type: string, format: date-time }
    MemoItem:
      type: object
      properties:
        tag: { type: string, description: "Stable English slug, e.g. article-usage." }
        noteZh: { type: string }
        count: { type: integer }
        lastSeenAt: { type: string, format: date-time }
    LearnerProfile:
      type: object
      properties:
        goalTrack:
          oneOf: [{ $ref: "#/components/schemas/Track" }, { type: "null" }]
          description: The learner's goal track — the only track state; null only before onboarding.
        targetScore:
          oneOf: [{ type: integer }, { type: "null" }]
          description: TOEIC 10–990; IELTS as band×10 (65 = band 6.5).
        examDate:
          oneOf: [{ type: string }, { type: "null" }]
          description: Local date YYYY-MM-DD.
        dailyMinutes: { type: integer }
        selfRatedLevel:
          oneOf: [{ $ref: "#/components/schemas/SelfRatedLevel" }, { type: "null" }]
        skillEstimates:
          type: object
          description: Keys are listening/reading/writing/speaking/vocab; server-owned.
          additionalProperties: { $ref: "#/components/schemas/SkillEstimate" }
        coachMemo:
          type: object
          description: The AI tutor's rolling notes on this learner; server-owned.
          properties:
            issues:
              type: array
              items: { $ref: "#/components/schemas/MemoItem" }
            strengths:
              type: array
              items: { $ref: "#/components/schemas/MemoItem" }
    VocabWord:
      type: object
      description: Bilingual dictionary entry (zh fields are content, not localization).
      properties:
        id: { type: string }
        headword: { type: string }
        ipa: { type: string }
        pos: { type: string }
        translationZh: { type: string }
    QuizQuestion:
      type: object
      description: Opaque server-owned question; no content id or answer-key signal.
      properties:
        id: { type: string }
        direction: { type: string, enum: [en2zh, zh2en] }
        prompt: { type: string }
        options:
          type: array
          minItems: 2
          maxItems: 4
          items:
            type: object
            properties:
              id: { type: string }
              text: { type: string }
    ExerciseListItem:
      type: object
      properties:
        id: { type: string }
        track: { $ref: "#/components/schemas/Track" }
        title: { type: string }
        titleZh: { type: string }
        questionCount: { type: integer }
        best:
          oneOf:
            - type: object
              properties:
                score: { type: integer }
                total: { type: integer }
            - type: "null"
    GradedExercise:
      type: object
      properties:
        score: { type: integer }
        total: { type: integer }
        perQuestion:
          type: array
          items:
            type: object
            properties:
              questionId: { type: string }
              correctIndex: { type: integer }
              explanationZh: { type: string }
              correct: { type: boolean }
    SectionDeadline:
      type: object
      description: Epoch-ms timestamps issued by the server.
      properties:
        sectionId: { type: string }
        startedAt: { type: integer }
        expiresAt: { type: integer }
    ExamEstimate:
      oneOf:
        - type: object
          properties:
            kind: { type: string, const: toeic }
            listening: { type: integer }
            reading: { type: integer }
            total: { type: integer }
        - type: object
          properties:
            kind: { type: string, const: ielts }
            band: { type: number }
    RecentScore:
      type: object
      properties:
        kind: { type: string, enum: [reading, listening, vocab_quiz, writing, speaking, exam] }
        at: { type: string, format: date-time }
        score: { type: integer }
        total: { type: integer }
        scoreLabel: { type: ["string", "null"] }
        estimate:
          oneOf: [{ $ref: "#/components/schemas/ExamEstimate" }, { type: "null" }]
    SubmissionStatus:
      type: string
      enum: [ai_scored, self_assessed]
